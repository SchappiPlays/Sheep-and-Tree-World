<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<title>Sheep and Tree World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: monospace; }
canvas { display: block; }
#debug {
    position: fixed; top: 8px; left: 8px;
    color: rgba(255,255,255,0.6); font-size: 12px;
    pointer-events: none; z-index: 10;
    text-shadow: 1px 1px 2px #000;
    line-height: 1.6;
}
#worldMap {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    background: rgba(10,15,10,0.92);
    border: 2px solid rgba(180,160,120,0.4);
    border-radius: 8px;
    padding: 10px;
}
#worldMap h2 {
    color: rgba(220,200,160,0.8); font: bold 14px monospace;
    text-align: center; margin-bottom: 6px;
}
#mapCanvas { display: block; cursor: grab; }
#hotbar {
    position: fixed; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 3px; z-index: 20;
    background: rgba(0,0,0,0.45);
    padding: 4px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
}
.hotbar-slot {
    width: 46px; height: 46px;
    background: rgba(40,40,40,0.6);
    border: 2px solid rgba(120,120,120,0.3);
    border-radius: 4px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
}
.hotbar-slot.selected {
    border-color: rgba(255,255,255,0.85);
    background: rgba(80,80,80,0.5);
}
.hotbar-slot .block-icon {
    width: 26px; height: 26px;
    border-radius: 2px;
    position: relative;
}
.hotbar-slot .block-icon .top-face {
    position: absolute; top: 0; left: 3px;
    width: 20px; height: 10px;
    border-radius: 1px;
}
.hotbar-slot .block-icon .front-face {
    position: absolute; top: 9px; left: 3px;
    width: 20px; height: 17px;
    border-radius: 1px;
}
.hotbar-slot .count {
    position: absolute; bottom: 1px; right: 3px;
    font: bold 10px monospace;
    color: #fff; text-shadow: 1px 1px 1px #000;
}
.hotbar-slot .key-hint {
    position: absolute; top: 1px; left: 3px;
    font: 9px monospace;
    color: rgba(255,255,255,0.35);
}
#inventoryScreen {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 110;
    background: rgba(10,12,10,0.55);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(160,140,100,0.3);
    border-radius: 8px;
    padding: 16px;
    min-width: 420px;
    user-select: none;
}
#inventoryScreen h2 {
    color: rgba(220,200,160,0.85); font: bold 15px monospace;
    text-align: center; margin-bottom: 10px;
}
.inv-section-label {
    color: rgba(180,160,120,0.6); font: 11px monospace;
    margin: 10px 0 4px 2px;
}
.inv-grid {
    display: grid;
    grid-template-columns: repeat(9, 44px);
    gap: 3px;
}
.inv-slot {
    width: 44px; height: 44px;
    background: rgba(40,40,40,0.4);
    border: 2px solid rgba(100,100,100,0.2);
    border-radius: 4px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
}
.inv-slot:hover { border-color: rgba(200,180,120,0.6); background: rgba(60,55,45,0.4); }
.inv-slot.drag-over { border-color: rgba(255,220,100,0.8); background: rgba(80,70,40,0.4); }
.inv-slot .block-icon {
    width: 26px; height: 26px; border-radius: 2px; position: relative;
}
.inv-slot .block-icon .top-face {
    position: absolute; top: 0; left: 3px; width: 20px; height: 10px; border-radius: 1px;
}
.inv-slot .block-icon .front-face {
    position: absolute; top: 9px; left: 3px; width: 20px; height: 17px; border-radius: 1px;
}
.inv-slot .count {
    position: absolute; bottom: 1px; right: 3px;
    font: bold 10px monospace; color: #fff; text-shadow: 1px 1px 1px #000;
}
.inv-slot .slot-label {
    position: absolute; top: 1px; left: 3px;
    font: 9px monospace; color: rgba(255,255,255,0.3);
}
.inv-slot .block-name {
    position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
    font: 9px monospace; color: rgba(200,180,140,0.7); white-space: nowrap;
    display: none;
}
.inv-slot:hover .block-name { display: block; }
.craft-btn:not([disabled]):hover { background: rgba(80,70,40,0.8) !important; border-color: rgba(220,200,120,0.7) !important; }
.craft-row {
    display: flex; align-items: center; gap: 4px; padding: 5px 8px;
    background: rgba(40,35,25,0.4); border: 1px solid rgba(100,90,60,0.25);
    border-radius: 4px; cursor: pointer; font: 11px monospace;
    color: rgba(200,190,160,0.8); transition: background 0.15s;
}
.craft-row:hover:not(.disabled) { background: rgba(70,60,35,0.6); border-color: rgba(180,160,100,0.5); }
.craft-row.disabled { opacity: 0.4; cursor: default; }
.craft-icon { width: 16px; height: 16px; border-radius: 2px; flex-shrink: 0; }
.craft-arrow { color: rgba(180,160,100,0.5); font-size: 13px; }
.craft-cat { color: rgba(160,140,100,0.5); font: bold 10px monospace; margin: 8px 0 3px 2px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; user-select: none; }
.craft-cat:hover { color: rgba(200,180,120,0.7); }
.craft-cat::before { content: '▸ '; font-size: 10px; }
.craft-cat.open::before { content: '▾ '; }
.craft-grid { display: flex; flex-direction: column; gap: 3px; }
.craft-grid.collapsed { display: none; }
#dragGhost {
    position: fixed; pointer-events: none; z-index: 200;
    width: 30px; height: 30px; opacity: 0.85; display: none;
}
#dragGhost .top-face {
    position: absolute; top: 0; left: 3px; width: 24px; height: 12px; border-radius: 1px;
}
#dragGhost .front-face {
    position: absolute; top: 11px; left: 3px; width: 24px; height: 19px; border-radius: 1px;
}
#mainMenu {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,15,10,0.85);
    backdrop-filter: blur(8px);
    z-index: 500; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    overflow-y: auto; padding: 20px 0;
}
#mainMenu h1 {
    color: rgba(220,200,160,0.9); font: bold 36px monospace;
    text-shadow: 0 0 20px rgba(100,180,60,0.3); margin-bottom: 20px;
}
.menu-btn {
    width: 260px; padding: 14px; font: bold 16px monospace;
    background: rgba(40,60,30,0.7); color: rgba(220,210,180,0.9);
    border: 2px solid rgba(120,160,80,0.4); border-radius: 6px;
    cursor: pointer; text-align: center;
}
.menu-btn:hover { background: rgba(60,90,40,0.8); border-color: rgba(160,200,100,0.7); }
.menu-btn:disabled { opacity: 0.4; cursor: default; }
.menu-btn.delete { background: rgba(80,30,30,0.5); border-color: rgba(160,60,60,0.4); font-size: 11px; width: 80px; padding: 6px; }
.menu-btn.delete:hover { background: rgba(120,40,40,0.7); }
.save-slot {
    display: flex; align-items: center; gap: 8px; width: 360px;
    background: rgba(30,40,25,0.5); border: 1px solid rgba(100,120,70,0.3);
    border-radius: 6px; padding: 8px 12px;
}
.save-slot .info { flex: 1; color: rgba(180,170,140,0.8); font: 12px monospace; }
.save-slot .info .name { font-size: 14px; color: rgba(220,210,180,0.9); }
#saveToast {
    position: fixed; top: 12px; right: 12px; padding: 6px 14px;
    background: rgba(40,60,30,0.8); color: rgba(200,190,160,0.8);
    font: 11px monospace; border-radius: 4px; z-index: 50;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
</style>
</head>

<script type="module">
import { World, BLOCK_SIZE, BLOCK, BLOCK_COLORS, CHUNK_SIZE, getTerrainHeight, getIslandRadius, getMountainBlend, getSnowBlend, getDesertBlend, getScorchedBlend, getEnchantedBlend } from './world.js';
import { Player } from './player.js';
import { ChunkManager } from './chunks.js';
import { CreatureManager } from './creatures.js';
import { DragonManager } from './dragons.js';
import { Multiplayer } from './multiplayer.js';
import { VillageManager, placeVillageInChunk } from './villages.js';

function mix(a, b, t) { return a + (b - a) * t; }

const SKY_COLOR = 0x87CEEB;

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: devicePixelRatio < 1.5 });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.setClearColor(SKY_COLOR);
document.body.appendChild(renderer.domElement);

// ── Scene ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(SKY_COLOR, 0.0015);

// ── Camera — same FOV as game.html ──

// Build voxel terrain from actual game world
{
    const BS = BLOCK_SIZE;
    const step = 3; // sample every 3rd block for performance
    const S = BS * step; // world-space step size
    const range = 150; // world units in each direction
    const _hash = (x, z) => { const d = Math.sin(x * 127.1 + z * 311.7 + 42.0) * 43758.5453; return d - Math.floor(d); };
    const _getBiome = (wx, wz) => {
        const snow = getSnowBlend(wz), desert = getDesertBlend(wz), mtn = getMountainBlend(wx,wz), sc = getScorchedBlend(wx,wz);
        if (sc > 0.1) return 'scorched'; if (snow > 0.5) return 'snow'; if (desert > 0.5) return 'desert';
        if (mtn > 0.3) return 'mountain'; if (snow > 0) return 'snow_transition'; if (desert > 0) return 'desert_transition'; return 'grass';
    };

    // Collect block positions by color
    const blocksByColor = {};
    const addBlock = (x, y, z, color) => {
        const hex = color;
        if (!blocksByColor[hex]) blocksByColor[hex] = [];
        blocksByColor[hex].push(x, y, z);
    };

    // Terrain surface blocks
    const gridSize = Math.floor(range / S);
    for (let gx = -gridSize; gx <= gridSize; gx++) {
        for (let gz = -gridSize; gz <= gridSize; gz++) {
            const wx = gx * S, wz = gz * S;
            const h = getTerrainHeight(wx, wz);
            if (h < -0.5) continue;
            const biome = _getBiome(wx, wz);
            let color;
            if (biome === 'scorched') color = 0x2a2018;
            else if (biome === 'snow') color = 0xe0e0e8;
            else if (biome === 'snow_transition') color = 0xb0c8b0;
            else if (biome === 'desert') color = 0xd4c07a;
            else if (biome === 'desert_transition') color = 0xa0a050;
            else if (biome === 'mountain') color = 0x888888;
            else color = 0x5b8c3e; // grass
            addBlock(wx, h, wz, color);
            // Two layers below surface
            const dirt = biome === 'desert' || biome === 'desert_transition' ? 0xd4c07a : 0x8b6b3d;
            addBlock(wx, h - S, wz, dirt);
            addBlock(wx, h - S * 2, wz, 0x888888);
        }
    }

    // Trees — same logic as world.js with full canopy
    const treeRange = Math.floor(range / BS);
    for (let bx = -treeRange; bx <= treeRange; bx += 2) {
        for (let bz = -treeRange; bz <= treeRange; bz += 2) {
            if (_hash(bx * 0.37 + 7777, bz * 0.53 + 3333) > 0.06) continue;
            const jx = bx + Math.floor(_hash(bx+11,bz+22)*2);
            const jz = bz + Math.floor(_hash(bx+33,bz+44)*2);
            const wx = jx * BS, wz = jz * BS;
            const h = getTerrainHeight(wx, wz);
            const biome = _getBiome(wx, wz);
            if (biome !== 'grass' && biome !== 'desert_transition') continue;
            if (h < 1 || h > 35) continue;
            const trunkH = 4 + Math.floor(_hash(jx*1.7, jz*2.3) * 4);
            const canopyR = 2 + Math.floor(_hash(jx*3.1, jz*1.9) * 2);
            const canopyHH = canopyR * 2 + 1;
            // Trunk
            for (let ty = 1; ty <= trunkH; ty++) {
                addBlock(wx, h + ty * BS, wz, 0x6B4226);
            }
            // Canopy
            const canopyBase = h + (trunkH - 1) * BS;
            for (let dy = 0; dy < canopyHH; dy++) {
                const progress = dy / (canopyHH - 1);
                const r = Math.ceil(canopyR * (1 - progress * 0.7));
                for (let ddx = -r; ddx <= r; ddx++) {
                    for (let ddz = -r; ddz <= r; ddz++) {
                        if (ddx*ddx + ddz*ddz > r*r+1) continue;
                        addBlock(wx + ddx * BS, canopyBase + dy * BS, wz + ddz * BS, 0x2d7d2d);
                    }
                }
            }
        }
    }

    // Merge all blocks into one geometry with vertex colors for performance
    const totalBlocks = Object.values(blocksByColor).reduce((s, a) => s + a.length / 3, 0);
    const mergedPos = new Float32Array(totalBlocks * 24 * 3); // 24 verts per box
    const mergedNorm = new Float32Array(totalBlocks * 24 * 3);
    const mergedCol = new Float32Array(totalBlocks * 24 * 3);
    const mergedIdx = [];
    const tmpGeo = new THREE.BoxGeometry(S, S, S);
    const tmpPos = tmpGeo.attributes.position.array;
    const tmpNorm = tmpGeo.attributes.normal.array;
    const tmpIdx = tmpGeo.index.array;
    let vertOff = 0, idxOff = 0;
    for (const [hex, positions] of Object.entries(blocksByColor)) {
        const c = new THREE.Color(parseInt(hex));
        const count = positions.length / 3;
        for (let i = 0; i < count; i++) {
            const ox = positions[i*3], oy = positions[i*3+1], oz = positions[i*3+2];
            for (let v = 0; v < 24; v++) {
                const vi = vertOff * 3 + v * 3;
                mergedPos[vi] = tmpPos[v*3] + ox;
                mergedPos[vi+1] = tmpPos[v*3+1] + oy;
                mergedPos[vi+2] = tmpPos[v*3+2] + oz;
                mergedNorm[vi] = tmpNorm[v*3];
                mergedNorm[vi+1] = tmpNorm[v*3+1];
                mergedNorm[vi+2] = tmpNorm[v*3+2];
                mergedCol[vi] = c.r; mergedCol[vi+1] = c.g; mergedCol[vi+2] = c.b;
            }
            for (let j = 0; j < tmpIdx.length; j++) {
                mergedIdx.push(tmpIdx[j] + vertOff);
            }
            vertOff += 24;
        }
    }
    const mergedGeo = new THREE.BufferGeometry();
    mergedGeo.setAttribute('position', new THREE.Float32BufferAttribute(mergedPos, 3));
    mergedGeo.setAttribute('normal', new THREE.Float32BufferAttribute(mergedNorm, 3));
    mergedGeo.setAttribute('color', new THREE.Float32BufferAttribute(mergedCol, 3));
    mergedGeo.setIndex(mergedIdx);
    const mergedMat = new THREE.MeshStandardMaterial({ vertexColors: true });
    titleScene.add(new THREE.Mesh(mergedGeo, mergedMat));

    // Water plane
    const waterGeo = new THREE.PlaneGeometry(range * 3, range * 3);
    waterGeo.rotateX(-Math.PI / 2);
    const waterMat = new THREE.MeshStandardMaterial({ color: 0x3a7ab5, transparent: true, opacity: 0.5 });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.position.y = 0.2;
    titleScene.add(water);
}

// ── Save/Load System ──
const SAVE_KEY = 'satw_saves';

function getSaves() {
    try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); } catch { return {}; }
}

function collectSaveData() {
    return {
        time: Date.now(),
        player: { x: player.position.x, y: player.position.y, z: player.position.z, ry: player.group.rotation.y },
        inventory: JSON.parse(JSON.stringify(inventory)),
        hotbarSlots: [...hotbarSlots],
        selectedSlot,
        eggItems: JSON.parse(JSON.stringify(eggItems)),
        // Modified blocks (set by player, not generated)
        modifiedBlocks: world._modifiedBlocks ? Object.fromEntries(world._modifiedBlocks) : {},
        // Dragon data
        dragons: dragonMgr.dragons.map(bd => ({
            x: bd.x, z: bd.z, age: bd.age, angle: bd.angle,
            eggColor: bd.eggColor, wingColor: bd.wingColor, isWyvern: bd.isWyvern,
            dragonName: bd.dragonName, hp: bd.hp,
        })),
        pickedUpEggs: dragonMgr.eggs.filter(e => e.pickedUp).map((e, i) => dragonMgr.eggs.indexOf(e)),
    };
}

function saveGame(slotName) {
    const saves = getSaves();
    saves[slotName] = collectSaveData();
    localStorage.setItem(SAVE_KEY, JSON.stringify(saves));
}

// ── World (created once, reset on new game) ──
let world, chunkManager, creatures, dragonMgr, player, villageMgr;
const mp = new Multiplayer(scene);

function startGame(loadSlotName) {
    mainMenuEl.style.display = 'none';
    previewRunning = false;
    gameStarted = true;
    // Stop menu music, then start calm after fade
    if (musicSystem.current) {
        musicSystem.fadeOut(musicSystem.current);
        musicSystem.currentName = null;
        musicSystem.current = null;
        setTimeout(() => musicSystem.play('calm'), 1200);
    } else {
        musicSystem.play('calm');
    }

    // Clean up previous game if any
    if (world) {
        while (scene.children.length > 0) scene.remove(scene.children[0]);
        scene.add(ambient); scene.add(hemi); scene.add(sun); scene.add(sun.target);
    }

    world = new World();
    if (!world._modifiedBlocks) world._modifiedBlocks = new Map();
    chunkManager = new ChunkManager(scene, world);
    chunkManager.setRenderDist(settingsRenderDist);
    creatures = new CreatureManager(scene, world);
    creatures._onCreatureDrop = (item, count) => {
        for (let i = 0; i < count; i++) addToInventory(item);
        refreshUI();
    };
    creatures._onPlayerHit = (dmg, type) => {
        playerHP = Math.max(0, playerHP - dmg);
        updateHeartsUI();
        // Screen flash red
        const flash = document.createElement('div');
        flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(200,0,0,0.2);z-index:50;pointer-events:none;';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 150);
    };
    villageMgr = new VillageManager(scene, world);
    world._placeVillages = placeVillageInChunk;

    // Hook setBlock to broadcast changes in multiplayer
    const origSetBlock = world.setBlock.bind(world);
    world.setBlock = (bx, by, bz, block) => {
        origSetBlock(bx, by, bz, block);
        if (mp.active) mp.sendBlockChange(bx, by, bz, block);
    };

    // Receive remote block changes
    mp.onBlockChange = (bx, by, bz, block) => {
        origSetBlock(bx, by, bz, block);
        chunkManager.rebuildChunkAt(bx, bz);
    };

    // Receive villager sync from host
    mp.onVillagerSync = (list) => {
        if (!villageMgr) return;
        for (const r of list) {
            let best = null, bestD = 4;
            for (const v of villageMgr.villagers) {
                const dx = v.x - r.x, dz = v.z - r.z;
                const d = dx * dx + dz * dz;
                if (d < bestD) { bestD = d; best = v; }
            }
            if (best) {
                best.x = r.x; best.z = r.z;
                best.group.position.x = r.x;
                best.group.position.z = r.z;
                best.group.rotation.y = r.ry;
                best.walking = !!r.w;
            }
        }
    };

    // Receive remote attacks (host processes creature damage)
    mp.onAttack = (data) => {
        if (mp.isHost && creatures) {
            creatures.attackAt(data.x, data.z, data.angle, data.damage, 3);
        }
    };

    // Receive creature sync from host — match by cid
    mp.onCreatureSync = (list) => {
        const byId = new Map();
        for (const c of creatures.creatures) byId.set(c.cid, c);
        for (const r of list) {
            let c = byId.get(r.id);
            // Fallback: match by nearest same-type if cid doesn't match
            if (!c) {
                let bestD = 16;
                for (const cc of creatures.creatures) {
                    if (cc.type !== r.t) continue;
                    const dx = cc.x - r.x, dz = cc.z - r.z;
                    const d = dx * dx + dz * dz;
                    if (d < bestD) { bestD = d; c = cc; }
                }
            }
            if (c) {
                c.x = r.x; c.z = r.z;
                c.group.rotation.y = r.ry;
                c.walking = !!r.w;
                if (r.d && !c.dead) { c.dead = true; c.deathTimer = 0; c.hp = 0; }
            }
        }
    };
    dragonMgr = new DragonManager(scene, world);
    player = new Player(scene, world);
    saveCharColors(); // read from inputs
    applyCharColors(player);
    // Name label above player
    if (player._nameLabel) player.group.remove(player._nameLabel);
    const nameCanvas = document.createElement('canvas');
    nameCanvas.width = 256; nameCanvas.height = 48;
    const nCtx = nameCanvas.getContext('2d');
    nCtx.fillStyle = '#fff'; nCtx.font = 'bold 24px monospace'; nCtx.textAlign = 'center';
    nCtx.fillText(charColors.name, 128, 30);
    const nameTex = new THREE.CanvasTexture(nameCanvas);
    const nameMat = new THREE.SpriteMaterial({ map: nameTex, transparent: true, depthWrite: false, depthTest: true });
    const nameSprite = new THREE.Sprite(nameMat);
    nameSprite.position.y = 2.3;
    nameSprite.scale.set(1.2, 0.22, 1);
    player.group.add(nameSprite);
    player._nameLabel = nameSprite;

    dragonMgr.build((x, z) => world.getHeight(x, z));

    // Cave entrances are now natural openings in the hill ring — no beacons needed
    dragonMgr.buildCarriedEgg(player.spine);
    dragonMgr.addToInventory = addToInventory;
    dragonMgr.removeFromInventory = removeFromInventory;
    dragonMgr.getHeldItem = () => {
        const bt = hotbarSlots[selectedSlot];
        if (typeof bt === 'string' && bt.startsWith('egg_') && inventory[bt] > 0) {
            return { type: 'egg', egg: eggItems[bt] };
        }
        return null;
    };

    // Reset inventory
    for (const k in inventory) delete inventory[k];
    for (const k in eggItems) delete eggItems[k];
    hotbarSlots.fill(0);
    selectedSlot = 0;

    if (loadSlotName) {
        // Load save
        const saves = getSaves();
        const s = saves[loadSlotName];
        if (s) {
            player.position.set(s.player.x, s.player.y, s.player.z);
            player.group.rotation.y = s.player.ry || 0;
            // Restore inventory
            Object.assign(inventory, s.inventory || {});
            for (let i = 0; i < 9; i++) hotbarSlots[i] = s.hotbarSlots?.[i] || 0;
            selectedSlot = s.selectedSlot || 0;
            Object.assign(eggItems, s.eggItems || {});
            // Restore modified blocks + rebuild chunk index
            if (s.modifiedBlocks) {
                for (const [key, val] of Object.entries(s.modifiedBlocks)) {
                    world._modifiedBlocks.set(key, val);
                    // Build chunk index
                    const [mbx, mby, mbz] = key.split(',').map(Number);
                    const mcx = Math.floor(mbx / CHUNK_SIZE), mcz = Math.floor(mbz / CHUNK_SIZE);
                    const mlx = ((mbx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const mlz = ((mbz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const ck = mcx + ',' + mcz;
                    if (!world._modsByChunk.has(ck)) world._modsByChunk.set(ck, []);
                    world._modsByChunk.get(ck).push({ lx: mlx, y: mby, lz: mlz, block: val });
                }
            }
            // Restore picked up eggs
            if (s.pickedUpEggs) {
                for (const idx of s.pickedUpEggs) {
                    if (dragonMgr.eggs[idx]) {
                        dragonMgr.eggs[idx].pickedUp = true;
                        dragonMgr.eggs[idx].group.visible = false;
                    }
                }
            }
            // Restore dragons
            if (s.dragons) {
                for (const dd of s.dragons) {
                    const hy = world.getHeight(dd.x, dd.z);
                    const bd = dragonMgr._makeDragon(dd.x, dd.z, hy, dd.eggColor, dd.wingColor, dd.isWyvern);
                    bd.age = dd.age || 0;
                    bd.dragonName = dd.dragonName || 'Dragon';
                    bd.hp = dd.hp || bd.maxHP;
                    bd.angle = dd.angle || 0;
                    bd.group.rotation.y = bd.angle;
                    scene.add(bd.group);
                    dragonMgr.dragons.push(bd);
                }
            }
            _currentSaveName = loadSlotName;
            showToast('Loaded: ' + loadSlotName);
        }
    } else {
        // New game — spawn at center
        world.getOrCreateChunk(0, 0);
        const spawnY = world.getHeight(0, 0);
        player.position.set(0, spawnY, 0);
        // Generate save name
        const n = Object.keys(getSaves()).length + 1;
        _currentSaveName = 'Save ' + n;
        showToast('New game started');
    }

    refreshUI();
    if (!_animStarted) { _animStarted = true; animate(); }
}

}

function updatePreviewHair() {
    if (!previewModel || !previewModel._hairGroup) return;
    const g = previewModel._hairGroup;
    while (g.children.length) g.remove(g.children[0]);
    const rc = charColors.hair;
    const tc = charColors.hairGradient ? (charColors.hairTip || rc) : rc;
    const style = charColors.hairStyle || 'short';
    // Gradient box helper
    const hg = (w,h,d,c1,c2,x,y,z,rx,ry,rz) => {
        const geo = new THREE.BoxGeometry(w,h,d);
        const mat = new THREE.MeshStandardMaterial({ vertexColors: true });
        const pos = geo.attributes.position;
        const cols = new Float32Array(pos.count * 3);
        const a = new THREE.Color(c1), b = new THREE.Color(c2), tmp = new THREE.Color();
        for (let i = 0; i < pos.count; i++) {
            const t = Math.max(0, Math.min(1, 0.5 - (pos.getY(i) / h)));
            tmp.copy(a).lerp(b, t);
            cols[i*3] = tmp.r; cols[i*3+1] = tmp.g; cols[i*3+2] = tmp.b;
        }
        geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x||0,y||0,z||0);
        if (rx||ry||rz) mesh.rotation.set(rx||0,ry||0,rz||0);
        return mesh;
    };
    if (style==='short') { g.add(hg(0.24,0.08,0.24,rc,tc,0,0.13,0)); }
    else if (style==='flat') { g.add(hg(0.26,0.12,0.26,rc,tc,0,0.10,0)); g.add(hg(0.24,0.04,0.24,rc,tc,0,0.16,0)); }
    else if (style==='long') { g.add(hg(0.24,0.08,0.24,rc,tc,0,0.13,0)); g.add(hg(0.24,0.28,0.06,rc,tc,0,-0.02,-0.12)); g.add(hg(0.06,0.20,0.18,rc,tc,-0.13,0,0)); g.add(hg(0.06,0.20,0.18,rc,tc,0.13,0,0)); }
    else if (style==='mohawk') { g.add(hg(0.06,0.16,0.22,rc,tc,0,0.18,0)); }
    else if (style==='messy') { g.add(hg(0.26,0.10,0.26,rc,tc,0,0.14,0,0,0.15,0)); g.add(hg(0.08,0.08,0.08,rc,tc,-0.10,0.18,0.08,0,0,0.3)); g.add(hg(0.07,0.09,0.07,rc,tc,0.08,0.19,-0.06,0,0,-0.4)); g.add(hg(0.06,0.07,0.06,rc,tc,0,0.20,0.10,0.3,0,0)); }
    else if (style==='curly') { for(let i=0;i<8;i++){const a2=(i/8)*Math.PI*2;g.add(hg(0.07,0.07,0.07,rc,tc,Math.cos(a2)*0.10,0.13+Math.sin(i*1.5)*0.03,Math.sin(a2)*0.10));} g.add(hg(0.18,0.06,0.18,rc,rc,0,0.12,0)); }
    else if (style==='ponytail') { g.add(hg(0.24,0.08,0.24,rc,rc,0,0.13,0)); g.add(hg(0.06,0.06,0.06,rc,rc,0,0.08,-0.13)); g.add(hg(0.05,0.18,0.05,rc,tc,0,-0.04,-0.16)); g.add(hg(0.06,0.06,0.06,tc,tc,0,-0.14,-0.18)); }
    else if (style==='spiky') { g.add(hg(0.22,0.05,0.22,rc,rc,0,0.12,0)); for(let i=0;i<5;i++){const a2=(i/5)*Math.PI*2+0.3;const s=hg(0.04,0.12,0.04,rc,tc,Math.cos(a2)*0.06,0.20,Math.sin(a2)*0.06);s.rotation.set(Math.sin(a2)*0.4,0,Math.cos(a2)*0.4);g.add(s);} }
    else if (style==='bowl') { g.add(hg(0.26,0.10,0.26,rc,tc,0,0.10,0)); g.add(hg(0.24,0.04,0.24,tc,tc,0,0.04,0)); g.add(hg(0.26,0.03,0.08,tc,tc,0,0.02,0.12)); }
}

const MUSIC_TRACKS = {
    calm: 'Field at First Light.mp3',
    menu: 'Windswept Kingdoms.mp3',
    // Add more tracks here as they're generated:
    // combat: 'combat_track.mp3',
    // cave: 'cave_ambient.mp3',
    // night: 'night_theme.mp3',
};
const musicSystem = {
    tracks: {},
    current: null,
    currentName: null,
    _initDone: false,
    init() {
        if (this._initDone) return;
        this._initDone = true;
        for (const [name, file] of Object.entries(MUSIC_TRACKS)) {
            const audio = new Audio(file);
            audio.loop = true;
            audio.volume = musicVolume;
            this.tracks[name] = audio;
        }
    },
    play(name) {
        if (!this._initDone) this.init();
        const track = this.tracks[name];
        if (!track) return;
        // If already playing this track and not paused, skip
        if (this.currentName === name && this.current && !this.current.paused) return;
        if (this.current && this.current !== track) this.fadeOut(this.current);
        track.volume = 0;
        if (this.currentName !== name) track.currentTime = 0;
        track.play().then(() => console.log('[Music] Playing:', name)).catch(e => console.log('[Music] Blocked:', name, e.message));
        this.current = track;
        this.currentName = name;
        this._fadeIn(track);
    },
    _fadeIn(audio) {
        const target = musicVolume;
        const step = () => {
            if (audio.volume < target - 0.02) {
                audio.volume = Math.min(target, audio.volume + 0.02);
                setTimeout(step, 50);
            } else {
                audio.volume = target;
            }
        };
        step();
    },
    fadeOut(audio) {
        const step = () => {
            if (audio.volume > 0.02) {
                audio.volume = Math.max(0, audio.volume - 0.02);
                setTimeout(step, 50);
            } else {
                audio.pause();
                audio.volume = 0;
            }
        };
        step();
    },
    setVolume(v) {
        musicVolume = v;
        if (this.current) this.current.volume = v;
    },
    stop() {
        if (this.current) { this.fadeOut(this.current); this.current = null; this.currentName = null; }
    }
};

// ── Player HP ──
let playerHP = 20, playerMaxHP = 20; // 10 hearts, each = 2 HP
let attackCooldown = 0;

// ── Projectile system ──
const projectiles = [];
const STAFF_PROPS = {
    basic_staff:     { color: 0x44aa44, speed: 18, damage: 3, size: 0.08, trail: 0x66cc66, life: 1.8 },
    fire_staff:      { color: 0xff4400, speed: 25, damage: 8, size: 0.12, trail: 0xff6600, life: 2.0 },
    ice_staff:       { color: 0x66ccff, speed: 20, damage: 6, size: 0.10, trail: 0xaaeeff, life: 2.5 },
    lightning_staff:  { color: 0xffee44, speed: 40, damage: 12, size: 0.08, trail: 0xffff88, life: 1.5 },
};

function fireProjectile(staffType) {
    const props = STAFF_PROPS[staffType];
    if (!props) return;
    // Find where crosshair (screen center) points in world
    const rc = new THREE.Raycaster();
    rc.setFromCamera(new THREE.Vector2(0, 0), camera);
    // Converge with crosshair at 15 units so projectile lines up early
    const target = new THREE.Vector3().copy(rc.ray.origin).addScaledVector(rc.ray.direction, 15);
    // Spawn at player chest
    const sx = player.position.x;
    const sy = player.position.y + player.EYE_HEIGHT * 0.8;
    const sz = player.position.z;
    // Aim from spawn toward crosshair target
    const dir = new THREE.Vector3(target.x - sx, target.y - sy, target.z - sz).normalize();
    const vx = dir.x * props.speed;
    const vy = dir.y * props.speed;
    const vz = dir.z * props.speed;

    const mat = new THREE.MeshBasicMaterial({ color: props.color, transparent: true, opacity: 0.9 });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(props.size, 6, 4), mat);
    mesh.position.set(sx, sy, sz);
    scene.add(mesh);

    // Glow light
    const light = new THREE.PointLight(props.color, 2, 8);
    light.position.copy(mesh.position);
    scene.add(light);

    projectiles.push({
        mesh, light, x: sx, y: sy, z: sz,
        vx, vy, vz,
        life: props.life, age: 0,
        damage: props.damage, staffType,
        trailColor: props.trail,
    });
}

function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.age += dt;
        if (p.age > p.life) {
            scene.remove(p.mesh); scene.remove(p.light);
            p.mesh.geometry.dispose(); p.mesh.material.dispose();
            projectiles.splice(i, 1);
            continue;
        }
        // Gravity for fire, none for lightning
        if (p.staffType === 'fire_staff') p.vy -= 5 * dt;

        p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
        p.mesh.position.set(p.x, p.y, p.z);
        p.light.position.set(p.x, p.y, p.z);

        // Fade out
        p.mesh.material.opacity = 1 - (p.age / p.life) * 0.5;
        p.light.intensity = 2 * (1 - p.age / p.life);

        // Hit terrain — destroy on contact
        if (world && world.isSolid(p.x, p.y, p.z)) {
            scene.remove(p.mesh); scene.remove(p.light);
            p.mesh.geometry.dispose(); p.mesh.material.dispose();
            projectiles.splice(i, 1);
            continue;
        }

        // Hit creatures
        if (creatures) {
            for (const sh of creatures.creatures) {
                if (sh.dead) continue;
                const dx = sh.x - p.x, dz = sh.z - p.z;
                const dy = (world.getHeight(sh.x, sh.z) + 0.5) - p.y;
                if (dx * dx + dy * dy + dz * dz < 2) {
                    sh.hp -= p.damage;
                    sh.x += dx * 0.1; sh.z += dz * 0.1; // tiny knockback
                    if (sh.hp <= 0) { sh.hp = 0; sh.dead = true; sh.deathTimer = 0; sh.walking = false; sh.speed = 0; }
                    scene.remove(p.mesh); scene.remove(p.light);
                    p.mesh.geometry.dispose(); p.mesh.material.dispose();
                    projectiles.splice(i, 1);
                    break;
                }
            }
        }
    }
}

// ── World Map ──
const worldMapEl = document.getElementById('worldMap');
const mapCanvas = document.getElementById('mapCanvas');
const mapCtx = mapCanvas.getContext('2d');
let mapOpen = false;
let mapViewX = 0, mapViewZ = 0, mapViewSize = 1200;
let mapDragging = false, mapDragX = 0, mapDragY = 0, mapDragVX = 0, mapDragVZ = 0, mapDidDrag = false;
let mapCache = null, mapCacheVX = null, mapCacheVZ = null, mapCacheSize = null;

function drawWorldMap() {
    const w = mapCanvas.width, h = mapCanvas.height;
    const scale = w / (mapViewSize * 2);

    // Only redraw terrain if view changed
    if (!mapCache || mapCacheVX !== mapViewX || mapCacheVZ !== mapViewZ || mapCacheSize !== mapViewSize) {
        mapCtx.fillStyle = '#1a2a1a';
        mapCtx.fillRect(0, 0, w, h);

        // Draw terrain pixel by pixel
        const step = 4; // render every 4th pixel for speed
        for (let px = 0; px < w; px += step) {
            for (let py = 0; py < h; py += step) {
                const wx = (px / scale) + mapViewX - mapViewSize;
                const wz = (py / scale) + mapViewZ - mapViewSize;

                const dist = Math.sqrt(wx * wx + wz * wz);
                const localR = getIslandRadius(wx, wz);

                if (dist > localR - 20) {
                    mapCtx.fillStyle = '#2a5a8a'; // ocean
                    mapCtx.fillRect(px, py, step, step);
                    continue;
                }

                // Beach
                if (dist > localR - 50) {
                    mapCtx.fillStyle = '#c4b890';
                    mapCtx.fillRect(px, py, step, step);
                    continue;
                }

                const th = getTerrainHeight(wx, wz);
                const snow = getSnowBlend(wz);
                const desert = getDesertBlend(wz);
                const mtn = getMountainBlend(wx, wz);
                const ench = getEnchantedBlend(wx, wz);
                const scorch = getScorchedBlend(wx, wz);

                let r, g, b;
                if (scorch > 0.05) {
                    const sv = Math.floor(20 + th * 2 - scorch * 15);
                    r = sv + 5; g = sv; b = sv;
                } else if (ench > 0.1) {
                    const eT = Math.min(1, (ench - 0.1) / 0.5);
                    r = Math.floor(60 + th * 3 + eT * 50);
                    g = Math.floor(30 + th * 5 + eT * 20);
                    b = Math.floor(80 + th * 5 + eT * 100);
                } else if (mtn > 0.15) {
                    const rockT = Math.min(1, (mtn - 0.15) / 0.5);
                    const base = 80 + Math.floor(rockT * 100);
                    r = base; g = base - 5; b = base - 10;
                } else if (snow > 0) {
                    r = Math.floor(40 + th * 5 + snow * 180);
                    g = Math.floor(80 + th * 10 + snow * 155);
                    b = Math.floor(30 + snow * 215);
                } else if (desert > 0) {
                    r = Math.floor(40 + th * 5 + desert * 170);
                    g = Math.floor(80 + th * 10 + desert * 110);
                    b = Math.floor(30 + desert * 90);
                } else {
                    r = Math.floor(40 + th * 5);
                    g = Math.min(140, Math.floor(80 + th * 15));
                    b = 30;
                }

                mapCtx.fillStyle = `rgb(${Math.min(255,r)},${Math.min(255,g)},${Math.min(255,b)})`;
                mapCtx.fillRect(px, py, step, step);
            }
        }
        mapCache = mapCtx.getImageData(0, 0, w, h);
        mapCacheVX = mapViewX; mapCacheVZ = mapViewZ; mapCacheSize = mapViewSize;
    } else {
        mapCtx.putImageData(mapCache, 0, 0);
    }

    // Player marker
    const ppx = (player.position.x - mapViewX + mapViewSize) * scale;
    const ppy = (player.position.z - mapViewZ + mapViewSize) * scale;
    const angle = player.group.rotation.y;
    mapCtx.fillStyle = '#ff3333';
    mapCtx.beginPath();
    mapCtx.moveTo(ppx + Math.sin(angle) * 8, ppy + Math.cos(angle) * 8);
    mapCtx.lineTo(ppx + Math.sin(angle + 2.5) * 5, ppy + Math.cos(angle + 2.5) * 5);
    mapCtx.lineTo(ppx + Math.sin(angle - 2.5) * 5, ppy + Math.cos(angle - 2.5) * 5);
    mapCtx.closePath();
    mapCtx.fill();

    // Coord label
    mapCtx.fillStyle = 'rgba(200,190,170,0.7)';
    mapCtx.font = '11px monospace';
    mapCtx.textAlign = 'left';
    mapCtx.fillText(`X: ${player.position.x.toFixed(0)}  Z: ${player.position.z.toFixed(0)}`, 8, h - 8);
}

// Map drag
mapCanvas.addEventListener('mousedown', e => {
    mapDragging = true; mapDidDrag = false;
    mapDragX = e.clientX; mapDragY = e.clientY;
    mapDragVX = mapViewX; mapDragVZ = mapViewZ;
    mapCanvas.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', e => {
    if (!mapDragging) return;
    const dxPx = e.clientX - mapDragX, dyPx = e.clientY - mapDragY;
    if (Math.abs(dxPx) > 3 || Math.abs(dyPx) > 3) mapDidDrag = true;
    const rect = mapCanvas.getBoundingClientRect();
    const canvasScale = mapCanvas.width / rect.width;
    const pixToWorld = (mapViewSize * 2) / mapCanvas.width;
    mapViewX = mapDragVX - dxPx * canvasScale * pixToWorld;
    mapViewZ = mapDragVZ - dyPx * canvasScale * pixToWorld;
    drawWorldMap();
});
document.addEventListener('mouseup', () => {
    if (mapDragging) { mapDragging = false; mapCanvas.style.cursor = 'grab'; }
});
mapCanvas.addEventListener('wheel', e => {
    if (!mapOpen) return;
    e.preventDefault(); e.stopPropagation();
    const zf = e.deltaY > 0 ? 1.15 : 1 / 1.15;
    mapViewSize = Math.max(50, Math.min(2500, mapViewSize * zf));
    drawWorldMap();
}, { passive: false });

function addToInventory(key, eggData) {
    if (typeof key === 'string' && key.startsWith('egg_') && eggData) {
        eggItems[key] = eggData;
        inventory[key] = 1;
    } else {
        inventory[key] = (inventory[key] || 0) + 1;
    }
    if (!hotbarSlots.includes(key)) {
        const emptyIdx = hotbarSlots.indexOf(0);
        if (emptyIdx >= 0) hotbarSlots[emptyIdx] = key;
    }
    refreshUI();
}

function removeFromInventory(blockType) {
    if (!inventory[blockType]) return false;
    inventory[blockType]--;
    if (inventory[blockType] <= 0) {
        delete inventory[blockType];
        for (let i = 0; i < hotbarSlots.length; i++)
            if (hotbarSlots[i] === blockType) hotbarSlots[i] = 0;
    }
    refreshUI();
    return true;
}

// Inventory interaction — click to move items between hotbar and inventory
let heldItem = null;

function onInvSlotClick(e) {
    const slot = e.currentTarget;
    const area = slot.dataset.area;
    const idx = parseInt(slot.dataset.idx);

    if (!heldItem) {
        // ── Pick up from slot ──
        if (area === 'hotbar') {
            const item = hotbarSlots[idx];
            if (item && inventory[item] > 0) {
                heldItem = item;
                hotbarSlots[idx] = 0;
            }
        } else {
            // Get item key from the inventory list
            const allItems = Object.keys(inventory).filter(k => inventory[k] > 0).map(k => isNaN(k) ? k : Number(k));
            const item = idx < allItems.length ? allItems[idx] : null;
            if (item && inventory[item] > 0) {
                heldItem = item;
            }
        }
        if (heldItem) showDragGhost(heldItem);
        refreshUI();
    } else {
        // ── Drop held item ──
        if (area === 'hotbar') {
            // Swap with hotbar slot
            const existing = hotbarSlots[idx];
            hotbarSlots[idx] = heldItem;
            heldItem = (existing && existing !== heldItem && inventory[existing] > 0) ? existing : null;
        } else {
            // Drop back — remove from any hotbar slot it might be on, it stays in inventory
            // Just clear held
            heldItem = null;
        }
        if (heldItem) showDragGhost(heldItem);
        else hideDragGhost();
        refreshUI();
    }
}

// ── DDA Raycast helper ──
const _raycaster = new THREE.Raycaster();
const _mouse = new THREE.Vector2();

function raycastBlock(e) {
    if (pointerLocked || !e) {
        // When pointer locked or no event, ray from screen center (crosshair)
        _mouse.x = 0;
        _mouse.y = 0;
    } else {
        _mouse.x = (e.clientX / innerWidth) * 2 - 1;
        _mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    }
    _raycaster.setFromCamera(_mouse, camera);

    const origin = _raycaster.ray.origin;
    const dir = _raycaster.ray.direction;
    const BS = BLOCK_SIZE;
    const yOff = 128;

    let x = Math.floor(origin.x / BS);
    let y = Math.floor(origin.y / BS) + yOff;
    let z = Math.floor(origin.z / BS);

    const stepX = dir.x >= 0 ? 1 : -1;
    const stepY = dir.y >= 0 ? 1 : -1;
    const stepZ = dir.z >= 0 ? 1 : -1;
    const tDeltaX = dir.x !== 0 ? Math.abs(BS / dir.x) : Infinity;
    const tDeltaY = dir.y !== 0 ? Math.abs(BS / dir.y) : Infinity;
    const tDeltaZ = dir.z !== 0 ? Math.abs(BS / dir.z) : Infinity;
    let tMaxX = dir.x !== 0 ? ((dir.x > 0 ? (Math.floor(origin.x/BS)+1)*BS - origin.x : Math.floor(origin.x/BS)*BS - origin.x) / dir.x) : Infinity;
    let tMaxY = dir.y !== 0 ? ((dir.y > 0 ? (Math.floor(origin.y/BS)+1)*BS - origin.y : Math.floor(origin.y/BS)*BS - origin.y) / dir.y) : Infinity;
    let tMaxZ = dir.z !== 0 ? ((dir.z > 0 ? (Math.floor(origin.z/BS)+1)*BS - origin.z : Math.floor(origin.z/BS)*BS - origin.z) / dir.z) : Infinity;

    const maxSteps = Math.ceil(18 / BS) + 5;
    let prevX = x, prevY = y, prevZ = z;

    for (let i = 0; i < maxSteps; i++) {
        const block = world.getBlockAt(x, y, z);
        if (block !== BLOCK.AIR && block !== BLOCK.WATER && block !== BLOCK.BEDROCK) {
            // Face normal = direction we entered from
            const nx = prevX - x, ny = prevY - y, nz = prevZ - z;
            return { x, y, z, block, prevX, prevY, prevZ, nx, ny, nz };
        }
        prevX = x; prevY = y; prevZ = z;
        if (tMaxX < tMaxY) {
            if (tMaxX < tMaxZ) { x += stepX; tMaxX += tDeltaX; }
            else { z += stepZ; tMaxZ += tDeltaZ; }
        } else {
            if (tMaxY < tMaxZ) { y += stepY; tMaxY += tDeltaY; }
            else { z += stepZ; tMaxZ += tDeltaZ; }
        }
    }
    return null;
}

function rebuildNear(bx, bz) {
    chunkManager.rebuildChunkAt(bx, bz);
    const lx = ((bx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    const lz = ((bz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    if (lx === 0) chunkManager.rebuildChunkAt(bx - 1, bz);
    if (lx === CHUNK_SIZE - 1) chunkManager.rebuildChunkAt(bx + 1, bz);
    if (lz === 0) chunkManager.rebuildChunkAt(bx, bz - 1);
    if (lz === CHUNK_SIZE - 1) chunkManager.rebuildChunkAt(bx, bz + 1);
}

// Check if a wood block is part of a natural tree (has wood above + leaves nearby)
function isNaturalTree(bx, by, bz) {
    // Check if this wood block was player-placed
    if (world._modifiedBlocks.has(bx + ',' + by + ',' + bz)) return false;
    // Check for wood above and leaves somewhere in vicinity
    let hasWoodAbove = false, hasLeaves = false;
    for (let dy = 1; dy <= 10; dy++) {
        const b = world.getBlockAt(bx, by + dy, bz);
        if (b === BLOCK.WOOD) hasWoodAbove = true;
        if (b === BLOCK.LEAVES) { hasLeaves = true; break; }
        if (b === BLOCK.AIR && hasWoodAbove) {
            // Check around for leaves
            for (let dx = -2; dx <= 2; dx++) for (let ddz = -2; ddz <= 2; ddz++) {
                if (world.getBlockAt(bx + dx, by + dy, bz + ddz) === BLOCK.LEAVES) { hasLeaves = true; break; }
            }
            if (hasLeaves) break;
        }
        if (b !== BLOCK.WOOD && b !== BLOCK.LEAVES) break;
    }
    return hasLeaves;
}

// Tree felling — break all connected WOOD above, then flood-fill remove all connected LEAVES
function fellTree(bx, by, bz, rebuildSet) {
    // 1. Break all wood blocks going straight up
    let topY = by;
    for (let dy = 1; dy < 40; dy++) {
        const ty = by + dy;
        const b = world.getBlockAt(bx, ty, bz);
        if (b === BLOCK.WOOD) {
            addToInventory(getBlockDrop(b));
            world.setBlock(bx, ty, bz, BLOCK.AIR);
            rebuildSet.add(bx + ',' + bz);
            topY = ty;
        } else {
            break;
        }
    }
    // 2. Flood-fill break all leaves connected to where the trunk was
    // Search a generous box around the trunk column
    const R = 5, VR = 6;
    for (let dx = -R; dx <= R; dx++) {
        for (let dz = -R; dz <= R; dz++) {
            for (let dy = -2; dy <= VR; dy++) {
                const lx = bx + dx, ly = topY + dy, lz = bz + dz;
                if (world.getBlockAt(lx, ly, lz) === BLOCK.LEAVES) {
                    addToInventory(getBlockDrop(BLOCK.LEAVES));
                    world.setBlock(lx, ly, lz, BLOCK.AIR);
                    rebuildSet.add(lx + ',' + lz);
                }
            }
        }
    }
}

// Block break times (seconds) — [no pickaxe, wood pickaxe, stone pickaxe]
const BREAK_TIME = {
    [BLOCK.GRASS]: [0.4, 0.2, 0.1],
    [BLOCK.DIRT]: [0.4, 0.2, 0.1],
    [BLOCK.SAND]: [0.3, 0.15, 0.08],
    [BLOCK.CLAY]: [0.5, 0.25, 0.12],
    [BLOCK.GRAVEL]: [0.5, 0.25, 0.12],
    [BLOCK.WOOD]: [0.8, 0.3, 0.15],
    [BLOCK.PLANKS]: [0.6, 0.25, 0.12],
    [BLOCK.LEAVES]: [0.15, 0.1, 0.05],
    [BLOCK.SNOW]: [0.3, 0.15, 0.08],
    [BLOCK.STONE]: [Infinity, 0.6, 0.25],    // requires pickaxe
    [BLOCK.IRON_ORE]: [Infinity, 0.8, 0.35],  // requires pickaxe
    [BLOCK.CRAFTING]: [0.8, 0.3, 0.15],
    [BLOCK.COAL_ORE]: [Infinity, 0.5, 0.2],
    16: [Infinity, 0.5, 0.2],  // COAL_ORE fallback
    [BLOCK.DIAMOND_ORE]: [Infinity, Infinity, 0.5],  // needs iron pickaxe

    [BLOCK.GOLD_ORE]: [Infinity, 0.8, 0.3],  // needs stone+ pickaxe
    18: [Infinity, 0.8, 0.3],
    [BLOCK.FURNACE]: [1.0, 0.5, 0.25],
    15: [1.0, 0.5, 0.25],  // FURNACE fallback
};

mineBarEl.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,20px);width:60px;height:6px;background:rgba(0,0,0,0.5);border-radius:3px;z-index:15;display:none;';

renderer.domElement.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    if (mapOpen || inventoryOpen || craftingTableOpen || furnaceOpen) return;

    // Rotate player to face camera direction on click, angled slightly for staff aiming
    if (useMouseLook && pointerLocked) {
        const held = hotbarSlots[selectedSlot];
        const staffAimOffset = STAFF_PROPS[held] ? 0.15 : 0;
        player.group.rotation.y = fpYaw + staffAimOffset;
    }

    // Always swing on left click
    player.triggerSwing();

    // Sword attack — damage creatures in front of player
    const held = hotbarSlots[selectedSlot];
    const swordDmg = SWORD_DAMAGE[held];
    if (swordDmg && inventory[held] > 0 && attackCooldown <= 0) {
        player.triggerSwing();
        attackCooldown = 0.5;
        if (creatures && creatures.attackAt) creatures.attackAt(player.position.x, player.position.z, player.group.rotation.y, swordDmg, 3);
        if (mp.active) mp.sendAttack(player.position.x, player.position.z, player.group.rotation.y, swordDmg);
        return;
    }
    // Staff — fire projectile (delay 1 frame so camera catches up to new rotation)

        const staffType = held;
        requestAnimationFrame(() => requestAnimationFrame(() => fireProjectile(staffType)));
        return;
    }

    miningHeld = true;
    const hit = raycastBlock(e);
    if (!hit) return;
    const hasWoodPick = held === 'pickaxe' && inventory['pickaxe'] > 0;
    const hasStonePick = held === 'stone_pickaxe' && inventory['stone_pickaxe'] > 0;
    const hasIronPick = held === 'iron_pickaxe' && inventory['iron_pickaxe'] > 0;
    const hasDiamondPick = held === 'diamond_pickaxe' && inventory['diamond_pickaxe'] > 0;
    const hasGoldPick = held === 'gold_pickaxe' && inventory['gold_pickaxe'] > 0;
    const hasPickaxe = hasWoodPick || hasStonePick || hasIronPick || hasDiamondPick || hasGoldPick;
    const hasWoodAxe = held === 'wood_axe' && inventory['wood_axe'] > 0;
    const hasStoneAxe = held === 'stone_axe' && inventory['stone_axe'] > 0;
    const hasIronAxe = held === 'iron_axe' && inventory['iron_axe'] > 0;
    const hasDiamondAxe = held === 'diamond_axe' && inventory['diamond_axe'] > 0;
    const hasGoldAxe = held === 'gold_axe' && inventory['gold_axe'] > 0;
    const hasAxe = hasWoodAxe || hasStoneAxe || hasIronAxe || hasDiamondAxe || hasGoldAxe;
    const pickTier = hasDiamondPick ? 2 : hasIronPick ? 2 : hasGoldPick ? 2 : hasStonePick ? 2 : hasWoodPick ? 1 : 0;
    // Only use majority block for break time when snap grid is MANUALLY enabled (G key)
    let bt = hit.block;
    if (snapGrid) {
        const snap = v => Math.floor(v / 2) * 2;
        const bx0 = snap(hit.x), by0 = snap(hit.y), bz0 = snap(hit.z);
        const counts = {};
        for (let dx = 0; dx < 2; dx++)
            for (let dy = 0; dy < 2; dy++)
                for (let dz = 0; dz < 2; dz++) {
                    const b = world.getBlockAt(bx0+dx, by0+dy, bz0+dz);
                    if (b !== 0 && b !== 5 && b !== 7) counts[b] = (counts[b] || 0) + 1;
                }
        let maxCount = 0;
        for (const [block, count] of Object.entries(counts)) {
            if (count > maxCount) { maxCount = count; bt = Number(block); }
        }
    }

    let breakTime;
    if (hasAxe) {
        // Axes: fast on wood/planks/leaves, slow on stone, can't do iron/coal
        const axeTier = hasIronAxe ? 2 : hasStoneAxe ? 1 : 0;
        const AXE_TIMES = {
            [BLOCK.WOOD]: [0.15, 0.1, 0.06],
            [BLOCK.PLANKS]: [0.15, 0.1, 0.06],
            [BLOCK.LEAVES]: [0.08, 0.05, 0.03],
            [BLOCK.CRAFTING]: [0.2, 0.15, 0.08],
            [BLOCK.STONE]: [1.5, 1.0, 0.7],
            [BLOCK.GRASS]: [0.3, 0.2, 0.1],
            [BLOCK.DIRT]: [0.3, 0.2, 0.1],
            [BLOCK.SAND]: [0.25, 0.15, 0.08],
            15: [0.5, 0.3, 0.2], // FURNACE
        };
        const axeTimes = AXE_TIMES[bt];
        if (axeTimes) breakTime = axeTimes[axeTier];
        else if (bt === BLOCK.IRON_ORE || bt === 16) breakTime = Infinity; // can't break iron/coal with axe
        else breakTime = (BREAK_TIME[bt] || [0.5, 0.25, 0.12])[0]; // default no-tool speed
    } else {
        const times = BREAK_TIME[bt] || [0.5, 0.25, 0.12];
        breakTime = times[pickTier];
    }

    if (breakTime === Infinity) return; // can't break without pickaxe

    player.triggerSwing();
    miningTarget = { x: hit.x, y: hit.y, z: hit.z, block: bt, progress: 0, time: breakTime, hit, hasPickaxe, hasAxe };
    mineBarEl.style.display = 'block';
    mineBarFill.style.width = '0%';
});

function getBlockDrop(blockType) {
    if (blockType === BLOCK.COAL_ORE) return 'coal';
    if (blockType === BLOCK.DIAMOND_ORE) return 'diamond';
    if (blockType === BLOCK.GOLD_ORE) return BLOCK.GOLD_ORE; // smelt to get gold ingot
    if (blockType === 15) return 'furnace_block'; // BLOCK.FURNACE
    return blockType;
}

function doBreakBlock(hit, hasPickaxe, hasAxe) {

    // Auto snap grid — detect underground mining (natural solid blocks above hit block)
    let useSnap = snapGrid;
    if (!useSnap && autoMineSnap) {
        // Check if there are natural blocks above — means we're underground
        // Skip planks, wood, leaves, crafting, furnace (building materials)
        const _isNatural = b => b !== 0 && b !== 5 && b !== BLOCK.WOOD && b !== BLOCK.PLANKS && b !== BLOCK.LEAVES && b !== BLOCK.CRAFTING && b !== 15;
        let solidAbove = 0;
        for (let dy = 1; dy <= 4; dy++) {
            const above = world.getBlockAt(hit.x, hit.y + dy, hit.z);
            if (_isNatural(above)) solidAbove++;
        }
        if (solidAbove >= 2) useSnap = true;
    }
    // Snap grid mode — always breaks aligned 2x2x2 cubes
    if (useSnap) {
        const snap = v => Math.floor(v / 2) * 2;
        const bx0 = snap(hit.x), by0 = snap(hit.y), bz0 = snap(hit.z);
        const rebuildSet = new Set();
        for (let dx = 0; dx < 2; dx++) {
            for (let dy = 0; dy < 2; dy++) {
                for (let dz = 0; dz < 2; dz++) {
                    const bx = bx0 + dx, by = by0 + dy, bz = bz0 + dz;
                    const block = world.getBlockAt(bx, by, bz);
                    if (block !== BLOCK.AIR && block !== BLOCK.WATER && block !== BLOCK.BEDROCK) {
                        const isTree = block === BLOCK.WOOD && isNaturalTree(bx, by, bz);
                        addToInventory(getBlockDrop(block));
                        world.setBlock(bx, by, bz, BLOCK.AIR);
                        rebuildSet.add(bx + ',' + bz);
                        if (isTree) fellTree(bx, by, bz, rebuildSet);
                    }
                }
            }
        }
        for (const key of rebuildSet) {
            const [rx, rz] = key.split(',').map(Number);
            rebuildNear(rx, rz);
        }
        return;
    }

    if (brushW > 1 || brushH > 1 || brushD > 1) {
        // Brush break — side + up + forward
        let hAxis;
        if (hit.nx !== 0) hAxis = brushRotated ? 'x' : 'z';
        else if (hit.nz !== 0) hAxis = brushRotated ? 'z' : 'x';
        else hAxis = brushRotated ? 'z' : 'x';
        const halfW = Math.floor(brushW / 2);
        const halfH = Math.floor(brushH / 2);
        const rebuildSet = new Set();
        for (let d = 0; d < brushD; d++) {
            for (let a = -halfW; a <= halfW; a++) {
                for (let b = -halfH; b <= halfH; b++) {
                    let bx = hit.x + hit.nx * d, by = hit.y + b, bz = hit.z + hit.nz * d;
                    if (hAxis === 'x') bx += a; else bz += a;
                    const block = world.getBlockAt(bx, by, bz);
                    if (block !== BLOCK.AIR && block !== BLOCK.WATER && block !== BLOCK.BEDROCK) {
                        const isTree = block === BLOCK.WOOD && isNaturalTree(bx, by, bz);
                        addToInventory(getBlockDrop(block));
                        world.setBlock(bx, by, bz, BLOCK.AIR);
                        rebuildSet.add(bx + ',' + bz);
                        if (isTree) fellTree(bx, by, bz, rebuildSet);
                    }
                }
            }
        }
        for (const key of rebuildSet) {
            const [rx, rz] = key.split(',').map(Number);
            rebuildNear(rx, rz);
        }
    } else {
        // Single block break (no pickaxe)
        const isTree = hit.block === BLOCK.WOOD && isNaturalTree(hit.x, hit.y, hit.z);
        addToInventory(getBlockDrop(hit.block));
        world.setBlock(hit.x, hit.y, hit.z, BLOCK.AIR);
        if (isTree) {
            const rs = new Set();
            rs.add(hit.x + ',' + hit.z);
            fellTree(hit.x, hit.y, hit.z, rs);
            for (const key of rs) { const [rx, rz] = key.split(',').map(Number); rebuildNear(rx, rz); }
        } else {
            rebuildNear(hit.x, hit.z);
        }
    }
}

function renderRecipeRow(r, ri, canCraft) {
    const fromInfo = getItemInfo(r.from);
    const toInfo = getItemInfo(r.to);
    const fromColor = fromInfo ? (fromInfo.front || fromInfo.top) : '#555';
    const toColor = toInfo ? (toInfo.front || toInfo.top) : '#555';
    const fromName = fromInfo ? fromInfo.name : '?';
    const toName = toInfo ? toInfo.name : '?';
    let inputs = `<span class="craft-icon" style="background:${fromColor}"></span><span>${r.fc}× ${fromName}</span>`;
    if (r.multi) {
        const altInfo = getItemInfo(r.fromAlt);
        const altColor = altInfo ? (altInfo.front || altInfo.top) : '#555';
        const altName = altInfo ? altInfo.name : '?';
        inputs += ` + <span class="craft-icon" style="background:${altColor}"></span><span>${r.fcAlt}× ${altName}</span>`;
    }
    return `<div class="craft-row${canCraft ? '' : ' disabled'}" data-ri="${ri}">
        ${inputs} <span class="craft-arrow">→</span>
        <span class="craft-icon" style="background:${toColor}"></span><span>${r.tc}× ${toName}</span>
    </div>`;
}

function doCraft(r) {
    if (!r || !r.from) return;
    if ((inventory[r.from] || 0) < r.fc) return;
    if (r.multi && (inventory[r.fromAlt] || 0) < r.fcAlt) return;
    // Consume primary
    inventory[r.from] -= r.fc;
    if (inventory[r.from] <= 0) { delete inventory[r.from]; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === r.from) hotbarSlots[i] = 0; }
    // Consume secondary
    if (r.multi) {
        inventory[r.fromAlt] -= r.fcAlt;
        if (inventory[r.fromAlt] <= 0) { delete inventory[r.fromAlt]; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === r.fromAlt) hotbarSlots[i] = 0; }
    }
    // Produce
    const toKey = r.to;
    inventory[toKey] = (inventory[toKey] || 0) + r.tc;
    // Always try to put on hotbar
    if (!hotbarSlots.includes(toKey)) {
        const ei = hotbarSlots.indexOf(0);
        if (ei >= 0) hotbarSlots[ei] = toKey;
    }
    refreshUI();
}

// Brush dimensions: side (horizontal), up (vertical), fwd (depth into surface)
let brushW = 1, brushH = 1, brushD = 1;
let brushRotated = false; // R to toggle horizontal axis

// Right click — place block or interact
let placingHeld = false;
let placeTimer = 0;
let placeHoldTime = 0;
let lastMouseX = 0, lastMouseY = 0;
const PLACE_INTERVAL = 0.05;
const PLACE_HOLD_DELAY = 0.15;
// Direction lock — locks placement to the same face normal while holding
// Waits until 2nd placement to lock, so the first block can be on any face
let placeLock = null; // { nx, ny, nz, yaw, pitch, px, py, pz } or null
let placeCount = 0;
const PLACE_LOCK_ANGLE = 0.6; // radians (~34°) before lock breaks
const PLACE_LOCK_MOVE = 1.0; // world units of player movement before lock breaks

document.addEventListener('mousemove', e => { lastMouseX = e.clientX; lastMouseY = e.clientY; });

function doPlace(e) {
    if (mapOpen || inventoryOpen || craftingTableOpen || furnaceOpen) return false;
    const mouseEvt = e || { clientX: lastMouseX, clientY: lastMouseY };
    const hit = raycastBlock(mouseEvt);
    if (!hit) return false;

    // Right-click on crafting table → open crafting menu (only on initial click, not hold)
    if ((hit.block === BLOCK.CRAFTING) && placeHoldTime < 0.05) {
        craftingTableOpen = true;
        craftTableMenuEl.style.display = 'block';
        updateCraftTableUI();
        placingHeld = false;
        if (pointerLocked) document.exitPointerLock();
        return false;
    }
    if ((hit.block === 15 || hit.block === BLOCK.FURNACE) && placeHoldTime < 0.05) {
        furnaceOpen = true;
        furnaceMenuEl.style.display = 'block';
        updateFurnaceUI();
        placingHeld = false;
        if (pointerLocked) document.exitPointerLock();
        return false;
    }

    // Direction lock — break if looked away too far or moved, reject if face normal changed
    if (placeLock) {
        let dYaw = Math.abs(fpYaw - placeLock.yaw);
        if (dYaw > Math.PI) dYaw = 2 * Math.PI - dYaw;
        const dPitch = Math.abs(fpPitch - placeLock.pitch);
        const dMove = Math.abs(player.position.x - placeLock.px) + Math.abs(player.position.y - placeLock.py) + Math.abs(player.position.z - placeLock.pz);
        if (dYaw > PLACE_LOCK_ANGLE || dPitch > PLACE_LOCK_ANGLE || dMove > PLACE_LOCK_MOVE) {
            placeLock = null; // looked away or moved — unlock
        } else if (hit.nx !== placeLock.nx || hit.ny !== placeLock.ny || hit.nz !== placeLock.nz) {
            return false; // still locked but wrong face — skip
        }
    }

    let bt = hotbarSlots[selectedSlot];
    if (!bt || !inventory[bt]) return false;
    const isFurnace = bt === 'furnace_block';
    const placeBlock = isFurnace ? 15 : bt;
    if (typeof bt === 'string' && !isFurnace) return false;

    const px = hit.prevX, py = hit.prevY, pz = hit.prevZ;
    const BS = BLOCK_SIZE;
    const yOff = 128;
    const placeWX = px * BS, placeWY = (py - yOff) * BS, placeWZ = pz * BS;
    const pdx = placeWX - player.position.x, pdz = placeWZ - player.position.z;
    const pdy = placeWY - player.position.y;
    if (Math.abs(pdx) < 0.5 && Math.abs(pdz) < 0.5 && pdy >= -0.5 && pdy < player.HEIGHT) return false;

    if (!removeFromInventory(bt)) return false;

    if (placeBlock === BLOCK.CRAFTING || placeBlock === 15) {
        for (let dx = 0; dx <= 1; dx++)
            for (let dy = 0; dy <= 1; dy++)
                for (let dz = 0; dz <= 1; dz++)
                    world.setBlock(px + dx, py + dy, pz + dz, placeBlock);
        for (let dx = 0; dx <= 1; dx++)
            for (let dz = 0; dz <= 1; dz++)
                rebuildNear(px + dx, pz + dz);
    } else {
        // Brush placement — always a vertical wall (Y + one horizontal axis)
        // Determine horizontal axis for brush
        let hAxis; // 'x' or 'z'
        if (hit.nx !== 0) hAxis = brushRotated ? 'x' : 'z';
        else if (hit.nz !== 0) hAxis = brushRotated ? 'z' : 'x';
        else hAxis = brushRotated ? 'z' : 'x';

        const halfW = Math.floor(brushW / 2);
        const halfH = Math.floor(brushH / 2);
        // On top/bottom faces, shift Y so brush builds away from surface
        let yShift = 0;
        if (hit.ny === 1) yShift = halfH;
        else if (hit.ny === -1) yShift = -halfH;
        // Depth: expand along the face normal direction (into the surface)
        const coords = [];
        for (let d = 0; d < brushD; d++) {
            for (let b = -halfH; b <= halfH; b++) {
                for (let a = -halfW; a <= halfW; a++) {
                    coords.push([a, b, d]);
                }
            }
        }
        let placedFirst = false;
        for (const [a, b, d] of coords) {
            let bx = px - hit.nx * d, by = py + b + yShift - (hit.ny !== 0 ? 0 : 0), bz = pz - hit.nz * d;
            if (hAxis === 'x') bx += a; else bz += a;
            const existing = world.getBlockAt(bx, by, bz);
            if (existing !== BLOCK.AIR && existing !== BLOCK.WATER) continue;
            if (!placedFirst) {
                world.setBlock(bx, by, bz, bt);
                rebuildNear(bx, bz);
                placedFirst = true;
            } else if (removeFromInventory(bt)) {
                world.setBlock(bx, by, bz, bt);
                rebuildNear(bx, bz);
            }
        }
    }
    // Lock direction after 2nd placement — first block can be on any face
    if (placingHeld) {
        placeCount++;
        if (!placeLock && placeCount >= 2) {
            placeLock = { nx: hit.nx, ny: hit.ny, nz: hit.nz, yaw: fpYaw, pitch: fpPitch, px: player.position.x, py: player.position.y, pz: player.position.z };
        }
    }
    return true;
}
