<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sheep and Tree World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: monospace; }
canvas { display: block; }
#debug {
    position: fixed; top: 8px; left: 8px;
    color: rgba(255,255,255,0.6); font-size: 12px;
    pointer-events: none; z-index: 10;
    text-shadow: 1px 1px 2px #000;
    line-height: 1.6;
}
#worldMap {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    background: rgba(10,15,10,0.92);
    border: 2px solid rgba(180,160,120,0.4);
    border-radius: 8px;
    padding: 10px;
}
#worldMap h2 {
    color: rgba(220,200,160,0.8); font: bold 14px monospace;
    text-align: center; margin-bottom: 6px;
}
#mapCanvas { display: block; cursor: grab; }
#hotbar {
    position: fixed; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 3px; z-index: 20;
    background: rgba(0,0,0,0.45);
    padding: 4px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
}
.hotbar-slot {
    width: 46px; height: 46px;
    background: rgba(40,40,40,0.6);
    border: 2px solid rgba(120,120,120,0.3);
    border-radius: 4px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
}
.hotbar-slot.selected {
    border-color: rgba(255,255,255,0.85);
    background: rgba(80,80,80,0.5);
}
.hotbar-slot .block-icon {
    width: 26px; height: 26px;
    border-radius: 2px;
    position: relative;
}
.hotbar-slot .block-icon .top-face {
    position: absolute; top: 0; left: 3px;
    width: 20px; height: 10px;
    border-radius: 1px;
}
.hotbar-slot .block-icon .front-face {
    position: absolute; top: 9px; left: 3px;
    width: 20px; height: 17px;
    border-radius: 1px;
}
.hotbar-slot .count {
    position: absolute; bottom: 1px; right: 3px;
    font: bold 10px monospace;
    color: #fff; text-shadow: 1px 1px 1px #000;
}
.hotbar-slot .key-hint {
    position: absolute; top: 1px; left: 3px;
    font: 9px monospace;
    color: rgba(255,255,255,0.35);
}
#inventoryScreen {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 110;
    background: rgba(10,12,10,0.94);
    border: 2px solid rgba(160,140,100,0.4);
    border-radius: 8px;
    padding: 16px;
    min-width: 420px;
    user-select: none;
}
#inventoryScreen h2 {
    color: rgba(220,200,160,0.85); font: bold 15px monospace;
    text-align: center; margin-bottom: 10px;
}
.inv-section-label {
    color: rgba(180,160,120,0.6); font: 11px monospace;
    margin: 10px 0 4px 2px;
}
.inv-grid {
    display: grid;
    grid-template-columns: repeat(9, 44px);
    gap: 3px;
}
.inv-slot {
    width: 44px; height: 44px;
    background: rgba(40,40,40,0.6);
    border: 2px solid rgba(100,100,100,0.25);
    border-radius: 4px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
}
.inv-slot:hover { border-color: rgba(200,180,120,0.6); background: rgba(60,55,45,0.5); }
.inv-slot.drag-over { border-color: rgba(255,220,100,0.8); background: rgba(80,70,40,0.5); }
.inv-slot .block-icon {
    width: 26px; height: 26px; border-radius: 2px; position: relative;
}
.inv-slot .block-icon .top-face {
    position: absolute; top: 0; left: 3px; width: 20px; height: 10px; border-radius: 1px;
}
.inv-slot .block-icon .front-face {
    position: absolute; top: 9px; left: 3px; width: 20px; height: 17px; border-radius: 1px;
}
.inv-slot .count {
    position: absolute; bottom: 1px; right: 3px;
    font: bold 10px monospace; color: #fff; text-shadow: 1px 1px 1px #000;
}
.inv-slot .slot-label {
    position: absolute; top: 1px; left: 3px;
    font: 9px monospace; color: rgba(255,255,255,0.3);
}
.inv-slot .block-name {
    position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
    font: 9px monospace; color: rgba(200,180,140,0.7); white-space: nowrap;
    display: none;
}
.inv-slot:hover .block-name { display: block; }
.craft-btn:not([disabled]):hover { background: rgba(80,70,40,0.8) !important; border-color: rgba(220,200,120,0.7) !important; }
#dragGhost {
    position: fixed; pointer-events: none; z-index: 200;
    width: 30px; height: 30px; opacity: 0.85; display: none;
}
#dragGhost .top-face {
    position: absolute; top: 0; left: 3px; width: 24px; height: 12px; border-radius: 1px;
}
#dragGhost .front-face {
    position: absolute; top: 11px; left: 3px; width: 24px; height: 19px; border-radius: 1px;
}
#mainMenu {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, #1a2a1a 0%, #0a120a 100%);
    z-index: 500; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
}
#mainMenu h1 {
    color: rgba(220,200,160,0.9); font: bold 36px monospace;
    text-shadow: 0 0 20px rgba(100,180,60,0.3); margin-bottom: 20px;
}
.menu-btn {
    width: 260px; padding: 14px; font: bold 16px monospace;
    background: rgba(40,60,30,0.7); color: rgba(220,210,180,0.9);
    border: 2px solid rgba(120,160,80,0.4); border-radius: 6px;
    cursor: pointer; text-align: center;
}
.menu-btn:hover { background: rgba(60,90,40,0.8); border-color: rgba(160,200,100,0.7); }
.menu-btn:disabled { opacity: 0.4; cursor: default; }
.menu-btn.delete { background: rgba(80,30,30,0.5); border-color: rgba(160,60,60,0.4); font-size: 11px; width: 80px; padding: 6px; }
.menu-btn.delete:hover { background: rgba(120,40,40,0.7); }
.save-slot {
    display: flex; align-items: center; gap: 8px; width: 360px;
    background: rgba(30,40,25,0.5); border: 1px solid rgba(100,120,70,0.3);
    border-radius: 6px; padding: 8px 12px;
}
.save-slot .info { flex: 1; color: rgba(180,170,140,0.8); font: 12px monospace; }
.save-slot .info .name { font-size: 14px; color: rgba(220,210,180,0.9); }
#saveToast {
    position: fixed; top: 12px; right: 12px; padding: 6px 14px;
    background: rgba(40,60,30,0.8); color: rgba(200,190,160,0.8);
    font: 11px monospace; border-radius: 4px; z-index: 50;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
</style>
</head>
<body>
<div id="mainMenu">
    <h1>Sheep and Tree World</h1>
    <button class="menu-btn" id="newGameBtn">New Game</button>
    <div id="savedGames"></div>
</div>
<div id="saveToast">Saved</div>
<div id="debug"></div>
<div id="prompt" style="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.8);font:13px monospace;text-shadow:0 0 6px #000;z-index:15;pointer-events:none;display:none;"></div>
<div id="hotbar"></div>
<div id="inventoryScreen"><h2>Inventory</h2><div id="invContents"></div></div>
<div id="dragGhost"></div>
<div id="worldMap"><h2>World Map</h2><canvas id="mapCanvas" width="600" height="600"></canvas></div>
<script src="three.min.js" onerror="
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
    document.head.appendChild(s);
"></script>
<script type="module">
import { World, BLOCK_SIZE, BLOCK, CHUNK_SIZE, getTerrainHeight, getIslandRadius, getMountainBlend, getSnowBlend, getDesertBlend, getScorchedBlend, getEnchantedBlend } from './world.js';
import { Player } from './player.js';
import { ChunkManager } from './chunks.js';
import { CreatureManager } from './creatures.js';
import { DragonManager } from './dragons.js';
import { VillageManager, placeVillageInChunk } from './villages.js';

function mix(a, b, t) { return a + (b - a) * t; }

const SKY_COLOR = 0x87CEEB;

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: devicePixelRatio < 1.5 });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.setClearColor(SKY_COLOR);
document.body.appendChild(renderer.domElement);

// ── Scene ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(SKY_COLOR, 0.006);

// ── Camera — same FOV as game.html ──
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.05, 800);

// ── Lighting — same as game.html ──
const ambient = new THREE.AmbientLight(0x667788, 0.5);
scene.add(ambient);
const hemi = new THREE.HemisphereLight(0x6688aa, 0x3a4422, 0.6);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffeedd, 1.5);
sun.position.set(5, 12, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
const shCam = sun.shadow.camera;
shCam.near = 0.5; shCam.far = 60;
shCam.left = -18; shCam.right = 18; shCam.top = 18; shCam.bottom = -18;
scene.add(sun);
scene.add(sun.target);

// ── Save/Load System ──
const SAVE_KEY = 'satw_saves';

function getSaves() {
    try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); } catch { return {}; }
}

function collectSaveData() {
    return {
        time: Date.now(),
        player: { x: player.position.x, y: player.position.y, z: player.position.z, ry: player.group.rotation.y },
        inventory: JSON.parse(JSON.stringify(inventory)),
        hotbarSlots: [...hotbarSlots],
        selectedSlot,
        eggItems: JSON.parse(JSON.stringify(eggItems)),
        // Modified blocks (set by player, not generated)
        modifiedBlocks: world._modifiedBlocks ? Object.fromEntries(world._modifiedBlocks) : {},
        // Dragon data
        dragons: dragonMgr.dragons.map(bd => ({
            x: bd.x, z: bd.z, age: bd.age, angle: bd.angle,
            eggColor: bd.eggColor, wingColor: bd.wingColor, isWyvern: bd.isWyvern,
            dragonName: bd.dragonName, hp: bd.hp,
        })),
        pickedUpEggs: dragonMgr.eggs.filter(e => e.pickedUp).map((e, i) => dragonMgr.eggs.indexOf(e)),
    };
}

function saveGame(slotName) {
    const saves = getSaves();
    saves[slotName] = collectSaveData();
    localStorage.setItem(SAVE_KEY, JSON.stringify(saves));
}

function showToast(msg) {
    const t = document.getElementById('saveToast');
    t.textContent = msg; t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 1500);
}

// ── Main Menu ──
const mainMenuEl = document.getElementById('mainMenu');
let gameStarted = false;

function updateMenuUI() {
    const saves = getSaves();
    const keys = Object.keys(saves);
    let html = '';
    if (keys.length > 0) {
        html += '<div style="color:rgba(180,170,140,0.6);font:11px monospace;margin:8px 0 4px;">Saved Games:</div>';
        for (const name of keys) {
            const s = saves[name];
            const date = new Date(s.time).toLocaleString();
            html += `<div class="save-slot">
                <div class="info"><div class="name">${name}</div>${date}</div>
                <button class="menu-btn" style="width:80px;padding:8px;font-size:13px;" data-load="${name}">Load</button>
                <button class="menu-btn delete" data-delete="${name}">Delete</button>
            </div>`;
        }
    }
    document.getElementById('savedGames').innerHTML = html;
    document.querySelectorAll('[data-load]').forEach(btn => {
        btn.addEventListener('click', () => startGame(btn.dataset.load));
    });
    document.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => {
            const saves = getSaves();
            delete saves[btn.dataset.delete];
            localStorage.setItem(SAVE_KEY, JSON.stringify(saves));
            updateMenuUI();
        });
    });
}
updateMenuUI();
document.getElementById('newGameBtn').addEventListener('click', () => startGame(null));

// ── World (created once, reset on new game) ──
let world, chunkManager, creatures, dragonMgr, player, villageMgr;

function startGame(loadSlotName) {
    mainMenuEl.style.display = 'none';
    gameStarted = true;

    // Clean up previous game if any
    if (world) {
        while (scene.children.length > 0) scene.remove(scene.children[0]);
        scene.add(ambient); scene.add(hemi); scene.add(sun); scene.add(sun.target);
    }

    world = new World();
    if (!world._modifiedBlocks) world._modifiedBlocks = new Map();
    chunkManager = new ChunkManager(scene, world);
    creatures = new CreatureManager(scene, world);
    villageMgr = new VillageManager(scene, world);
    world._placeVillages = placeVillageInChunk;
    dragonMgr = new DragonManager(scene, world);
    player = new Player(scene, world);

    dragonMgr.build((x, z) => world.getHeight(x, z));
    dragonMgr.buildCarriedEgg(player.spine);
    dragonMgr.addToInventory = addToInventory;
    dragonMgr.removeFromInventory = removeFromInventory;
    dragonMgr.getHeldItem = () => {
        const bt = hotbarSlots[selectedSlot];
        if (typeof bt === 'string' && bt.startsWith('egg_') && inventory[bt] > 0) {
            return { type: 'egg', egg: eggItems[bt] };
        }
        return null;
    };

    // Reset inventory
    for (const k in inventory) delete inventory[k];
    for (const k in eggItems) delete eggItems[k];
    hotbarSlots.fill(0);
    selectedSlot = 0;

    if (loadSlotName) {
        // Load save
        const saves = getSaves();
        const s = saves[loadSlotName];
        if (s) {
            player.position.set(s.player.x, s.player.y, s.player.z);
            player.group.rotation.y = s.player.ry || 0;
            // Restore inventory
            Object.assign(inventory, s.inventory || {});
            for (let i = 0; i < 9; i++) hotbarSlots[i] = s.hotbarSlots?.[i] || 0;
            selectedSlot = s.selectedSlot || 0;
            Object.assign(eggItems, s.eggItems || {});
            // Restore modified blocks + rebuild chunk index
            if (s.modifiedBlocks) {
                for (const [key, val] of Object.entries(s.modifiedBlocks)) {
                    world._modifiedBlocks.set(key, val);
                    // Build chunk index
                    const [mbx, mby, mbz] = key.split(',').map(Number);
                    const mcx = Math.floor(mbx / CHUNK_SIZE), mcz = Math.floor(mbz / CHUNK_SIZE);
                    const mlx = ((mbx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const mlz = ((mbz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const ck = mcx + ',' + mcz;
                    if (!world._modsByChunk.has(ck)) world._modsByChunk.set(ck, []);
                    world._modsByChunk.get(ck).push({ lx: mlx, y: mby, lz: mlz, block: val });
                }
            }
            // Restore picked up eggs
            if (s.pickedUpEggs) {
                for (const idx of s.pickedUpEggs) {
                    if (dragonMgr.eggs[idx]) {
                        dragonMgr.eggs[idx].pickedUp = true;
                        dragonMgr.eggs[idx].group.visible = false;
                    }
                }
            }
            // Restore dragons
            if (s.dragons) {
                for (const dd of s.dragons) {
                    const hy = world.getHeight(dd.x, dd.z);
                    const bd = dragonMgr._makeDragon(dd.x, dd.z, hy, dd.eggColor, dd.wingColor, dd.isWyvern);
                    bd.age = dd.age || 0;
                    bd.dragonName = dd.dragonName || 'Dragon';
                    bd.hp = dd.hp || bd.maxHP;
                    bd.angle = dd.angle || 0;
                    bd.group.rotation.y = bd.angle;
                    scene.add(bd.group);
                    dragonMgr.dragons.push(bd);
                }
            }
            _currentSaveName = loadSlotName;
            showToast('Loaded: ' + loadSlotName);
        }
    } else {
        // New game — spawn at center
        world.getOrCreateChunk(0, 0);
        const spawnY = world.getHeight(0, 0);
        player.position.set(0, spawnY, 0);
        // Generate save name
        const n = Object.keys(getSaves()).length + 1;
        _currentSaveName = 'Save ' + n;
        showToast('New game started');
    }

    refreshUI();
    if (!_animStarted) { _animStarted = true; animate(); }
}

let _currentSaveName = 'Save 1';
let _animStarted = false;
let _autosaveTimer = 0;

// ── Input — same as game.html (no pointer lock, keyboard only) ──
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
    if (e.code === 'KeyM') {
        mapOpen = !mapOpen;
        worldMapEl.style.display = mapOpen ? 'block' : 'none';
        if (mapOpen) {
            mapViewX = player.position.x;
            mapViewZ = player.position.z;
            drawWorldMap();
        }
    }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Zoom — exact same as game.html ──
let zoomLevel = 1.0;
const minZoom = 0.4;
const maxZoom = 5.0;
addEventListener('wheel', e => {
    e.preventDefault();
    const zoomSpeed = 0.001;
    zoomLevel += e.deltaY * zoomSpeed;
    zoomLevel = Math.max(minZoom, Math.min(maxZoom, zoomLevel));
}, { passive: false });

// ── World Map ──
const worldMapEl = document.getElementById('worldMap');
const mapCanvas = document.getElementById('mapCanvas');
const mapCtx = mapCanvas.getContext('2d');
let mapOpen = false;
let mapViewX = 0, mapViewZ = 0, mapViewSize = 1200;
let mapDragging = false, mapDragX = 0, mapDragY = 0, mapDragVX = 0, mapDragVZ = 0, mapDidDrag = false;
let mapCache = null, mapCacheVX = null, mapCacheVZ = null, mapCacheSize = null;

function drawWorldMap() {
    const w = mapCanvas.width, h = mapCanvas.height;
    const scale = w / (mapViewSize * 2);

    // Only redraw terrain if view changed
    if (!mapCache || mapCacheVX !== mapViewX || mapCacheVZ !== mapViewZ || mapCacheSize !== mapViewSize) {
        mapCtx.fillStyle = '#1a2a1a';
        mapCtx.fillRect(0, 0, w, h);

        // Draw terrain pixel by pixel
        const step = 4; // render every 4th pixel for speed
        for (let px = 0; px < w; px += step) {
            for (let py = 0; py < h; py += step) {
                const wx = (px / scale) + mapViewX - mapViewSize;
                const wz = (py / scale) + mapViewZ - mapViewSize;

                const dist = Math.sqrt(wx * wx + wz * wz);
                const localR = getIslandRadius(wx, wz);

                if (dist > localR - 20) {
                    mapCtx.fillStyle = '#2a5a8a'; // ocean
                    mapCtx.fillRect(px, py, step, step);
                    continue;
                }

                // Beach
                if (dist > localR - 50) {
                    mapCtx.fillStyle = '#c4b890';
                    mapCtx.fillRect(px, py, step, step);
                    continue;
                }

                const th = getTerrainHeight(wx, wz);
                const snow = getSnowBlend(wz);
                const desert = getDesertBlend(wz);
                const mtn = getMountainBlend(wx, wz);
                const ench = getEnchantedBlend(wx, wz);
                const scorch = getScorchedBlend(wx, wz);

                let r, g, b;
                if (scorch > 0.05) {
                    const sv = Math.floor(20 + th * 2 - scorch * 15);
                    r = sv + 5; g = sv; b = sv;
                } else if (ench > 0.1) {
                    const eT = Math.min(1, (ench - 0.1) / 0.5);
                    r = Math.floor(60 + th * 3 + eT * 50);
                    g = Math.floor(30 + th * 5 + eT * 20);
                    b = Math.floor(80 + th * 5 + eT * 100);
                } else if (mtn > 0.15) {
                    const rockT = Math.min(1, (mtn - 0.15) / 0.5);
                    const base = 80 + Math.floor(rockT * 100);
                    r = base; g = base - 5; b = base - 10;
                } else if (snow > 0) {
                    r = Math.floor(40 + th * 5 + snow * 180);
                    g = Math.floor(80 + th * 10 + snow * 155);
                    b = Math.floor(30 + snow * 215);
                } else if (desert > 0) {
                    r = Math.floor(40 + th * 5 + desert * 170);
                    g = Math.floor(80 + th * 10 + desert * 110);
                    b = Math.floor(30 + desert * 90);
                } else {
                    r = Math.floor(40 + th * 5);
                    g = Math.min(140, Math.floor(80 + th * 15));
                    b = 30;
                }

                mapCtx.fillStyle = `rgb(${Math.min(255,r)},${Math.min(255,g)},${Math.min(255,b)})`;
                mapCtx.fillRect(px, py, step, step);
            }
        }
        mapCache = mapCtx.getImageData(0, 0, w, h);
        mapCacheVX = mapViewX; mapCacheVZ = mapViewZ; mapCacheSize = mapViewSize;
    } else {
        mapCtx.putImageData(mapCache, 0, 0);
    }

    // Player marker
    const ppx = (player.position.x - mapViewX + mapViewSize) * scale;
    const ppy = (player.position.z - mapViewZ + mapViewSize) * scale;
    const angle = player.group.rotation.y;
    mapCtx.fillStyle = '#ff3333';
    mapCtx.beginPath();
    mapCtx.moveTo(ppx + Math.sin(angle) * 8, ppy + Math.cos(angle) * 8);
    mapCtx.lineTo(ppx + Math.sin(angle + 2.5) * 5, ppy + Math.cos(angle + 2.5) * 5);
    mapCtx.lineTo(ppx + Math.sin(angle - 2.5) * 5, ppy + Math.cos(angle - 2.5) * 5);
    mapCtx.closePath();
    mapCtx.fill();

    // Coord label
    mapCtx.fillStyle = 'rgba(200,190,170,0.7)';
    mapCtx.font = '11px monospace';
    mapCtx.textAlign = 'left';
    mapCtx.fillText(`X: ${player.position.x.toFixed(0)}  Z: ${player.position.z.toFixed(0)}`, 8, h - 8);
}

// Map drag
mapCanvas.addEventListener('mousedown', e => {
    mapDragging = true; mapDidDrag = false;
    mapDragX = e.clientX; mapDragY = e.clientY;
    mapDragVX = mapViewX; mapDragVZ = mapViewZ;
    mapCanvas.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', e => {
    if (!mapDragging) return;
    const dxPx = e.clientX - mapDragX, dyPx = e.clientY - mapDragY;
    if (Math.abs(dxPx) > 3 || Math.abs(dyPx) > 3) mapDidDrag = true;
    const rect = mapCanvas.getBoundingClientRect();
    const canvasScale = mapCanvas.width / rect.width;
    const pixToWorld = (mapViewSize * 2) / mapCanvas.width;
    mapViewX = mapDragVX - dxPx * canvasScale * pixToWorld;
    mapViewZ = mapDragVZ - dyPx * canvasScale * pixToWorld;
    drawWorldMap();
});

// Egg data stored separately — maps 'egg_0' → egg object
const eggItems = {};

function getItemInfo(key) {
    if (key === 'pickaxe') return { name: 'Wood Pickaxe', top: '#8a6a3a', front: '#5c3a1e', isTool: true };
    if (key === 'stone_pickaxe') return { name: 'Stone Pickaxe', top: '#999', front: '#666', isTool: true };
    if (key === 'iron_pickaxe') return { name: 'Iron Pickaxe', top: '#b0b8c0', front: '#7a8590', isTool: true };
    if (key === 'furnace_block') return { name: 'Furnace', top: '#555', front: '#3a3a3a' };
    if (key === 'iron_ingot') return { name: 'Iron Ingot', top: '#c0c8d0', front: '#8a9098' };
    if (key === 'coal') return { name: 'Coal', top: '#2a2a2a', front: '#1a1a1a' };
    if (key === 'stick') return { name: 'Stick', top: '#a08050', front: '#6b4226', isTool: true };
    if (typeof key === 'number') return BLOCK_INFO[key];
    if (typeof key === 'string' && key.startsWith('egg_')) {
        const egg = eggItems[key];
        if (!egg) return null;
        const c = '#' + new THREE.Color(egg.color).getHexString();
        const v = '#' + new THREE.Color(egg.veinColor).getHexString();
        return { name: egg.name + ' Egg', top: v, front: c, isEgg: true };
    }
    return null;
}

function blockIconHTML(info) {
    if (info.isTool) {
        return `<div class="block-icon" style="display:flex;align-items:center;justify-content:center;">
            <svg width="22" height="22" viewBox="0 0 22 22">
                <rect x="10" y="8" width="3" height="13" rx="1" fill="${info.front}" transform="rotate(-45 11 14)"/>
                <rect x="5" y="2" width="12" height="5" rx="1" fill="${info.top}" transform="rotate(-45 11 5)"/>
            </svg></div>`;
    }
    if (info.isEgg) {
        return `<div class="block-icon" style="border-radius:50%"><div class="top-face" style="background:${info.top};border-radius:50%"></div><div class="front-face" style="background:${info.front};border-radius:6px"></div></div>`;
    }
    return `<div class="block-icon"><div class="top-face" style="background:${info.top}"></div><div class="front-face" style="background:${info.front}"></div></div>`;
}

function addToInventory(key, eggData) {
    if (typeof key === 'string' && key.startsWith('egg_') && eggData) {
        eggItems[key] = eggData;
        inventory[key] = 1;
    } else {
        inventory[key] = (inventory[key] || 0) + 1;
    }
    if (!hotbarSlots.includes(key)) {
        const emptyIdx = hotbarSlots.indexOf(0);
        if (emptyIdx >= 0) hotbarSlots[emptyIdx] = key;
    }
    refreshUI();
}

function removeFromInventory(blockType) {
    if (!inventory[blockType]) return false;
    inventory[blockType]--;
    if (inventory[blockType] <= 0) {
        delete inventory[blockType];
        for (let i = 0; i < hotbarSlots.length; i++)
            if (hotbarSlots[i] === blockType) hotbarSlots[i] = 0;
    }
    refreshUI();
    return true;
}

// Click-to-move system: click a slot to pick up, click another to swap/place
// heldItem is declared in onInvSlotClick section above

// Inventory interaction — click to move items between hotbar and inventory
let heldItem = null;

function onInvSlotClick(e) {
    const slot = e.currentTarget;
    const area = slot.dataset.area;
    const idx = parseInt(slot.dataset.idx);

    if (!heldItem) {
        // ── Pick up from slot ──
        if (area === 'hotbar') {
            const item = hotbarSlots[idx];
            if (item && inventory[item] > 0) {
                heldItem = item;
                hotbarSlots[idx] = 0;
            }
        } else {
            // Get item key from the inventory list
            const allItems = Object.keys(inventory).filter(k => inventory[k] > 0).map(k => isNaN(k) ? k : Number(k));
            const item = idx < allItems.length ? allItems[idx] : null;
            if (item && inventory[item] > 0) {
                heldItem = item;
            }
        }
        if (heldItem) showDragGhost(heldItem);
        refreshUI();
    } else {
        // ── Drop held item ──
        if (area === 'hotbar') {
            // Swap with hotbar slot
            const existing = hotbarSlots[idx];
            hotbarSlots[idx] = heldItem;
            heldItem = (existing && existing !== heldItem && inventory[existing] > 0) ? existing : null;
        } else {
            // Drop back — remove from any hotbar slot it might be on, it stays in inventory
            // Just clear held
            heldItem = null;
        }
        if (heldItem) showDragGhost(heldItem);
        else hideDragGhost();
        refreshUI();
    }
}

// ── DDA Raycast helper ──
const _raycaster = new THREE.Raycaster();
const _mouse = new THREE.Vector2();

function raycastBlock(e) {
    _mouse.x = (e.clientX / innerWidth) * 2 - 1;
    _mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    _raycaster.setFromCamera(_mouse, camera);

    const origin = _raycaster.ray.origin;
    const dir = _raycaster.ray.direction;
    const BS = BLOCK_SIZE;
    const yOff = 128;

    let x = Math.floor(origin.x / BS);
    let y = Math.floor(origin.y / BS) + yOff;
    let z = Math.floor(origin.z / BS);

    const stepX = dir.x >= 0 ? 1 : -1;
    const stepY = dir.y >= 0 ? 1 : -1;
    const stepZ = dir.z >= 0 ? 1 : -1;
    const tDeltaX = dir.x !== 0 ? Math.abs(BS / dir.x) : Infinity;
    const tDeltaY = dir.y !== 0 ? Math.abs(BS / dir.y) : Infinity;
    const tDeltaZ = dir.z !== 0 ? Math.abs(BS / dir.z) : Infinity;
    let tMaxX = dir.x !== 0 ? ((dir.x > 0 ? (Math.floor(origin.x/BS)+1)*BS - origin.x : Math.floor(origin.x/BS)*BS - origin.x) / dir.x) : Infinity;
    let tMaxY = dir.y !== 0 ? ((dir.y > 0 ? (Math.floor(origin.y/BS)+1)*BS - origin.y : Math.floor(origin.y/BS)*BS - origin.y) / dir.y) : Infinity;
    let tMaxZ = dir.z !== 0 ? ((dir.z > 0 ? (Math.floor(origin.z/BS)+1)*BS - origin.z : Math.floor(origin.z/BS)*BS - origin.z) / dir.z) : Infinity;

    const maxSteps = Math.ceil(18 / BS) + 5;
    let prevX = x, prevY = y, prevZ = z;

    for (let i = 0; i < maxSteps; i++) {
        const block = world.getBlockAt(x, y, z);
        if (block !== BLOCK.AIR && block !== BLOCK.WATER && block !== BLOCK.BEDROCK) {
            // Face normal = direction we entered from
            const nx = prevX - x, ny = prevY - y, nz = prevZ - z;
            return { x, y, z, block, prevX, prevY, prevZ, nx, ny, nz };
        }
        prevX = x; prevY = y; prevZ = z;
        if (tMaxX < tMaxY) {
            if (tMaxX < tMaxZ) { x += stepX; tMaxX += tDeltaX; }
            else { z += stepZ; tMaxZ += tDeltaZ; }
        } else {
            if (tMaxY < tMaxZ) { y += stepY; tMaxY += tDeltaY; }
            else { z += stepZ; tMaxZ += tDeltaZ; }
        }
    }
    return null;
}

function rebuildNear(bx, bz) {
    chunkManager.rebuildChunkAt(bx, bz);
    const lx = ((bx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    const lz = ((bz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    if (lx === 0) chunkManager.rebuildChunkAt(bx - 1, bz);
    if (lx === CHUNK_SIZE - 1) chunkManager.rebuildChunkAt(bx + 1, bz);
    if (lz === 0) chunkManager.rebuildChunkAt(bx, bz - 1);
    if (lz === CHUNK_SIZE - 1) chunkManager.rebuildChunkAt(bx, bz + 1);
}

// ── Pickaxe system ──
let mineDepth = 1; // depth: 1-3 blocks deep

// Arrow keys adjust mining depth (only when holding pickaxe)
document.addEventListener('keydown', e => {
    const held = hotbarSlots[selectedSlot];
    if (held !== 'pickaxe') return;
    if (e.code === 'ArrowUp') { mineDepth = Math.min(3, mineDepth + 1); e.preventDefault(); }
    if (e.code === 'ArrowDown') { mineDepth = Math.max(1, mineDepth - 1); e.preventDefault(); }
});

// Tree felling — break all connected WOOD above, then flood-fill remove all connected LEAVES
function fellTree(bx, by, bz, rebuildSet) {
    // 1. Break all wood blocks going straight up
    let topY = by;
    for (let dy = 1; dy < 40; dy++) {
        const ty = by + dy;
        const b = world.getBlockAt(bx, ty, bz);
        if (b === BLOCK.WOOD) {
            addToInventory(getBlockDrop(b));
            world.setBlock(bx, ty, bz, BLOCK.AIR);
            rebuildSet.add(bx + ',' + bz);
            topY = ty;
        } else {
            break;
        }
    }
    // 2. Flood-fill break all leaves connected to where the trunk was
    // Search a generous box around the trunk column
    const R = 5, VR = 6;
    for (let dx = -R; dx <= R; dx++) {
        for (let dz = -R; dz <= R; dz++) {
            for (let dy = -2; dy <= VR; dy++) {
                const lx = bx + dx, ly = topY + dy, lz = bz + dz;
                if (world.getBlockAt(lx, ly, lz) === BLOCK.LEAVES) {
                    addToInventory(getBlockDrop(BLOCK.LEAVES));
                    world.setBlock(lx, ly, lz, BLOCK.AIR);
                    rebuildSet.add(lx + ',' + lz);
                }
            }
        }
    }
}

// Block break times (seconds) — [no pickaxe, wood pickaxe, stone pickaxe]
const BREAK_TIME = {
    [BLOCK.GRASS]: [0.4, 0.2, 0.1],
    [BLOCK.DIRT]: [0.4, 0.2, 0.1],
    [BLOCK.SAND]: [0.3, 0.15, 0.08],
    [BLOCK.CLAY]: [0.5, 0.25, 0.12],
    [BLOCK.GRAVEL]: [0.5, 0.25, 0.12],
    [BLOCK.WOOD]: [0.8, 0.3, 0.15],
    [BLOCK.PLANKS]: [0.6, 0.25, 0.12],
    [BLOCK.LEAVES]: [0.15, 0.1, 0.05],
    [BLOCK.SNOW]: [0.3, 0.15, 0.08],
    [BLOCK.STONE]: [Infinity, 0.6, 0.25],    // requires pickaxe
    [BLOCK.IRON_ORE]: [Infinity, 0.8, 0.35],  // requires pickaxe
    [BLOCK.CRAFTING]: [0.8, 0.3, 0.15],
    [BLOCK.COAL_ORE]: [Infinity, 0.5, 0.2],
    16: [Infinity, 0.5, 0.2],  // COAL_ORE fallback
    [BLOCK.FURNACE]: [1.0, 0.5, 0.25],
    15: [1.0, 0.5, 0.25],  // FURNACE fallback
};

let miningTarget = null; // { x, y, z, block, progress, time }
let miningHeld = false;

// Mining progress overlay
const mineBarEl = document.createElement('div');
mineBarEl.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,20px);width:60px;height:6px;background:rgba(0,0,0,0.5);border-radius:3px;z-index:15;display:none;';
const mineBarFill = document.createElement('div');

renderer.domElement.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    if (mapOpen || inventoryOpen || craftingTableOpen || furnaceOpen) return;
    miningHeld = true;
    const hit = raycastBlock(e);
    if (!hit) return;

    const held = hotbarSlots[selectedSlot];
    const hasWoodPick = held === 'pickaxe' && inventory['pickaxe'] > 0;
    const hasStonePick = held === 'stone_pickaxe' && inventory['stone_pickaxe'] > 0;
    const hasIronPick = held === 'iron_pickaxe' && inventory['iron_pickaxe'] > 0;
    const hasPickaxe = hasWoodPick || hasStonePick || hasIronPick;
    const pickTier = hasIronPick ? 2 : hasStonePick ? 2 : hasWoodPick ? 1 : 0;
    const bt = hit.block;
    const times = BREAK_TIME[bt] || [0.5, 0.25, 0.12];
    const breakTime = times[pickTier];

    if (breakTime === Infinity) return; // can't break without pickaxe

    player.triggerSwing();
    miningTarget = { x: hit.x, y: hit.y, z: hit.z, block: bt, progress: 0, time: breakTime, hit, hasPickaxe };
    mineBarEl.style.display = 'block';
    mineBarFill.style.width = '0%';
});

    if (e.button !== 0) return;

    miningTarget = null;

function getBlockDrop(blockType) {
    if (blockType === BLOCK.COAL_ORE) return 'coal';
    if (blockType === 15) return 'furnace_block'; // BLOCK.FURNACE
    return blockType;
}

function doBreakBlock(hit, hasPickaxe) {

    if (hasPickaxe) {
        // Pickaxe: snaps to a 3x3 grid on the face plane, 1 layer deep into surface
        // The hit block snaps to the nearest 3x3 cell on the two perpendicular axes
        const dnx = hit.nx, dny = hit.ny, dnz = hit.nz;
        let ax1, ax2;
        if (dnx !== 0) { ax1 = 'z'; ax2 = 'y'; }
        else if (dny !== 0) { ax1 = 'x'; ax2 = 'z'; }
        else { ax1 = 'x'; ax2 = 'y'; }

        // Get the hit block's coords on the two plane axes
        const getAxis = (a) => a === 'x' ? hit.x : a === 'y' ? hit.y : hit.z;
        // Snap to 3x3 grid: floor to nearest multiple of 3, then that's the corner
        const snap = (v) => Math.floor(v / 3) * 3;
        const base1 = snap(getAxis(ax1));
        const base2 = snap(getAxis(ax2));

        const rebuildSet = new Set();
        for (let d1 = 0; d1 < 3; d1++) {
            for (let d2 = 0; d2 < 3; d2++) {
                let bx = hit.x, by = hit.y, bz = hit.z;
                // Set the plane axes to the snapped grid position
                if (ax1 === 'x') bx = base1 + d1; else if (ax1 === 'y') by = base1 + d1; else bz = base1 + d1;
                if (ax2 === 'x') bx = base2 + d2; else if (ax2 === 'y') by = base2 + d2; else bz = base2 + d2;
                // Depth axis stays at hit position (1 block deep)
                const b = world.getBlockAt(bx, by, bz);
                if (b !== BLOCK.AIR && b !== BLOCK.WATER && b !== BLOCK.BEDROCK) {
                    addToInventory(getBlockDrop(b));
                    world.setBlock(bx, by, bz, BLOCK.AIR);
                    rebuildSet.add(bx + ',' + bz);
                    if (b === BLOCK.WOOD) fellTree(bx, by, bz, rebuildSet);
                }
            }
        }
        for (const key of rebuildSet) {
            const [rx, rz] = key.split(',').map(Number);
            rebuildNear(rx, rz);
        }
    } else {
        // Single block break (no pickaxe)
        addToInventory(getBlockDrop(hit.block));
        world.setBlock(hit.x, hit.y, hit.z, BLOCK.AIR);
        if (hit.block === BLOCK.WOOD) {
            const rs = new Set();
            rs.add(hit.x + ',' + hit.z);
            fellTree(hit.x, hit.y, hit.z, rs);
            for (const key of rs) { const [rx, rz] = key.split(',').map(Number); rebuildNear(rx, rz); }
        } else {
            rebuildNear(hit.x, hit.z);
        }
    }
}

// Right click = place block or interact with crafting table
let craftingTableOpen = false;
const craftTableMenuEl = document.createElement('div');
craftTableMenuEl.id = 'craftTableMenu';
craftTableMenuEl.style.cssText = 'display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:110;background:rgba(10,12,10,0.94);border:2px solid rgba(160,140,100,0.4);border-radius:8px;padding:16px;min-width:440px;user-select:none;';
document.body.appendChild(craftTableMenuEl);

const WORKBENCH_RECIPES = [
    { from: BLOCK.WOOD, to: BLOCK.PLANKS, fc: 1, tc: 4, label: 'Wood Log → 4 Planks' },
    { from: BLOCK.PLANKS, to: BLOCK.WOOD, fc: 4, tc: 1, label: '4 Planks → Wood Log' },
    { from: BLOCK.WOOD, to: BLOCK.CRAFTING, fc: 4, tc: 1, label: '4 Wood Logs → Crafting Table' },
    { from: BLOCK.PLANKS, to: BLOCK.CRAFTING, fc: 16, tc: 1, label: '16 Planks → Crafting Table' },
    { from: BLOCK.STONE, to: BLOCK.GRAVEL, fc: 1, tc: 4, label: 'Stone → 4 Gravel' },
    { from: BLOCK.GRAVEL, to: BLOCK.STONE, fc: 4, tc: 1, label: '4 Gravel → Stone' },
    { from: BLOCK.DIRT, to: BLOCK.CLAY, fc: 4, tc: 1, label: '4 Dirt → Clay' },
    { from: BLOCK.PLANKS, to: BLOCK.LEAVES, fc: 2, tc: 1, label: '2 Planks → Leaves (decoration)' },
    { from: BLOCK.WOOD, to: 'stick', fc: 1, tc: 4, label: 'Wood Log → 4 Sticks' },
    { from: BLOCK.PLANKS, to: 'stick', fc: 1, tc: 2, label: 'Planks → 2 Sticks' },
    { from: BLOCK.PLANKS, fromAlt: 'stick', to: 'pickaxe', fc: 3, fcAlt: 2, tc: 1, label: '3 Planks + 2 Sticks → Wood Pickaxe', multi: true },
    { from: BLOCK.STONE, fromAlt: 'stick', to: 'stone_pickaxe', fc: 3, fcAlt: 2, tc: 1, label: '3 Stone + 2 Sticks → Stone Pickaxe', multi: true },
    { from: 3, to: 'furnace_block', fc: 8, tc: 1, label: '8 Stone → Furnace' },
    { from: 'iron_ingot', fromAlt: 'stick', to: 'iron_pickaxe', fc: 3, fcAlt: 2, tc: 1, label: '3 Iron Ingots + 2 Sticks → Iron Pickaxe', multi: true },
];

function doCraft(r) {
    if (!r || !r.from) return;
    if ((inventory[r.from] || 0) < r.fc) return;
    if (r.multi && (inventory[r.fromAlt] || 0) < r.fcAlt) return;
    // Consume primary
    inventory[r.from] -= r.fc;
    if (inventory[r.from] <= 0) { delete inventory[r.from]; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === r.from) hotbarSlots[i] = 0; }
    // Consume secondary
    if (r.multi) {
        inventory[r.fromAlt] -= r.fcAlt;
        if (inventory[r.fromAlt] <= 0) { delete inventory[r.fromAlt]; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === r.fromAlt) hotbarSlots[i] = 0; }
    }
    // Produce
    const toKey = r.to;
    inventory[toKey] = (inventory[toKey] || 0) + r.tc;
    // Always try to put on hotbar
    if (!hotbarSlots.includes(toKey)) {
        const ei = hotbarSlots.indexOf(0);
        if (ei >= 0) hotbarSlots[ei] = toKey;
    }
    refreshUI();
}

function updateCraftTableUI() {
    let html = '<h2 style="color:rgba(220,200,160,0.85);font:bold 15px monospace;text-align:center;margin-bottom:10px;">Crafting Table</h2>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:5px;">';
    for (let ri = 0; ri < WORKBENCH_RECIPES.length; ri++) {
        const r = WORKBENCH_RECIPES[ri];
        const canCraft = (inventory[r.from] || 0) >= r.fc && (!r.multi || (inventory[r.fromAlt] || 0) >= r.fcAlt);
        const toInfo = getItemInfo(r.to);
        html += `<button class="craft-btn ct-craft" data-ri="${ri}" ${canCraft ? '' : 'disabled'} style="
            display:flex;align-items:center;gap:6px;padding:6px 10px;
            background:${canCraft ? 'rgba(60,50,30,0.7)' : 'rgba(30,30,30,0.5)'};
            border:1px solid ${canCraft ? 'rgba(180,160,100,0.5)' : 'rgba(80,80,80,0.3)'};
            border-radius:4px;color:${canCraft ? 'rgba(220,200,160,0.9)' : 'rgba(120,120,120,0.5)'};
            font:12px monospace;cursor:${canCraft ? 'pointer' : 'default'};
        ">`;
        html += `<span>${r.label}</span>`;
        if (toInfo) html += `<span style="display:inline-block;width:14px;height:14px;background:${toInfo.front};border-radius:2px;"></span>`;
        html += '</button>';
    }
    html += '</div>';
    // Show current pickaxe mining size if holding pickaxe
    if (hotbarSlots[selectedSlot] === 'pickaxe' && inventory['pickaxe'] > 0) {
        html += '<div style="margin-top:8px;color:rgba(200,180,140,0.7);font:11px monospace;text-align:center;">Pickaxe: 3x3 grid-snapped, 1 deep</div>';
    }
    html += '<div style="text-align:center;margin-top:8px;color:rgba(150,130,100,0.5);font:10px monospace;">Press Escape or I to close</div>';
    craftTableMenuEl.innerHTML = html;
    craftTableMenuEl.querySelectorAll('.ct-craft').forEach(btn => {
        btn.addEventListener('click', () => {
            doCraft(WORKBENCH_RECIPES[Number(btn.dataset.ri)]);
            updateCraftTableUI();
        });
    });
}

// ── Furnace system ──
let furnaceOpen = false;
const furnaceMenuEl = document.createElement('div');
furnaceMenuEl.style.cssText = 'display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:110;background:rgba(10,12,10,0.94);border:2px solid rgba(160,140,100,0.4);border-radius:8px;padding:16px;min-width:360px;user-select:none;';
document.body.appendChild(furnaceMenuEl);

const SMELT_RECIPES = [
    { input: BLOCK.IRON_ORE, output: 'iron_ingot', label: 'Iron Ore → Iron Ingot' },
    { input: BLOCK.SAND, output: BLOCK.CLAY, label: 'Sand → Clay (brick)' },
];

function updateFurnaceUI() {
    let html = '<h2 style="color:rgba(220,200,160,0.85);font:bold 15px monospace;text-align:center;margin-bottom:10px;">Furnace</h2>';
    const coalCount = inventory['coal'] || 0;
    html += `<div style="color:rgba(180,160,120,0.7);font:12px monospace;margin-bottom:8px;">Coal: ${coalCount} (1 coal smelts 3 items)</div>`;
    html += '<div style="display:flex;flex-wrap:wrap;gap:5px;">';
    for (let ri = 0; ri < SMELT_RECIPES.length; ri++) {
        const r = SMELT_RECIPES[ri];
        const hasInput = (inventory[r.input] || 0) >= 1;
        const hasFuel = coalCount >= 1;
        const canSmelt = hasInput && hasFuel;
        // How many can we smelt? Min of (input count, coal * 3)
        const maxSmelt = Math.min(inventory[r.input] || 0, coalCount * 3);
        const outInfo = getItemInfo(r.output);
        html += `<button class="craft-btn furnace-smelt" data-ri="${ri}" ${canSmelt ? '' : 'disabled'} style="
            display:flex;align-items:center;gap:6px;padding:6px 10px;
            background:${canSmelt ? 'rgba(60,40,20,0.7)' : 'rgba(30,30,30,0.5)'};
            border:1px solid ${canSmelt ? 'rgba(200,140,60,0.5)' : 'rgba(80,80,80,0.3)'};
            border-radius:4px;color:${canSmelt ? 'rgba(230,200,150,0.9)' : 'rgba(120,120,120,0.5)'};
            font:12px monospace;cursor:${canSmelt ? 'pointer' : 'default'};
        ">`;
        html += `<span>${r.label} (x${maxSmelt})</span>`;
        if (outInfo) html += `<span style="display:inline-block;width:14px;height:14px;background:${outInfo.front || outInfo.top};border-radius:2px;"></span>`;
        html += '</button>';
    }
    html += '</div>';
    html += '<div style="text-align:center;margin-top:8px;color:rgba(150,130,100,0.5);font:10px monospace;">Press Escape or I to close</div>';
    furnaceMenuEl.innerHTML = html;

    furnaceMenuEl.querySelectorAll('.furnace-smelt').forEach(btn => {
        btn.addEventListener('click', () => {
            const r = SMELT_RECIPES[Number(btn.dataset.ri)];
            const inputCount = inventory[r.input] || 0;
            const coalAvail = inventory['coal'] || 0;
            if (inputCount < 1 || coalAvail < 1) return;
            // Smelt up to 3 per coal, use as many as possible
            const canSmelt = Math.min(inputCount, 3);
            inventory[r.input] -= canSmelt;
            if (inventory[r.input] <= 0) { delete inventory[r.input]; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === r.input) hotbarSlots[i] = 0; }
            inventory['coal']--;
            if (inventory['coal'] <= 0) { delete inventory['coal']; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === 'coal') hotbarSlots[i] = 0; }
            inventory[r.output] = (inventory[r.output] || 0) + canSmelt;
            if (!hotbarSlots.includes(r.output)) { const ei = hotbarSlots.indexOf(0); if (ei >= 0) hotbarSlots[ei] = r.output; }
            refreshUI();
            updateFurnaceUI();
        });
    });
}

renderer.domElement.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    if (mapOpen || inventoryOpen || craftingTableOpen || furnaceOpen) return;
    const hit = raycastBlock(e);
    if (!hit) return;

    // Right-click on crafting table → open crafting menu
    if (hit.block === BLOCK.CRAFTING) {
        craftingTableOpen = true;
        craftTableMenuEl.style.display = 'block';
        updateCraftTableUI();
        return;
    }

    // Right-click on furnace → open furnace menu
    if (hit.block === 15 || hit.block === BLOCK.FURNACE) {
        furnaceOpen = true;
        furnaceMenuEl.style.display = 'block';
        updateFurnaceUI();
        return;
    }

    let bt = hotbarSlots[selectedSlot];
    if (!bt || !inventory[bt]) return;
    // Convert furnace_block item to actual block type for placement
    const isFurnace = bt === 'furnace_block';
    const placeBlock = isFurnace ? 15 : bt; // 15 = BLOCK.FURNACE
    if (typeof bt === 'string' && !isFurnace) return; // other string items can't be placed

    const px = hit.prevX, py = hit.prevY, pz = hit.prevZ;
    const BS = BLOCK_SIZE;
    const yOff = 128;
    const placeWX = px * BS, placeWY = (py - yOff) * BS, placeWZ = pz * BS;
    const pdx = placeWX - player.position.x, pdz = placeWZ - player.position.z;
    const pdy = placeWY - player.position.y;
    if (Math.abs(pdx) < 0.5 && Math.abs(pdz) < 0.5 && pdy >= -0.5 && pdy < player.HEIGHT) return;

    if (!removeFromInventory(bt)) return;

    // 3x3x3 placement for crafting table and furnace
    if (placeBlock === BLOCK.CRAFTING || placeBlock === 15) {
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = 0; dy <= 2; dy++) {
                for (let dz = -1; dz <= 1; dz++) {
                    world.setBlock(px + dx, py + dy, pz + dz, placeBlock);
                }
            }
        }
        for (let dx = -1; dx <= 1; dx++)
            for (let dz = -1; dz <= 1; dz++)
                rebuildNear(px + dx, pz + dz);
    } else {
        world.setBlock(px, py, pz, bt);
        rebuildNear(px, pz);
    }
});

// ── Resize ──
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

// ── Game Loop ──
let prevTime = performance.now();
const debugEl = document.getElementById('debug');
let frameCount = 0, fpsTime = 0, fps = 0;

// Camera smoothing — exact same as game.html
const camPos = new THREE.Vector3();
const camLook = new THREE.Vector3();
const _idealOffset = new THREE.Vector3();
const _idealLook = new THREE.Vector3();
const _upAxis = new THREE.Vector3(0, 1, 0);
let camInit = false;

function animate() {
    requestAnimationFrame(animate);
    if (!gameStarted) return;
    const now = performance.now();
    const dt = Math.min((now - prevTime) / 1000, 0.1);
    prevTime = now;

    // Autosave every 40s
    _autosaveTimer += dt;
    if (_autosaveTimer >= 40) {
        _autosaveTimer = 0;
        saveGame(_currentSaveName);
        showToast('Autosaved');
    }

    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 1) { fps = frameCount; frameCount = 0; fpsTime = 0; }

    // Player update
    if (!dragonMgr.ridingDragon && !craftingTableOpen && !furnaceOpen) player.update(dt, keys);
    dragonMgr.applyPlayerPose(player);

    // Show/hide pickaxe in hand
    const heldItem = hotbarSlots[selectedSlot];
    player.pickaxeHeld.visible = (heldItem === 'pickaxe' && (inventory['pickaxe'] || 0) > 0) || (heldItem === 'stone_pickaxe' && (inventory['stone_pickaxe'] || 0) > 0) || (heldItem === 'iron_pickaxe' && (inventory['iron_pickaxe'] || 0) > 0);

    // Sun follows player (offset same as game.html)
    sun.position.set(
        player.position.x + 5,
        player.position.y + 12,
        player.position.z + 8
    );
    sun.target.position.copy(player.position);
    sun.target.updateMatrixWorld();

    // Load/unload chunks
    chunkManager.update(player.position.x, player.position.z);

    // Mining progress
    if (miningTarget && miningHeld) {
        miningTarget.progress += dt;
        const pct = Math.min(100, (miningTarget.progress / miningTarget.time) * 100);
        mineBarFill.style.width = pct + '%';
        // Re-trigger swing animation periodically
        if (miningTarget.progress % 0.5 < dt) player.triggerSwing();
        if (miningTarget.progress >= miningTarget.time) {
            doBreakBlock(miningTarget.hit, miningTarget.hasPickaxe);
            miningTarget = null;
            miningHeld = false;
            mineBarEl.style.display = 'none';
        }
    }

    // Creatures
    creatures.update(dt, player.position.x, player.position.z);

    // Villagers
    villageMgr.update(dt, player.position.x, player.position.z);

    // Dragons
    dragonMgr.update(dt, player, keys);

    // ── Camera ──
    let camRotY = player.group.rotation.y;
    let camTarget = player.position.clone();
    let lookOffY = 1.3;
    if (dragonMgr.ridingDragon && dragonMgr.ridingRef) {
        const bd = dragonMgr.ridingRef;
        camRotY = bd.angle;
        camTarget.set(bd.x, bd.group.position.y, bd.z);
        lookOffY = bd.growthScale * 2;
    }
    const s = player.sprintBlend;
    const cr = 0;
    const ridingScale = dragonMgr.ridingDragon && dragonMgr.ridingRef ? Math.max(1, dragonMgr.ridingRef.growthScale * 2.5) : 1;
    const baseDist = mix(mix(4.5, 5.8, s), 3.5, cr) * ridingScale;
    const baseH    = mix(mix(2.8, 3.2, s), 1.8, cr) * ridingScale;
    const camDist = baseDist * zoomLevel;
    const camH    = baseH * (0.7 + 0.3 * zoomLevel);

    _idealOffset.set(0, camH, -camDist)
        .applyAxisAngle(_upAxis, camRotY)
        .add(camTarget);
    _idealLook.copy(camTarget);
    _idealLook.y += lookOffY;

    if (!camInit) {
        camPos.copy(_idealOffset);
        camLook.copy(_idealLook);
        camInit = true;
    } else {
        camPos.lerp(_idealOffset, 1 - Math.exp(-4 * dt));
        camLook.lerp(_idealLook,  1 - Math.exp(-6 * dt));
    }

    camera.position.copy(camPos);
    camera.lookAt(camLook);

    // Prompt
    const promptEl = document.getElementById('prompt');
    const promptText = dragonMgr.getPrompt(player);
    if (promptText) { promptEl.textContent = promptText; promptEl.style.display = 'block'; }
    else { promptEl.style.display = 'none'; }

    // Debug
    const px = player.position.x, py = player.position.y, pz = player.position.z;
    const bx = Math.floor(px / BLOCK_SIZE);
    const by = Math.floor(py / BLOCK_SIZE);
    const bz = Math.floor(pz / BLOCK_SIZE);
    const _heldPick = hotbarSlots[selectedSlot];
    const pickInfo = ((_heldPick === 'pickaxe' && inventory['pickaxe'] > 0) || (_heldPick === 'stone_pickaxe' && inventory['stone_pickaxe'] > 0)) ? '<br>Pickaxe: 3x3 grid-snapped' : '';
    debugEl.innerHTML = `FPS: ${fps}<br>X: ${px.toFixed(1)} Y: ${py.toFixed(1)} Z: ${pz.toFixed(1)}<br>Block: ${bx} ${by} ${bz}<br>Chunks: ${chunkManager.loadedCount}${pickInfo}`;

    renderer.render(scene, camera);
}
animate();
</script>
