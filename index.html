            showToast('Smelted: ' + (getItemInfo(sq.recipe.output)?.name || sq.recipe.output));
            if (furnaceOpen) updateFurnaceUI();
            if (blastFurnaceOpen) updateBlastFurnaceUI();
        }
    }
    // Refresh furnace UI to show progress bars
    if ((furnaceOpen || blastFurnaceOpen) && smeltQueue.length > 0 && Math.floor(performance.now() / 500) !== Math.floor((performance.now() - dt*1000) / 500)) {
        if (furnaceOpen) updateFurnaceUI();
        if (blastFurnaceOpen) updateBlastFurnaceUI();
    }

    // Colossus mining — break blocks off it with pickaxe
    {
        const colossus = creatures.creatures.find(c => c._isGateBoss && !c.dead && c._blocks);
        if (colossus && miningHeld && colossus._blocks.length > 0) {
            const held = hotbarSlots[selectedSlot];
            const isPickaxe = typeof held === 'string' && held.includes('pickaxe');
            if (isPickaxe) {
                const cdx = player.position.x - colossus.x, cdz = player.position.z - colossus.z;
                const cDist = Math.sqrt(cdx*cdx + cdz*cdz);
                if (cDist < 10) {
                    if (!colossus._mineTimer) colossus._mineTimer = 0;
                    colossus._mineTimer += dt;
                    if (colossus._mineTimer >= 0.25) {
                        colossus._mineTimer = 0;
                        // Find the block closest to the player
                        let bestIdx = -1, bestDist = Infinity;
                        const ppos = new THREE.Vector3();
                        const bpos = new THREE.Vector3();
                        ppos.set(player.position.x, player.position.y + 0.5, player.position.z);
                        // First find which PART is closest
                        const partDists = {};
                        for (let bi = 0; bi < colossus._blocks.length; bi++) {
                            const blk = colossus._blocks[bi];
                            blk.mesh.getWorldPosition(bpos);
                            const d = ppos.distanceToSquared(bpos);
                            if (!partDists[blk.part] || d < partDists[blk.part]) partDists[blk.part] = d;
                        }
                        let closestPart = null, closestPartDist = Infinity;
                        for (const [part, d] of Object.entries(partDists)) {
                            if (d < closestPartDist) { closestPartDist = d; closestPart = part; }
                        }
                        // Then find closest block within that part
                        for (let bi = 0; bi < colossus._blocks.length; bi++) {
                            const blk = colossus._blocks[bi];
                            if (blk.part !== closestPart) continue;
                            blk.mesh.getWorldPosition(bpos);
                            const d = ppos.distanceToSquared(bpos);
                            if (d < bestDist) { bestDist = d; bestIdx = bi; }
                        }
                        if (bestIdx < 0) bestIdx = 0;
                        const idx = bestIdx;
                        const blk = colossus._blocks[idx];
                        const part = blk.part;
                        blk.parent.remove(blk.mesh);
                        colossus._blocks.splice(idx, 1);
                        // Deal damage
                        const dmg = colossus._dmgPerBlock || 1;
                        colossus.hp -= dmg;
                        // Drop block material
                        const drops = [BLOCK.STONE, BLOCK.DIRT, BLOCK.GRASS];
                        addToInventory(drops[Math.floor(Math.random() * 3)]);
                        player.triggerSwing();

                        // Check if a leg is fully destroyed
                        if (!colossus._fallen && (part === 'leftLeg' || part === 'rightLeg')) {
                            const remaining = colossus._blocks.filter(b => b.part === part).length;
                            const original = colossus._legBlockCounts[part] || 1;
                            if (remaining < original * 0.2) {
                                // Leg destroyed — colossus falls!
                                colossus._fallen = true;
                                colossus.chaseSpeed = 0;
                                colossus.walking = false;
                                colossus.speed = 0;
                                colossus.attackRange = 6; // can still reach with longer range
                                addChatMessage('The Colossus staggers and falls!', 'rgba(255,220,100,0.95)');
                                // Tilt the whole model to the side of the destroyed leg
                                const fallSide = part === 'leftLeg' ? -1 : 1;
                                colossus.group.rotation.z = fallSide * 0.6;
                                colossus.group.position.y -= 2;
                                // Crush trees in fall zone
                                const BS = BLOCK_SIZE;
                                const yOff = 128;
                                const fcx = Math.round(colossus.x / BS);
                                const fcz = Math.round(colossus.z / BS);
                                const fgy = Math.floor(getTerrainHeight(colossus.x, colossus.z) / BS) + yOff;
                                for (let dx = -15; dx <= 15; dx++) {
                                    for (let dz = -15; dz <= 15; dz++) {
                                        for (let dy = 1; dy <= 20; dy++) {
                                            const bx = fcx + dx, by = fgy + dy, bz = fcz + dz;
                                            const b = world.getBlockAt(bx, by, bz);
                                            if (b === BLOCK.WOOD || b === BLOCK.LEAVES) {
                                                world.setBlock(bx, by, bz, BLOCK.AIR);
                                            }
                                        }
                                    }
                                }
                                // Rebuild chunks in the area
                                for (let dx = -2; dx <= 2; dx++)
                                    for (let dz = -2; dz <= 2; dz++)
                                        chunkManager.rebuildChunkAt(fcx + dx * CHUNK_SIZE, fcz + dz * CHUNK_SIZE);
                            }
                        }

                        if (colossus.hp <= 0) {
                            colossus.hp = 0;
                            colossus.dead = true;
                            colossus.deathTimer = 0;
                            colossus.walking = false;
                            colossus.speed = 0;
                            if (creatures._onGateBossDeath) creatures._onGateBossDeath(colossus);
                        }
                    }
                }
            }
        }
        // Fallen colossus — can still rotate to face player
        if (colossus && colossus._fallen && !colossus.dead) {
            const cdx = player.position.x - colossus.x, cdz = player.position.z - colossus.z;
            const targetAngle = Math.atan2(-cdx, -cdz);
            let da = targetAngle - colossus.group.rotation.y;
            while (da > Math.PI) da -= Math.PI * 2;
            while (da < -Math.PI) da += Math.PI * 2;
            colossus.group.rotation.y += da * 1.5 * dt;
        }
    }

    // Boss attack animations
    {
        const allBosses = creatures.creatures.filter(c => c._isBoss && !c.dead && c._arms && c._spine);
        const ss = (e0, e1, x) => { const u = Math.max(0, Math.min(1, (x - e0) / (e1 - e0))); return u * u * (3 - 2 * u); };
        const _lerp = (a, b, u) => a + (b - a) * u;
        const kf = (t, keys) => {
            if (t <= keys[0][0]) return keys[0][1];
            if (t >= keys[keys.length-1][0]) return keys[keys.length-1][1];
            for (let i = 0; i < keys.length - 1; i++) {
                if (t < keys[i+1][0]) return _lerp(keys[i][1], keys[i+1][1], ss(keys[i][0], keys[i+1][0], t));
            }
            return keys[keys.length-1][1];
        };
        for (const boss of allBosses) {
            const bdx = player.position.x - boss.x, bdz = player.position.z - boss.z;
            const bDist = Math.sqrt(bdx*bdx + bdz*bdz);
            // Trigger attack when in range and attack ready
            if (bDist < boss.attackRange * 5 && boss.attackTimer <= 0.1 && boss._smashTimer < 0) {
                boss._smashTimer = 0;
                if (boss._isDarkKnight) boss._dkCombo = ((boss._dkCombo || 0) + 1) % 3;
            }
            // Animate attack
            if (boss._smashTimer >= 0) {
                if (boss._isNecromancer) {
                    // Necromancer: raise staff then fire purple projectile
                    const dur = 1.0;
                    boss._smashTimer += dt / dur;
                    const t = boss._smashTimer;
                    // Raise left arm (staff arm) overhead
                    const raiseArm = kf(t, [[0,0],[0.3,-2.5],[0.5,-2.8],[0.65,-1.0],[1,0]]);
                    const raiseElb = kf(t, [[0,0],[0.3,-0.5],[0.5,-0.3],[0.65,0.2],[1,0]]);
                    const spnX = kf(t, [[0,0],[0.3,-0.15],[0.5,-0.2],[0.65,0.05],[1,0]]);
                    boss._arms[0].shoulder.rotation.x = raiseArm;
                    boss._arms[0].elbow.rotation.x = raiseElb;
                    boss._arms[1].shoulder.rotation.x = raiseArm * 0.3;
                    boss._spine.rotation.x = spnX;
                    // Fire projectile at t=0.55
                    if (t >= 0.55 && t < 0.6) {
                        const dx = player.position.x - boss.x, dz = player.position.z - boss.z;
                        const dy = (player.position.y + 0.8) - (boss.group.position.y + 1.5);
                        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
                        const spd = 12;
                        const mat = new THREE.MeshBasicMaterial({ color: 0x8833cc, transparent: true, opacity: 0.9 });
                        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 4), mat);
                        mesh.position.set(boss.x, boss.group.position.y + 1.8, boss.z);
                        scene.add(mesh);
                        const light = new THREE.PointLight(0x8833cc, 2, 8);
                        light.position.copy(mesh.position);
                        scene.add(light);
                        projectiles.push({
                            mesh, light, x: boss.x, y: boss.group.position.y + 1.8, z: boss.z,
                            vx: (dx/dist)*spd, vy: (dy/dist)*spd, vz: (dz/dist)*spd,
                            life: 3, age: 0, damage: 5, staffType: 'necro',
                            _isEnemyProjectile: true,
                        });
                    }
                    if (boss._smashTimer >= 1) boss._smashTimer = -1;
                } else if (boss._isDarkKnight) {
                    // Dark Knight: player-style sword combo animation
                    const dur = 0.6;
                    boss._smashTimer += dt / dur;
                    const t = boss._smashTimer;
                    const combo = boss._dkCombo || 0;
                    const M = 1.3; // motion scale (menacing big swings)
                    let lShX=0, lShZ=0, lElX=0, rShX=0, spY=0, spX=0;

                    if (combo === 0) {
                        // Strike 1: high slash left-to-right
                        lShX = kf(t, [[0,0],[0.12,-1.8],[0.30,-0.8],[0.6,0]]);
                        lShZ = kf(t, [[0,0],[0.12,-0.6],[0.30,0.8],[0.6,0]]);
                        lElX = kf(t, [[0,0],[0.12,-0.8],[0.30,0.2],[0.6,0]]);
                        spY  = kf(t, [[0,0],[0.12,-0.4],[0.30,0.6],[0.6,0]]);
                        spX  = kf(t, [[0,0],[0.20,0],[0.30,0.1],[0.6,0]]);
                        rShX = kf(t, [[0,0],[0.12,0.2],[0.30,-0.2],[0.6,0]]);
                    } else if (combo === 1) {
                        // Strike 2: reverse slash right-to-left
                        lShX = kf(t, [[0,0],[0.12,-1.5],[0.28,-0.7],[0.6,0]]);
                        lShZ = kf(t, [[0,0],[0.12,0.8],[0.28,-0.8],[0.6,0]]);
                        lElX = kf(t, [[0,0],[0.12,-0.6],[0.28,0.2],[0.6,0]]);
                        spY  = kf(t, [[0,0],[0.12,0.4],[0.28,-0.6],[0.6,0]]);
                        spX  = kf(t, [[0,0],[0.20,0],[0.28,0.1],[0.6,0]]);
                        rShX = kf(t, [[0,0],[0.12,-0.2],[0.28,0.2],[0.6,0]]);
                    } else {
                        // Strike 3: overhead chop
                        lShX = kf(t, [[0,0],[0.15,1.5],[0.35,-2.0],[0.7,0]]);
                        lShZ = kf(t, [[0,0],[0.15,-0.3],[0.35,0],[0.7,0]]);
                        lElX = kf(t, [[0,0],[0.15,-1.5],[0.35,0.3],[0.7,0]]);
                        spX  = kf(t, [[0,0],[0.15,-0.15],[0.35,0.2],[0.7,0]]);
                        rShX = kf(t, [[0,0],[0.15,0.4],[0.35,-0.4],[0.7,0]]);
                    }
                    boss._arms[0].shoulder.rotation.x = lShX * M;
                    boss._arms[0].shoulder.rotation.z = lShZ * M;
                    boss._arms[0].elbow.rotation.x = lElX * M;
                    boss._spine.rotation.y = spY * M;
                    boss._spine.rotation.x = spX * M;
                    // Right arm mirrors/follows for two-handed look
                    boss._arms[1].shoulder.rotation.x = lShX * M - 0.15;
                    boss._arms[1].shoulder.rotation.z = -lShZ * M * 0.85;
                    boss._arms[1].elbow.rotation.x = lElX * M - 0.15;

                    if (boss._smashTimer >= 1) boss._smashTimer = -1;
                } else {
                    // Other bosses: original smash animation
                    boss._smashTimer += dt / 0.8;
                    const t = boss._smashTimer;
                    let armX = 0, elbX = 0, spnX = 0;
                    if (t < 0.3) {
                        const u = ss(0, 0.3, t);
                        armX = u * 2.5; elbX = u * (-1.0); spnX = u * (-0.2);
                    } else if (t < 0.5) {
                        const u = ss(0.3, 0.5, t);
                        armX = 2.5 - u * 4.0; elbX = -1.0 + u * 1.5; spnX = -0.2 + u * 0.4;
                    } else {
                        const u = ss(0.5, 1.0, t);
                        armX = -1.5 * (1-u); elbX = 0.5 * (1-u); spnX = 0.2 * (1-u);
                    }
                    for (const arm of boss._arms) {
                        arm.shoulder.rotation.x = armX;
                        arm.elbow.rotation.x = elbX;
                    }
                    boss._spine.rotation.x = spnX;
                    if (boss._smashTimer >= 1) boss._smashTimer = -1;
                }
            }
            // Necromancer: always animate floating particles + staff effects
            if (boss._isNecromancer) {
                const time = performance.now() * 0.001;
                if (boss._necParticles) {
                    for (const p of boss._necParticles.children) {
                        p.position.y = 0.5 + Math.sin(time * 1.5 + p._phase) * 0.4 + Math.cos(time * 0.7 + p._phase * 2) * 0.2;
                        p.position.x = Math.sin(time * 0.8 + p._phase) * 0.5;
                        p.position.z = Math.cos(time * 0.8 + p._phase) * 0.5;
                        p.material.opacity = 0.3 + Math.sin(time * 2 + p._phase) * 0.3;
                    }
                }
                // Animate staff orb pulse and ring rotation
                const pm = boss._playerModel;
                if (pm) {
                    const staff = pm.leftArm.handGrp.children[pm.leftArm.handGrp.children.length - 1];
                    if (staff && staff._rings) {
                        staff._rings[0].rotation.z = time * 1.5;
                        staff._rings[1].rotation.y = time * 1.2;
                        if (staff._orbMesh) staff._orbMesh.material.opacity = 0.65 + Math.sin(time * 3) * 0.2;
                        if (staff._orbLight) staff._orbLight.intensity = 1.2 + Math.sin(time * 2.5) * 0.5;
                    }
                }
            }
        }
    }

    // Context music — boss > fortress > village > calm
    {
        const aliveBosses = creatures.creatures.filter(c => c._isBoss && !c.dead);
        const fdx = player.position.x - (-505), fdz = player.position.z - (-175);
        const fortDist = Math.sqrt(fdx*fdx + fdz*fdz);
        const cur = musicSystem.currentName;

        // Find nearest boss
        let nearestBoss = null, nearestBossDist = Infinity;
        for (const b of aliveBosses) {
            const bdx = player.position.x - b.x, bdz = player.position.z - b.z;
            const d = Math.sqrt(bdx*bdx + bdz*bdz);
            if (d < nearestBossDist) { nearestBossDist = d; nearestBoss = b; }
        }

        if (nearestBoss && nearestBossDist < 35) {
            const track = nearestBoss._isDarkKnight ? 'darkKnight' : nearestBoss._isHobgoblin ? 'hobgoblin' : nearestBoss._isGateBoss ? 'gateBoss' : 'boss';
            if (cur !== track && musicSystem.tracks[track]) musicSystem.play(track);
        } else if (cur === 'boss' || cur === 'gateBoss') {
            musicSystem.play(fortDist < 70 ? 'fortress' : 'calm');
        }

        // Check if near a village
        const villageLocs = [[80,16],[-100,-50],[200,60],[-200,100],[50,-150],[-150,200]];
        let nearVillage = false;
        for (const [vx, vz] of villageLocs) {
            const vdx = player.position.x - vx, vdz = player.position.z - vz;
            if (vdx*vdx + vdz*vdz < 40*40) { nearVillage = true; break; }
        }

        // Priority: boss > fortress > village > calm
        if (cur !== 'boss') {
            if (fortDist < 60 && cur !== 'fortress') {
                musicSystem.play('fortress');
            } else if (fortDist >= 80 && cur === 'fortress') {
                musicSystem.play(nearVillage ? 'village' : 'calm');
            } else if (cur !== 'fortress') {
                if (nearVillage && cur !== 'village') {
                    musicSystem.play('village');
                } else if (!nearVillage && cur === 'village') {
                    musicSystem.play('calm');
                }
            }
        }
    }

    // Campfire flame animation
    const _ft = performance.now() * 0.004;
    for (const [, cf] of campfireModels) {
        if (cf._flames) for (let i = 0; i < cf._flames.length; i++) {
            const f = cf._flames[i];
            f.scale.y = 1.0 + Math.sin(_ft + i * 2.1) * 0.4;
            f.position.y = BLOCK_SIZE * (0.45 + i * 0.08 + Math.sin(_ft * 1.3 + i) * 0.05);
        }
    }

    // Fortress guardian wyvern — circle above fortress
    if (world._fortressDragon) {
        const fd = world._fortressDragon;
        fd._flyAngle += fd._flySpeed * dt;
        fd.x = -505 + Math.cos(fd._flyAngle) * fd._flyRadius;
        fd.z = -175 + Math.sin(fd._flyAngle) * fd._flyRadius;
        const flyY = getTerrainHeight(-505, -175) + fd._flyHeight + Math.sin(fd._flyAngle * 1.7) * 5;
        fd.group.position.set(fd.x, flyY, fd.z);
        // Face direction of flight — tangent to circle
        fd.group.rotation.y = -fd._flyAngle;
        // Slight bank into the turn
        fd.group.rotation.z = 0.15;
        // Slight nose-down pitch for flying
        fd.group.rotation.x = 0.1;
        // Set flying state so dragon update handles wing animation
        fd.flying = true;
        fd.walking = false;
        fd._flapT = (fd._flapT || 0) + dt;
        // Legs tucked
        if (fd.legs) for (const leg of fd.legs) leg.rotation.x = 0.6;
        // Tail wave
        if (fd.tailSegs) for (let ti = 0; ti < fd.tailSegs.length; ti++) {
            fd.tailSegs[ti].rotation.y = Math.sin(fd._flapT * 2 + ti * 0.35) * 0.1;
        }
        // Head slightly down
        if (fd.headGrp) fd.headGrp.rotation.x = -0.1;
        if (fd.neckGrp) fd.neckGrp.rotation.x = 0.15;

        // Fire breath — attack player if too close to fortress
        const fdx = player.position.x - (-505), fdz = player.position.z - (-175);
        const fortDist = Math.sqrt(fdx*fdx + fdz*fdz);
        const breathRange = 55; // start breathing when player is within this range of fortress center

        if (fortDist < breathRange && playerHP > 0) {
            fd._breathTimer += dt;
            if (!fd._exposureTimer) fd._exposureTimer = 0;

            // Check line of sight — raycast from dragon to player through blocks
            const drx = fd.x, dry = fd.group.position.y, drz = fd.z;
            const px = player.position.x, py = player.position.y + 0.5, pz = player.position.z;
            const dirX = px - drx, dirY = py - dry, dirZ = pz - drz;
            const dist = Math.sqrt(dirX*dirX + dirY*dirY + dirZ*dirZ);
            const nx = dirX/dist, ny = dirY/dist, nz = dirZ/dist;

            // Block raycast for line of sight — check every half block
            let blocked = false;
            const yOff = 128;
            const step = BLOCK_SIZE * 0.5;
            for (let t = 1; t < dist - 0.5; t += step) {
                const rx = drx + nx * t, ry = dry + ny * t, rz = drz + nz * t;
                const bx = Math.floor(rx / BLOCK_SIZE);
                const by = Math.floor(ry / BLOCK_SIZE) + yOff;
                const bz = Math.floor(rz / BLOCK_SIZE);
                const b = world.getBlockAt(bx, by, bz);
                if (b !== 0 && b !== 5) { blocked = true; break; }
            }

            if (!blocked && dist < 80) {
                fd._exposureTimer += dt;
                fd._breathing = true;

                // Only attack after 2 seconds of exposure
                if (fd._exposureTimer < 2) {
                    fd._fireMesh.visible = false;
                } else {
                // Show fire beam
                fd._fireMesh.visible = true;
                // Position fire from dragon toward player
                const midX = (drx + px) / 2, midY = (dry + py) / 2, midZ = (drz + pz) / 2;
                fd._fireMesh.position.set(midX, midY, midZ);
                fd._fireMesh.lookAt(px, py, pz);
                fd._fireMesh.rotateX(Math.PI / 2);
                const fireLen = dist * 0.9;
                fd._fireMesh.scale.set(1, fireLen / 20, 1);
                // Flicker
                fd._fireMat.opacity = 0.4 + Math.sin(performance.now() * 0.02) * 0.2;
                fd._fireMat.color.setHex(Math.random() > 0.3 ? 0xff6600 : 0xff3300);

                // Damage player — 3 per second
                if (fd._breathTimer >= 0.33) {
                    fd._breathTimer = 0;
                    playerHP = Math.max(0, playerHP - applyArmorDamage(1)); // 1 HP per tick, reduced by armor
                    updateHeartsUI();
                    // Screen flash
                    const flash = document.createElement('div');
                    flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,100,0,0.15);z-index:50;pointer-events:none;';
                    document.body.appendChild(flash);
                    setTimeout(() => flash.remove(), 100);
                }
            }
            } else {
                fd._fireMesh.visible = false;
                fd._exposureTimer = 0; // behind cover resets exposure
            }
        } else {
            if (fd._breathing) {
                fd._breathing = false;
                fd._breathTimer = 0;
                fd._fireMesh.visible = false;
            }
            fd._exposureTimer = 0; // out of range resets exposure
        }
    }

    // ── Camera ──
    const firstPerson = zoomLevel < 0.15 && !dragonMgr.ridingDragon;
    let camRotY = (useMouseLook && pointerLocked) ? fpYaw : player.group.rotation.y;
    let camTarget = player.position.clone();
    let lookOffY = 1.3;
    if (dragonMgr.ridingDragon && dragonMgr.ridingRef) {
        const bd = dragonMgr.ridingRef;
        camRotY = bd.angle;
        camTarget.set(bd.x, bd.group.position.y, bd.z);
        lookOffY = bd.growthScale * 2;
    }

    // Hide player model in first person
    player.group.visible = !firstPerson;

    if (firstPerson) {
        // First person — camera at eye level, mouse look with pitch
        const eyeY = player.position.y + player.EYE_HEIGHT;
        const lookDist = 5;
        _idealOffset.set(player.position.x, eyeY, player.position.z);
        _idealLook.set(
            player.position.x + Math.sin(fpYaw) * Math.cos(fpPitch) * lookDist,
            eyeY + Math.sin(fpPitch) * lookDist,
            player.position.z + Math.cos(fpYaw) * Math.cos(fpPitch) * lookDist
        );
    } else if (cameraMC) {
        // Minecraft-style third person — camera orbits, resets behind player on move
        const isMoving = player.speed > 0.3;
        if (isMoving) {
            // Smoothly lerp camera yaw toward behind-player direction
            let targetYaw = player.group.rotation.y;
            let dYaw = targetYaw - fpYaw;
            while (dYaw > Math.PI) dYaw -= Math.PI * 2;
            while (dYaw < -Math.PI) dYaw += Math.PI * 2;
            fpYaw += dYaw * 4 * dt;
            // Keep pitch as-is — only reset horizontal angle
        }
        const ridingScale = dragonMgr.ridingDragon && dragonMgr.ridingRef ? Math.max(1, dragonMgr.ridingRef.growthScale * 2.5) : 1;
        const camDist = 4.0 * zoomLevel * ridingScale;
        const camH = 2.0 * ridingScale;
        const pitchAngle = fpPitch;
        const pitchOffY = Math.sin(pitchAngle) * camDist;
        const pitchDist = Math.cos(pitchAngle) * camDist;

        _idealOffset.set(0, camH + pitchOffY, -pitchDist)
            .applyAxisAngle(_upAxis, fpYaw)
            .add(camTarget);
        _idealLook.copy(camTarget);
        _idealLook.y += lookOffY + 0.3;
    } else {
        // Third person — Fortnite-style over-right-shoulder
        const s = player.sprintBlend;
        const cr = 0;
        const ridingScale = dragonMgr.ridingDragon && dragonMgr.ridingRef ? Math.max(1, dragonMgr.ridingRef.growthScale * 2.5) : 1;
        const baseDist = mix(mix(3.5, 4.5, s), 3.0, cr) * ridingScale;
        const baseH    = mix(mix(2.0, 2.3, s), 1.5, cr) * ridingScale;
        const camDist = baseDist * zoomLevel;
        const camH    = baseH;
        const rightOffset = -1.0 * ridingScale; // over left shoulder — player appears right
        const upOffset = 0.5 * ridingScale; // slightly above shoulder height

        // Apply pitch to camera height/distance
        const pitchAngle = pointerLocked ? fpPitch : 0;
        const pitchOffY = Math.sin(pitchAngle) * camDist;
        const pitchDist = Math.cos(pitchAngle) * camDist;

        _idealOffset.set(rightOffset, camH + upOffset + pitchOffY, -pitchDist)
            .applyAxisAngle(_upAxis, camRotY)
            .add(camTarget);
        const lookRight = new THREE.Vector3(rightOffset * 0.6, 0, 0)
            .applyAxisAngle(_upAxis, camRotY);
        _idealLook.copy(camTarget).add(lookRight);
        _idealLook.y += lookOffY + 0.3;
    }

    // Pull ideal camera position forward if it would be inside a solid block
    if (!firstPerson && world) {
        const yOff = 128;
        const ibx = Math.floor(_idealOffset.x / BLOCK_SIZE);
        const iby = Math.floor(_idealOffset.y / BLOCK_SIZE) + yOff;
        const ibz = Math.floor(_idealOffset.z / BLOCK_SIZE);
        const block = world.getBlockAt(ibx, iby, ibz);
        if (block !== 0 && block !== 5) {
            const dir = new THREE.Vector3().subVectors(_idealOffset, camTarget).normalize();
            const maxDist = _idealOffset.distanceTo(camTarget);
            let safeDist = 0.5;
            for (let t = 0.5; t < maxDist; t += BLOCK_SIZE * 0.5) {
                const tx = camTarget.x + dir.x * t;
                const ty = camTarget.y + dir.y * t;
                const tz = camTarget.z + dir.z * t;
                const tbx = Math.floor(tx / BLOCK_SIZE);
                const tby = Math.floor(ty / BLOCK_SIZE) + yOff;
                const tbz = Math.floor(tz / BLOCK_SIZE);
                const tb = world.getBlockAt(tbx, tby, tbz);
                if (tb !== 0 && tb !== 5) break;
                safeDist = t;
            }
            _idealOffset.copy(camTarget).addScaledVector(dir, safeDist);
        }
    }

    if (!camInit) {
        camPos.copy(_idealOffset);
        camLook.copy(_idealLook);
        camInit = true;
    } else {
        const lerpSpeed = firstPerson ? 30 : 20;
        camPos.lerp(_idealOffset, 1 - Math.exp(-lerpSpeed * dt));
        camLook.lerp(_idealLook,  1 - Math.exp(-lerpSpeed * 1.5 * dt));
    }
    camera.position.copy(camPos);
    camera.lookAt(camLook);

    // Crosshair in first person only
    const crossEl = document.getElementById('crosshair');
    // Crosshair always visible

    // Prompt
    const promptEl = document.getElementById('prompt');
    // Colossus mining prompt
    let colossusPrompt = '';
    {
        const col = creatures.creatures.find(c => c._isGateBoss && !c.dead);
        if (col) {
            const cdx = player.position.x - col.x, cdz = player.position.z - col.z;
            if (cdx*cdx + cdz*cdz < 64) {
                const held = hotbarSlots[selectedSlot];
                if (typeof held === 'string' && held.includes('pickaxe')) {
                    colossusPrompt = 'Mine to damage the Colossus (' + col.hp + '/' + col.maxHP + ' HP)';
                } else {
                    colossusPrompt = 'Use a pickaxe to damage the Colossus';
                }
            }
        }
    }

    // Fortress sword interaction
    let fortressSwordPrompt = '';
    if (world._fortressSwordMeshes) {
        for (let fi = world._fortressSwordMeshes.length - 1; fi >= 0; fi--) {
            const fs = world._fortressSwordMeshes[fi];
            const sdx = player.position.x - fs.wx, sdz = player.position.z - fs.wz;
            if (sdx*sdx + sdz*sdz < 9) {
                const sName = window._customSwords[fs.id]?.name || 'ancient sword';
                fortressSwordPrompt = 'Press E to draw ' + sName;
                if (keys['KeyE']) {
                    inventory[fs.id] = 1;
                    if (!hotbarSlots.includes(fs.id) && !_hotbarHasSword()) {
                        const ei = hotbarSlots.indexOf(0);
                        if (ei >= 0) hotbarSlots[ei] = fs.id;
                    }
                    refreshUI();
                    scene.remove(fs.mesh);
                    world._fortressSwordMeshes.splice(fi, 1);
                    addChatMessage('You draw ' + sName + ' from the ancient stone.', 'rgba(255,200,100,0.9)');
                    keys['KeyE'] = false;
                }
                break;
            }
        }
    }

    const promptText = colossusPrompt || fortressSwordPrompt || dragonMgr.getPrompt(player);
    if (promptText) { promptEl.textContent = promptText; promptEl.style.display = 'block'; }
    else { promptEl.style.display = 'none'; }

    // Debug
    const px = player.position.x, py = player.position.y, pz = player.position.z;
    const bx = Math.floor(px / BLOCK_SIZE);
    const by = Math.floor(py / BLOCK_SIZE);
    const bz = Math.floor(pz / BLOCK_SIZE);
    const pickInfo = (player.pickaxeHeld.visible || player.axeHeld.visible) ? '<br>Tool: 3x3 grid-snapped' : '';
    const mpInfo = mp.active ? `<br>Players: ${mp.playerCount} | ${mp.isHost ? 'Host' : 'Client'} | ${mp.myId}` : '';
    debugEl.innerHTML = `FPS: ${fps}<br>X: ${px.toFixed(1)} Y: ${py.toFixed(1)} Z: ${pz.toFixed(1)}<br>Block: ${bx} ${by} ${bz}<br>Chunks: ${chunkManager.loadedCount}${pickInfo}${mpInfo}`;

    // ── Update block highlight ──
    if (!inventoryOpen && !craftingTableOpen && !furnaceOpen && !anvilOpen && !mapOpen) {
        const hlHit = raycastBlock(null);
        if (hlHit) {
            const BS = BLOCK_SIZE;
            const yOff = 128;
            const nx = hlHit.nx, ny = hlHit.ny, nz = hlHit.nz;

            let cx, cy, cz, sx, sy, sz;
            // Check if auto-snap would apply
            let hlSnap = snapGrid;
            if (!hlSnap && autoMineSnap) {
                const _isNat = b => b !== 0 && b !== 5 && b !== BLOCK.WOOD && b !== BLOCK.PLANKS && b !== BLOCK.LEAVES && b !== BLOCK.CRAFTING && b !== 15;
                let sa = 0;
                for (let dy = 1; dy <= 4; dy++) {
                    const ab = world.getBlockAt(hlHit.x, hlHit.y + dy, hlHit.z);
                    if (_isNat(ab)) sa++;
                }
                if (sa >= 2) hlSnap = true;
            }
            if (hlSnap) {
                // Snap grid — show aligned 2x2x2 cube
                const snap = v => Math.floor(v / 2) * 2;
                const bx0 = snap(hlHit.x), by0 = snap(hlHit.y), bz0 = snap(hlHit.z);
                cx = (bx0 + 0.5) * BS + BS * 0.5;
                cy = (by0 + 0.5 - yOff) * BS + BS * 0.5;
                cz = (bz0 + 0.5) * BS + BS * 0.5;
                sx = 2; sy = 2; sz = 2;
            } else {
                // Brush: side along hAxis, up in Y, depth along face normal
                let hAxis;
                if (nx !== 0) hAxis = brushRotated ? 'x' : 'z';
                else if (nz !== 0) hAxis = brushRotated ? 'z' : 'x';
                else hAxis = brushRotated ? 'z' : 'x';
                sx = (hAxis === 'x') ? brushW : (Math.abs(nx) ? brushD : 1);
                sy = brushH;
                sz = (hAxis === 'z') ? brushW : (Math.abs(nz) ? brushD : 1);
                cx = hlHit.x * BS + BS * 0.5;
                cy = (hlHit.y - yOff) * BS + BS * 0.5;
                cz = hlHit.z * BS + BS * 0.5;
            }
            _hlLine.position.set(cx, cy, cz);
            _hlLine.scale.set(sx, sy, sz);
            _hlLine.visible = true;
            // Inverse color outline
            const bc = BLOCK_COLORS[hlHit.block] || 0x888888;
            _hlLineMat.color.setHex(0xffffff - (bc & 0xffffff));
            // Face highlight — sized to brush
            const fw = brushW;
            const fh = brushH;
            _faceMesh.scale.set(fw, fh, 1);
            _faceMesh.position.set(cx + nx * BS * 0.503, cy + ny * BS * 0.503, cz + nz * BS * 0.503);
            if (ny !== 0) {
                _faceMesh.rotation.set(Math.PI / 2, 0, 0);
            } else if (nx !== 0) {
                _faceMesh.rotation.set(0, Math.PI / 2, 0);
            } else {
                _faceMesh.rotation.set(0, 0, 0);
            }
            _faceMesh.visible = true;
        } else {
            _hlLine.visible = false;
            _faceMesh.visible = false;
        }
    } else {
        _hlLine.visible = false;
        _faceMesh.visible = false;
    }

    // Necromancer shield — animate, check, and block player
    {
        const nec = creatures.creatures.find(c => c._isNecromancer && !c.dead);
        if (nec && nec._shield) {
            const shieldShouldBeActive = nec._shieldActive();
            if (shieldShouldBeActive) {
                // Animate shield dome
                const st = performance.now() * 0.001;
                nec._shield.visible = true;
                nec._shieldRing.visible = true;
                nec._shieldRing2.visible = true;
                nec._shield.material.opacity = 0.1 + Math.sin(st * 1.5) * 0.05;
                nec._shieldRing.rotation.z = st * 0.3;
                nec._shieldRing2.rotation.z = -st * 0.5;
                nec._shieldRing2.material.opacity = 0.2 + Math.sin(st * 2) * 0.1;

                // Block player from entering the shield radius
                const dx = player.position.x - nec.x, dz = player.position.z - nec.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < 8 && dist > 0.1) {
                    // Push player back to edge
                    const pushX = nec.x + (dx / dist) * 8.1;
                    const pushZ = nec.z + (dz / dist) * 8.1;
                    player.position.x = pushX;
                    player.position.z = pushZ;
                    player.group.position.x = pushX;
                    player.group.position.z = pushZ;
                }

                // Keep necromancer passive
                nec.hostile = false;
                nec.aggroRange = 0;
            } else if (nec._shielded) {
                // Shield just dropped! Activate the necromancer
                nec._shielded = false;
                nec.hostile = true;
                nec.aggroRange = 25;
                // Remove shield visuals
                scene.remove(nec._shield);
                scene.remove(nec._shieldRing);
                scene.remove(nec._shieldRing2);
                nec._shield.geometry.dispose();
                nec._shieldRing.geometry.dispose();
                nec._shieldRing2.geometry.dispose();
                nec._shield = null;
                addChatMessage('The barrier shatters! The Necromancer awakens...', 'rgba(170,68,255,0.95)');
            }
        }
    }

    // Update summoned skeletons — timer and cleanup
    for (let i = summonedSkeletons.length - 1; i >= 0; i--) {
        const sk = summonedSkeletons[i];
        sk._summonTimer -= dt;
        if (sk._summonTimer <= 0 || sk.dead) {
            // Despawn — death poof
            sk.hp = 0; sk.dead = true; sk.deathTimer = 0; sk.walking = false; sk.speed = 0;
            summonedSkeletons.splice(i, 1);
        } else {
            // Summoned skeletons seek nearest hostile enemy
            let nearest = null, nearDist = Infinity;
            for (const c of creatures.creatures) {
                if (c === sk || c.dead || c._isSummon || c._friendlyToPlayer) continue;
                if (!c.hostile) continue;
                const dx = c.x - sk.x, dz = c.z - sk.z;
                const d = dx*dx + dz*dz;
                if (d < nearDist) { nearDist = d; nearest = c; }
            }
            if (nearest && nearDist < 20*20) {
                // Chase the enemy
                const dx = nearest.x - sk.x, dz = nearest.z - sk.z;
                const dist = Math.sqrt(dx*dx + dz*dz) || 1;
                sk.angle = Math.atan2(dx, dz);
                sk.group.rotation.y = sk.angle;
                if (dist > sk.attackRange) {
                    sk.x += (dx/dist) * sk.chaseSpeed * dt;
                    sk.z += (dz/dist) * sk.chaseSpeed * dt;
                    sk.walking = true;
                } else {
                    // Attack
                    sk.attackTimer -= dt;
                    if (sk.attackTimer <= 0) {
                        nearest.hp -= sk.attackDmg;
                        if (nearest.hp <= 0) { nearest.hp = 0; nearest.dead = true; nearest.deathTimer = 0; nearest.walking = false; nearest.speed = 0; }
                        sk.attackTimer = sk.attackCD;
                    }
                    sk.walking = false;
                }
                sk.group.position.set(sk.x, getTerrainHeight(sk.x, sk.z), sk.z);
            }
            // Flash when about to expire (last 5 seconds)
            if (sk._summonTimer < 5) {
                sk.group.visible = Math.sin(sk._summonTimer * 8) > 0;
            }
        }
    }

    // Animate ice staff if held
    if (player.staffHeld.visible && player.staffHeld._iceExtras && player.staffHeld._iceExtras.visible) {
        const it = performance.now() * 0.001;
        // Orbiting ice particles
        if (player.staffHeld._iceParticles) {
            for (const p of player.staffHeld._iceParticles) {
                const a = it * 0.8 + p._phase;
                p.position.x = Math.cos(a) * 0.1;
                p.position.z = Math.sin(a) * 0.1;
                p.position.y = 1.28 + Math.sin(it * 1.5 + p._phase) * 0.08;
                p.material.opacity = 0.4 + Math.sin(it * 2 + p._phase) * 0.2;
            }
        }
        // Core glow pulse
        if (player.staffHeld._iceCore) {
            player.staffHeld._iceCore.material.opacity = 0.3 + Math.sin(it * 2) * 0.15;
            player.staffHeld._iceCore.scale.setScalar(1 + Math.sin(it * 3) * 0.1);
        }
        // Light flicker
        if (player.staffHeld._iceLight) {
            player.staffHeld._iceLight.intensity = 1.0 + Math.sin(it * 2.5) * 0.3;
        }
    }

    // Animate lightning staff if held
    if (player.staffHeld.visible && player.staffHeld._lightningExtras && player.staffHeld._lightningExtras.visible) {
        const lt = performance.now() * 0.001;
        // Crackling arcs — randomly reposition and flash
        if (player.staffHeld._lightningArcs) {
            for (const arc of player.staffHeld._lightningArcs) {
                const a = lt * 3 + arc._phase;
                arc.position.x = Math.cos(a) * 0.04;
                arc.position.z = Math.sin(a) * 0.04;
                arc.rotation.z = Math.sin(lt * 15 + arc._phase) * 1.5;
                arc.rotation.x = Math.cos(lt * 12 + arc._phase * 2) * 1.0;
                // Random flash — occasionally go bright or dim
                arc.material.opacity = Math.sin(lt * 20 + arc._phase * 7) > 0.3 ? 0.8 : 0.1;
                arc.scale.y = 0.5 + Math.random() * 1.5;
            }
        }
        // Spark core flicker
        if (player.staffHeld._sparkCore) {
            player.staffHeld._sparkCore.material.opacity = 0.6 + Math.sin(lt * 8) * 0.3;
            player.staffHeld._sparkCore.scale.setScalar(0.8 + Math.sin(lt * 6) * 0.3);
        }
        // Light crackle
        if (player.staffHeld._lightningLight) {
            player.staffHeld._lightningLight.intensity = 1.0 + Math.random() * 1.5;
        }
    }

    // Animate fire staff if held
    if (player.staffHeld.visible && player.staffHeld._fireExtras && player.staffHeld._fireExtras.visible) {
        const ft = performance.now() * 0.001;
        // Flickering flames
        if (player.staffHeld._fireFlames) {
            player.staffHeld._fireFlames[0].scale.y = 1.3 + Math.sin(ft * 8) * 0.3;
            player.staffHeld._fireFlames[0].scale.x = 1 + Math.sin(ft * 6 + 1) * 0.15;
            player.staffHeld._fireFlames[1].scale.y = 1.5 + Math.sin(ft * 10 + 2) * 0.4;
            player.staffHeld._fireFlames[2].position.y = 1.32 + Math.sin(ft * 12) * 0.02;
        }
        // Floating ember particles
        if (player.staffHeld._fireEmbers) {
            for (const e of player.staffHeld._fireEmbers) {
                e.position.y = 1.3 + Math.sin(ft * 3 + e._phase) * 0.15 + ((ft * 0.5 + e._phase) % 0.4);
                e.position.x = Math.sin(ft * 2 + e._phase) * 0.08;
                e.position.z = Math.cos(ft * 2 + e._phase * 1.3) * 0.08;
                e.material.opacity = 0.5 + Math.sin(ft * 5 + e._phase) * 0.3;
            }
        }
        // Pulsing light
        if (player.staffHeld._fireLight) {
            player.staffHeld._fireLight.intensity = 1.2 + Math.sin(ft * 4) * 0.6;
        }
    }

    // Animate void staff rings/light if player is holding it
    if (player.staffHeld.visible && player.staffHeld._voidExtras && player.staffHeld._voidExtras.visible) {
        const vt = performance.now() * 0.001;
        if (player.staffHeld._voidRings) {
            player.staffHeld._voidRings[0].rotation.z = vt * 1.5;
            player.staffHeld._voidRings[1].rotation.y = vt * 1.2;
        }
        if (player.staffHeld._voidLight) {
            player.staffHeld._voidLight.intensity = 1.2 + Math.sin(vt * 2.5) * 0.5;
        }
    }

    // Keep sun at fixed direction from player (so it doesn't move as you walk)
    sunSphere.position.set(player.position.x + 400, 600, player.position.z - 300);
    sunGlow.position.copy(sunSphere.position);

    updateClouds(dt);
    renderer.render(scene, camera);
}
animate();

// ── Command system (for terminal / NFC tags) ──
window._gameCmd = function(data) {
    const { cmd, args } = data;
    const msg = (t) => { showToast(t); console.log('[CMD]', t); };
    switch (cmd) {
        case 'give': {
            const item = isNaN(args[0]) ? args[0] : Number(args[0]);
            const count = Number(args[1]) || 1;
            inventory[item] = (inventory[item] || 0) + count;
            const emptyIdx = hotbarSlots.indexOf(0);
            if (emptyIdx >= 0 && !hotbarSlots.includes(item)) hotbarSlots[emptyIdx] = item;
            refreshUI();
            msg('Gave ' + count + 'x ' + item);
            break;
        }
        case 'heal': {
            playerHP = playerMaxHP;
            updateHeartsUI();
            msg('Fully healed');
            break;
        }
        case 'tp': {
            const tx = Number(args[0]) || 0, ty = Number(args[1]) || 0, tz = Number(args[2]) || 0;
            player.position.set(tx, ty, tz);
            msg('Teleported to ' + tx + ', ' + ty + ', ' + tz);
            break;
        }
        case 'speed': {
            const s = Number(args[0]) || 3;
            player.walkSpeed = s;
            player.sprintSpeed = s * 1.8;
            msg('Speed set to ' + s);
            break;
        }
        case 'fly': {
            player.vy = 8;
            msg('Boost!');
            break;
        }
        case 'god': {
            playerMaxHP = 9999; playerHP = 9999;
            updateHeartsUI();
            msg('God mode');
            break;
        }
        case 'time': {
            // args[0] = 'day' or 'night' or a number 0-1
            if (args[0] === 'day') timeOfDay = 0.5;
            else if (args[0] === 'night') timeOfDay = 0.0;
            else timeOfDay = Number(args[0]) || 0.5;
            msg('Time set to ' + timeOfDay.toFixed(2));
            break;
        }
        case 'clear': {
            for (const k in inventory) delete inventory[k];
            hotbarSlots.fill(0);
            refreshUI();
            msg('Inventory cleared');
            break;
        }
        case 'xp':
        case 'msg': {
            msg(args.join(' '));
            break;
        }
        default:
            msg('Unknown command: ' + cmd);
    }
};

// ── Chat & Command System ──
const chatBox = document.getElementById('chatBox');
const chatLog = document.getElementById('chatLog');
const chatInput = document.getElementById('chatInput');
let chatOpen = false;
const chatMessages = [];
const CHAT_FADE_TIME = 8000; // messages fade after 8s

function addChatMessage(text, color) {
    const time = Date.now();
    chatMessages.push({ text, color: color || 'rgba(220,210,180,0.9)', time });
    // Keep last 50
    if (chatMessages.length > 50) chatMessages.shift();
    renderChatLog();
}

function renderChatLog() {
    // Show last 10 messages, fade old ones
    const now = Date.now();
    const recent = chatMessages.slice(-10);
    chatLog.innerHTML = recent.map(m => {
        const age = now - m.time;
        const opacity = chatOpen ? 1 : Math.max(0, 1 - (age - CHAT_FADE_TIME) / 2000);
        if (opacity <= 0 && !chatOpen) return '';
        return `<div style="color:${m.color};opacity:${opacity};margin-bottom:2px;">${m.text}</div>`;
    }).join('');
    chatBox.style.display = (chatOpen || recent.some(m => Date.now() - m.time < CHAT_FADE_TIME + 2000)) ? 'block' : 'none';
}

// Refresh chat fade every 500ms
setInterval(renderChatLog, 500);

function openChat() {
    chatOpen = true;
    chatInput.style.display = 'block';
    chatInput.focus();
    chatBox.style.display = 'block';
    renderChatLog();
    if (pointerLocked) document.exitPointerLock();
}

function closeChat() {
    chatOpen = false;
    chatInput.style.display = 'none';
    chatInput.value = '';
    renderChatLog();
    if (useMouseLook && gameStarted) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
}

// Parse player selector: @s, @a, @e, @r, "name with spaces", plain name
function resolvePlayerSelector(sel) {
    if (!sel) return [];
    if (sel === '@s') return [{ name: charColors.name || 'Player', isSelf: true }];
    if (sel === '@a') return [{ name: charColors.name || 'Player', isSelf: true }]; // singleplayer = just self
    if (sel === '@e') return [{ name: charColors.name || 'Player', isSelf: true }]; // entities = self for now
    if (sel === '@r') return [{ name: charColors.name || 'Player', isSelf: true }]; // random = self in singleplayer
    // Quoted name: "name" or {name} or [name]
    let name = sel;
    if ((sel.startsWith('"') && sel.endsWith('"')) ||
        (sel.startsWith('{') && sel.endsWith('}')) ||
        (sel.startsWith('[') && sel.endsWith(']'))) {
        name = sel.slice(1, -1);
    }
    // Check if it's this player
    if (name.toLowerCase() === (charColors.name || 'Player').toLowerCase()) {
        return [{ name, isSelf: true }];
    }
    // TODO: multiplayer — resolve remote player names
    return [{ name, isSelf: false, notFound: true }];
}

// Parse command arguments, respecting quoted strings
function parseArgs(text) {
    const args = [];
    let i = 0;
    while (i < text.length) {
        if (text[i] === ' ') { i++; continue; }
        if (text[i] === '"' || text[i] === '{' || text[i] === '[') {
            const close = text[i] === '"' ? '"' : text[i] === '{' ? '}' : ']';
            const end = text.indexOf(close, i + 1);
            if (end >= 0) {
                args.push(text.substring(i, end + 1));
                i = end + 1;
            } else {
                args.push(text.substring(i));
                break;
            }
        } else {
            const end = text.indexOf(' ', i);
            if (end >= 0) {
                args.push(text.substring(i, end));
                i = end;
            } else {
                args.push(text.substring(i));
                break;
            }
        }
    }
    return args;
}

function executeCommand(input) {
    const trimmed = input.trim();
    if (!trimmed) return;

    // Regular chat message
    if (!trimmed.startsWith('/')) {
        addChatMessage(`<${charColors.name || 'Player'}> ${trimmed}`);
        return;
    }

    const parts = parseArgs(trimmed.substring(1)); // remove /
    const cmd = parts[0]?.toLowerCase();
    const args = parts.slice(1);

    switch (cmd) {
        case 'give': {
            // /give <player> <item> [quantity]
            if (args.length < 2) { addChatMessage('Usage: /give <player> <item> [quantity]', 'rgba(255,100,100,0.9)'); return; }
            const targets = resolvePlayerSelector(args[0]);
            const item = args[1];
            const qty = Number(args[2]) || 1;
            for (const t of targets) {
                if (t.notFound) { addChatMessage('Player not found: ' + t.name, 'rgba(255,100,100,0.9)'); continue; }
                if (t.isSelf) {
                    const invItem = isNaN(item) ? item : Number(item);
                    inventory[invItem] = (inventory[invItem] || 0) + qty;
                    if (!hotbarSlots.includes(invItem)) {
                        const ei = hotbarSlots.indexOf(0);
                        if (ei >= 0) hotbarSlots[ei] = invItem;
                    }
                    refreshUI();
                    addChatMessage(`Gave ${qty}x ${item} to ${t.name}`, 'rgba(150,220,150,0.9)');
                }
            }
            break;
        }
        case 'tp': {
            // /tp <player(s)> <x> <y> <z>
            if (args.length < 4) { addChatMessage('Usage: /tp <player> <x> <y> <z>', 'rgba(255,100,100,0.9)'); return; }
            const targets = resolvePlayerSelector(args[0]);
            const tx = Number(args[1]), ty = Number(args[2]), tz = Number(args[3]);
            if (isNaN(tx) || isNaN(ty) || isNaN(tz)) { addChatMessage('Invalid coordinates', 'rgba(255,100,100,0.9)'); return; }
            for (const t of targets) {
                if (t.notFound) { addChatMessage('Player not found: ' + t.name, 'rgba(255,100,100,0.9)'); continue; }
                if (t.isSelf) {
                    player.position.set(tx, ty, tz);
                    addChatMessage(`Teleported ${t.name} to ${tx}, ${ty}, ${tz}`, 'rgba(150,220,150,0.9)');
                }
            }
            break;
        }
        case 'clear': {
            // /clear [player]
            const targets = args.length > 0 ? resolvePlayerSelector(args[0]) : [{ name: charColors.name, isSelf: true }];
            for (const t of targets) {
                if (t.notFound) { addChatMessage('Player not found: ' + t.name, 'rgba(255,100,100,0.9)'); continue; }
                if (t.isSelf) {
                    for (const k in inventory) delete inventory[k];
                    hotbarSlots.fill(0);
                    refreshUI();
                    addChatMessage(`Cleared inventory of ${t.name}`, 'rgba(150,220,150,0.9)');
                }
            }
            break;
        }
        case 'kill': {
            // /kill <player>
            if (args.length < 1) { addChatMessage('Usage: /kill <player>', 'rgba(255,100,100,0.9)'); return; }
            const targets = resolvePlayerSelector(args[0]);
            for (const t of targets) {
                if (t.notFound) { addChatMessage('Player not found: ' + t.name, 'rgba(255,100,100,0.9)'); continue; }
                if (t.isSelf) {
                    playerHP = 0;
                    updateHeartsUI();
                    addChatMessage(`Killed ${t.name}`, 'rgba(255,150,100,0.9)');
                }
            }
            break;
        }
        case 'help': {
            addChatMessage('/give <player> <item> [qty] — Give items', 'rgba(180,180,220,0.9)');
            addChatMessage('/tp <player> <x> <y> <z> — Teleport', 'rgba(180,180,220,0.9)');
            addChatMessage('/clear [player] — Clear inventory', 'rgba(180,180,220,0.9)');
            addChatMessage('/kill <player> — Kill player', 'rgba(180,180,220,0.9)');
            addChatMessage('Selectors: @s=self @a=all @r=random', 'rgba(180,180,220,0.9)');
            break;
        }
        default:
            addChatMessage('Unknown command: /' + cmd + '. Type /help', 'rgba(255,100,100,0.9)');
    }
}

// T key opens chat, Enter sends, Escape closes
document.addEventListener('keydown', e => {
    if (_rebindingAction) return; // don't intercept during keybind
    if (chatOpen) {
        if (e.code === 'Enter') {
            executeCommand(chatInput.value);
            closeChat();
            e.preventDefault();
        } else if (e.code === 'Escape') {
            closeChat();
            e.preventDefault();
        }
        e.stopPropagation(); // don't let game keys fire while typing
    } else if (e.code === 'KeyT' && gameStarted && !inventoryOpen && !craftingTableOpen && !furnaceOpen && !anvilOpen && !blastFurnaceOpen && !settingsOpen && !mapOpen) {
        openChat();
        e.preventDefault();
    } else if (e.code === 'Slash' && gameStarted && !inventoryOpen && !craftingTableOpen && !furnaceOpen && !anvilOpen && !blastFurnaceOpen && !settingsOpen && !mapOpen) {
        // / key opens chat with / pre-filled
        openChat();
        chatInput.value = '/';
        e.preventDefault();
    }
}, true); // capture phase

// Prevent chat input from triggering game actions
chatInput.addEventListener('keydown', e => e.stopPropagation());
chatInput.addEventListener('mousedown', e => e.stopPropagation());

</script>
