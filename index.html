renderer.domElement.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    if (mapOpen || inventoryOpen || craftingTableOpen || furnaceOpen || anvilOpen) return;

    // Rotate player to face camera direction on click, angled slightly for staff aiming
    if (useMouseLook && pointerLocked) {
        const held = hotbarSlots[selectedSlot];
        const staffAimOffset = STAFF_PROPS[held] ? 0.15 : 0;
        player.group.rotation.y = fpYaw + staffAimOffset;
    }

    // Sword attack — damage creatures in front of player
    const held = hotbarSlots[selectedSlot];
    const swordDmg = _getSwordDamage(held);
    if (swordDmg && inventory[held] > 0 && attackCooldown <= 0) {
        player.triggerSwing();
        attackCooldown = 0.6;
        if (creatures && creatures.attackAt) creatures.attackAt(player.position.x, player.position.z, player.group.rotation.y, swordDmg, 3);
        if (mp.active) mp.sendAttack(player.position.x, player.position.z, player.group.rotation.y, swordDmg);
        return;
    }
    // Staff spells — depends on activeSpellSlot
    if (STAFF_PROPS[held] && inventory[held] > 0 && attackCooldown <= 0) {
        if (activeSpellSlot === 1 && playerMana >= 2) {
            // Spell 1: Projectile bolt
            playerMana -= 2;
            updateManaUI();
            player.triggerSwing();
            attackCooldown = STAFF_PROPS[held].speed > 30 ? 0.3 : 0.6;
            const staffType = held;
            requestAnimationFrame(() => requestAnimationFrame(() => fireProjectile(staffType)));
            return;
        } else if (activeSpellSlot === 3) {
            // Spell 3: Unique per staff
            const sp = STAFF_SPELLS[held];
            const minMana = (held === 'void_staff') ? 2 : sp.mana3;
            if (sp && playerMana >= minMana) {
                const manaSpent = (held === 'void_staff') ? playerMana : sp.mana3;
                playerMana -= manaSpent;
                updateManaUI();
                player.triggerSwing();
                attackCooldown = 1.5;
                castUniqueSpell(held, manaSpent);
                return;
            }
        } else if (activeSpellSlot >= 4 && activeSpellSlot <= 6) {
            // Universal unlockable spells
            const slotKey = '_slot' + activeSpellSlot;
            const sp = STAFF_SPELLS[slotKey];
            if (sp && playerMana >= sp.mana3) {
                playerMana -= sp.mana3;
                updateManaUI();
                player.triggerSwing();
                attackCooldown = 1.5;
                castUniversalSpell(activeSpellSlot, held);
                return;
            }
        }
        // Spell 2 (shield) is handled by right-click, not left-click
    }

    miningHeld = true;
    const hit = raycastBlock(e);
    if (!hit) return;
    const hasWoodPick = held === 'pickaxe' && inventory['pickaxe'] > 0;
    const hasStonePick = held === 'stone_pickaxe' && inventory['stone_pickaxe'] > 0;
    const hasIronPick = held === 'iron_pickaxe' && inventory['iron_pickaxe'] > 0;
    const hasSteelPick = held === 'steel_pickaxe' && inventory['steel_pickaxe'] > 0;
    const hasDiamondPick = held === 'diamond_pickaxe' && inventory['diamond_pickaxe'] > 0;
    const hasGoldPick = held === 'gold_pickaxe' && inventory['gold_pickaxe'] > 0;
    const hasPickaxe = hasWoodPick || hasStonePick || hasIronPick || hasSteelPick || hasDiamondPick || hasGoldPick;
    const hasWoodAxe = held === 'wood_axe' && inventory['wood_axe'] > 0;
    const hasStoneAxe = held === 'stone_axe' && inventory['stone_axe'] > 0;
    const hasIronAxe = held === 'iron_axe' && inventory['iron_axe'] > 0;
    const hasSteelAxe = held === 'steel_axe' && inventory['steel_axe'] > 0;
    const hasDiamondAxe = held === 'diamond_axe' && inventory['diamond_axe'] > 0;
    const hasGoldAxe = held === 'gold_axe' && inventory['gold_axe'] > 0;
    const hasAxe = hasWoodAxe || hasStoneAxe || hasIronAxe || hasSteelAxe || hasDiamondAxe || hasGoldAxe;
    const pickTier = hasDiamondPick ? 3 : hasSteelPick ? 3 : hasIronPick ? 3 : hasGoldPick ? 2 : hasStonePick ? 2 : hasWoodPick ? 1 : 0;
    // Only use majority block for break time when snap grid is MANUALLY enabled (G key)
    let bt = hit.block;
    if (snapGrid) {
        const snap = v => Math.floor(v / 2) * 2;
        const bx0 = snap(hit.x), by0 = snap(hit.y), bz0 = snap(hit.z);
        const counts = {};
        for (let dx = 0; dx < 2; dx++)
            for (let dy = 0; dy < 2; dy++)
                for (let dz = 0; dz < 2; dz++) {
                    const b = world.getBlockAt(bx0+dx, by0+dy, bz0+dz);
                    if (b !== 0 && b !== 5 && b !== 7) counts[b] = (counts[b] || 0) + 1;
                }
        let maxCount = 0;
        for (const [block, count] of Object.entries(counts)) {
            if (count > maxCount) { maxCount = count; bt = Number(block); }
        }
    }

    let breakTime;
    if (hasAxe) {
        // Axes: fast on wood/planks/leaves, slow on stone, can't do iron/coal
        const axeTier = hasIronAxe ? 2 : hasStoneAxe ? 1 : 0;
        const AXE_TIMES = {
            [BLOCK.WOOD]: [0.15, 0.1, 0.06],
            [BLOCK.PLANKS]: [0.15, 0.1, 0.06],
            [BLOCK.LEAVES]: [0.08, 0.05, 0.03],
            [BLOCK.CRAFTING]: [0.2, 0.15, 0.08],
            [BLOCK.STONE]: [1.5, 1.0, 0.7],
            [BLOCK.GRASS]: [0.3, 0.2, 0.1],
            [BLOCK.DIRT]: [0.3, 0.2, 0.1],
            [BLOCK.SAND]: [0.25, 0.15, 0.08],
            15: [0.5, 0.3, 0.2], // FURNACE
        };
        const axeTimes = AXE_TIMES[bt];
        if (axeTimes) breakTime = axeTimes[axeTier];
        else if (bt === BLOCK.IRON_ORE || bt === 16) breakTime = Infinity; // can't break iron/coal with axe
        else breakTime = (BREAK_TIME[bt] || [0.5, 0.25, 0.12, 0.08])[0]; // default no-tool speed
    } else {
        const times = BREAK_TIME[bt] || [0.5, 0.25, 0.12, 0.08];
        breakTime = times[pickTier];
    }

    if (breakTime === Infinity) return; // can't break without pickaxe

    player.triggerSwing();
    miningTarget = { x: hit.x, y: hit.y, z: hit.z, block: bt, progress: 0, time: breakTime, hit, hasPickaxe, hasAxe };
    mineBarEl.style.display = 'block';
    mineBarFill.style.width = '0%';
});

function getBlockDrop(blockType) {
    if (blockType === BLOCK.COAL_ORE) return 'coal';
    if (blockType === BLOCK.DIAMOND_ORE) return 'diamond';
    if (blockType === BLOCK.RUBY_ORE) return 'ruby';
    if (blockType === BLOCK.SAPPHIRE_ORE) return 'sapphire';
    if (blockType === BLOCK.EMERALD_ORE) return 'emerald';
    if (blockType === BLOCK.TOPAZ_ORE) return 'topaz';
    if (blockType === BLOCK.ANVIL) return 'anvil_block';
    if (blockType === BLOCK.BLAST_FURNACE) return 'blast_furnace_block';
    if (blockType === BLOCK.CAMPFIRE) return 'campfire_block';
    if (blockType === BLOCK.CHEST) return 'chest_block';
    if (blockType === BLOCK.GOLD_ORE) return BLOCK.GOLD_ORE; // smelt to get gold ingot
    if (blockType === 15) return 'furnace_block'; // BLOCK.FURNACE
    return blockType;
}

function doBreakBlock(hit, hasPickaxe, hasAxe) {

    // Remove anvil/campfire model if breaking
    if (hit.block === BLOCK.ANVIL) removeAnvilModel(hit.x, hit.y, hit.z);
    if (hit.block === BLOCK.CAMPFIRE) removeCampfireModel(hit.x, hit.y, hit.z);
    if (hit.block === BLOCK.CHEST) {
        // Spill chest contents into player inventory
        const ck = _findChestKey(hit.x, hit.y, hit.z);
        if (ck && chestData[ck]) {
            for (const [item, count] of Object.entries(chestData[ck].items)) {
                inventory[item] = (inventory[item] || 0) + count;
            }
            delete chestData[ck];
            updateHotbar();
        }
    }

    // Auto snap grid — detect underground mining (natural solid blocks above hit block)
    let useSnap = snapGrid;
    if (!useSnap && autoMineSnap) {
        // Check if there are natural blocks above — means we're underground
        // Skip planks, wood, leaves, crafting, furnace (building materials)
        const _isNatural = b => b !== 0 && b !== 5 && b !== BLOCK.WOOD && b !== BLOCK.PLANKS && b !== BLOCK.LEAVES && b !== BLOCK.CRAFTING && b !== 15;
        let solidAbove = 0;
        for (let dy = 1; dy <= 4; dy++) {
            const above = world.getBlockAt(hit.x, hit.y + dy, hit.z);
            if (_isNatural(above)) solidAbove++;
        }
        if (solidAbove >= 2) useSnap = true;
    }
    // Snap grid mode — always breaks aligned 2x2x2 cubes
    if (useSnap) {
        const snap = v => Math.floor(v / 2) * 2;
        const bx0 = snap(hit.x), by0 = snap(hit.y), bz0 = snap(hit.z);
        const rebuildSet = new Set();
        for (let dx = 0; dx < 2; dx++) {
            for (let dy = 0; dy < 2; dy++) {
                for (let dz = 0; dz < 2; dz++) {
                    const bx = bx0 + dx, by = by0 + dy, bz = bz0 + dz;
                    const block = world.getBlockAt(bx, by, bz);
                    if (block !== BLOCK.AIR && block !== BLOCK.WATER && block !== BLOCK.BEDROCK) {
                        const isTree = block === BLOCK.WOOD && isNaturalTree(bx, by, bz);
                        addToInventory(getBlockDrop(block));
                        world.setBlock(bx, by, bz, BLOCK.AIR);
                        rebuildSet.add(bx + ',' + bz);
                        if (isTree) fellTree(bx, by, bz, rebuildSet);
                    }
                }
            }
        }
        for (const key of rebuildSet) {
            const [rx, rz] = key.split(',').map(Number);
            rebuildNear(rx, rz);
        }
        return;
    }

    if (brushW > 1 || brushH > 1 || brushD > 1) {
        // Brush break — side + up + forward
        let hAxis;
        if (hit.nx !== 0) hAxis = brushRotated ? 'x' : 'z';
        else if (hit.nz !== 0) hAxis = brushRotated ? 'z' : 'x';
        else hAxis = brushRotated ? 'z' : 'x';
        const halfW = Math.floor(brushW / 2);
        const halfH = Math.floor(brushH / 2);
        const rebuildSet = new Set();
        for (let d = 0; d < brushD; d++) {
            for (let a = -halfW; a <= halfW; a++) {
                for (let b = -halfH; b <= halfH; b++) {
                    let bx = hit.x + hit.nx * d, by = hit.y + b, bz = hit.z + hit.nz * d;
                    if (hAxis === 'x') bx += a; else bz += a;
                    const block = world.getBlockAt(bx, by, bz);
                    if (block !== BLOCK.AIR && block !== BLOCK.WATER && block !== BLOCK.BEDROCK) {
                        const isTree = block === BLOCK.WOOD && isNaturalTree(bx, by, bz);
                        addToInventory(getBlockDrop(block));
                        world.setBlock(bx, by, bz, BLOCK.AIR);
                        rebuildSet.add(bx + ',' + bz);
                        if (isTree) fellTree(bx, by, bz, rebuildSet);
                    }
                }
            }
        }
        for (const key of rebuildSet) {
            const [rx, rz] = key.split(',').map(Number);
            rebuildNear(rx, rz);
        }
    } else {
        // Single block break (no pickaxe)
        const isTree = hit.block === BLOCK.WOOD && isNaturalTree(hit.x, hit.y, hit.z);
        addToInventory(getBlockDrop(hit.block));
        world.setBlock(hit.x, hit.y, hit.z, BLOCK.AIR);
        if (isTree) {
            const rs = new Set();
            rs.add(hit.x + ',' + hit.z);
            fellTree(hit.x, hit.y, hit.z, rs);
            for (const key of rs) { const [rx, rz] = key.split(',').map(Number); rebuildNear(rx, rz); }
        } else {
            rebuildNear(hit.x, hit.z);
        }
    }
}

const WORKBENCH_RECIPES = WB_CATEGORIES.flatMap(c => c.recipes);

function renderRecipeRow(r, ri, canCraft) {
    const fromInfo = getItemInfo(r.from);
    const toInfo = getItemInfo(r.to);
    const fromColor = fromInfo ? (fromInfo.front || fromInfo.top) : '#555';
    const toColor = toInfo ? (toInfo.front || toInfo.top) : '#555';
    const fromName = fromInfo ? fromInfo.name : '?';
    const toName = toInfo ? toInfo.name : '?';
    let inputs = `<span class="craft-icon" style="background:${fromColor}"></span><span>${r.fc}× ${fromName}</span>`;
    if (r.multi) {
        const altInfo = getItemInfo(r.fromAlt);
        const altColor = altInfo ? (altInfo.front || altInfo.top) : '#555';
        const altName = altInfo ? altInfo.name : '?';
        inputs += ` + <span class="craft-icon" style="background:${altColor}"></span><span>${r.fcAlt}× ${altName}</span>`;
    }
    return `<div class="craft-row${canCraft ? '' : ' disabled'}" data-ri="${ri}">
        ${inputs} <span class="craft-arrow">→</span>
        <span class="craft-icon" style="background:${toColor}"></span><span>${r.tc}× ${toName}</span>
    </div>`;
}

function doCraft(r) {
    if (!r || !r.from) return;
    if ((inventory[r.from] || 0) < r.fc) return;
    if (r.multi && (inventory[r.fromAlt] || 0) < r.fcAlt) return;
    // Consume primary
    inventory[r.from] -= r.fc;
    if (inventory[r.from] <= 0) { delete inventory[r.from]; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === r.from) hotbarSlots[i] = 0; }
    // Consume secondary
    if (r.multi) {
        inventory[r.fromAlt] -= r.fcAlt;
        if (inventory[r.fromAlt] <= 0) { delete inventory[r.fromAlt]; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === r.fromAlt) hotbarSlots[i] = 0; }
    }
    // Produce
    const toKey = r.to;
    inventory[toKey] = (inventory[toKey] || 0) + r.tc;
    // Try to put on hotbar (but only 1 sword allowed)
    if (!hotbarSlots.includes(toKey)) {
        if (!(_isSwordItem(toKey) && _hotbarHasSword())) {
            const ei = hotbarSlots.indexOf(0);
            if (ei >= 0) hotbarSlots[ei] = toKey;
        }
    }
    refreshUI();
}

const _craftOpen = {}; // track which categories are open

function updateCraftTableUI() {
    let html = '<h2 style="color:rgba(220,200,160,0.85);font:bold 15px monospace;text-align:center;margin-bottom:6px;">Crafting Table</h2>';
    let globalIdx = 0;
    for (let ci = 0; ci < WB_CATEGORIES.length; ci++) {
        const cat = WB_CATEGORIES[ci];
        const isOpen = !!_craftOpen[cat.name];
        html += `<div class="craft-cat${isOpen ? ' open' : ''}" data-cat="${cat.name}">${cat.name}</div>`;
        html += `<div class="craft-grid${isOpen ? '' : ' collapsed'}">`;
        for (const r of cat.recipes) {
            const canCraft = (inventory[r.from] || 0) >= r.fc && (!r.multi || (inventory[r.fromAlt] || 0) >= r.fcAlt);
            html += renderRecipeRow(r, globalIdx, canCraft);
            globalIdx++;
        }
        html += '</div>';
    }
    html += '<div style="text-align:center;margin-top:8px;color:rgba(150,130,100,0.4);font:10px monospace;">Escape to close</div>';
    craftTableMenuEl.innerHTML = html;
    // Toggle categories
    craftTableMenuEl.querySelectorAll('.craft-cat').forEach(el => {
        el.addEventListener('click', () => {
            _craftOpen[el.dataset.cat] = !_craftOpen[el.dataset.cat];
            updateCraftTableUI();
        });
    });
    // Craft clicks
    craftTableMenuEl.querySelectorAll('.craft-row:not(.disabled)').forEach(row => {
        row.addEventListener('click', () => {
            doCraft(WORKBENCH_RECIPES[Number(row.dataset.ri)]);
            updateCraftTableUI();
        });
    });
}

    { input: BLOCK.IRON_ORE, output: 'iron_ingot', label: 'Iron Ore → Iron Ingot', time: 4 },

// Smelting queue — items being smelted
let smeltQueue = []; // { recipe, progress, duration, count }

function updateFurnaceUI() {
    const coalCount = inventory['coal'] || 0;
    let html = '<h2 style="color:rgba(220,200,160,0.85);font:bold 15px monospace;text-align:center;margin-bottom:6px;">Furnace</h2>';
    html += `<div style="display:flex;align-items:center;gap:6px;padding:4px 8px;margin-bottom:6px;background:rgba(40,25,15,0.5);border-radius:4px;">
        <span class="craft-icon" style="background:#1a1a1a"></span>
        <span style="color:rgba(200,160,100,0.8);font:12px monospace;">Coal: ${coalCount} (1 coal smelts 3 items)</span>
    </div>`;
    // Show active smelting
    if (smeltQueue.length > 0) {
        html += '<div class="inv-section-label">Smelting...</div>';
        for (const sq of smeltQueue) {
            const pct = Math.min(100, (sq.progress / sq.duration) * 100);
            const outInfo = getItemInfo(sq.recipe.output);
            html += `<div style="padding:4px 8px;margin-bottom:4px;background:rgba(40,25,15,0.4);border-radius:4px;">
                <div style="display:flex;align-items:center;gap:6px;font:11px monospace;color:rgba(200,190,160,0.8);margin-bottom:3px;">
                    <span>${outInfo?.name || '?'} ×${sq.count}</span>
                    <span style="margin-left:auto;">${Math.ceil(sq.duration - sq.progress)}s</span>
                </div>
                <div style="width:100%;height:4px;background:rgba(40,40,40,0.6);border-radius:2px;">
                    <div style="width:${pct}%;height:100%;background:rgba(200,120,40,0.8);border-radius:2px;"></div>
                </div>
            </div>`;
        }
    }
    html += '<div class="craft-cat">Smelting</div><div class="craft-grid">';
    for (let ri = 0; ri < SMELT_RECIPES.length; ri++) {
        const r = SMELT_RECIPES[ri];
        const canSmelt = (inventory[r.input] || 0) >= 1 && coalCount >= 1;
        const inInfo = getItemInfo(r.input);
        const outInfo = getItemInfo(r.output);
        const inColor = inInfo ? (inInfo.front || inInfo.top) : '#555';
        const outColor = outInfo ? (outInfo.front || outInfo.top) : '#555';
        const inName = inInfo ? inInfo.name : '?';
        const outName = outInfo ? outInfo.name : '?';
        html += `<div class="craft-row${canSmelt ? '' : ' disabled'}" data-ri="${ri}">
            <span class="craft-icon" style="background:${inColor}"></span><span>${inName}</span>
            <span class="craft-arrow">→</span>
            <span class="craft-icon" style="background:${outColor}"></span><span>${outName}</span>
            <span style="color:rgba(150,130,80,0.6);margin-left:auto;font-size:10px;">${r.time}s</span>
        </div>`;
    }
    html += '</div>';
    html += '<div style="text-align:center;margin-top:8px;color:rgba(150,130,100,0.4);font:10px monospace;">Escape to close</div>';
    furnaceMenuEl.innerHTML = html;

    furnaceMenuEl.querySelectorAll('.craft-row:not(.disabled)').forEach(row => {
        row.addEventListener('click', () => {
            const r = SMELT_RECIPES[Number(row.dataset.ri)];
            const inputCount = inventory[r.input] || 0;
            const coalAvail = inventory['coal'] || 0;
            if (inputCount < 1 || coalAvail < 1) return;
            const canSmelt = Math.min(inputCount, 3);
            // Consume input and coal immediately
            inventory[r.input] -= canSmelt;
            if (inventory[r.input] <= 0) { delete inventory[r.input]; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === r.input) hotbarSlots[i] = 0; }
            inventory['coal']--;
            if (inventory['coal'] <= 0) { delete inventory['coal']; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === 'coal') hotbarSlots[i] = 0; }
            // Add to smelt queue
            smeltQueue.push({ recipe: r, progress: 0, duration: r.time, count: canSmelt, type: 'furnace' });
            refreshUI();
            updateFurnaceUI();
        });
    });
}

// ── Campfire 3D models ──
const campfireModels = new Map();
const _logMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.9 });
const _charMat = new THREE.MeshStandardMaterial({ color: 0x1a1210, roughness: 0.95 });
const _emberMat = new THREE.MeshStandardMaterial({ color: 0xff6622, emissive: 0xff4400, emissiveIntensity: 0.3 });
const _ashMat = new THREE.MeshStandardMaterial({ color: 0x3a3530, roughness: 0.95 });

function createCampfireModel(wx, wy, wz) {
    const BS = BLOCK_SIZE;
    const g = new THREE.Group();
    // Stone ring
    const stoneMat = new THREE.MeshStandardMaterial({ color: 0x777770, roughness: 0.9 });
    for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        const rock = new THREE.Mesh(new THREE.BoxGeometry(BS*0.4, BS*0.3, BS*0.35), stoneMat);
        rock.position.set(Math.cos(a) * BS * 0.7, BS * 0.15, Math.sin(a) * BS * 0.7);
        rock.rotation.y = a + Math.random() * 0.5;
        g.add(rock);
    }
    // Ash bed
    const ash = new THREE.Mesh(new THREE.CylinderGeometry(BS*0.6, BS*0.65, BS*0.1, 8), _ashMat);
    ash.position.y = BS * 0.05; g.add(ash);
    // Crossed logs
    const logGeo = new THREE.BoxGeometry(BS*0.15, BS*0.15, BS*1.2);
    const log1 = new THREE.Mesh(logGeo, _logMat);
    log1.position.y = BS * 0.2; log1.rotation.y = 0.4; g.add(log1);
    const log2 = new THREE.Mesh(logGeo, _logMat);
    log2.position.y = BS * 0.2; log2.rotation.y = -0.4; g.add(log2);
    const log3 = new THREE.Mesh(logGeo, _charMat);
    log3.position.y = BS * 0.35; log3.rotation.y = 0.9; log3.rotation.z = 0.15; g.add(log3);
    // Embers/coals
    for (let i = 0; i < 5; i++) {
        const ember = new THREE.Mesh(new THREE.BoxGeometry(BS*0.1, BS*0.08, BS*0.1), _emberMat);
        ember.position.set((Math.random()-0.5)*BS*0.5, BS*0.12, (Math.random()-0.5)*BS*0.5);
        g.add(ember);
    }
    // Flame — simple diamond shapes
    const flameMat = new THREE.MeshBasicMaterial({ color: 0xff8822, transparent: true, opacity: 0.7 });
    const flame1 = new THREE.Mesh(new THREE.OctahedronGeometry(BS*0.2), flameMat);
    flame1.position.y = BS * 0.6; flame1.scale.set(0.6, 1.4, 0.6); g.add(flame1);
    const flameMat2 = new THREE.MeshBasicMaterial({ color: 0xffcc44, transparent: true, opacity: 0.5 });
    const flame2 = new THREE.Mesh(new THREE.OctahedronGeometry(BS*0.15), flameMat2);
    flame2.position.set(BS*0.1, BS * 0.5, BS*0.05); flame2.scale.set(0.5, 1.2, 0.5); g.add(flame2);
    const flame3 = new THREE.Mesh(new THREE.OctahedronGeometry(BS*0.12), flameMat);
    flame3.position.set(-BS*0.08, BS * 0.45, -BS*0.06); flame3.scale.set(0.4, 1.0, 0.4); g.add(flame3);
    g._flames = [flame1, flame2, flame3];

    g.position.set(wx + BS, wy, wz + BS); // center in 2x1x2
    scene.add(g);
    return g;
}

function placeCampfireModel(px, py, pz) {
    const BS = BLOCK_SIZE;
    const yOff = 128;
    const wx = px * BS, wy = (py - yOff) * BS, wz = pz * BS;
    const key = px + ',' + py + ',' + pz;
    if (campfireModels.has(key)) return;
    campfireModels.set(key, createCampfireModel(wx, wy, wz));
}

function removeCampfireModel(px, py, pz) {
    for (let dx = 0; dx <= 1; dx++)
        for (let dz = 0; dz <= 1; dz++) {
            const key = (px-dx) + ',' + py + ',' + (pz-dz);
            if (campfireModels.has(key)) {
                scene.remove(campfireModels.get(key));
                campfireModels.delete(key);
            }
        }
}

// ── Anvil 3D models ──
const anvilModels = new Map(); // key 'x,y,z' → mesh
const _anvilDarkMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.8, roughness: 0.3 });
const _anvilLightMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.7, roughness: 0.35 });

function createAnvilModel(wx, wy, wz) {
    const BS = BLOCK_SIZE;
    const g = new THREE.Group();
    // Base — wide flat bottom
    const base = new THREE.Mesh(new THREE.BoxGeometry(BS * 1.8, BS * 0.4, BS * 1.4), _anvilDarkMat);
    base.position.y = BS * 0.2; g.add(base);
    // Pillar — narrow middle
    const pillar = new THREE.Mesh(new THREE.BoxGeometry(BS * 1.0, BS * 0.6, BS * 0.8), _anvilDarkMat);
    pillar.position.y = BS * 0.7; g.add(pillar);
    // Top face — wide work surface
    const top = new THREE.Mesh(new THREE.BoxGeometry(BS * 2.0, BS * 0.35, BS * 1.2), _anvilLightMat);
    top.position.y = BS * 1.2; g.add(top);
    // Horn — the pointy end
    const horn = new THREE.Mesh(new THREE.ConeGeometry(BS * 0.3, BS * 0.8, 4), _anvilLightMat);
    horn.position.set(BS * 1.2, BS * 1.2, 0);
    horn.rotation.z = -Math.PI / 2;
    g.add(horn);
    // Step on back
    const step = new THREE.Mesh(new THREE.BoxGeometry(BS * 0.5, BS * 0.5, BS * 1.0), _anvilDarkMat);
    step.position.set(-BS * 0.9, BS * 0.75, 0); g.add(step);

    g.position.set(wx + BS, wy + BS, wz + BS); // center in the 2x2x2, raised above ground
    scene.add(g);
    return g;
}

function placeAnvilModel(px, py, pz) {
    const BS = BLOCK_SIZE;
    const yOff = 128;
    const wx = px * BS, wy = (py - yOff) * BS, wz = pz * BS;
    const key = px + ',' + py + ',' + pz;
    if (anvilModels.has(key)) return;
    anvilModels.set(key, createAnvilModel(wx, wy, wz));
}

function removeAnvilModel(px, py, pz) {
    // Check all 8 blocks in a 2x2x2 — if any is broken, remove the model
    for (let dx = 0; dx <= 1; dx++)
        for (let dy = 0; dy <= 1; dy++)
            for (let dz = 0; dz <= 1; dz++) {
                const key = (px-dx) + ',' + (py-dy) + ',' + (pz-dz);
                if (anvilModels.has(key)) {
                    scene.remove(anvilModels.get(key));
                    anvilModels.delete(key);
                }
            }
}

    'sapphire': 'ice_staff', 'coal': 'fire_staff', 'ruby': 'fire_staff',
    'topaz': 'lightning_staff',
};
// Unique gem bolt properties for non-standard gems
const STAFF_GEM_BOLT = {
    'diamond':    { color: 0x88ffff, damage: 10, name: 'Diamond Staff', speed: 24, desc: 'Piercing shard bolt' },

const HOLDER_STYLES = ['prongs', 'cage', 'coil', 'claws', 'crown'];

let anvilStaffConfig = {
    shaftMat: 'stick',
    holderStyle: 'prongs',
    holderMat: 'iron_ingot',
    gem: 'ruby',
    name: '',
};

let anvilSwordConfig = {
    pommelStyle: 'round', pommelMat: 'iron_ingot',
    handleMat: 'stick',
    guardStyle: 'straight', guardMat: 'iron_ingot',
    bladeMat: 'iron_ingot', bladeLength: 2, bladeThickness: 1,
    trimMat: '',
    name: '',
};

function updateAnvilUI() {
    let html = '<h2 style="color:rgba(220,200,160,0.85);font:bold 15px monospace;text-align:center;margin-bottom:10px;">Anvil</h2>';

    // Standard recipes
    for (const cat of ANVIL_RECIPES) {
        html += `<div class="craft-cat open">${cat.name}</div><div class="craft-grid">`;
        for (let ri = 0; ri < cat.recipes.length; ri++) {
            const r = cat.recipes[ri];
            const has1 = (inventory[r.from] || 0) >= r.fc;
            const has2 = !r.multi || (inventory[r.fromAlt] || 0) >= r.fcAlt;
            const canCraft = has1 && has2;
            const outInfo = getItemInfo(r.to);
            const inInfo = getItemInfo(r.from);
            const altInfo = r.multi ? getItemInfo(r.fromAlt) : null;
            html += `<div class="craft-row${canCraft ? '' : ' disabled'}" data-cat="${cat.name}" data-ri="${ri}" style="cursor:pointer;">
                <span class="craft-icon" style="background:${inInfo?.front || '#555'}"></span>
                <span>${r.fc}× ${inInfo?.name || '?'}</span>`;
            if (altInfo) html += `<span>+ ${r.fcAlt}× ${altInfo.name}</span>`;
            html += `<span class="craft-arrow">→</span>
                <span class="craft-icon" style="background:${outInfo?.front || '#555'}"></span>
                <span>${outInfo?.name || '?'}</span></div>`;
        }
        html += '</div>';
    }

    // Custom sword forge
    const _sel = (id, opts, cur) => {
        let s = `<select id="${id}" style="width:100%;padding:3px;font:10px monospace;background:rgba(20,30,15,0.7);color:rgba(220,210,180,0.9);border:1px solid rgba(120,160,80,0.4);border-radius:3px;">`;
        for (const o of opts) s += `<option value="${o.value}"${cur == o.value ? ' selected' : ''}>${o.label}</option>`;
        return s + '</select>';
    };
    const _matOpts = SWORD_MATERIALS.map(m => ({ value: m.key, label: m.name }));
    const _accentOpts = [..._matOpts, ...ACCENT_MATERIALS.map(m => ({ value: m.key, label: m.name }))];
    const _matOptsWithNone = [{ value: '', label: 'None' }, ..._accentOpts];
    const _styleOpts = (arr) => arr.map(s => ({ value: s, label: s.charAt(0).toUpperCase() + s.slice(1) }));
    const _lbl = 'color:rgba(180,170,140,0.6);font:10px monospace;';
    const _row = 'display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(80,80,60,0.2);';

    html += '<div style="margin-top:12px;border-top:1px solid rgba(120,160,80,0.3);padding-top:10px;">';
    html += '<div style="color:rgba(200,180,140,0.7);font:bold 11px monospace;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Custom Sword Forge</div>';

    // 1. Pommel (1x material + style)
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Pommel</span>`;
    html += `<span style="flex:1;">${_sel('anvilPommelStyle', _styleOpts(POMMEL_STYLES), anvilSwordConfig.pommelStyle)}</span>`;
    html += `<span style="flex:1;">${_sel('anvilPommelMat', _accentOpts, anvilSwordConfig.pommelMat)}</span>`;
    html += `<span style="${_lbl}">×1</span></div>`;

    // 2. Handle (1x material)
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Handle</span>`;
    html += `<span style="flex:1;">${_sel('anvilHandleMat', _matOpts, anvilSwordConfig.handleMat)}</span>`;
    html += `<span style="${_lbl}">×1</span></div>`;

    // 3. Guard (style + 2x material)
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Guard</span>`;
    html += `<span style="flex:1;">${_sel('anvilGuardStyle', _styleOpts(GUARD_STYLES), anvilSwordConfig.guardStyle)}</span>`;
    html += `<span style="flex:1;">${_sel('anvilGuardMat', _matOpts, anvilSwordConfig.guardMat)}</span>`;
    html += `<span style="${_lbl}">×2</span></div>`;

    // 4. Blade material
    const bladeCost = Math.ceil(anvilSwordConfig.bladeLength + anvilSwordConfig.bladeThickness);
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Blade</span>`;
    html += `<span style="flex:1;">${_sel('anvilBladeMat', _matOpts, anvilSwordConfig.bladeMat)}</span>`;
    html += `<span style="${_lbl}" id="bladeCostLabel">×${bladeCost}</span></div>`;
    // Blade length
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Length</span>`;
    html += `<input type="range" id="anvilBladeLen" min="5" max="60" value="${Math.round(anvilSwordConfig.bladeLength * 10)}" style="flex:1;accent-color:rgba(120,160,80,0.8);">`;
    html += `<span style="${_lbl}" id="bladeLenLabel">${anvilSwordConfig.bladeLength.toFixed(1)}</span></div>`;
    // Blade thickness
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Width</span>`;
    html += `<input type="range" id="anvilBladeThick" min="5" max="40" value="${Math.round(anvilSwordConfig.bladeThickness * 10)}" style="flex:1;accent-color:rgba(120,160,80,0.8);">`;
    html += `<span style="${_lbl}" id="bladeThickLabel">${anvilSwordConfig.bladeThickness.toFixed(1)}</span></div>`;

    // 5. Trim (1x material, optional)
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Trim</span>`;
    html += `<span style="flex:1;">${_sel('anvilTrimMat', _matOptsWithNone, anvilSwordConfig.trimMat)}</span>`;
    html += `<span style="${_lbl}">×1</span></div>`;

    // 6. Blade name
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Name</span>`;
    html += `<input type="text" id="anvilName" maxlength="24" placeholder="Unnamed Blade" value="${anvilSwordConfig.name || ''}" style="flex:1;padding:3px;font:10px monospace;background:rgba(20,30,15,0.7);color:rgba(220,210,180,0.9);border:1px solid rgba(120,160,80,0.4);border-radius:3px;">`;
    html += `</div>`;

    // Cost summary + forge button
    html += '<div id="anvilCostSummary" style="margin-top:6px;font:10px monospace;color:rgba(180,170,140,0.5);"></div>';
    html += '<button class="menu-btn" id="forgeBtn" style="width:100%;margin-top:6px;padding:10px;font-size:13px;font-weight:bold;">Forge Sword</button>';
    html += '</div>';

    // ── Custom Staff Forge ──
    html += '<div style="margin-top:12px;border-top:1px solid rgba(120,160,80,0.3);padding-top:10px;">';
    html += '<div style="color:rgba(200,180,140,0.7);font:bold 11px monospace;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Custom Staff Forge</div>';

    const _gemOpts = [
        { value: 'coal', label: 'Coal (Fire)' }, { value: 'ruby', label: 'Ruby (Fire)' },
        { value: 'sapphire', label: 'Sapphire (Ice)' }, { value: 'topaz', label: 'Topaz (Lightning)' },
        { value: 'diamond', label: 'Diamond' }, { value: 'emerald', label: 'Emerald' },
        { value: 'gold_ingot', label: 'Gold' }, { value: 'iron_ingot', label: 'Iron' },
        { value: 'steel_ingot', label: 'Steel' }, { value: String(BLOCK.LEAVES), label: 'Leaves' },
        { value: String(BLOCK.WOOD), label: 'Wood' }, { value: String(BLOCK.STONE), label: 'Stone' },
        { value: 'dragonsteel_ingot', label: 'Dragonsteel' },
    ];
    // Shaft (2x material)
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Shaft</span>`;
    html += `<span style="flex:1;">${_sel('staffShaftMat', _matOpts, anvilStaffConfig.shaftMat)}</span>`;
    html += `<span style="${_lbl}">×2</span></div>`;
    // Gem holder style + material (1x)
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Holder</span>`;
    html += `<span style="flex:1;">${_sel('staffHolderStyle', _styleOpts(HOLDER_STYLES), anvilStaffConfig.holderStyle)}</span>`;
    html += `<span style="flex:1;">${_sel('staffHolderMat', _matOpts, anvilStaffConfig.holderMat)}</span>`;
    html += `<span style="${_lbl}">×1</span></div>`;
    // Gem (1x)
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Gem</span>`;
    html += `<span style="flex:1;">${_sel('staffGem', _gemOpts, anvilStaffConfig.gem)}</span>`;
    html += `<span style="${_lbl}">×1</span></div>`;
    // Name
    html += `<div style="${_row}"><span style="${_lbl}width:55px;">Name</span>`;
    html += `<input type="text" id="staffName" maxlength="24" placeholder="Unnamed Staff" value="${anvilStaffConfig.name || ''}" style="flex:1;padding:3px;font:10px monospace;background:rgba(20,30,15,0.7);color:rgba(220,210,180,0.9);border:1px solid rgba(120,160,80,0.4);border-radius:3px;">`;
    html += `</div>`;
    // Staff type preview
    const previewGem = anvilStaffConfig.gem;
    const previewType = STAFF_GEM_TYPE[previewGem] || 'basic_staff';
    const previewBolt = STAFF_GEM_BOLT[previewGem];
    const gemKey2 = typeof previewGem === 'number' ? { [BLOCK.LEAVES]: 'leaves', [BLOCK.WOOD]: 'wood', [BLOCK.STONE]: 'stone' }[previewGem] || 'basic' : previewGem.replace('_ingot', '');
    const gemSpell = STAFF_SPELLS['gem_' + gemKey2] || STAFF_SPELLS[previewType] || STAFF_SPELLS['basic_staff'];
    const typeLabel = previewBolt ? previewBolt.name : previewType.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
    const descLabel = (previewBolt ? previewBolt.desc + ' + ' : '') + gemSpell.name3 + ': ' + gemSpell.desc3;
    const isDragonPreview = String(anvilStaffConfig.shaftMat) === 'dragonsteel_ingot' && String(anvilStaffConfig.holderMat) === 'dragonsteel_ingot';
    html += `<div style="font:10px monospace;color:rgba(150,200,130,0.7);margin-top:4px;">Type: ${typeLabel} — ${descLabel}</div>`;
    if (isDragonPreview) html += `<div style="font:10px monospace;color:rgba(130,130,200,0.8);margin-top:2px;">✦ Dragonsteel Synergy: Projectiles are tiny flying wyverns!</div>`;
    // Cost + forge button
    html += '<div id="staffCostSummary" style="margin-top:4px;font:10px monospace;color:rgba(180,170,140,0.5);"></div>';
    html += '<button class="menu-btn" id="forgeStaffBtn" style="width:100%;margin-top:6px;padding:10px;font-size:13px;font-weight:bold;">Forge Staff</button>';
    html += '</div>';

    html += '<div style="text-align:center;margin-top:8px;color:rgba(150,130,100,0.4);font:10px monospace;">Escape to close</div>';
    anvilMenuEl.innerHTML = html;

    // Wire up standard recipe clicks
    anvilMenuEl.querySelectorAll('.craft-row:not(.disabled)').forEach(row => {
        row.addEventListener('click', () => {
            const catName = row.dataset.cat;
            const ri = Number(row.dataset.ri);
            const cat = ANVIL_RECIPES.find(c => c.name === catName);
            if (!cat) return;
            const r = cat.recipes[ri];
            doCraft(r);
            updateAnvilUI();
        });
    });

    // Helper: consume material from inventory
    const _consume = (mat, count) => {
        const k = typeof mat === 'string' ? mat : mat;
        inventory[k] = (inventory[k] || 0) - count;
        if (inventory[k] <= 0) { delete inventory[k]; for (let i = 0; i < hotbarSlots.length; i++) if (hotbarSlots[i] === k) hotbarSlots[i] = 0; }
    };

    // Read config from UI and update cost summary
    const _readConfig = () => {
        const c = anvilSwordConfig;
        c.pommelStyle = document.getElementById('anvilPommelStyle')?.value || 'round';
        c.pommelMat = document.getElementById('anvilPommelMat')?.value || 'iron_ingot';
        c.handleMat = document.getElementById('anvilHandleMat')?.value || 'stick';
        c.guardStyle = document.getElementById('anvilGuardStyle')?.value || 'straight';
        c.guardMat = document.getElementById('anvilGuardMat')?.value || 'iron_ingot';
        c.bladeMat = document.getElementById('anvilBladeMat')?.value || 'iron_ingot';
        c.bladeLength = Number(document.getElementById('anvilBladeLen')?.value || 20) / 10;
        c.bladeThickness = Number(document.getElementById('anvilBladeThick')?.value || 10) / 10;
        c.trimMat = document.getElementById('anvilTrimMat')?.value || '';
        c.name = document.getElementById('anvilName')?.value?.trim() || '';
        // Parse mat keys back to numbers if needed
        if (!isNaN(c.pommelMat)) c.pommelMat = Number(c.pommelMat);
        if (!isNaN(c.handleMat)) c.handleMat = Number(c.handleMat);
        if (!isNaN(c.guardMat)) c.guardMat = Number(c.guardMat);
        if (!isNaN(c.bladeMat)) c.bladeMat = Number(c.bladeMat);
        if (c.trimMat && !isNaN(c.trimMat)) c.trimMat = Number(c.trimMat);
    };

    const _updateCost = () => {
        _readConfig();
        const costs = {};
        const add = (mat, n) => { if (!mat) return; costs[mat] = (costs[mat] || 0) + n; };
        add(anvilSwordConfig.pommelMat, 1);
        add(anvilSwordConfig.handleMat, 1);
        add(anvilSwordConfig.guardMat, 2);
        add(anvilSwordConfig.bladeMat, Math.ceil(anvilSwordConfig.bladeLength + anvilSwordConfig.bladeThickness));
        if (anvilSwordConfig.trimMat) add(anvilSwordConfig.trimMat, 1);
        let text = 'Cost: ';
        let canForge = true;
        for (const [mat, count] of Object.entries(costs)) {
            const info = getItemInfo(typeof mat === 'string' ? mat : Number(mat));
            const have = inventory[mat] || inventory[Number(mat)] || 0;
            const ok = have >= count;
            if (!ok) canForge = false;
            text += `<span style="color:${ok ? 'rgba(150,200,100,0.8)' : 'rgba(200,80,80,0.8)'}">${count}× ${info?.name || mat}</span> `;
        }
        const dmg = BLADE_DAMAGE[anvilSwordConfig.bladeMat] || 3;
        text += ` | Damage: ${dmg}`;
        const el = document.getElementById('anvilCostSummary');
        if (el) el.innerHTML = text;
        const btn = document.getElementById('forgeBtn');
        if (btn) { btn.style.opacity = canForge ? '1' : '0.4'; btn.dataset.canForge = canForge; }
    };

    // Wire up all selects/inputs to update cost
    for (const id of ['anvilPommelStyle','anvilPommelMat','anvilHandleMat','anvilGuardStyle','anvilGuardMat','anvilBladeMat','anvilTrimMat']) {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', _updateCost);
    }
    for (const id of ['anvilBladeLen','anvilBladeThick']) {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', () => {
            anvilSwordConfig.bladeLength = Number(document.getElementById('anvilBladeLen').value) / 10;
            anvilSwordConfig.bladeThickness = Number(document.getElementById('anvilBladeThick').value) / 10;
            document.getElementById('bladeLenLabel').textContent = anvilSwordConfig.bladeLength.toFixed(1);
            document.getElementById('bladeThickLabel').textContent = anvilSwordConfig.bladeThickness.toFixed(1);
            const bladeCost = Math.ceil(anvilSwordConfig.bladeLength + anvilSwordConfig.bladeThickness);
            document.getElementById('bladeCostLabel').textContent = '×' + bladeCost;
            _updateCost();
        });
    }
    _updateCost();

    // Forge button
    const forgeBtn = document.getElementById('forgeBtn');
    if (forgeBtn) forgeBtn.addEventListener('click', () => {
        _readConfig();
        const c = anvilSwordConfig;
        // Calculate costs
        const costs = {};
        const add = (mat, n) => { if (!mat) return; costs[mat] = (costs[mat] || 0) + n; };
        add(c.pommelMat, 1); add(c.handleMat, 1); add(c.guardMat, 2); add(c.bladeMat, Math.ceil(c.bladeLength + c.bladeThickness));
        if (c.trimMat) add(c.trimMat, 1);
        // Check all materials available
        for (const [mat, count] of Object.entries(costs)) {
            const have = inventory[mat] || inventory[Number(mat)] || 0;
            if (have < count) return;
        }
        // Consume all
        for (const [mat, count] of Object.entries(costs)) _consume(mat, count);
        // Determine tier from blade material
        const tierMap = { 'stick': 'wood', [BLOCK.STONE]: 'stone', 'iron_ingot': 'iron', 'gold_ingot': 'gold', 'steel_ingot': 'steel', 'diamond': 'diamond', 'dragonsteel_ingot': 'dragonsteel' };
        const tier = tierMap[c.bladeMat] || 'iron';
        // Create custom sword
        const swordId = 'csword_' + Date.now();
        if (!window._customSwords) window._customSwords = {};
        window._customSwords[swordId] = {
            tier, damage: BLADE_DAMAGE[c.bladeMat] || 3,
            pommelStyle: c.pommelStyle, pommelMat: c.pommelMat,
            handleMat: c.handleMat,
            guardStyle: c.guardStyle, guardMat: c.guardMat,
            bladeMat: c.bladeMat, bladeLength: c.bladeLength, bladeThickness: c.bladeThickness,
            trimMat: c.trimMat,
            name: c.name || (tier.charAt(0).toUpperCase() + tier.slice(1) + ' Sword'),
        };
        inventory[swordId] = 1;
        const emptyIdx = hotbarSlots.indexOf(0);
        if (emptyIdx >= 0) hotbarSlots[emptyIdx] = swordId;
        refreshUI();
        updateAnvilUI();
        showToast('Forged: ' + (c.name || tier + ' sword'));
    });

    // ── Staff forge wiring ──
    const _readStaffConfig = () => {
        const c = anvilStaffConfig;
        c.shaftMat = document.getElementById('staffShaftMat')?.value || 'stick';
        c.holderStyle = document.getElementById('staffHolderStyle')?.value || 'prongs';
        c.holderMat = document.getElementById('staffHolderMat')?.value || 'iron_ingot';
        c.gem = document.getElementById('staffGem')?.value || 'ruby';
        c.name = document.getElementById('staffName')?.value?.trim() || '';
        if (!isNaN(c.shaftMat)) c.shaftMat = Number(c.shaftMat);
        if (!isNaN(c.holderMat)) c.holderMat = Number(c.holderMat);
        if (!isNaN(c.gem)) c.gem = Number(c.gem);
    };

    const _updateStaffCost = () => {
        _readStaffConfig();
        const costs = {};
        const add = (mat, n) => { if (!mat) return; costs[mat] = (costs[mat] || 0) + n; };
        add(anvilStaffConfig.shaftMat, 2);
        add(anvilStaffConfig.holderMat, 1);
        add(anvilStaffConfig.gem, 1);
        let text = 'Cost: ';
        let canForge = true;
        for (const [mat, count] of Object.entries(costs)) {
            const info = getItemInfo(typeof mat === 'string' ? mat : Number(mat));
            const have = inventory[mat] || inventory[Number(mat)] || 0;
            const ok = have >= count;
            if (!ok) canForge = false;

        // Register in STAFF_PROPS so it can fire

        } else {

        STAFF_SPELLS[staffId] = STAFF_SPELLS[gemSpellKey] || STAFF_SPELLS[baseType] || STAFF_SPELLS['basic_staff'];

const CHEST_SLOTS = 27; // 27 item slots

function _chestKey(bx, by, bz) { return bx + ',' + by + ',' + bz; }

function _registerChest(bx, by, bz) {
    const key = _chestKey(bx, by, bz);
    if (!chestData[key]) chestData[key] = { items: {} };
}

function _findChestKey(bx, by, bz) {
    // A chest is 2x2x2, so clicking any of its blocks should find the origin
    for (let dx = 0; dx >= -1; dx--)
        for (let dy = 0; dy >= -1; dy--)
            for (let dz = 0; dz >= -1; dz--) {
                const k = _chestKey(bx+dx, by+dy, bz+dz);
                if (chestData[k]) return k;
            }
    return null;
}

window._chestTakeItem = (itemKey) => {
    if (!chestOpenKey || !chestData[chestOpenKey]) return;
    const chest = chestData[chestOpenKey];
    if (!chest.items[itemKey]) return;
    // Move 1 item (or shift-click for all — just do 1 for now)
    const amount = 1;
    inventory[itemKey] = (inventory[itemKey] || 0) + amount;
    chest.items[itemKey] -= amount;
    if (chest.items[itemKey] <= 0) delete chest.items[itemKey];
    updateChestUI();
    updateHotbar();
};

window._chestDepositItem = (itemKey) => {
    if (!chestOpenKey || !chestData[chestOpenKey]) return;
    const chest = chestData[chestOpenKey];
    // Check slot limit
    const chestItemCount = Object.keys(chest.items).length;
    if (!chest.items[itemKey] && chestItemCount >= CHEST_SLOTS) return; // full
    const amount = 1;
    if (!inventory[itemKey] || inventory[itemKey] < amount) return;
    chest.items[itemKey] = (chest.items[itemKey] || 0) + amount;
    inventory[itemKey] -= amount;
    if (inventory[itemKey] <= 0) delete inventory[itemKey];
    updateChestUI();
    updateHotbar();
    if (inventoryOpen) updateInventoryUI();
};

window._closeChest = () => {
    chestOpen = false;
    chestOpenKey = null;
    chestMenuEl.style.display = 'none';
};

// Right click — place block or interact
let placingHeld = false;
let placeTimer = 0;
let placeHoldTime = 0;
let lastMouseX = 0, lastMouseY = 0;
const PLACE_INTERVAL = 0.05;
const PLACE_HOLD_DELAY = 0.15;
// Direction lock — locks placement to the same face normal while holding
// Waits until 2nd placement to lock, so the first block can be on any face
let placeLock = null; // { nx, ny, nz, yaw, pitch, px, py, pz } or null
let placeCount = 0;
const PLACE_LOCK_ANGLE = 0.6; // radians (~34°) before lock breaks
const PLACE_LOCK_MOVE = 1.0; // world units of player movement before lock breaks

document.addEventListener('mousemove', e => { lastMouseX = e.clientX; lastMouseY = e.clientY; });

function doPlace(e) {
    if (mapOpen || inventoryOpen || craftingTableOpen || furnaceOpen || anvilOpen || chestOpen) return false;
    const mouseEvt = e || { clientX: lastMouseX, clientY: lastMouseY };
    const hit = raycastBlock(mouseEvt);
    if (!hit) return false;

    // Right-click on crafting table → open crafting menu (only on initial click, not hold)
    if ((hit.block === BLOCK.CRAFTING) && placeHoldTime < 0.05) {
        craftingTableOpen = true;
        craftTableMenuEl.style.display = 'block';
        updateCraftTableUI();
        placingHeld = false;
        if (pointerLocked) document.exitPointerLock();
        return false;
    }
    if ((hit.block === 15 || hit.block === BLOCK.FURNACE) && placeHoldTime < 0.05) {
        furnaceOpen = true;
        furnaceMenuEl.style.display = 'block';
        updateFurnaceUI();
        placingHeld = false;
        if (pointerLocked) document.exitPointerLock();
        return false;
    }

    // Right-click on chest → open chest
    if (hit.block === BLOCK.CHEST && placeHoldTime < 0.05) {
        const ck = _findChestKey(hit.x, hit.y, hit.z);
        if (ck) {
            chestOpen = true;
            chestOpenKey = ck;
            chestMenuEl.style.display = 'block';
            updateChestUI();
            placingHeld = false;
            if (pointerLocked) document.exitPointerLock();
            return false;
        }
    }

    // Right-click on anvil → open anvil menu
    if (hit.block === BLOCK.ANVIL && placeHoldTime < 0.05) {
        anvilOpen = true;
        anvilMenuEl.style.display = 'block';
        updateAnvilUI();
        placingHeld = false;
        if (pointerLocked) document.exitPointerLock();
        return false;
    }
    // Right-click on blast furnace → open blast furnace menu
    if ((hit.block === BLOCK.BLAST_FURNACE || hit.block === 20) && placeHoldTime < 0.05) {
        blastFurnaceOpen = true;
        blastFurnaceMenuEl.style.display = 'block';
        updateBlastFurnaceUI();
        placingHeld = false;
        if (pointerLocked) document.exitPointerLock();
        return false;
    }

    // Direction lock — break if looked away too far or moved, reject if face normal changed
    if (placeLock) {
        let dYaw = Math.abs(fpYaw - placeLock.yaw);
        if (dYaw > Math.PI) dYaw = 2 * Math.PI - dYaw;
        const dPitch = Math.abs(fpPitch - placeLock.pitch);
        const dMove = Math.abs(player.position.x - placeLock.px) + Math.abs(player.position.y - placeLock.py) + Math.abs(player.position.z - placeLock.pz);
        if (dYaw > PLACE_LOCK_ANGLE || dPitch > PLACE_LOCK_ANGLE || dMove > PLACE_LOCK_MOVE) {
            placeLock = null; // looked away or moved — unlock
        } else if (hit.nx !== placeLock.nx || hit.ny !== placeLock.ny || hit.nz !== placeLock.nz) {
            return false; // still locked but wrong face — skip
        }
    }

    let bt = hotbarSlots[selectedSlot];
    if (!bt || !inventory[bt]) return false;
    const isFurnace = bt === 'furnace_block';
    const isBlastFurnace = bt === 'blast_furnace_block';
    const isAnvil = bt === 'anvil_block';
    const isCampfire = bt === 'campfire_block';
    const isChest = bt === 'chest_block';
    const placeBlock = isFurnace ? 15 : isBlastFurnace ? BLOCK.BLAST_FURNACE : isAnvil ? BLOCK.ANVIL : isCampfire ? BLOCK.CAMPFIRE : isChest ? BLOCK.CHEST : bt;
    if (typeof bt === 'string' && !isFurnace && !isBlastFurnace && !isAnvil && !isCampfire && !isChest) return false;

    const px = hit.prevX, py = hit.prevY, pz = hit.prevZ;
    const BS = BLOCK_SIZE;
    const yOff = 128;
    const placeWX = px * BS, placeWY = (py - yOff) * BS, placeWZ = pz * BS;
    const pdx = placeWX - player.position.x, pdz = placeWZ - player.position.z;
    const pdy = placeWY - player.position.y;
    if (Math.abs(pdx) < 0.5 && Math.abs(pdz) < 0.5 && pdy >= -0.5 && pdy < player.HEIGHT) return false;

    if (!removeFromInventory(bt)) return false;

    if (placeBlock === BLOCK.CAMPFIRE) {
        // 2x1x2 campfire
        for (let dx = 0; dx <= 1; dx++)
            for (let dz = 0; dz <= 1; dz++)
                world.setBlock(px + dx, py, pz + dz, placeBlock);
        for (let dx = 0; dx <= 1; dx++)
            for (let dz = 0; dz <= 1; dz++)
                rebuildNear(px + dx, pz + dz);
        placeCampfireModel(px, py, pz);
    } else if (placeBlock === BLOCK.CRAFTING || placeBlock === 15 || placeBlock === BLOCK.ANVIL || placeBlock === BLOCK.BLAST_FURNACE || placeBlock === BLOCK.CHEST) {
        for (let dx = 0; dx <= 1; dx++)
            for (let dy = 0; dy <= 1; dy++)
                for (let dz = 0; dz <= 1; dz++)
                    world.setBlock(px + dx, py + dy, pz + dz, placeBlock);
        for (let dx = 0; dx <= 1; dx++)
            for (let dz = 0; dz <= 1; dz++)
                rebuildNear(px + dx, pz + dz);
        if (placeBlock === BLOCK.ANVIL) placeAnvilModel(px, py, pz);
        if (placeBlock === BLOCK.CHEST) _registerChest(px, py, pz);
    } else {
        // Brush placement — always a vertical wall (Y + one horizontal axis)
        // Determine horizontal axis for brush
        let hAxis; // 'x' or 'z'
        if (hit.nx !== 0) hAxis = brushRotated ? 'x' : 'z';
        else if (hit.nz !== 0) hAxis = brushRotated ? 'z' : 'x';
        else hAxis = brushRotated ? 'z' : 'x';

        const halfW = Math.floor(brushW / 2);
        const halfH = Math.floor(brushH / 2);
        // On top/bottom faces, shift Y so brush builds away from surface
        let yShift = 0;
        if (hit.ny === 1) yShift = halfH;
        else if (hit.ny === -1) yShift = -halfH;
        // Depth: expand along the face normal direction (into the surface)
        const coords = [];
        for (let d = 0; d < brushD; d++) {
            for (let b = -halfH; b <= halfH; b++) {
                for (let a = -halfW; a <= halfW; a++) {
                    coords.push([a, b, d]);
                }
            }
        }
        let placedFirst = false;
        for (const [a, b, d] of coords) {
            let bx = px - hit.nx * d, by = py + b + yShift - (hit.ny !== 0 ? 0 : 0), bz = pz - hit.nz * d;
            if (hAxis === 'x') bx += a; else bz += a;
            const existing = world.getBlockAt(bx, by, bz);
            if (existing !== BLOCK.AIR && existing !== BLOCK.WATER) continue;
            if (!placedFirst) {
                world.setBlock(bx, by, bz, bt);
                rebuildNear(bx, bz);
                placedFirst = true;
            } else if (removeFromInventory(bt)) {
                world.setBlock(bx, by, bz, bt);
                rebuildNear(bx, bz);
            }
        }
    }
    // Lock direction after 2nd placement — first block can be on any face
    if (placingHeld) {
        placeCount++;
        if (!placeLock && placeCount >= 2) {
            placeLock = { nx: hit.nx, ny: hit.ny, nz: hit.nz, yaw: fpYaw, pitch: fpPitch, px: player.position.x, py: player.position.y, pz: player.position.z };
        }
    }
    return true;
}

                moveKeys[kr] = false; moveKeys['ArrowRight'] = false;

                    moveKeys[kr] = false; moveKeys['ArrowRight'] = false;

                    moveKeys[kf] = false; moveKeys['ArrowUp'] = false;
                    moveKeys[kk] = false; moveKeys['ArrowDown'] = false;
                }

                if (Math.abs(Math.cos(fpYaw)) > Math.abs(Math.sin(fpYaw))) {
                    moveKeys[kl] = false; moveKeys['ArrowLeft'] = false;
                    moveKeys[kr] = false; moveKeys['ArrowRight'] = false;
                } else {
                    moveKeys[kf] = false; moveKeys['ArrowUp'] = false;

                    'ruby':         { c: 0xff3355, m: 0.4, r: 0.12 },
                    'sapphire':     { c: 0x4466ff, m: 0.4, r: 0.12 },

                _apply(ss._bladeMat, cs.bladeMat);

                    ss._guardExtra1.position.set(-0.09, 0.05, 0); ss._guardExtra1.rotation.set(0, 0, 0);

                    ss._guardExtra2.geometry = new THREE.BoxGeometry(0.03, 0.08, 0.04);

    const farDx = player.position.x - _farCenterX, farDz = player.position.z - _farCenterZ;

                // Villager sync
                if (villageMgr && villageMgr.villagers.length > 0) {

    }

    // Hearts, Mana & Spell UI
    updateHeartsUI();
    updateManaUI();
    updateSpellSlotUI();

    // Mining progress
    if (miningTarget && miningHeld) {
        miningTarget.progress += dt;
        const pct = Math.min(100, (miningTarget.progress / miningTarget.time) * 100);
        mineBarFill.style.width = pct + '%';
        // Re-trigger swing animation periodically
        if (miningTarget.progress % 0.5 < dt) player.triggerSwing();
        if (miningTarget.progress >= miningTarget.time) {

            miningHeld = false;
            mineBarEl.style.display = 'none';
        }
    }

    // Creatures
    creatures.skipAI = mp.active && !mp.isHost;
    creatures.update(dt, player.position.x, player.position.z);

    // Villagers
    villageMgr.update(dt, player.position.x, player.position.z);

    // Dragons
    dragonMgr.update(dt, player, keys);

    // Process smelt queue
    for (let si = smeltQueue.length - 1; si >= 0; si--) {
        const sq = smeltQueue[si];
        sq.progress += dt;
        if (sq.progress >= sq.duration) {
