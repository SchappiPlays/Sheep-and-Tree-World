            handleMat: BLOCK.STONE, guardStyle: 'wide', guardMat: 'iron_ingot',
            bladeMat: 'dragonsteel_ingot', bladeLength: 2.8, bladeThickness: 1.2,
            trimMat: 'emerald', name: 'Voidpiercer',
        };
        fortressSwords.push({ id: s7, wx: -500, wz: -160, data: window._customSwords[s7] });

        w._fortressSwords = fortressSwords;
    }

    function buildForestGate(w, gateX, gateZ, axis, shattered) {
        const BS = BLOCK_SIZE;
        const yOff = 128;
        const gateBlockX = Math.round(gateX / BS);
        const gateBlockZ = Math.round(gateZ / BS);
        const gy = Math.floor(getTerrainHeight(gateX, gateZ) / BS) + yOff;
        const S = BLOCK.DARK_STONE;
        const hash = (x, z) => { const d = Math.sin(x * 127.1 + z * 311.7 + 42.0) * 43758.5453; return d - Math.floor(d); };
        // Coordinate transform: for x-axis gates, swap dx/dz
        const gp = (dx, dz) => axis === 'x' ? [cx + dz, cz + dx] : [cx + dx, cz + dz];
        const shatR = shattered ? 0.45 : 0; // extra ruin for shattered gates

        const _pb = (bx, by, bz, block) => {
            if (by < 0 || by >= 256) return;
            w._modifiedBlocks.set(bx + ',' + by + ',' + bz, block);
            const mcx = Math.floor(bx / CHUNK_SIZE), mcz = Math.floor(bz / CHUNK_SIZE);
            const mlx = ((bx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
            const mlz = ((bz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
            const ck = mcx + ',' + mcz;
            if (!w._modsByChunk) w._modsByChunk = new Map();
            if (!w._modsByChunk.has(ck)) w._modsByChunk.set(ck, []);
            w._modsByChunk.get(ck).push({ lx: mlx, y: by, lz: mlz, block });
        };
        // Wrap placement to handle axis rotation and shattered ruin
        const rb = (bx, by, bz, block, ruin) => {
            const totalRuin = (ruin || 0) + shatR;
            if (totalRuin && hash(bx*7+by*13, bz*11+by*3) < totalRuin) return;
            if (axis === 'x') _pb(cx + (bz - cz), by, cz + (bx - cx), block);
            else _pb(bx, by, bz, block);
        };

        const cx = gateBlockX, cz = gateBlockZ;
        const R = 0.03;
        const halfGap = 28; // half-width of the gap in blocks

        // === SOUTH TOWER ===
        const tR = 4; // tower radius
        for (let y = 0; y < 22; y++) {
            for (let dx = -tR; dx <= tR; dx++) for (let dz = -tR; dz <= tR; dz++) {
                if (dx*dx + dz*dz > tR*tR+1) continue;
                const isWall = dx*dx + dz*dz > (tR-1)*(tR-1);
                if (isWall) rb(cx+dx, gy+y, cz+halfGap+dz, S, R + y*0.002);
                else if (y === 0 || y === 10 || y === 21) rb(cx+dx, gy+y, cz+halfGap+dz, S, R);
            }
        }
        for (let dx = -tR; dx <= tR; dx++) for (let dz = -tR; dz <= tR; dz++) {
            if (dx*dx+dz*dz > tR*tR+1 || dx*dx+dz*dz < (tR-1)*(tR-1)) continue;
            if ((dx+dz)%2===0) rb(cx+dx, gy+22, cz+halfGap+dz, S, R+0.05);
        }

        // === NORTH TOWER ===
        for (let y = 0; y < 22; y++) {
            for (let dx = -tR; dx <= tR; dx++) for (let dz = -tR; dz <= tR; dz++) {
                if (dx*dx + dz*dz > tR*tR+1) continue;
                const isWall = dx*dx + dz*dz > (tR-1)*(tR-1);
                if (isWall) rb(cx+dx, gy+y, cz-halfGap+dz, S, R + y*0.002);
                else if (y === 0 || y === 10 || y === 21) rb(cx+dx, gy+y, cz-halfGap+dz, S, R);
            }
        }
        for (let dx = -tR; dx <= tR; dx++) for (let dz = -tR; dz <= tR; dz++) {
            if (dx*dx+dz*dz > tR*tR+1 || dx*dx+dz*dz < (tR-1)*(tR-1)) continue;
            if ((dx+dz)%2===0) rb(cx+dx, gy+22, cz-halfGap+dz, S, R+0.05);
        }

        // === WALLS SPANNING THE FULL GAP (towers to gate) ===
        // South wall section (from south tower inward to gate)
        for (let dz = 5; dz < halfGap - tR; dz++) {
            for (let y = 0; y < 14; y++) for (let dx = -1; dx <= 1; dx++)
                rb(cx+dx, gy+y, cz+dz, S, R);
        }
        // North wall section
        for (let dz = -(halfGap - tR); dz < -5; dz++) {
            for (let y = 0; y < 14; y++) for (let dx = -1; dx <= 1; dx++)
                rb(cx+dx, gy+y, cz+dz, S, R);
        }
        // Crenellations on walls
        for (let dz = 5; dz < halfGap - tR; dz++) { if (dz%2===0) rb(cx, gy+14, cz+dz, S, R+0.05); }
        for (let dz = -(halfGap - tR); dz < -5; dz++) { if (dz%2===0) rb(cx, gy+14, cz+dz, S, R+0.05); }

        // === WALLS EXTENDING INTO HILLSIDE ===
        for (let dz = halfGap + tR + 1; dz <= halfGap + 25; dz++) {
            for (let y = 0; y < 12; y++) for (let dx = -1; dx <= 1; dx++)
                rb(cx+dx, gy+y, cz+dz, S, R);
        }
        for (let dz = -(halfGap + 25); dz <= -(halfGap + tR + 1); dz++) {
            for (let y = 0; y < 12; y++) for (let dx = -1; dx <= 1; dx++)
                rb(cx+dx, gy+y, cz+dz, S, R);
        }

        // === ARCH OVER GATE ===
        for (let dz = -4; dz <= 4; dz++) {
            const archH = 10 - Math.abs(dz) * 0.8;
            for (let dx = -1; dx <= 1; dx++) {
                for (let y = Math.floor(archH); y <= 14; y++)
                    rb(cx+dx, gy+y, cz+dz, S, R);
            }
        }
        // Top walkway over gate
        for (let dz = -5; dz <= 5; dz++) for (let dx = -2; dx <= 2; dx++)
            rb(cx+dx, gy+14, cz+dz, S, R);
        for (let dz = -5; dz <= 5; dz++) { if (dz%2===0) rb(cx, gy+15, cz+dz, S, R+0.05); }

        // === GATE OPENING ===
        for (let dz = -3; dz <= 3; dz++) for (let y = 1; y <= 8; y++) {
            rb(cx, gy+y, cz+dz, BLOCK.AIR, 0);
            rb(cx-1, gy+y, cz+dz, BLOCK.AIR, 0);
            rb(cx+1, gy+y, cz+dz, BLOCK.AIR, 0);
        }

        // === PAVED GROUND ===
        for (let dx = -6; dx <= 6; dx++) for (let dz = -5; dz <= 5; dz++)
            rb(cx+dx, gy, cz+dz, S, 0.02);

        // === DECORATIVE PILLARS ===
        for (const side of [-5, 5]) {
            for (let y = 0; y < 12; y++) rb(cx-4, gy+y, cz+side, S, R);
            rb(cx-4, gy+12, cz+side, BLOCK.STONE, R);
        }

        // === MID-WALL BUTTRESSES ===
        for (const dz of [12, -12]) {
            for (let y = 0; y < 10; y++) {
                rb(cx-2, gy+y, cz+dz, S, R);
                rb(cx+2, gy+y, cz+dz, S, R);
            }
        }
    }

    function buildForestRuins(w) {
        const BS = BLOCK_SIZE;
        const yOff = 128;
        const S = BLOCK.DARK_STONE;
        const SM = BLOCK.STONE;
        const hash = (x, z) => { const d = Math.sin(x * 127.1 + z * 311.7 + 42.0) * 43758.5453; return d - Math.floor(d); };
        const _pb = (bx, by, bz, block) => {
            if (by < 0 || by >= 256) return;
            w._modifiedBlocks.set(bx+','+by+','+bz, block);
            const mcx = Math.floor(bx/CHUNK_SIZE), mcz = Math.floor(bz/CHUNK_SIZE);
            const mlx = ((bx%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
            const mlz = ((bz%CHUNK_SIZE)+CHUNK_SIZE)%CHUNK_SIZE;
            const ck = mcx+','+mcz;
            if (!w._modsByChunk) w._modsByChunk = new Map();
            if (!w._modsByChunk.has(ck)) w._modsByChunk.set(ck, []);
            w._modsByChunk.get(ck).push({ lx: mlx, y: by, lz: mlz, block });
        };
        const rb = (bx, by, bz, block, ruin) => {
            if (ruin && hash(bx*7+by*13, bz*11+by*3) < ruin) return;
            _pb(bx, by, bz, block);
        };

        const hillCX = -30, hillCZ = -190;

        // Ruin 1: Broken temple with pillars (-60, -210)
        {
            const rx = Math.round(-60 / BS), rz = Math.round(-210 / BS);
            const gy = Math.floor(getTerrainHeight(-60, -210) / BS) + yOff;
            // Floor
            for (let dx = -6; dx <= 6; dx++) for (let dz = -4; dz <= 4; dz++)
                rb(rx+dx, gy, rz+dz, S, 0.15);
            // Broken pillars
            const pillars = [[-5,-3],[-5,3],[5,-3],[5,3],[0,-3],[0,3]];
            for (const [px, pz] of pillars) {
                const h = 3 + Math.floor(hash(rx+px, rz+pz) * 5);
                for (let y = 1; y <= h; y++) rb(rx+px, gy+y, rz+pz, S, 0.08);
            }
            // Fallen pillar
            for (let dx = -3; dx <= 0; dx++) rb(rx+dx, gy+1, rz, S, 0.1);
            // Altar at center
            rb(rx, gy+1, rz, SM, 0.02);
            rb(rx+1, gy+1, rz, SM, 0.02);
            rb(rx, gy+2, rz, SM, 0.05);
        }

        // Ruin 2: Collapsed tower (-10, -160)
        {
            const rx = Math.round(-10 / BS), rz = Math.round(-160 / BS);
            const gy = Math.floor(getTerrainHeight(-10, -160) / BS) + yOff;
            // Circular base
            for (let dx = -4; dx <= 4; dx++) for (let dz = -4; dz <= 4; dz++) {
                if (dx*dx+dz*dz > 18) continue;
                rb(rx+dx, gy, rz+dz, S, 0.1);
            }
            // Standing wall fragment (quarter circle)
            for (let a = 0; a < 8; a++) {
                const angle = (a / 8) * Math.PI * 0.6;
                const px = Math.round(Math.cos(angle) * 3.5);
                const pz = Math.round(Math.sin(angle) * 3.5);
                const h = 6 - a * 0.5;
                for (let y = 1; y <= h; y++) rb(rx+px, gy+y, rz+pz, S, 0.1 + y * 0.02);
            }
            // Rubble
            for (let i = 0; i < 12; i++) {
                const rdx = Math.floor((hash(i*17, i*31) - 0.5) * 10);
                const rdz = Math.floor((hash(i*23, i*43) - 0.5) * 10);
                rb(rx+rdx, gy+1, rz+rdz, hash(rdx, rdz) < 0.5 ? S : SM, 0.2);
            }
        }

        // Ruin 3: Stone archway (-50, -175)
        {
            const rx = Math.round(-50 / BS), rz = Math.round(-175 / BS);
            const gy = Math.floor(getTerrainHeight(-50, -175) / BS) + yOff;
            // Two pillars
            for (let y = 0; y < 8; y++) {
                rb(rx, gy+y, rz-3, S, 0.05);
                rb(rx, gy+y, rz+3, S, 0.05);
            }
            // Arch top
            for (let dz = -3; dz <= 3; dz++) {
                const archY = 8 - Math.abs(dz) * 0.3;
                for (let y = Math.floor(archY); y <= 8; y++)
                    rb(rx, gy+y, rz+dz, S, 0.08);
            }
            // Paving underneath
            for (let dz = -4; dz <= 4; dz++) for (let dx = -1; dx <= 1; dx++)
                rb(rx+dx, gy, rz+dz, S, 0.12);
        }

        // Ruin 4: Overgrown wall fragments (10, -200)
        {
            const rx = Math.round(10 / BS), rz = Math.round(-200 / BS);
            const gy = Math.floor(getTerrainHeight(10, -200) / BS) + yOff;
            // L-shaped wall
            for (let dx = 0; dx <= 10; dx++) {
                const h = 4 - Math.floor(hash(rx+dx, rz) * 2);
                for (let y = 0; y < h; y++) rb(rx+dx, gy+y, rz, S, 0.12);
            }
            for (let dz = 0; dz <= 8; dz++) {
                const h = 3 - Math.floor(hash(rx, rz+dz) * 2);
                for (let y = 0; y < h; y++) rb(rx, gy+y, rz+dz, S, 0.12);
            }
            // Window opening
            _pb(rx+5, gy+2, rz, BLOCK.AIR);
            _pb(rx+6, gy+2, rz, BLOCK.AIR);
        }

        // Ruin 5: Stone circle / ritual site (-20, -220)
        {
            const rx = Math.round(-20 / BS), rz = Math.round(-220 / BS);
            const gy = Math.floor(getTerrainHeight(-20, -220) / BS) + yOff;
            // Standing stones in circle
            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * Math.PI * 2;
                const px = Math.round(Math.cos(a) * 5);
                const pz = Math.round(Math.sin(a) * 5);
                const h = 3 + Math.floor(hash(px*7, pz*11) * 3);
                // Some stones fallen
                if (hash(i * 17, i * 31) < 0.25) {
                    for (let dx = 0; dx < h; dx++) rb(rx+px+dx, gy+1, rz+pz, S, 0.1);
                } else {
                    for (let y = 0; y < h; y++) rb(rx+px, gy+y, rz+pz, S, 0.06);
                }
            }
            // Center slab
            for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++)
                rb(rx+dx, gy, rz+dz, SM, 0.03);
            rb(rx, gy+1, rz, SM, 0.02);
        }

        // Ruin 6: Staircase to nowhere (0, -180)
        {
            const rx = Math.round(0 / BS), rz = Math.round(-180 / BS);
            const gy = Math.floor(getTerrainHeight(0, -180) / BS) + yOff;
            // Wide stairs going up
            for (let step = 0; step < 8; step++) {
                const w = 5 - Math.floor(step * 0.4);
                for (let dx = -w; dx <= w; dx++)
                    rb(rx+dx, gy+step, rz-step, S, 0.08 + step * 0.02);
            }
            // Broken platform at top
            for (let dx = -3; dx <= 3; dx++) for (let dz = -2; dz <= 0; dz++)
                rb(rx+dx, gy+8, rz-8+dz, S, 0.2);
        }

        // Ruin 7: Foundation outline (-40, -190)
        {
            const rx = Math.round(-40 / BS), rz = Math.round(-190 / BS);
            const gy = Math.floor(getTerrainHeight(-40, -190) / BS) + yOff;
            // Rectangular foundation — just low walls
            for (let dx = -8; dx <= 8; dx++) {
                rb(rx+dx, gy, rz-6, S, 0.1); rb(rx+dx, gy+1, rz-6, S, 0.2);
                rb(rx+dx, gy, rz+6, S, 0.1); rb(rx+dx, gy+1, rz+6, S, 0.25);
            }
            for (let dz = -6; dz <= 6; dz++) {
                rb(rx-8, gy, rz+dz, S, 0.1); rb(rx-8, gy+1, rz+dz, S, 0.2);
                rb(rx+8, gy, rz+dz, S, 0.1); rb(rx+8, gy+1, rz+dz, S, 0.3);
            }
            // Corner posts slightly taller
            for (const [cx, cz] of [[-8,-6],[-8,6],[8,-6],[8,6]]) {
                rb(rx+cx, gy+2, rz+cz, S, 0.15);
                rb(rx+cx, gy+3, rz+cz, S, 0.3);
            }
        }

        // Ruin 8: Grand Central Ruin — collapsed great hall at hill ring center (-30, -190)
        {
            const rx = Math.round(hillCX / BS), rz = Math.round(hillCZ / BS);
            const gy = Math.floor(getTerrainHeight(hillCX, hillCZ) / BS) + yOff;

            // Large floor — cracked stone tiles (20×16 blocks)
            for (let dx = -10; dx <= 10; dx++) for (let dz = -8; dz <= 8; dz++) {
                const floorBlock = hash(rx+dx+99, rz+dz+77) < 0.3 ? SM : S;
                rb(rx+dx, gy, rz+dz, floorBlock, 0.08);
            }

            // Outer walls — partially collapsed (3 walls, front open)
            // Back wall (north)
            for (let dx = -10; dx <= 10; dx++) {
                const h = 7 - Math.floor(Math.abs(dx) * 0.2) - Math.floor(hash(rx+dx, rz-8) * 3);
                for (let y = 1; y <= Math.max(1, h); y++)
                    rb(rx+dx, gy+y, rz-8, S, 0.06 + y * 0.03);
            }
            // Left wall (west)
            for (let dz = -8; dz <= 4; dz++) {
                const h = 6 - Math.floor(hash(rx-10, rz+dz) * 3);
                for (let y = 1; y <= Math.max(1, h); y++)
                    rb(rx-10, gy+y, rz+dz, S, 0.08 + y * 0.03);
            }
            // Right wall (east) — more broken
            for (let dz = -8; dz <= 2; dz++) {
                const h = 5 - Math.floor(hash(rx+10, rz+dz) * 4);
                for (let y = 1; y <= Math.max(1, h); y++)
                    rb(rx+10, gy+y, rz+dz, S, 0.12 + y * 0.04);
            }

            // Grand pillars — 6 tall pillars (some broken)
            const pillars = [[-7,-5],[-7,3],[0,-5],[0,3],[7,-5],[7,3]];
            for (let pi = 0; pi < pillars.length; pi++) {
                const [px, pz] = pillars[pi];
                const broken = hash(pi*31, pi*17) < 0.3;
                const h = broken ? 2 + Math.floor(hash(px*3, pz*7) * 3) : 10;
                for (let y = 1; y <= h; y++) {
                    rb(rx+px, gy+y, rz+pz, SM, 0.04);
                    rb(rx+px+1, gy+y, rz+pz, SM, 0.04);
                    rb(rx+px, gy+y, rz+pz+1, SM, 0.04);
                    rb(rx+px+1, gy+y, rz+pz+1, SM, 0.04);
                }
                // Pillar capital on intact ones
                if (!broken) {
                    for (let cdx = -1; cdx <= 2; cdx++) for (let cdz = -1; cdz <= 2; cdz++)
                        rb(rx+px+cdx, gy+h+1, rz+pz+cdz, S, 0.1);
                }
            }

            // Fallen pillar across the floor
            for (let dx = -4; dx <= 5; dx++) {
                rb(rx+dx, gy+1, rz-2, SM, 0.08);
                rb(rx+dx, gy+2, rz-2, SM, 0.12);
            }

            // Central raised platform / altar base
            for (let dx = -3; dx <= 3; dx++) for (let dz = -2; dz <= 2; dz++) {
                rb(rx+dx, gy+1, rz+dz, SM, 0.03);
                if (Math.abs(dx) <= 2 && Math.abs(dz) <= 1)
                    rb(rx+dx, gy+2, rz+dz, SM, 0.05);
            }
            // Altar stone on top
            rb(rx, gy+3, rz, BLOCK.DARK_STONE, 0.02);
            rb(rx+1, gy+3, rz, BLOCK.DARK_STONE, 0.02);
            rb(rx, gy+3, rz+1, BLOCK.DARK_STONE, 0.02);
            rb(rx+1, gy+3, rz+1, BLOCK.DARK_STONE, 0.02);

            // Scattered rubble around the ruin
            for (let i = 0; i < 20; i++) {
                const rdx = Math.floor((hash(i*17+5, i*31+9) - 0.5) * 26);
                const rdz = Math.floor((hash(i*23+3, i*43+7) - 0.5) * 20);
                if (Math.abs(rdx) <= 10 && Math.abs(rdz) <= 8) continue; // skip inside
                rb(rx+rdx, gy+1, rz+rdz, hash(rdx*3, rdz*7) < 0.5 ? S : SM, 0.3);
            }

            // Broken archway entrance (south side)
            for (let y = 0; y < 6; y++) {
                rb(rx-4, gy+y, rz+8, S, 0.06);
                rb(rx+4, gy+y, rz+8, S, 0.06);
            }
            // Arch top (partially collapsed)
            for (let dx = -3; dx <= 3; dx++) {
                const archH = 6 + (3 - Math.abs(dx)) * 0.5;
                rb(rx+dx, gy+Math.floor(archH), rz+8, S, 0.15 + Math.abs(dx) * 0.05);
            }
        }
    }

    // Naturally spawning chests in ruins
    {

    // Receive villager sync from host
    mp.onVillagerSync = (list) => {
        if (!villageMgr) return;
        for (const r of list) {
            let best = null, bestD = 4;
            for (const v of villageMgr.villagers) {
                const dx = v.x - r.x, dz = v.z - r.z;
                const d = dx * dx + dz * dz;
                if (d < bestD) { bestD = d; best = v; }
            }
            if (best) {
                best.x = r.x; best.z = r.z;
                best.group.position.x = r.x;
                best.group.position.z = r.z;
                best.group.rotation.y = r.ry;
                best.walking = !!r.w;
            }
        }
    };

            if (!c) {
                let bestD = 16;
                for (const cc of creatures.creatures) {
                    if (cc.type !== r.t) continue;
                    const dx = cc.x - r.x, dz = cc.z - r.z;
                    const d = dx * dx + dz * dz;
                    if (d < bestD) { bestD = d; c = cc; }
                }
            }
            if (c) {
                c.x = r.x; c.z = r.z;
                c.group.rotation.y = r.ry;
                c.walking = !!r.w;
                if (r.d && !c.dead) { c.dead = true; c.deathTimer = 0; c.hp = 0; }

        }

                sm._guardExtra2.visible = true; sm._guardExtra2.geometry.dispose();
                sm._guardExtra2.geometry = new THREE.ConeGeometry(0.025, 0.1, 4);
                sm._guardExtra2.position.set(0.1, 0, 0); sm._guardExtra2.rotation.set(0,0,-Math.PI/2);
            } else if (cs.guardStyle === 'ring') {
                sm._guardMesh.geometry = new THREE.TorusGeometry(0.06, 0.015, 6, 8);
                sm._guardMesh.rotation.set(Math.PI/2, 0, 0);
            } else {
                sm._guardMesh.geometry = new THREE.BoxGeometry(0.16, 0.03, 0.04);
            }
            // Trim
            if (cs.trimMat) {
                sm._trimMat.color.setHex(_mcfs(cs.trimMat)); sm._trimMat.metalness = 0.5;
                sm._trimStripe.visible = true; sm._trimStripe2.visible = true;
            }
            // Blade scale
            const bLenS = (cs.bladeLength || 2) / 2;
            sm._bladeGrp.scale.set(cs.bladeThickness || 1, bLenS, cs.bladeThickness || 1);
            sm._bladeGrp.position.y = 0.1 * (1 - bLenS);
            // Position in world — stuck in ground at angle
            const gy = getTerrainHeight(fs.wx, fs.wz);
            const lean = 0.1 + Math.sin(fs.wx * 3.7) * 0.08;
            const yaw = Math.sin(fs.wx * 7.1 + fs.wz * 3.3) * 0.5;
            sm.position.set(fs.wx, gy + 1.0, fs.wz);
            sm.rotation.set(Math.PI + lean, yaw, 0.05);
            sm.scale.set(2.5, 2.5, 2.5);
            scene.add(sm);
            world._fortressSwordMeshes.push({ id: fs.id, mesh: sm, wx: fs.wx, wz: fs.wz });
        }
    }

    // === Fortress Guardian Wyvern — massive black dragon circling above ===
    // Always create fresh (not saved)
    {
        const fortDragon = dragonMgr._makeDragon(-505, -175, getTerrainHeight(-505, -175), 0x0a0a0a, 0xcc7733, true);

        fortDragon._flyAngle = 0;
        fortDragon._flyRadius = 35;
        fortDragon._flyHeight = 40;
        fortDragon._flySpeed = 0.3;
        fortDragon._breathing = false;
        fortDragon._breathTimer = 0;
        // Fire breath mesh — simple cone, hidden until breathing
        const fireMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
        const fireGeo = new THREE.ConeGeometry(3, 20, 6, 1, true);
        const fireMesh = new THREE.Mesh(fireGeo, fireMat);

        fireMesh.renderOrder = 998;

        scene.add(fortDragon.group);
        dragonMgr.dragons.push(fortDragon);
        world._fortressDragon = fortDragon;
    }

    // === Gate Boss Progression System ===
    let gateKills = 0; // tracks how many gate bosses killed this game

    const GATE_TIERS = [
        // 0 kills: iron tier
        { blades: ['iron_ingot', 'iron_ingot', 'steel_ingot'], armorTier: 'iron', swordTierName: 'Iron', dmg: 6, extraMats: ['iron_ingot'], extraCount: 3 },
        // 1 kill: steel/gold tier
        { blades: ['steel_ingot', 'gold_ingot', 'steel_ingot'], armorTier: 'steel', swordTierName: 'Steel', dmg: 8, extraMats: ['gold_ingot', 'steel_ingot'], extraCount: 4 },
        // 2 kills: diamond tier
        { blades: ['diamond', 'diamond', 'steel_ingot'], armorTier: 'diamond', swordTierName: 'Diamond', dmg: 8, extraMats: ['diamond', 'gold_ingot'], extraCount: 3 },
        // 3 kills: dragonsteel tier
        { blades: ['dragonsteel_ingot', 'diamond', 'dragonsteel_ingot'], armorTier: 'dragonsteel', swordTierName: 'Dragonsteel', dmg: 12, extraMats: ['dragonsteel_ingot', 'diamond'], extraCount: 5 },
    ];

    function getGateDropTier() {
        return GATE_TIERS[Math.min(gateKills, GATE_TIERS.length - 1)];
    }

    function generateGateSword(bossName) {
        const tier = getGateDropTier();
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const rng = Math.random;
        const guards = ['straight', 'curved', 'wide', 'spiked', 'ring'];
        const pommels = ['round', 'gem', 'skull', 'wolf', 'claw'];
        const mats = ['iron_ingot', 'gold_ingot', 'steel_ingot', 'diamond'];
        const gems = ['ruby', 'sapphire', 'emerald', 'topaz'];
        const bladeMat = pick(tier.blades);
        const tierMap = { 'iron_ingot': 'iron', 'gold_ingot': 'gold', 'steel_ingot': 'steel', 'diamond': 'diamond', 'dragonsteel_ingot': 'dragonsteel' };
        const swordId = 'csword_gate_' + Date.now() + '_' + Math.floor(rng()*9999);
        if (!window._customSwords) window._customSwords = {};
        window._customSwords[swordId] = {
            tier: tierMap[bladeMat] || 'iron', damage: tier.dmg,
            pommelStyle: pick(pommels), pommelMat: rng() < 0.4 ? pick(gems) : pick(mats),
            handleMat: pick(mats),
            guardStyle: pick(guards), guardMat: pick(mats),
            bladeMat,
            bladeLength: 1.5 + rng() * (gateKills >= 2 ? 3.0 : 2.0), // bigger swords at higher tiers
            bladeThickness: 0.6 + rng() * (gateKills >= 2 ? 1.8 : 1.2),
            trimMat: rng() < 0.5 + gateKills * 0.1 ? pick(gems) : '',
            name: bossName,
        };
        return swordId;
    }

    function giveGateDrops(bossDisplayName, swordNames) {
        const tier = getGateDropTier();
        playerMaxHP += 2;
        playerHP = Math.min(playerHP + 2, playerMaxHP);
        updateHeartsUI();
        addChatMessage(bossDisplayName + ' (+1 heart)', 'rgba(255,220,100,0.95)');

        // Sword drop
        const swordId = generateGateSword(swordNames[Math.floor(Math.random() * swordNames.length)]);
        inventory[swordId] = 1;
        if (!_hotbarHasSword()) {
            const ei = hotbarSlots.indexOf(0);
            if (ei >= 0) hotbarSlots[ei] = swordId;
        }

        // Armor drop matching tier
        const at = tier.armorTier;
        for (const piece of ['_helmet', '_chestplate', '_leggings', '_boots']) {
            inventory[at + piece] = (inventory[at + piece] || 0) + 1;
        }

        // Extra materials
        for (const mat of tier.extraMats) {
            inventory[mat] = (inventory[mat] || 0) + tier.extraCount;
        }

        refreshUI();
        const cs = window._customSwords[swordId];
        addChatMessage('Dropped: ' + cs.name + ' (' + tier.swordTierName + ') + ' + at.charAt(0).toUpperCase() + at.slice(1) + ' Armor', 'rgba(136,255,255,0.95)');

    }

    // === Giant Skeleton Boss at east gate ===
    if (!killedBosses.has('The Ancient One')) {

        const _bossGuards = ['straight', 'curved', 'wide', 'spiked', 'ring'];
        const _bossPommels = ['round', 'gem', 'skull', 'wolf', 'claw'];
        const _bossMats = ['iron_ingot', 'gold_ingot', 'steel_ingot', 'diamond', 'dragonsteel_ingot'];
        const _bossBlades = ['steel_ingot', 'diamond', 'dragonsteel_ingot'];
        const _bossGems = ['ruby', 'sapphire', 'emerald', 'topaz'];
        const _bossNames = ['Bonecrusher', 'Soulreaver', 'Deathwhisper', 'Gravekeeper', 'Cryptblade', 'Marrowsplitter', 'Doomfang', 'Wraithcutter'];
        const bossBladeMat = _bossPick(_bossBlades);
        const bossTier = bossBladeMat === 'dragonsteel_ingot' ? 'dragonsteel' : bossBladeMat === 'diamond' ? 'diamond' : 'steel';
        const bossDmg = bossBladeMat === 'dragonsteel_ingot' ? 12 : bossBladeMat === 'diamond' ? 8 : 8;
        const bossSwordId = 'csword_boss_' + Date.now();
        if (!window._customSwords) window._customSwords = {};
        const bossSwordData = {
            tier: bossTier, damage: bossDmg,
            pommelStyle: _bossPick(_bossPommels), pommelMat: _bossRng() < 0.5 ? _bossPick(_bossGems) : _bossPick(_bossMats),

        const bossY = getTerrainHeight(bossX, bossZ);
        // Create skeleton via creature manager's internal spawner

            x: bossX, z: bossZ, angle: 0, speed: 0,
            walkPhase: 0, wanderTimer: 5, idleHeadTimer: 0, idleHeadTarget: 0, walking: false,
            type: 'skeleton', hostile: true, aggroRange: 30, attackRange: 4, attackDmg: 6, attackCD: 3.0, attackTimer: 0,
            hp: 150, maxHP: 150, dead: false, chaseSpeed: 1.5,

            _smashTimer: -1, // attack animation timer
        };
        // Build boss using player-style model — bone colored

        // Shoulder bones (clavicle)

        // Pelvis

        crownBase.position.y = 0.15; headGrp.add(crownBase);
        for (let ci = 0; ci < 8; ci++) {
            const ca = (ci / 8) * Math.PI * 2;
            const spikeH = 0.08 + (ci % 2) * 0.06;
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.02, spikeH, 4), crownMat);

        // Arms — thin skeletal bones with claws, stored for animation
        bossSkel._arms = [];

            const elbow = new THREE.Group(); elbow.position.y = -0.3; shoulder.add(elbow);
            // Forearm bone
            const fore = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.28, 0.05), darkBoneMat);
            fore.position.y = -0.14; elbow.add(fore);
            // Clawed hand

            const palm = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.05, 0.06), boneMat);
            handGrp.add(palm);
            for (let fi = 0; fi < 4; fi++) {
                const claw = new THREE.Mesh(new THREE.ConeGeometry(0.01, 0.08, 4), darkBoneMat);

                handGrp.add(claw);

            bossSkel._arms.push({ shoulder, elbow, handGrp });
        }
        // Attach the boss sword to the left hand
        const bossSwordMesh = player._makeSword.call(player);
        const _MC_BOSS = { 'stick': 0x8a6a3a, [BLOCK.STONE]: 0x888888, '3': 0x888888, 'iron_ingot': 0xc0c8d0, 'gold_ingot': 0xffee44, 'steel_ingot': 0xe8eef5, 'diamond': 0x88ffff, 'dragonsteel_ingot': 0x1a1a28, 'ruby': 0xff3355, 'sapphire': 0x4466ff, 'emerald': 0x44ff66, 'topaz': 0xffcc33 };
        const _mcb = (k) => _MC_BOSS[k] || _MC_BOSS[String(k)] || 0xc0c8d0;
        bossSwordMesh._bladeMat.color.setHex(_mcb(bossSwordData.bladeMat)); bossSwordMesh._bladeMat.metalness = 0.7; bossSwordMesh._bladeMat.roughness = 0.1;
        bossSwordMesh._guardMat.color.setHex(_mcb(bossSwordData.guardMat));
        bossSwordMesh._handleMat.color.setHex(_mcb(bossSwordData.handleMat));
        bossSwordMesh._pommelMat.color.setHex(_mcb(bossSwordData.pommelMat));
        if (bossSwordData.trimMat) { bossSwordMesh._trimMat.color.setHex(_mcb(bossSwordData.trimMat)); bossSwordMesh._trimStripe.visible = true; bossSwordMesh._trimStripe2.visible = true; }
        const bls = bossSwordData.bladeLength / 2;
        bossSwordMesh._bladeGrp.scale.set(bossSwordData.bladeThickness, bls, bossSwordData.bladeThickness);
        bossSwordMesh._bladeGrp.position.y = 0.1 * (1 - bls);
        bossSwordMesh.rotation.set(Math.PI - 0.4, 0, -0.15);
        bossSwordMesh.position.y = 0.02;
        bossSkel._arms[0].handGrp.add(bossSwordMesh);
        bossSkel._bossSwordMesh = bossSwordMesh;
        bossSkel._spine = spine;

        // Legs — thin skeletal bones
        for (const lx of [-0.11, 0.11]) {
            const hip = new THREE.Group(); hip.position.set(lx, 0, 0); body.add(hip);
            const thigh = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.42, 0.07), boneMat);
            thigh.position.y = -0.21; hip.add(thigh);
            const knee = new THREE.Group(); knee.position.y = -0.42; hip.add(knee);
            const shin = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.40, 0.06), darkBoneMat);
            shin.position.y = -0.20; knee.add(shin);
            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.07, 0.24), boneMat);
            foot.position.set(0, -0.43, 0.04); knee.add(foot);
            bossSkel.legs.push(hip);
        }

        // Scale to 5x player size
        g.scale.setScalar(5);
        g.position.set(bossX, bossY, bossZ);
        scene.add(g);
        creatures.creatures.push(bossSkel);

        // Boss drop handler — uses progression system
        creatures._onBossDeath = (boss) => {
            if (!boss._isBoss) return;
            giveGateDrops('The Ancient One falls!',
                ['Bonecrusher', 'Soulreaver', 'Deathwhisper', 'Gravekeeper', 'Cryptblade', 'Marrowsplitter', 'Doomfang', 'Wraithcutter']);
        };
    }

    // === Earth Colossus Boss near the western gate ===
    if (!killedBosses.has('Colossus of the Gate')) {
        const colX = -155, colZ = -190;
        const colY = getTerrainHeight(colX, colZ);
        const colossus = {
            group: new THREE.Group(), legs: [], headGrp: new THREE.Group(),
            x: colX, z: colZ, angle: Math.PI * 0.5, speed: 0,
            walkPhase: 0, wanderTimer: 5, idleHeadTimer: 0, idleHeadTarget: 0, walking: false,
            type: 'skeleton', hostile: true, aggroRange: 35, attackRange: 5, attackDmg: 8, attackCD: 3.5, attackTimer: 0,
            hp: 250, maxHP: 250, dead: false, chaseSpeed: 0.7,
            _isBoss: true, _bossName: 'Colossus of the Gate', _smashTimer: -1, _isGateBoss: true,
            _mineOnly: true, _turnSpeed: 1.2, // slow turning
        };

        const eyeMat2 = new THREE.MeshStandardMaterial({ color: 0xffaa22, emissive: 0xff8800, emissiveIntensity: 0.5 });
        const g = colossus.group;

        // Use chunky block-textured materials instead of individual voxels (performance)
        const _grassM = new THREE.MeshStandardMaterial({ color: 0x5b8c3e, roughness: 0.85, flatShading: true });
        const _dirtM = new THREE.MeshStandardMaterial({ color: 0x8b6b3d, roughness: 0.9, flatShading: true });
        const _stoneM = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.8, flatShading: true });
        const _hash = (x,y,z) => { const d = Math.sin(x*127.1+y*311.7+z*271.3+42)*43758.5; return d - Math.floor(d); };

        // Track "blocks" as logical units for mining (not actual meshes)
        const colossusBlocks = [];
        let _currentPartName = '';
        let _blockIdCounter = 0;

        // Build body part from a few chunky pieces that LOOK blocky
        const voxelPart = (parent, ox, oy, oz, w, h, d, partName) => {
            if (partName) _currentPartName = partName;
            // Split into 2x2x2 sub-blocks for chunky look
            const stepX = w / 2, stepY = h / 3, stepZ = d / 2;
            for (let bx = 0; bx < 2; bx++) for (let by = 0; by < 3; by++) for (let bz = 0; bz < 2; bz++) {
                if (_hash(bx+ox*10, by+oy*10, bz+oz*10) < 0.05) continue;
                const yRatio = by / 3;
                let mat;
                if (yRatio > 0.7) mat = _grassM;
                else if (yRatio > 0.35) mat = _dirtM;
                else mat = _hash(bx*3, by*7, bz*11) < 0.3 ? _dirtM : _stoneM;
                // Slightly varied size for rough look
                const vary = 0.9 + _hash(bx*13, by*17, bz*23) * 0.2;
                const geo = new THREE.BoxGeometry(stepX * vary, stepY * vary, stepZ * vary);
                const block = new THREE.Mesh(geo, mat);
                block.position.set(
                    ox + (bx - 0.5) * stepX,
                    oy + by * stepY,
                    oz + (bz - 0.5) * stepZ
                );
                parent.add(block);
                colossusBlocks.push({ mesh: block, parent, part: _currentPartName, id: _blockIdCounter++ });
            }
        };

        // Body
        const body = new THREE.Group(); body.position.y = 0.90; g.add(body);
        const spine = new THREE.Group(); body.add(spine);

        // Torso
        voxelPart(spine, 0, 0.05, 0, 0.55, 0.6, 0.3, 'torso');

        // Neck
        voxelPart(spine, 0, 0.62, 0, 0.14, 0.1, 0.14, 'neck');

        // Head
        const headGrp = colossus.headGrp;
        headGrp.position.y = 0.8; spine.add(headGrp);
        voxelPart(headGrp, 0, -0.1, 0, 0.3, 0.3, 0.28, 'head');
        // Eyes
        const lEye2 = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), eyeMat2);
        lEye2.position.set(-0.09, 0.02, 0.14); headGrp.add(lEye2);
        const rEye2 = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), eyeMat2);
        rEye2.position.set(0.09, 0.02, 0.14); headGrp.add(rEye2);

        // Arms
        colossus._arms = [];
        let armIdx = 0;
        for (const side of [-1, 1]) {
            const armName = armIdx === 0 ? 'leftArm' : 'rightArm';
            const shoulder = new THREE.Group();
            shoulder.position.set(side * 0.35, 0.45, 0); spine.add(shoulder);
            voxelPart(shoulder, 0, -0.18, 0, 0.16, 0.35, 0.16, armName);
            const elbow = new THREE.Group(); elbow.position.y = -0.38; shoulder.add(elbow);
            voxelPart(elbow, 0, -0.16, 0, 0.14, 0.32, 0.14, armName);
            voxelPart(elbow, 0, -0.38, 0, 0.2, 0.16, 0.16, armName);
            colossus._arms.push({ shoulder, elbow });
            armIdx++;
        }
        colossus._spine = spine;

        // Legs
        let legIdx = 0;
        for (const lx of [-0.15, 0.15]) {
            const legName = legIdx === 0 ? 'leftLeg' : 'rightLeg';
            const hip = new THREE.Group(); hip.position.set(lx, 0, 0); body.add(hip);
            voxelPart(hip, 0, -0.22, 0, 0.18, 0.45, 0.18, legName);
            const knee = new THREE.Group(); knee.position.y = -0.45; hip.add(knee);
            voxelPart(knee, 0, -0.21, 0, 0.16, 0.42, 0.16, legName);
            voxelPart(knee, 0, -0.47, 0.03, 0.22, 0.1, 0.3, legName);
            colossus.legs.push(hip);
            legIdx++;
        }
        colossus._legBlockCounts = {
            leftLeg: colossusBlocks.filter(b => b.part === 'leftLeg').length,
            rightLeg: colossusBlocks.filter(b => b.part === 'rightLeg').length,
        };
        colossus._fallen = false;

        // Scale to 6.5x player size (1.3x the skeleton boss)
        g.scale.setScalar(6.5);
        g.position.set(colX, colY, colZ);
        scene.add(g);
        colossus._blocks = colossusBlocks;
        colossus._dmgPerBlock = Math.ceil(colossus.maxHP / colossusBlocks.length); // each block = proportional damage
        creatures.creatures.push(colossus);

        // Boss drop handler for gate colossus
        creatures._onGateBossDeath = (boss) => {
            giveGateDrops('The Colossus crumbles!',
                ['Earthshaker', 'Stonefist', 'Worldsplitter', 'Groundbreaker', 'Mountaincleaver', 'Rootcutter', 'Quakeborn']);
        };
    }

    // === Dark Knight Boss at north gate ===
    if (!killedBosses.has('The Dark Knight')) {
        const dkX = -30, dkZ = -300;
        const dkY = getTerrainHeight(dkX, dkZ);

        // Pre-generate the knight's sword
        const dkSwordId = 'csword_darkknight_' + Date.now();
        if (!window._customSwords) window._customSwords = {};
        window._customSwords[dkSwordId] = {
            tier: 'diamond', damage: 8,
            pommelStyle: 'skull', pommelMat: 'diamond',
            handleMat: 'diamond', guardStyle: 'spiked', guardMat: 'diamond',
            bladeMat: 'diamond', bladeLength: 2.6, bladeThickness: 1.5,
            trimMat: 'sapphire', name: 'Frostmourne',
        };

        // Create a player-model boss using the Player class
        const darkKnight = new Player(scene, world);
        darkKnight.group.position.set(dkX, dkY, dkZ);
        darkKnight.position.set(dkX, dkY, dkZ);

        // Apply diamond armor visuals
        darkKnight.setArmorVisuals({
            helmet: 'diamond_helmet', chestplate: 'diamond_chestplate',
            leggings: 'diamond_leggings', boots: 'diamond_boots',
        });

        // Dark skin/clothes to look menacing
        darkKnight._skinMat.color.setHex(0x444444);
        darkKnight._shirtMat.color.setHex(0x1a1a2a);
        darkKnight._pantsMat.color.setHex(0x111118);
        darkKnight._shoeMat.color.setHex(0x0a0a10);
        darkKnight._hairMat.color.setHex(0x000000);

        // Show diamond sword in hand
        darkKnight.swordHeld.visible = true;
        darkKnight.setToolColor(darkKnight.swordHeld, 'diamond_sword');
        darkKnight.swordHeld._bladeGrp.scale.set(1.5, 2.6/2, 1.5);
        darkKnight.swordHeld._bladeGrp.position.y = 0.1 * (1 - 2.6/2);

        // Add name label
        const dkCanvas = document.createElement('canvas');
        dkCanvas.width = 256; dkCanvas.height = 48;
        const dkCtx = dkCanvas.getContext('2d');
        dkCtx.fillStyle = '#ff4444'; dkCtx.font = 'bold 24px monospace'; dkCtx.textAlign = 'center';
        dkCtx.fillText('The Dark Knight', 128, 30);
        const dkTex = new THREE.CanvasTexture(dkCanvas);
        const dkLabel = new THREE.Sprite(new THREE.SpriteMaterial({ map: dkTex, transparent: true, depthWrite: false }));
        dkLabel.position.y = 2.3; dkLabel.scale.set(1.5, 0.28, 1);
        darkKnight.group.add(dkLabel);

        scene.add(darkKnight.group);

        // Create creature entry for the boss
        const dkCreature = {
            group: darkKnight.group, legs: [darkKnight.leftLeg.hip, darkKnight.rightLeg.hip],
            headGrp: darkKnight.headGroup,
            x: dkX, z: dkZ, angle: 0, speed: 0,
            walkPhase: 0, wanderTimer: 3, idleHeadTimer: 0, idleHeadTarget: 0, walking: false,
            type: 'skeleton', hostile: true, aggroRange: 20, attackRange: 2.5, attackDmg: 7, attackCD: 2.5, attackTimer: 0,
            hp: 180, maxHP: 180, dead: false, chaseSpeed: 3.0, _turnSpeed: 6,
            _isBoss: true, _bossName: 'The Dark Knight', _isDarkKnight: true,
            _smashTimer: -1, _arms: [
                { shoulder: darkKnight.leftArm.shoulder, elbow: darkKnight.leftArm.elbow },
                { shoulder: darkKnight.rightArm.shoulder, elbow: darkKnight.rightArm.elbow },
            ],
            _spine: darkKnight.spine,
            _playerModel: darkKnight,
        };
        creatures.creatures.push(dkCreature);

        // Drop handler
        creatures._onDarkKnightDeath = (boss) => {
            giveGateDrops('The Dark Knight has been vanquished!',
                ['Frostmourne', 'Duskbringer', 'Shadowedge', 'Nightfall', 'Voidstrike', 'Darkrender']);
        };
    }

    // === Necromancer Boss at central ancient forest ruin ===
    if (!killedBosses.has('The Necromancer')) {
        const necX = -30, necZ = -190;
        const necY = getTerrainHeight(necX, necZ) + 1.5; // on the altar platform

        const necro = new Player(scene, world);
        necro.group.position.set(necX, necY, necZ);
        necro.position.set(necX, necY, necZ);

        // Dark robes appearance
        necro._skinMat.color.setHex(0x2a2a30);
        necro._shirtMat.color.setHex(0x15101a);
        necro._pantsMat.color.setHex(0x100a14);
        necro._shoeMat.color.setHex(0x0a0810);
        necro._hairMat.color.setHex(0x1a0a2a);

        // Custom necromancer staff — dark twisted shaft with skull headpiece and floating orb
        necro.staffHeld.visible = false;
        necro.swordHeld.visible = false;
        const necStaff = new THREE.Group();
        // Dark shaft — slightly tapered, bone-colored
        const shaftMat = new THREE.MeshStandardMaterial({ color: 0x1a1018, roughness: 0.9 });
        const shaft = new THREE.Mesh(new THREE.BoxGeometry(0.04, 2.2, 0.04), shaftMat);
        shaft.position.y = 0.15; necStaff.add(shaft);
        // Gnarled knots on the shaft
        const knotMat = new THREE.MeshStandardMaterial({ color: 0x2a1a2a });
        for (let i = 0; i < 4; i++) {
            const knot = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.06), knotMat);
            knot.position.set((i%2)*0.01, -0.3 + i*0.4, 0);
            knot.rotation.y = i * 0.8;
            necStaff.add(knot);
        }
        // Skull-like headpiece at top
        const skullMat = new THREE.MeshStandardMaterial({ color: 0xc0b8a0, roughness: 0.7 });
        const skull = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.08), skullMat);
        skull.position.y = 1.28; necStaff.add(skull);
        // Jaw
        const jaw = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.04, 0.06), skullMat);
        jaw.position.set(0, 1.21, 0.01); necStaff.add(jaw);
        // Eye sockets (dark holes with purple glow)
        const socketMat = new THREE.MeshBasicMaterial({ color: 0x6622aa });
        const lSocket = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.025, 0.02), socketMat);
        lSocket.position.set(-0.025, 1.30, 0.04); necStaff.add(lSocket);
        const rSocket = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.025, 0.02), socketMat);
        rSocket.position.set(0.025, 1.30, 0.04); necStaff.add(rSocket);
        // Prongs cradling the orb (4 curved fingers)
        const prongMat = new THREE.MeshStandardMaterial({ color: 0x1a1018 });
        for (let i = 0; i < 4; i++) {
            const a = (i / 4) * Math.PI * 2;
            const prong = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.15, 0.02), prongMat);
            prong.position.set(Math.cos(a)*0.06, 1.42, Math.sin(a)*0.06);
            prong.rotation.x = Math.sin(a) * 0.3;
            prong.rotation.z = -Math.cos(a) * 0.3;
            necStaff.add(prong);
        }
        // Floating orb — glowing purple
        const orbMat = new THREE.MeshBasicMaterial({ color: 0xaa44ff, transparent: true, opacity: 0.85 });
        const orb = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 6), orbMat);
        orb.position.y = 1.48; necStaff.add(orb);
        // Orb inner glow
        const innerOrb = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 4),
            new THREE.MeshBasicMaterial({ color: 0xdd88ff }));
        innerOrb.position.y = 1.48; necStaff.add(innerOrb);
        // Energy ring around orb
        const ringGeo = new THREE.TorusGeometry(0.1, 0.008, 4, 16);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x8833cc, transparent: true, opacity: 0.5 });
        const ring1 = new THREE.Mesh(ringGeo, ringMat);
        ring1.position.y = 1.48; ring1.rotation.x = Math.PI * 0.3; necStaff.add(ring1);
        const ring2 = new THREE.Mesh(ringGeo, ringMat.clone());
        ring2.position.y = 1.48; ring2.rotation.x = Math.PI * 0.7; ring2.rotation.z = 0.5; necStaff.add(ring2);
        // Point light from the orb
        const orbLight = new THREE.PointLight(0x8833cc, 1.5, 4);
        orbLight.position.y = 1.48; necStaff.add(orbLight);
        necStaff._orbMesh = orb;
        necStaff._rings = [ring1, ring2];
        necStaff._orbLight = orbLight;
        necStaff.position.y = 0.02;
        necro.leftArm.handGrp.add(necStaff);

        // Glowing purple eyes
        const necEyeMat = new THREE.MeshBasicMaterial({ color: 0xaa44ff });
        const necLEye = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.02), necEyeMat);
        necLEye.position.set(-0.06, 0.08, 0.13); necro.headGroup.add(necLEye);
        const necREye = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.02), necEyeMat);
        necREye.position.set(0.06, 0.08, 0.13); necro.headGroup.add(necREye);

        // Floating particles around the necromancer
        const necParticles = new THREE.Group();
        for (let i = 0; i < 8; i++) {
            const p = new THREE.Mesh(
                new THREE.BoxGeometry(0.04, 0.04, 0.04),
                new THREE.MeshBasicMaterial({ color: 0x8833cc, transparent: true, opacity: 0.6 })
            );
            p.position.set(
                (Math.random() - 0.5) * 0.8,
                0.5 + Math.random() * 1.2,
                (Math.random() - 0.5) * 0.8
            );
            p._phase = Math.random() * Math.PI * 2;
            necParticles.add(p);
        }
        necro.group.add(necParticles);

        // Name label
        const necCanvas = document.createElement('canvas');
        necCanvas.width = 256; necCanvas.height = 48;
        const necCtxL = necCanvas.getContext('2d');
        necCtxL.fillStyle = '#aa44ff'; necCtxL.font = 'bold 24px monospace'; necCtxL.textAlign = 'center';
        necCtxL.fillText('The Necromancer', 128, 30);
        const necTex = new THREE.CanvasTexture(necCanvas);
        const necLabel = new THREE.Sprite(new THREE.SpriteMaterial({ map: necTex, transparent: true, depthWrite: false }));
        necLabel.position.y = 2.3; necLabel.scale.set(1.5, 0.28, 1);
        necro.group.add(necLabel);

        scene.add(necro.group);

        const necCreature = {
            group: necro.group, legs: [necro.leftLeg.hip, necro.rightLeg.hip],
            headGrp: necro.headGroup,
            x: necX, z: necZ, angle: 0, speed: 0,
            walkPhase: 0, wanderTimer: 3, idleHeadTimer: 0, idleHeadTarget: 0, walking: false,
            type: 'skeleton', hostile: true, aggroRange: 25, attackRange: 12, attackDmg: 5, attackCD: 3.0, attackTimer: 0,
            hp: 250, maxHP: 250, dead: false, chaseSpeed: 2.0, _turnSpeed: 4,
            _isBoss: true, _bossName: 'The Necromancer', _isNecromancer: true,
            _smashTimer: -1, _necSummonTimer: 0, _necProjectileTimer: 0,
            _necParticles: necParticles,
            _arms: [
                { shoulder: necro.leftArm.shoulder, elbow: necro.leftArm.elbow },
                { shoulder: necro.rightArm.shoulder, elbow: necro.rightArm.elbow },
            ],
            _spine: necro.spine,
            _playerModel: necro,
        };
        creatures.creatures.push(necCreature);

        // Protective barrier — blocks access until all 4 gate bosses are dead
        const _necShieldActive = () => !killedBosses.has('The Ancient One') || !killedBosses.has('Colossus of the Gate') || !killedBosses.has('The Dark Knight') || !killedBosses.has('Grokthak the Warchief');

        // Shield dome mesh
        const shieldGeo = new THREE.SphereGeometry(8, 24, 16, 0, Math.PI * 2, 0, Math.PI);
        const shieldMat = new THREE.MeshBasicMaterial({
            color: 0x8833cc, transparent: true, opacity: 0.15, side: THREE.DoubleSide,
        });
        const necShield = new THREE.Mesh(shieldGeo, shieldMat);
        necShield.position.set(necX, getTerrainHeight(necX, necZ), necZ);
        scene.add(necShield);

        // Shield ring at base
        const ringGeo2 = new THREE.TorusGeometry(8, 0.08, 8, 48);
        const ringMat2 = new THREE.MeshBasicMaterial({ color: 0xaa55ff, transparent: true, opacity: 0.4 });
        const necShieldRing = new THREE.Mesh(ringGeo2, ringMat2);
        necShieldRing.position.set(necX, getTerrainHeight(necX, necZ) + 0.1, necZ);
        necShieldRing.rotation.x = Math.PI / 2;
        scene.add(necShieldRing);

        // Second ring higher up
        const necShieldRing2 = new THREE.Mesh(
            new THREE.TorusGeometry(6, 0.06, 6, 36),
            new THREE.MeshBasicMaterial({ color: 0xcc77ff, transparent: true, opacity: 0.3 })
        );
        necShieldRing2.position.set(necX, getTerrainHeight(necX, necZ) + 4, necZ);
        necShieldRing2.rotation.x = Math.PI / 2;
        scene.add(necShieldRing2);

        // Store for animation and removal
        necCreature._shield = necShield;
        necCreature._shieldRing = necShieldRing;
        necCreature._shieldRing2 = necShieldRing2;
        necCreature._shieldActive = _necShieldActive;

        // While shield is active: disable aggro and make invulnerable
        if (_necShieldActive()) {
            necCreature.hostile = false;
            necCreature.aggroRange = 0;
            necCreature._shielded = true;
        }

        // Drop handler
        creatures._onNecromancerDeath = (boss) => {
            // Drop rare loot
            const drops = ['diamond', 'diamond', 'gold_ingot', 'gold_ingot', 'gold_ingot', 'ruby', 'sapphire', 'emerald'];
            for (const d of drops) inventory[d] = (inventory[d] || 0) + 1;
            // Drop the Void Staff
            inventory['void_staff'] = (inventory['void_staff'] || 0) + 1;
            const ei = hotbarSlots.indexOf(0);
            if (ei >= 0) hotbarSlots[ei] = 'void_staff';
            playerMaxHP += 2;
            playerHP = Math.min(playerHP + 2, playerMaxHP);
            updateHeartsUI();
            addChatMessage('The Necromancer has been destroyed! (+1 heart)', 'rgba(170,68,255,0.95)');
        };
    }

    // === Hobgoblin Warchief + Goblins at south gate ===
    if (!killedBosses.has('Grokthak the Warchief')) {
        const hgX = -30, hgZ = -80;
        const hgY = getTerrainHeight(hgX, hgZ);

        // Spawn 6 goblin minions around the gate
        for (let gi = 0; gi < 6; gi++) {
            const angle = (gi / 6) * Math.PI * 2;
            const gx = hgX + Math.cos(angle) * 8, gz = hgZ + Math.sin(angle) * 8;
            const gy = getTerrainHeight(gx, gz);
            // Use the creature spawner's goblin maker
            const gobData = {
                group: new THREE.Group(), legs: [], headGrp: new THREE.Group(),
                x: gx, z: gz, angle: angle, speed: 0,
                walkPhase: Math.random() * 6, wanderTimer: 2 + Math.random() * 3,
                idleHeadTimer: 0, idleHeadTarget: 0, walking: false,
                type: 'goblin', hostile: true, aggroRange: 12, attackRange: 1.5, attackDmg: 3, attackCD: 1.2, attackTimer: 0,
                hp: 15, maxHP: 15, dead: false, chaseSpeed: 1.8,
            };
            // Simple goblin model
            const gg = gobData.group;
            const gSkinMat = new THREE.MeshStandardMaterial({ color: 0x4a6a2a });
            const gClothMat = new THREE.MeshStandardMaterial({ color: 0x3a3022 });
            const gEyeMat = new THREE.MeshStandardMaterial({ color: 0xcc2200, emissive: 0x661100, emissiveIntensity: 0.2 });
            gg.add(new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.3, 0.18), gClothMat)).position.y = 0.55;
            const ghg = gobData.headGrp; ghg.position.set(0, 0.78, 0); gg.add(ghg);
            ghg.add(new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.2, 0.2), gSkinMat));
            ghg.add(new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6), gEyeMat)).position.set(-0.06, 0.02, 0.1);
            ghg.add(new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6), gEyeMat)).position.set(0.06, 0.02, 0.1);
            const gLegGeo = new THREE.BoxGeometry(0.08, 0.2, 0.08);
            for (const lx of [-0.08, 0.08]) {
                const hip = new THREE.Group(); hip.position.set(lx, 0.38, 0); gg.add(hip);
                hip.add(new THREE.Mesh(gLegGeo, gClothMat)).position.y = -0.1;
                gobData.legs.push(hip);
            }
            gg.position.set(gx, gy, gz);
            scene.add(gg);
            creatures.creatures.push(gobData);
        }

        // Hobgoblin Warchief — bigger, tougher goblin boss
        const hobgob = {
            group: new THREE.Group(), legs: [], headGrp: new THREE.Group(),
            x: hgX, z: hgZ, angle: 0, speed: 0,
            walkPhase: 0, wanderTimer: 5, idleHeadTimer: 0, idleHeadTarget: 0, walking: false,
            type: 'goblin', hostile: true, aggroRange: 18, attackRange: 2, attackDmg: 5, attackCD: 2.5, attackTimer: 0,
            hp: 80, maxHP: 80, dead: false, chaseSpeed: 2.0, _turnSpeed: 4,
            _isBoss: true, _bossName: 'Grokthak the Warchief', _isHobgoblin: true,
            _smashTimer: -1,
        };
        const hg = hobgob.group;
        const hobSkinMat = new THREE.MeshStandardMaterial({ color: 0x3a5a1a });
        const hobClothMat = new THREE.MeshStandardMaterial({ color: 0x4a3020 });
        const hobIronMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.6, roughness: 0.3 });
        const hobEyeMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xdd9900, emissiveIntensity: 0.3 });

        // Body — stocky
        const hobBody = new THREE.Group(); hobBody.position.y = 0.90; hg.add(hobBody);

        const axeHead = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.16, 0.03), hobIronMat);

            knee.add(new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.35, 0.12), hobClothMat)).position.y = -0.18;

            hobgob.legs.push(hip);
        }

        // Scale 1.8x — big but not giant
        hg.scale.setScalar(1.8);
        hg.position.set(hgX, hgY, hgZ);

        // Name label
        const hobCanvas = document.createElement('canvas');

        const hobTex = new THREE.CanvasTexture(hobCanvas);
        const hobLabel = new THREE.Sprite(new THREE.SpriteMaterial({ map: hobTex, transparent: true, depthWrite: false }));
        hobLabel.position.y = 1.6; hobLabel.scale.set(1.5, 0.28, 1);

        scene.add(hg);
        creatures.creatures.push(hobgob);

        // Drop handler
        creatures._onHobgoblinDeath = (boss) => {
            giveGateDrops('Grokthak falls! The goblins scatter!',
                ['Goblinbane', 'Skulltaker', 'Warchief\'s Cleaver', 'Raider\'s Edge', 'Hordecutter', 'Grumsplitter']);
        };
    }

    // Cave entrances are now natural openings in the hill ring — no beacons needed
    dragonMgr.buildCarriedEgg(player.spine);
    dragonMgr.addToInventory = addToInventory;
    dragonMgr.removeFromInventory = removeFromInventory;
    dragonMgr.getHeldItem = () => {
        const bt = hotbarSlots[selectedSlot];
        if (typeof bt === 'string' && bt.startsWith('egg_') && inventory[bt] > 0) {
            return { type: 'egg', egg: eggItems[bt] };
        }
        return null;
    };

    // Reset inventory
    for (const k in inventory) delete inventory[k];
    for (const k in eggItems) delete eggItems[k];
    hotbarSlots.fill(0);
    selectedSlot = 0;

    if (loadSlotName) {
        // Load save
        const saves = getSaves();
        const s = saves[loadSlotName];
        if (s) {
            player.position.set(s.player.x, s.player.y, s.player.z);
            player.group.rotation.y = s.player.ry || 0;
            // Restore inventory
            Object.assign(inventory, s.inventory || {});
            for (let i = 0; i < 9; i++) hotbarSlots[i] = s.hotbarSlots?.[i] || 0;
            selectedSlot = s.selectedSlot || 0;
            Object.assign(eggItems, s.eggItems || {});
            if (s.armorSlots) Object.assign(armorSlots, s.armorSlots);
            if (s.equippedShield) equippedShield = s.equippedShield;
            if (s.playerHP !== undefined) { playerHP = s.playerHP; playerMaxHP = s.playerMaxHP; }
            if (s.playerMana !== undefined) { playerMana = s.playerMana; playerMaxMana = s.playerMaxMana; }
            if (s.staffDamageDealt !== undefined) staffDamageDealt = s.staffDamageDealt;
            if (s.killedBosses) { killedBosses.clear(); for (const b of s.killedBosses) killedBosses.add(b); }
            window._customSwords = s.customSwords || {};
            window._customStaffs = s.customStaffs || {};
            // Re-register custom staff props
            for (const [id, cs] of Object.entries(window._customStaffs)) {
                const baseType = STAFF_GEM_TYPE[cs.gem] || 'basic_staff';
                const gemBolt = STAFF_GEM_BOLT[cs.gem];
                if (gemBolt) {
                    STAFF_PROPS[id] = { color: gemBolt.color, speed: gemBolt.speed, damage: gemBolt.damage, size: cs.isDragonstaff ? 0.15 : 0.1, trail: gemBolt.color, life: 2.5 };
                } else {
                    STAFF_PROPS[id] = { ...STAFF_PROPS[baseType] };
                }
                if (cs.isDragonstaff) STAFF_PROPS[id]._dragonProjectile = true;
                const gemSpellKey = 'gem_' + (typeof cs.gem === 'number' ? { [BLOCK.LEAVES]: 'leaves', [BLOCK.WOOD]: 'wood', [BLOCK.STONE]: 'stone' }[cs.gem] || 'basic' : cs.gem.replace('_ingot', ''));
                STAFF_SPELLS[id] = STAFF_SPELLS[gemSpellKey] || STAFF_SPELLS[baseType] || STAFF_SPELLS['basic_staff'];
            }
            // Migrate old custom swords with wrong tier
            const _tierFix = { 'stick': 'wood', '3': 'stone', [BLOCK.STONE]: 'stone', 'iron_ingot': 'iron', 'gold_ingot': 'gold', 'steel_ingot': 'steel', 'diamond': 'diamond' };
            for (const [id, cs] of Object.entries(window._customSwords)) {
                if (cs.bladeMat && _tierFix[cs.bladeMat] && cs.tier !== _tierFix[cs.bladeMat]) {
                    cs.tier = _tierFix[cs.bladeMat];
                }
            }
            // Restore modified blocks + rebuild chunk index
            if (s.modifiedBlocks) {
                const anvilOrigins = new Set();
                const campfireOrigins = new Set();
                for (const [key, val] of Object.entries(s.modifiedBlocks)) {
                    world._modifiedBlocks.set(key, val);
                    // Build chunk index
                    const [mbx, mby, mbz] = key.split(',').map(Number);
                    const mcx = Math.floor(mbx / CHUNK_SIZE), mcz = Math.floor(mbz / CHUNK_SIZE);
                    const mlx = ((mbx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const mlz = ((mbz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const ck = mcx + ',' + mcz;
                    if (!world._modsByChunk.has(ck)) world._modsByChunk.set(ck, []);
                    world._modsByChunk.get(ck).push({ lx: mlx, y: mby, lz: mlz, block: val });
                    // Track anvil blocks — snap to 2x2x2 origin
                    if (val === BLOCK.ANVIL) {
                        const ox = mbx - (((mbx % 2) + 2) % 2);
                        const oy = mby - (mby % 2);
                        const oz = mbz - (((mbz % 2) + 2) % 2);
                        anvilOrigins.add(ox + ',' + oy + ',' + oz);
                    }
                    // Track campfire blocks — snap to 2x1x2 origin
                    if (val === BLOCK.CAMPFIRE) {
                        const ox = mbx - (((mbx % 2) + 2) % 2);
                        const oz = mbz - (((mbz % 2) + 2) % 2);
                        campfireOrigins.add(ox + ',' + mby + ',' + oz);
                    }
                }
                // Recreate anvil 3D models
                for (const key of anvilOrigins) {
                    const [ax, ay, az] = key.split(',').map(Number);
                    placeAnvilModel(ax, ay, az);
                }
                // Recreate campfire 3D models
                for (const key of campfireOrigins) {
                    const [cx, cy, cz] = key.split(',').map(Number);
                    placeCampfireModel(cx, cy, cz);
                }
            }
            // Restore chests
            if (s.chests) {
                for (const [key, data] of Object.entries(s.chests)) {
                    chestData[key] = data;
                }
            }
            // Restore picked up eggs
            if (s.pickedUpEggs) {
                for (const idx of s.pickedUpEggs) {
                    if (dragonMgr.eggs[idx]) {
                        dragonMgr.eggs[idx].pickedUp = true;
                        dragonMgr.eggs[idx].group.visible = false;
                    }
                }
            }
            // Restore dragons
            if (s.dragons) {
                for (const dd of s.dragons) {
                    const hy = world.getHeight(dd.x, dd.z);
                    const bd = dragonMgr._makeDragon(dd.x, dd.z, hy, dd.eggColor, dd.wingColor, dd.isWyvern);
                    bd.age = dd.age || 0;
                    bd.dragonName = dd.dragonName || 'Dragon';
                    bd.hp = dd.hp || bd.maxHP;
                    bd.angle = dd.angle || 0;
                    bd.group.rotation.y = bd.angle;
                    scene.add(bd.group);
                    dragonMgr.dragons.push(bd);
                }
            }
            _currentSaveName = loadSlotName;
            showToast('Loaded: ' + loadSlotName);
        }
    } else {
        // New game — spawn at center
        world.getOrCreateChunk(0, 0);
        const spawnY = world.getHeight(0, 0);
        player.position.set(0, spawnY, 0);
        // Save name already set at top of startGame
        showToast('New game started');
    }

    refreshUI();

    // Show loading screen while chunks build
    const loadingEl = document.getElementById('loadingScreen');
    const loadBar = document.getElementById('loadBar');
    const loadText = document.getElementById('loadText');
    loadingEl.style.display = 'flex';
    gamePaused = true;

    if (!_animStarted) { _animStarted = true; animate(); }

    const targetChunks = Math.min(settingsRenderDist * settingsRenderDist * 0.3, 60);
    let loadCheckCount = 0;
    const loadMessages = ['Generating terrain...', 'Planting trees...', 'Building structures...', 'Spawning creatures...', 'Preparing world...'];
    const px = player.position.x, pz = player.position.z;

    const checkLoaded = () => {
        // Build chunks aggressively during loading (8 per tick)
        chunkManager.update(px, pz, 0);
        chunkManager._processQueue(8);

        const loaded = chunkManager.loadedCount || 0;
        const pct = Math.min(100, (loaded / targetChunks) * 100);
        loadBar.style.width = pct + '%';
        loadCheckCount++;
        loadText.textContent = loadMessages[Math.min(Math.floor(pct / 25), loadMessages.length - 1)];

        if (pct >= 100 || loadCheckCount > 300) {
            loadingEl.style.display = 'none';
            gamePaused = false;
            if (useMouseLook) setTimeout(() => renderer.domElement.requestPointerLock(), 200);
        } else {
            setTimeout(checkLoaded, 16); // ~60fps during loading
        }
    };
    setTimeout(checkLoaded, 50);
}

}
function applyCharColors(p) {
    if (p._skinMat) p._skinMat.color.set(charColors.skin);
    if (p._shirtMat) p._shirtMat.color.set(charColors.shirt);
    if (p._pantsMat) p._pantsMat.color.set(charColors.pants);
    if (p._shoeMat) p._shoeMat.color.set(charColors.shoes);
    if (p._hairMat) p._hairMat.color.set(charColors.hair);
    if (p.setHairStyle) p.setHairStyle(charColors.hairStyle || 'short', charColors.hairGradient ? charColors.hairTip : null);
    if (p.setHeight) p.setHeight(charColors.height || 1.0);
}
loadCharColorInputs();
for (const id of ['ccShirt','ccPants','ccSkin','ccHair','ccShoes','ccHairTip']) {

}

document.getElementById('ccName').addEventListener('keydown', e => e.stopPropagation());

});

});

// ── Character preview (spinning 3D model on menu) ──
let previewRenderer, previewScene, previewCamera, previewModel, previewRunning = false;

function initCharPreview() {
    const canvas = document.getElementById('charPreview');
    if (!canvas || previewRenderer) return;
    previewScene = new THREE.Scene();
    previewCamera = new THREE.PerspectiveCamera(40, 200 / 250, 0.1, 20);
    previewCamera.position.set(0, 1.2, 3.5);
    previewCamera.lookAt(0, 0.8, 0);
    previewRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    previewRenderer.setSize(200, 250);
    previewRenderer.setClearColor(0x000000, 0);

    // Lighting
    previewScene.add(new THREE.AmbientLight(0x667788, 0.8));
    const pSun = new THREE.DirectionalLight(0xffeedd, 1.5);
    pSun.position.set(2, 4, 3);
    previewScene.add(pSun);

    // Build preview character (same structure as player)
    previewModel = { group: new THREE.Group() };
    const g = previewModel.group;

    const skinMat = previewModel._skinMat = new THREE.MeshStandardMaterial({ color: charColors.skin });
    const shirtMat = previewModel._shirtMat = new THREE.MeshStandardMaterial({ color: charColors.shirt });
    const pantsMat = previewModel._pantsMat = new THREE.MeshStandardMaterial({ color: charColors.pants });
    const shoeMat = previewModel._shoeMat = new THREE.MeshStandardMaterial({ color: charColors.shoes });
    const hairMat = previewModel._hairMat = new THREE.MeshStandardMaterial({ color: charColors.hair });
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x222222 });

    const body = new THREE.Group(); body.position.y = 0.90; g.add(body);
    previewModel._body = body;
    const spine = new THREE.Group(); body.add(spine);
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.55, 0.22), shirtMat);
    torso.position.y = 0.3; spine.add(torso);
    previewModel._torso = torso;
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.1, 8), skinMat);
    neck.position.y = 0.62; spine.add(neck);
    const headGrp = new THREE.Group(); headGrp.position.y = 0.76; spine.add(headGrp);
    previewModel._headGrp = headGrp;
    const headMesh = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.24, 0.22), skinMat);
    headGrp.add(headMesh);
    previewModel._hairGroup = new THREE.Group();
    headGrp.add(previewModel._hairGroup);
    updatePreviewHair();
    const lEye = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8), eyeMat);
    lEye.position.set(-0.06, 0.03, 0.11); headGrp.add(lEye);
    const rEye = lEye.clone(); rEye.position.x = 0.06; headGrp.add(rEye);

    function mkArm(sign) {
        const sh = new THREE.Group(); sh.position.set(sign*0.28, 0.5, 0); spine.add(sh);
        const upper = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.28, 0.10), shirtMat);
        upper.position.y = -0.14; sh.add(upper);
        const el = new THREE.Group(); el.position.y = -0.28; sh.add(el);
        const fore = new THREE.Mesh(new THREE.BoxGeometry(0.085, 0.26, 0.085), skinMat);
        fore.position.y = -0.13; el.add(fore);
        const handGrp = new THREE.Group(); handGrp.position.y = -0.28; el.add(handGrp);
        const hand = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 0.05), skinMat);
        handGrp.add(hand);
    }
    mkArm(-1); mkArm(1);
    function mkLeg(sign) {
        const hip = new THREE.Group(); hip.position.set(sign*0.11, 0, 0); body.add(hip);
        const thigh = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.42, 0.14), pantsMat);
        thigh.position.y = -0.21; hip.add(thigh);
        const knee = new THREE.Group(); knee.position.y = -0.42; hip.add(knee);
        const shin = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.40, 0.12), pantsMat);
        shin.position.y = -0.20; knee.add(shin);
        const foot = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.07, 0.24), shoeMat);
        foot.position.set(0, -0.43, 0.04); knee.add(foot);
    }
    mkLeg(-1); mkLeg(1);

    previewScene.add(g);
    previewRunning = true;
    animatePreview();
}

function updatePreviewBody() {
    if (!previewModel || !previewModel._body || !previewModel._headGrp) return;
    const h = charColors.height || 1.0;
    previewModel._body.scale.set(1, h, 1);
    previewModel._headGrp.scale.set(1, 1/h, 1);
    previewModel._body.position.y = 0.90 * h;
}

function updatePreviewColors() {
    if (!previewModel) return;
    previewModel._skinMat.color.set(charColors.skin);
    previewModel._shirtMat.color.set(charColors.shirt);
    previewModel._pantsMat.color.set(charColors.pants);
    previewModel._shoeMat.color.set(charColors.shoes);
    previewModel._hairMat.color.set(charColors.hair);
    updatePreviewHair(); // rebuild gradient with new colors
}

function updatePreviewHair() {
    if (!previewModel || !previewModel._hairGroup) return;
    const g = previewModel._hairGroup;
    while (g.children.length) g.remove(g.children[0]);

const MUSIC_TRACKS = {
    calm: 'Field at First Light.mp3',
    menu: 'Windswept Kingdoms.mp3',
    boss: 'Titan of the Shattered Gate.mp3',
    gateBoss: 'colossus of the fallen gate.mp3',
    fortress: 'Echoes in the Fallen Keep.mp3',
    village: 'sunny steps in stonebridge.mp3',
    darkKnight: 'Rivals at First Light.mp3',
    hobgoblin: 'goblin frenzy ambush.mp3',
    // Add more tracks here as they're generated:
    // cave: 'cave_ambient.mp3',
    // night: 'night_theme.mp3',
};
const musicSystem = {
    tracks: {},
    current: null,
    currentName: null,
    _initDone: false,
    init() {
        if (this._initDone) return;
        this._initDone = true;
        for (const [name, file] of Object.entries(MUSIC_TRACKS)) {
            const audio = new Audio(file);
            audio.loop = true;
            audio.volume = musicVolume;
            this.tracks[name] = audio;
        }
    },
    play(name) {
        if (!this._initDone) this.init();
        const track = this.tracks[name];
        if (!track) return;
        // If already playing this track and not paused, skip
        if (this.currentName === name && this.current && !this.current.paused) return;
        if (this.current && this.current !== track) this.fadeOut(this.current);
        track.volume = 0;
        if (this.currentName !== name) track.currentTime = 0;
        track.play().then(() => console.log('[Music] Playing:', name)).catch(e => console.log('[Music] Blocked:', name, e.message));
        this.current = track;
        this.currentName = name;
        this._fadeIn(track);
    },
    _trackVolume: { village: 0.5 }, // per-track volume multipliers
    _fadeIn(audio) {
        const trackMul = this._trackVolume[this.currentName] || 1.0;
        const target = musicVolume * trackMul;
        const step = () => {
            if (audio.volume < target - 0.02) {
                audio.volume = Math.min(target, audio.volume + 0.02);
                setTimeout(step, 50);
            } else {
                audio.volume = target;
            }
        };
        step();
    },
    fadeOut(audio) {
        const step = () => {
            if (audio.volume > 0.02) {
                audio.volume = Math.max(0, audio.volume - 0.02);
                setTimeout(step, 50);
            } else {
                audio.pause();
                audio.volume = 0;
            }
        };
        step();
    },
    setVolume(v) {
        musicVolume = v;
        if (this.current) this.current.volume = v;
    },
    stop() {
        if (this.current) { this.fadeOut(this.current); this.current = null; this.currentName = null; }
    }
};

function isShieldBlocking(dmgSourceX, dmgSourceZ) {
    if (!(shieldRaised && equippedShield) && !staffShielding) return false;
    // Check if damage comes from the front 180 degrees
    const facing = player.group.rotation.y;
    const dx = dmgSourceX - player.position.x;
    const dz = dmgSourceZ - player.position.z;
    const angleToSource = Math.atan2(dx, dz);
    let diff = angleToSource - facing;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    return Math.abs(diff) < Math.PI / 2; // within 90 degrees left or right of facing
}

function getArmorReduction() {
    let total = 0;
    for (const [slot, item] of Object.entries(armorSlots)) {
        if (!item) continue;
        const tier = item.replace('_helmet','').replace('_chestplate','').replace('_leggings','').replace('_boots','');
        if (ARMOR_TIERS[tier]) total += ARMOR_TIERS[tier][slot];
    }
    return Math.min(total, 8); // cap at 80% reduction
}

function applyArmorDamage(rawDmg) {
    const reduction = getArmorReduction();
    return Math.max(1, Math.round(rawDmg * (1 - reduction / 10)));
}
