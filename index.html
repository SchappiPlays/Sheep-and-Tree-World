<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<title>Sheep and Tree World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: monospace; }
canvas { display: block; }
#debug {
    position: fixed; top: 8px; left: 8px;
    color: rgba(255,255,255,0.6); font-size: 12px;
    pointer-events: none; z-index: 10;
    text-shadow: 1px 1px 2px #000;
    line-height: 1.6;
}
#worldMap {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
}
#worldMap h2 {
    display: none;
}
#mapCanvas { display: block; cursor: grab; border-radius: 6px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
#hotbar {
    position: fixed; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 3px; z-index: 20;
    background: rgba(0,0,0,0.45);
    padding: 4px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
}
.hotbar-slot {
    width: 46px; height: 46px;
    background: rgba(40,40,40,0.6);
    border: 2px solid rgba(120,120,120,0.3);
    border-radius: 4px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
}
.hotbar-slot.selected {
    border-color: rgba(255,255,255,0.85);
    background: rgba(80,80,80,0.5);
}
.hotbar-slot .block-icon {
    width: 26px; height: 26px;
    border-radius: 2px;
    position: relative;
}
.hotbar-slot .block-icon .top-face {
    position: absolute; top: 0; left: 3px;
    width: 20px; height: 10px;
    border-radius: 1px;
}
.hotbar-slot .block-icon .front-face {
    position: absolute; top: 9px; left: 3px;
    width: 20px; height: 17px;
    border-radius: 1px;
}
.hotbar-slot .count {
    position: absolute; bottom: 1px; right: 3px;
    font: bold 10px monospace;
    color: #fff; text-shadow: 1px 1px 1px #000;
}
.hotbar-slot .key-hint {
    position: absolute; top: 1px; left: 3px;
    font: 9px monospace;
    color: rgba(255,255,255,0.35);
}
#inventoryScreen {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 110;
    background: rgba(10,12,10,0.55);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(160,140,100,0.3);
    border-radius: 8px;
    padding: 16px;
    min-width: 420px;
    user-select: none;
}
#inventoryScreen h2 {
    color: rgba(220,200,160,0.85); font: bold 15px monospace;
    text-align: center; margin-bottom: 10px;
}
.inv-section-label {
    color: rgba(180,160,120,0.6); font: 11px monospace;
    margin: 10px 0 4px 2px;
}
.inv-grid {
    display: grid;
    grid-template-columns: repeat(9, 44px);
    gap: 3px;
}
.inv-slot {
    width: 44px; height: 44px;
    background: rgba(40,40,40,0.4);
    border: 2px solid rgba(100,100,100,0.2);
    border-radius: 4px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
}
.inv-slot:hover { border-color: rgba(200,180,120,0.6); background: rgba(60,55,45,0.4); }
.inv-slot.drag-over { border-color: rgba(255,220,100,0.8); background: rgba(80,70,40,0.4); }
.inv-slot .block-icon {
    width: 26px; height: 26px; border-radius: 2px; position: relative;
}
.inv-slot .block-icon .top-face {
    position: absolute; top: 0; left: 3px; width: 20px; height: 10px; border-radius: 1px;
}
.inv-slot .block-icon .front-face {
    position: absolute; top: 9px; left: 3px; width: 20px; height: 17px; border-radius: 1px;
}
.inv-slot .count {
    position: absolute; bottom: 1px; right: 3px;
    font: bold 10px monospace; color: #fff; text-shadow: 1px 1px 1px #000;
}
.inv-slot .slot-label {
    position: absolute; top: 1px; left: 3px;
    font: 9px monospace; color: rgba(255,255,255,0.3);
}
.inv-slot .block-name {
    position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
    font: 9px monospace; color: rgba(200,180,140,0.7); white-space: nowrap;
    display: none;
}
.inv-slot:hover .block-name { display: block; }
.craft-btn:not([disabled]):hover { background: rgba(80,70,40,0.8) !important; border-color: rgba(220,200,120,0.7) !important; }
.craft-row {
    display: flex; align-items: center; gap: 4px; padding: 5px 8px;
    background: rgba(40,35,25,0.4); border: 1px solid rgba(100,90,60,0.25);
    border-radius: 4px; cursor: pointer; font: 11px monospace;
    color: rgba(200,190,160,0.8); transition: background 0.15s;
}
.craft-row:hover:not(.disabled) { background: rgba(70,60,35,0.6); border-color: rgba(180,160,100,0.5); }
.craft-row.disabled { opacity: 0.4; cursor: default; }
.craft-icon { width: 16px; height: 16px; border-radius: 2px; flex-shrink: 0; }
.craft-arrow { color: rgba(180,160,100,0.5); font-size: 13px; }
.craft-cat { color: rgba(160,140,100,0.5); font: bold 10px monospace; margin: 8px 0 3px 2px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; user-select: none; }
.craft-cat:hover { color: rgba(200,180,120,0.7); }
.craft-cat::before { content: '▸ '; font-size: 10px; }
.craft-cat.open::before { content: '▾ '; }
.craft-grid { display: flex; flex-direction: column; gap: 3px; }
.craft-grid.collapsed { display: none; }
#dragGhost {
    position: fixed; pointer-events: none; z-index: 200;
    width: 30px; height: 30px; opacity: 0.85; display: none;
}
#dragGhost .top-face {
    position: absolute; top: 0; left: 3px; width: 24px; height: 12px; border-radius: 1px;
}
#dragGhost .front-face {
    position: absolute; top: 11px; left: 3px; width: 24px; height: 19px; border-radius: 1px;
}
#mainMenu {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,15,10,0.85);
    backdrop-filter: blur(8px);
    z-index: 500; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    overflow-y: auto; padding: 20px 0;
}
#mainMenu h1 {
    color: rgba(220,200,160,0.9); font: bold 36px monospace;
    text-shadow: 0 0 20px rgba(100,180,60,0.3); margin-bottom: 20px;
}
.menu-btn {
    width: 260px; padding: 14px; font: bold 16px monospace;
    background: rgba(40,60,30,0.7); color: rgba(220,210,180,0.9);
    border: 2px solid rgba(120,160,80,0.4); border-radius: 6px;
    cursor: pointer; text-align: center;
}
.menu-btn:hover { background: rgba(60,90,40,0.8); border-color: rgba(160,200,100,0.7); }
.menu-btn:disabled { opacity: 0.4; cursor: default; }
.menu-btn.delete { background: rgba(80,30,30,0.5); border-color: rgba(160,60,60,0.4); font-size: 11px; width: 80px; padding: 6px; }
.menu-btn.delete:hover { background: rgba(120,40,40,0.7); }
.save-slot {
    display: flex; align-items: center; gap: 8px; width: 360px;
    background: rgba(30,40,25,0.5); border: 1px solid rgba(100,120,70,0.3);
    border-radius: 6px; padding: 8px 12px;
}
.save-slot .info { flex: 1; color: rgba(180,170,140,0.8); font: 12px monospace; }
.save-slot .info .name { font-size: 14px; color: rgba(220,210,180,0.9); }
#saveToast {
    position: fixed; top: 12px; right: 12px; padding: 6px 14px;
    background: rgba(40,60,30,0.8); color: rgba(200,190,160,0.8);
    font: 11px monospace; border-radius: 4px; z-index: 50;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
</style>
</head>
<body>
<div id="loadingScreen" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:520;background:rgba(10,15,10,0.95);flex-direction:column;align-items:center;justify-content:center;gap:16px;">
    <h2 style="color:rgba(220,200,160,0.9);font:bold 28px monospace;margin:0;">Loading World...</h2>
    <div style="width:300px;height:8px;background:rgba(40,40,40,0.8);border-radius:4px;overflow:hidden;">
        <div id="loadBar" style="width:0%;height:100%;background:rgba(120,160,80,0.8);border-radius:4px;transition:width 0.2s;"></div>
    </div>
    <div id="loadText" style="color:rgba(180,170,140,0.5);font:11px monospace;">Generating terrain...</div>
</div>
<div id="titleScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:510;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;">
    <canvas id="titleBg" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:-1;"></canvas>
    <h1 style="color:rgba(220,200,160,0.95);font:bold 48px monospace;text-shadow:0 0 30px rgba(100,180,60,0.4),0 2px 8px rgba(0,0,0,0.5);margin:0;">Sheep and Tree World</h1>
    <button class="menu-btn" id="titlePlayBtn" style="width:200px;padding:16px;font-size:18px;font-weight:bold;">Play</button>
    <div style="color:rgba(180,170,140,0.3);font:11px monospace;position:absolute;bottom:16px;">v1.2</div>
</div>
<div id="mainMenu" style="display:none;">
    <h1>Sheep and Tree World</h1>
    <div style="display:flex;gap:30px;align-items:flex-start;">
        <!-- Left: saves + multiplayer -->
        <div style="width:280px;">
            <button class="menu-btn" id="newGameBtn" style="margin-bottom:8px;">New Game</button>
            <div id="savedGames"></div>
            <div style="margin-top:16px;border-top:1px solid rgba(120,160,80,0.3);padding-top:12px;">
                <div style="color:rgba(180,170,140,0.6);font:11px monospace;margin-bottom:8px;">Multiplayer</div>
                <button class="menu-btn" id="hostBtn" style="margin-bottom:6px;">Host Game</button>
                <div style="display:flex;gap:4px;">
                    <input id="joinCode" placeholder="Room code" style="flex:1;padding:10px;font:14px monospace;background:rgba(30,40,25,0.7);color:rgba(220,210,180,0.9);border:2px solid rgba(120,160,80,0.4);border-radius:6px;outline:none;">
                    <button class="menu-btn" id="joinBtn" style="width:80px;">Join</button>
                </div>
                <div id="mpStatus" style="color:rgba(150,200,100,0.7);font:11px monospace;margin-top:6px;min-height:16px;"></div>
            </div>
        </div>
        <!-- Right: character customization + preview -->
        <div style="width:260px;padding:12px;background:rgba(30,40,25,0.6);border:1px solid rgba(120,160,80,0.3);border-radius:8px;margin-left:60px;">
            <div style="color:rgba(180,170,140,0.6);font:bold 11px monospace;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;text-align:center;">Character</div>
            <canvas id="charPreview" width="200" height="250" style="display:block;margin:0 auto 10px;border-radius:6px;background:rgba(20,30,20,0.5);"></canvas>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
                <label style="color:rgba(200,190,160,0.7);font:10px monospace;">Shirt
                    <input type="color" id="ccShirt" value="#4477BB" style="width:100%;height:24px;border:none;border-radius:3px;cursor:pointer;"></label>
                <label style="color:rgba(200,190,160,0.7);font:10px monospace;">Pants
                    <input type="color" id="ccPants" value="#334466" style="width:100%;height:24px;border:none;border-radius:3px;cursor:pointer;"></label>
                <label style="color:rgba(200,190,160,0.7);font:10px monospace;">Skin
                    <input type="color" id="ccSkin" value="#E8B49D" style="width:100%;height:24px;border:none;border-radius:3px;cursor:pointer;"></label>
                <label style="color:rgba(200,190,160,0.7);font:10px monospace;">Hair
                    <input type="color" id="ccHair" value="#3B2507" style="width:100%;height:24px;border:none;border-radius:3px;cursor:pointer;"></label>
                <label style="color:rgba(200,190,160,0.7);font:10px monospace;">Shoes
                    <input type="color" id="ccShoes" value="#332211" style="width:100%;height:24px;border:none;border-radius:3px;cursor:pointer;"></label>
            </div>
            <div style="margin-top:4px;display:flex;align-items:center;gap:6px;">
                <input type="checkbox" id="ccGradientOn" style="accent-color:rgba(120,160,80,0.8);">
                <label for="ccGradientOn" style="color:rgba(200,190,160,0.7);font:10px monospace;cursor:pointer;">Hair Gradient</label>
            </div>
            <div id="ccTipRow" style="display:none;margin-top:2px;">
            <label style="color:rgba(200,190,160,0.7);font:10px monospace;">Hair Tips
                    <input type="color" id="ccHairTip" value="#3B2507" style="width:100%;height:24px;border:none;border-radius:3px;cursor:pointer;"></label>
            </div>
            <div style="margin-top:6px;">
                <label style="color:rgba(200,190,160,0.7);font:10px monospace;">Hairstyle
                    <select id="ccHairStyle" style="width:100%;padding:4px 6px;font:12px monospace;background:rgba(20,30,15,0.7);color:rgba(220,210,180,0.9);border:1px solid rgba(120,160,80,0.4);border-radius:4px;outline:none;margin-top:2px;">
                        <option value="short">Short</option>
                        <option value="flat">Flat Top</option>
                        <option value="long">Long</option>
                        <option value="mohawk">Mohawk</option>
                        <option value="messy">Messy</option>
                        <option value="curly">Curly</option>
                        <option value="ponytail">Ponytail</option>
                        <option value="spiky">Spiky</option>
                        <option value="bowl">Bowl Cut</option>
                        <option value="bald">Bald</option>
                    </select>
                </label>
            </div>
            <div style="margin-top:6px;">
                <label style="color:rgba(200,190,160,0.7);font:10px monospace;">Player Name
                    <input type="text" id="ccName" placeholder="Player" maxlength="16" value="Player" style="width:100%;padding:6px 8px;font:13px monospace;background:rgba(20,30,15,0.7);color:rgba(220,210,180,0.9);border:1px solid rgba(120,160,80,0.4);border-radius:4px;outline:none;margin-top:2px;">
                </label>
            </div>
            <div style="margin-top:6px;">
                <label style="color:rgba(200,190,160,0.7);font:10px monospace;">Height: <span id="ccHeightLabel">1.0</span>x
                    <input type="range" id="ccHeight" min="5" max="15" value="10" style="width:100%;accent-color:rgba(120,160,80,0.8);">
                </label>
            </div>
            <button id="ccResetBtn" style="width:100%;margin-top:8px;padding:6px;font:11px monospace;background:rgba(60,40,30,0.6);color:rgba(200,180,150,0.7);border:1px solid rgba(140,100,70,0.4);border-radius:4px;cursor:pointer;">Reset to Default</button>
        </div>
    </div>
</div>
<div id="saveToast">Saved</div>
<div id="pauseMenu" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:400;flex-direction:column;align-items:center;justify-content:center;gap:10px;">
    <h2 style="color:rgba(220,200,160,0.9);font:bold 24px monospace;margin-bottom:10px;">Paused</h2>
    <button class="menu-btn" id="resumeBtn">Resume</button>
    <button class="menu-btn" id="settingsBtn">Settings</button>
    <button class="menu-btn" id="saveQuitBtn" style="background:rgba(80,40,30,0.7);border-color:rgba(160,80,60,0.5);">Save & Quit</button>
</div>
<div id="settingsMenu" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:410;flex-direction:column;align-items:center;justify-content:center;gap:12px;">
    <h2 style="color:rgba(220,200,160,0.9);font:bold 24px monospace;margin-bottom:10px;">Settings</h2>
    <div style="width:300px;">
        <div style="color:rgba(180,170,140,0.7);font:11px monospace;margin-bottom:4px;">Controls</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="menu-btn" id="controlsNewBtn" style="flex:1;padding:10px;font-size:12px;min-width:80px;" title="Best for combat">Fortnite</button>
            <button class="menu-btn" id="controlsMCBtn" style="flex:1;padding:10px;font-size:12px;min-width:80px;" title="Best for mining">Minecraft</button>
            <button class="menu-btn" id="controlsOldBtn" style="flex:1;padding:10px;font-size:12px;min-width:80px;" title="Can't think of what it's good for">Classic</button>
        </div>
    </div>
    <div style="width:300px;">
        <div style="color:rgba(180,170,140,0.7);font:11px monospace;margin-bottom:4px;">Render Distance: <span id="rdLabel">12</span> chunks</div>
        <input type="range" id="rdSlider" min="6" max="60" value="12" style="width:100%;accent-color:rgba(120,160,80,0.8);">
    </div>
    <div style="width:300px;">
        <div style="color:rgba(180,170,140,0.7);font:11px monospace;margin-bottom:4px;">Mouse Sensitivity: <span id="sensLabel">1.0</span></div>
        <input type="range" id="sensSlider" min="1" max="30" value="10" style="width:100%;accent-color:rgba(120,160,80,0.8);">
    </div>
    <div style="width:300px;">
        <div style="color:rgba(180,170,140,0.7);font:11px monospace;margin-bottom:4px;">Music Volume: <span id="musicVolLabel">50</span>%</div>
        <input type="range" id="musicVolSlider" min="0" max="100" value="50" style="width:100%;accent-color:rgba(120,160,80,0.8);">
    </div>
    <div style="width:300px;">
        <div style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="autoMineSnap" style="accent-color:rgba(120,160,80,0.8);">
            <label for="autoMineSnap" style="color:rgba(180,170,140,0.7);font:11px monospace;cursor:pointer;">Auto 2x2 snap grid when mining underground</label>
        </div>
    </div>
    <div style="width:300px;">
        <div style="color:rgba(180,170,140,0.7);font:11px monospace;margin-bottom:4px;">Keybinds</div>
        <div id="keybindList" style="max-height:200px;overflow-y:auto;background:rgba(20,25,15,0.5);border:1px solid rgba(120,160,80,0.3);border-radius:6px;padding:6px;"></div>
        <button class="menu-btn" id="resetKeybindsBtn" style="width:100%;margin-top:6px;padding:8px;font-size:11px;background:rgba(80,40,30,0.5);border-color:rgba(160,80,60,0.4);">Reset Keybinds to Default</button>
    </div>
    <button class="menu-btn" id="settingsBackBtn" style="margin-top:10px;">Back</button>
</div>
<div id="debug"></div>
<div id="crosshair" style="position:fixed;top:50%;left:50%;pointer-events:none;z-index:10;">
    <div style="position:absolute;width:2px;height:16px;left:-1px;top:-8px;background:rgba(255,255,255,0.6);"></div>
    <div style="position:absolute;width:16px;height:2px;top:-1px;left:-8px;background:rgba(255,255,255,0.6);"></div>
</div>
<div id="hearts" style="position:fixed;top:8px;right:8px;z-index:20;pointer-events:none;display:flex;gap:1px;"></div>
<div id="manaBar" style="position:fixed;top:48px;right:8px;z-index:20;pointer-events:none;display:flex;gap:1px;"></div>
<div id="prompt" style="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.8);font:13px monospace;text-shadow:0 0 6px #000;z-index:15;pointer-events:none;display:none;"></div>
<div id="chatBox" style="position:fixed;bottom:100px;left:10px;z-index:25;width:380px;display:none;pointer-events:none;">
    <div id="chatLog" style="max-height:180px;overflow-y:auto;padding:4px 8px;font:11px monospace;color:rgba(220,210,180,0.9);text-shadow:0 1px 2px rgba(0,0,0,0.8);pointer-events:none;"></div>
    <input type="text" id="chatInput" style="display:none;width:100%;padding:6px 10px;font:12px monospace;background:rgba(0,0,0,0.6);color:rgba(220,210,180,0.95);border:1px solid rgba(120,160,80,0.4);border-radius:4px;outline:none;box-sizing:border-box;pointer-events:auto;" placeholder="Type a message or /command..." maxlength="200">
</div>
<div id="brushPanel" style="position:fixed;bottom:75px;left:8px;z-index:20;background:rgba(0,0,0,0.45);padding:6px 10px;border-radius:6px;font:10px monospace;color:rgba(220,210,180,0.8);display:none;user-select:none;">
    <div style="margin-bottom:3px;font-weight:bold;letter-spacing:1px;">BRUSH <span id="brushLabel">1x1x1</span> <span style="opacity:0.5;margin-left:4px;">[B] size [R] rotate</span></div>
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;">
        <span style="width:36px;">Side:</span><input type="range" id="brushW" min="1" max="2" value="1" style="width:60px;accent-color:rgba(120,160,80,0.8);"><span id="brushWVal">1</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;">
        <span style="width:36px;">Up:</span><input type="range" id="brushH" min="1" max="2" value="1" style="width:60px;accent-color:rgba(120,160,80,0.8);"><span id="brushHVal">1</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px;">
        <span style="width:36px;">Fwd:</span><input type="range" id="brushD" min="1" max="2" value="1" style="width:60px;accent-color:rgba(120,160,80,0.8);"><span id="brushDVal">1</span>
    </div>
</div>
<div id="hotbar"></div>
<div id="inventoryScreen"><h2>Inventory</h2><div id="invContents"></div></div>
<div id="dragGhost"></div>
<div id="worldMap"><h2>World Map</h2><canvas id="mapCanvas" width="600" height="600"></canvas></div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';

"></script>
<script type="module">
import { World, BLOCK_SIZE, BLOCK, BLOCK_COLORS, CHUNK_SIZE, getTerrainHeight, getIslandRadius, getMountainBlend, getNWMountainBlend, getSWMountainBlend, getNEMountainBlend, getSEMountainBlend, getFarEastMountainBlend, getSnowBlend, getDesertBlend, getScorchedBlend, getEnchantedBlend } from './world.js';
import { Player } from './player.js';
import { ChunkManager } from './chunks.js';
import { CreatureManager } from './creatures.js';
import { DragonManager, makeBabyDragon, computeFlap, applyFingerRots, updateWyvernMembrane } from './dragons.js';
import { Multiplayer } from './multiplayer.js';
import { VillageManager, placeVillageInChunk } from './villages.js';

function mix(a, b, t) { return a + (b - a) * t; }

const SKY_COLOR = 0x87CEEB;

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: devicePixelRatio < 1.5 });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.setClearColor(SKY_COLOR);
document.body.appendChild(renderer.domElement);

// ── Scene ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(SKY_COLOR, 0.0008); // lighter fog so far terrain visible

// ── Camera — same FOV as game.html ──
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.05, 5000);

// ── Lighting — same as game.html ──
const ambient = new THREE.AmbientLight(0x667788, 0.5);
scene.add(ambient);
const hemi = new THREE.HemisphereLight(0x6688aa, 0x3a4422, 0.6);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffeedd, 1.5);
sun.position.set(5, 12, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
const shCam = sun.shadow.camera;
shCam.near = 0.5; shCam.far = 60;
shCam.left = -18; shCam.right = 18; shCam.top = 18; shCam.bottom = -18;
scene.add(sun);
scene.add(sun.target);

// ── Sun Sphere in Sky ──
const sunSphere = new THREE.Mesh(
    new THREE.SphereGeometry(40, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xffdd44, fog: false })
);
sunSphere.position.set(400, 600, -300);
scene.add(sunSphere);

// Sun glow (larger transparent sphere)
const sunGlow = new THREE.Mesh(
    new THREE.SphereGeometry(80, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xffcc22, transparent: true, opacity: 0.18, fog: false })
);
sunGlow.position.copy(sunSphere.position);
scene.add(sunGlow);

// ── Clouds ──
const clouds = [];
const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7, fog: false });
const cloudMat2 = new THREE.MeshBasicMaterial({ color: 0xf0f0f0, transparent: true, opacity: 0.5, fog: false });

function makeCloud(x, y, z) {
    const group = new THREE.Group();
    // Each cloud is 3-6 overlapping flattened boxes
    const numParts = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < numParts; i++) {
        const w = 15 + Math.random() * 25;
        const h = 3 + Math.random() * 4;
        const d = 10 + Math.random() * 18;
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = (Math.random() > 0.4) ? cloudMat : cloudMat2;
        const part = new THREE.Mesh(geo, mat);
        part.position.set(
            (Math.random() - 0.5) * 20,
            (Math.random() - 0.5) * 3,
            (Math.random() - 0.5) * 15
        );
        group.add(part);
    }
    group.position.set(x, y, z);
    scene.add(group);
    return { group, baseX: x, baseZ: z, speed: 0.5 + Math.random() * 1.5, drift: (Math.random() - 0.5) * 0.3 };
}

// Spawn clouds in a grid pattern with randomness
for (let i = 0; i < 40; i++) {
    const x = (Math.random() - 0.5) * 2000;
    const z = (Math.random() - 0.5) * 2000;
    const y = 180 + Math.random() * 80;
    clouds.push(makeCloud(x, y, z));
}

function updateClouds(dt) {
    for (const c of clouds) {
        c.group.position.x += c.speed * dt;
        c.group.position.z += c.drift * dt;
        // Wrap around when too far
        if (c.group.position.x > 1200) c.group.position.x -= 2400;
        if (c.group.position.x < -1200) c.group.position.x += 2400;
        if (c.group.position.z > 1200) c.group.position.z -= 2400;
        if (c.group.position.z < -1200) c.group.position.z += 2400;
    }
}

// ── Title Screen 3D Background ──
const titleCanvas = document.getElementById('titleBg');
const titleRenderer = new THREE.WebGLRenderer({ canvas: titleCanvas, antialias: true });
titleRenderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
titleRenderer.setSize(innerWidth, innerHeight);
titleRenderer.setClearColor(SKY_COLOR);
const titleScene = new THREE.Scene();
titleScene.fog = new THREE.FogExp2(SKY_COLOR, 0.003);
const titleCam = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
titleScene.add(new THREE.AmbientLight(0x8899aa, 0.6));
const titleSun = new THREE.DirectionalLight(0xffeedd, 1.2);
titleSun.position.set(5, 12, 8); titleScene.add(titleSun);
titleScene.add(new THREE.HemisphereLight(0x88aacc, 0x446622, 0.5));

// Build voxel terrain from actual game world
{
    const BS = BLOCK_SIZE;
    const step = 3; // sample every 3rd block for performance
    const S = BS * step; // world-space step size
    const range = 250; // world units in each direction (covers hill ring)
    const _hash = (x, z) => { const d = Math.sin(x * 127.1 + z * 311.7 + 42.0) * 43758.5453; return d - Math.floor(d); };
    const _getBiome = (wx, wz) => {
        const snow = getSnowBlend(wz), desert = getDesertBlend(wz), mtn = getMountainBlend(wx,wz), sc = getScorchedBlend(wx,wz);
        if (sc > 0.1) return 'scorched'; if (snow > 0.5) return 'snow'; if (desert > 0.5) return 'desert';
        if (mtn > 0.3) return 'mountain'; if (snow > 0) return 'snow_transition'; if (desert > 0) return 'desert_transition'; return 'grass';
    };

    // Collect block positions by color
    const blocksByColor = {};
    const addBlock = (x, y, z, color) => {
        const hex = color;
        if (!blocksByColor[hex]) blocksByColor[hex] = [];
        blocksByColor[hex].push(x, y, z);
    };

    // Terrain surface blocks
    const gridSize = Math.floor(range / S);
    for (let gx = -gridSize; gx <= gridSize; gx++) {
        for (let gz = -gridSize; gz <= gridSize; gz++) {
            const wx = gx * S, wz = gz * S;
            const h = getTerrainHeight(wx, wz);
            if (h < -0.5) continue;
            const biome = _getBiome(wx, wz);
            let color;
            if (biome === 'scorched') color = 0x2a2018;
            else if (biome === 'snow') color = 0xe0e0e8;
            else if (biome === 'snow_transition') color = 0xb0c8b0;
            else if (biome === 'desert') color = 0xd4c07a;
            else if (biome === 'desert_transition') color = 0xa0a050;
            else if (biome === 'mountain') color = 0x888888;
            else color = 0x5b8c3e; // grass
            addBlock(wx, h, wz, color);
            // Two layers below surface
            const dirt = biome === 'desert' || biome === 'desert_transition' ? 0xd4c07a : 0x8b6b3d;
            addBlock(wx, h - S, wz, dirt);
            addBlock(wx, h - S * 2, wz, 0x888888);
        }
    }

    // Trees — same logic as world.js with full canopy
    const treeRange = Math.floor(range / BS);
    for (let bx = -treeRange; bx <= treeRange; bx += 2) {
        for (let bz = -treeRange; bz <= treeRange; bz += 2) {
            if (_hash(bx * 0.37 + 7777, bz * 0.53 + 3333) > 0.06) continue;
            const jx = bx + Math.floor(_hash(bx+11,bz+22)*2);
            const jz = bz + Math.floor(_hash(bx+33,bz+44)*2);
            const wx = jx * BS, wz = jz * BS;
            const h = getTerrainHeight(wx, wz);
            const biome = _getBiome(wx, wz);
            if (biome !== 'grass' && biome !== 'desert_transition') continue;
            if (h < 1 || h > 35) continue;
            const trunkH = 4 + Math.floor(_hash(jx*1.7, jz*2.3) * 4);
            const canopyR = 2 + Math.floor(_hash(jx*3.1, jz*1.9) * 2);
            const canopyHH = canopyR * 2 + 1;
            // Trunk
            for (let ty = 1; ty <= trunkH; ty++) {
                addBlock(wx, h + ty * BS, wz, 0x6B4226);
            }
            // Canopy
            const canopyBase = h + (trunkH - 1) * BS;
            for (let dy = 0; dy < canopyHH; dy++) {
                const progress = dy / (canopyHH - 1);
                const r = Math.ceil(canopyR * (1 - progress * 0.7));
                for (let ddx = -r; ddx <= r; ddx++) {
                    for (let ddz = -r; ddz <= r; ddz++) {
                        if (ddx*ddx + ddz*ddz > r*r+1) continue;
                        addBlock(wx + ddx * BS, canopyBase + dy * BS, wz + ddz * BS, 0x2d7d2d);
                    }
                }
            }
        }
    }

    // Merge all blocks into one geometry with vertex colors for performance
    const totalBlocks = Object.values(blocksByColor).reduce((s, a) => s + a.length / 3, 0);
    const mergedPos = new Float32Array(totalBlocks * 24 * 3); // 24 verts per box
    const mergedNorm = new Float32Array(totalBlocks * 24 * 3);
    const mergedCol = new Float32Array(totalBlocks * 24 * 3);
    const mergedIdx = [];
    const tmpGeo = new THREE.BoxGeometry(S, S, S);
    const tmpPos = tmpGeo.attributes.position.array;
    const tmpNorm = tmpGeo.attributes.normal.array;
    const tmpIdx = tmpGeo.index.array;
    let vertOff = 0, idxOff = 0;
    for (const [hex, positions] of Object.entries(blocksByColor)) {
        const c = new THREE.Color(parseInt(hex));
        const count = positions.length / 3;
        for (let i = 0; i < count; i++) {
            const ox = positions[i*3], oy = positions[i*3+1], oz = positions[i*3+2];
            for (let v = 0; v < 24; v++) {
                const vi = vertOff * 3 + v * 3;
                mergedPos[vi] = tmpPos[v*3] + ox;
                mergedPos[vi+1] = tmpPos[v*3+1] + oy;
                mergedPos[vi+2] = tmpPos[v*3+2] + oz;
                mergedNorm[vi] = tmpNorm[v*3];
                mergedNorm[vi+1] = tmpNorm[v*3+1];
                mergedNorm[vi+2] = tmpNorm[v*3+2];
                mergedCol[vi] = c.r; mergedCol[vi+1] = c.g; mergedCol[vi+2] = c.b;
            }
            for (let j = 0; j < tmpIdx.length; j++) {
                mergedIdx.push(tmpIdx[j] + vertOff);
            }
            vertOff += 24;
        }
    }
    const mergedGeo = new THREE.BufferGeometry();
    mergedGeo.setAttribute('position', new THREE.Float32BufferAttribute(mergedPos, 3));
    mergedGeo.setAttribute('normal', new THREE.Float32BufferAttribute(mergedNorm, 3));
    mergedGeo.setAttribute('color', new THREE.Float32BufferAttribute(mergedCol, 3));
    mergedGeo.setIndex(mergedIdx);
    const mergedMat = new THREE.MeshStandardMaterial({ vertexColors: true });
    titleScene.add(new THREE.Mesh(mergedGeo, mergedMat));

    // Water plane
    const waterGeo = new THREE.PlaneGeometry(range * 3, range * 3);
    waterGeo.rotateX(-Math.PI / 2);
    const waterMat = new THREE.MeshStandardMaterial({ color: 0x3a7ab5, transparent: true, opacity: 0.5 });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.position.y = 0.2;
    titleScene.add(water);

    // Gate structures matching in-game gates
    const darkStoneMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3e, roughness: 0.8 });
    const hillCX = -30, hillCZ = -190;
    // [gateX, gateZ, axis, innerOffsetX, innerOffsetZ] — inner offset points toward hill ring center
    const _gateData = [
        [-140, -190, 'z', 15, 0],   // west, inner = east
        [80, -190, 'z', -15, 0],     // east, inner = west
        [-30, -300, 'x', 0, 15],     // north, inner = south
        [-30, -80, 'x', 0, -15],     // south, inner = north
    ];
    for (const [gx, gz, axis, iox, ioz] of _gateData) {
        const gy = getTerrainHeight(gx, gz);
        const halfGap = 12;
        const tR = 3; // tower size
        // Two towers
        for (const side of [-1, 1]) {
            const tx = axis === 'z' ? gx : gx + side * halfGap;
            const tz = axis === 'z' ? gz + side * halfGap : gz;
            // Tower base
            const tower = new THREE.Mesh(new THREE.BoxGeometry(tR*2, 14, tR*2), darkStoneMat);
            tower.position.set(tx, gy + 7, tz); titleScene.add(tower);
            // Tower top (crenellations)
            const top = new THREE.Mesh(new THREE.BoxGeometry(tR*2.2, 1, tR*2.2), darkStoneMat);
            top.position.set(tx, gy + 14.5, tz); titleScene.add(top);
        }
        // Wall sections between towers and gate
        for (const side of [-1, 1]) {
            for (let w = tR + 1; w < halfGap - 2; w += 2) {
                const wx = axis === 'z' ? gx : gx + side * w;
                const wz = axis === 'z' ? gz + side * w : gz;
                const wall = new THREE.Mesh(new THREE.BoxGeometry(axis === 'z' ? 2 : S, 9, axis === 'z' ? S : 2), darkStoneMat);
                wall.position.set(wx, gy + 4.5, wz); titleScene.add(wall);
            }
        }
        // Arch over gate
        const archW = axis === 'z' ? 2 : 6;
        const archD = axis === 'z' ? 6 : 2;
        const arch = new THREE.Mesh(new THREE.BoxGeometry(archW, 3, archD), darkStoneMat);
        arch.position.set(gx, gy + 9.5, gz); titleScene.add(arch);
        // Walkway on top
        const walkW = axis === 'z' ? 3 : halfGap * 2;
        const walkD = axis === 'z' ? halfGap * 2 : 3;
        const walk = new THREE.Mesh(new THREE.BoxGeometry(walkW, 1, walkD), darkStoneMat);
        walk.position.set(gx, gy + 9, gz); titleScene.add(walk);
        // Walls extending into hillside
        for (let ext = halfGap + tR; ext < halfGap + 15; ext += 2) {
            for (const side of [-1, 1]) {
                const ex = axis === 'z' ? gx : gx + side * ext;
                const ez = axis === 'z' ? gz + side * ext : gz;
                const ew = new THREE.Mesh(new THREE.BoxGeometry(axis === 'z' ? 2 : S, 7, axis === 'z' ? S : 2), darkStoneMat);
                ew.position.set(ex, gy + 3.5, ez); titleScene.add(ew);
            }
        }
    }

    // Boss figures — positioned on INNER side of each gate
    // Colossus (west gate, inner = east of gate)
    const colBX = -140 + 15, colBZ = -190;
    const colBY = getTerrainHeight(colBX, colBZ);
    const colFig = new THREE.Mesh(new THREE.BoxGeometry(3.5, 9, 3.5), new THREE.MeshStandardMaterial({ color: 0x777777 }));
    colFig.position.set(colBX, colBY + 4.5, colBZ); titleScene.add(colFig);
    const colDirt = new THREE.Mesh(new THREE.BoxGeometry(3.6, 3, 3.6), new THREE.MeshStandardMaterial({ color: 0x8b6b3d }));
    colDirt.position.set(colBX, colBY + 7, colBZ); titleScene.add(colDirt);
    const colGrass = new THREE.Mesh(new THREE.BoxGeometry(3.4, 1, 3.4), new THREE.MeshStandardMaterial({ color: 0x5b8c3e }));
    colGrass.position.set(colBX, colBY + 9, colBZ); titleScene.add(colGrass);
    const colHead = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), new THREE.MeshStandardMaterial({ color: 0x777777 }));
    colHead.position.set(colBX, colBY + 11, colBZ); titleScene.add(colHead);

    // Skeleton (east gate, inner = west of gate)
    const skBX = 80 - 15, skBZ = -190;
    const skBY = getTerrainHeight(skBX, skBZ);
    const skelFig = new THREE.Mesh(new THREE.BoxGeometry(1.8, 8, 1.2), new THREE.MeshStandardMaterial({ color: 0xd8d0c0 }));
    skelFig.position.set(skBX, skBY + 4, skBZ); titleScene.add(skelFig);
    const skelHead = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.8, 1.8), new THREE.MeshStandardMaterial({ color: 0xd8d0c0 }));
    skelHead.position.set(skBX, skBY + 9.5, skBZ); titleScene.add(skelHead);
    for (const sx of [-0.5, 0.5]) {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.3, 4, 4), new THREE.MeshBasicMaterial({ color: 0xff2222 }));
        eye.position.set(skBX + sx, skBY + 9.6, skBZ + 1); titleScene.add(eye);
    }

    // Dark Knight (north gate, inner = south of gate)
    const dkBX = -30, dkBZ = -300 + 15;
    const dkBY = getTerrainHeight(dkBX, dkBZ);
    const dkFig = new THREE.Mesh(new THREE.BoxGeometry(1.5, 5, 1), new THREE.MeshStandardMaterial({ color: 0x1a1a2a }));
    dkFig.position.set(dkBX, dkBY + 2.5, dkBZ); titleScene.add(dkFig);
    const dkHead = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({ color: 0x88ffff }));
    dkHead.position.set(dkBX, dkBY + 5.6, dkBZ); titleScene.add(dkHead);
    // Diamond armor glint
    const dkChest = new THREE.Mesh(new THREE.BoxGeometry(1.6, 4, 0.3), new THREE.MeshStandardMaterial({ color: 0x88ffff, metalness: 0.3, roughness: 0.2 }));
    dkChest.position.set(dkBX, dkBY + 2.5, dkBZ + 0.6); titleScene.add(dkChest);

    // Hobgoblin (south gate, inner = north of gate)
    const hgBX = -30, hgBZ = -80 - 15;
    const hgBY = getTerrainHeight(hgBX, hgBZ);
    const hobFig = new THREE.Mesh(new THREE.BoxGeometry(2, 4.5, 1.8), new THREE.MeshStandardMaterial({ color: 0x3a5a1a }));
    hobFig.position.set(hgBX, hgBY + 2.3, hgBZ); titleScene.add(hobFig);
    const hobHead = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({ color: 0x4a6a2a }));
    hobHead.position.set(hgBX, hgBY + 5.3, hgBZ); titleScene.add(hobHead);
    const hobHelm = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 1.6), new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.5 }));
    hobHelm.position.set(hgBX, hgBY + 6.2, hgBZ); titleScene.add(hobHelm);
    for (let gi = 0; gi < 5; gi++) {
        const ga = (gi / 5) * Math.PI * 2;
        const ggx = hgBX + Math.cos(ga) * 6, ggz = hgBZ + Math.sin(ga) * 6;
        const gob = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2, 0.6), new THREE.MeshStandardMaterial({ color: 0x4a6a2a }));
        gob.position.set(ggx, getTerrainHeight(ggx, ggz) + 1, ggz); titleScene.add(gob);
    }
}

let titleActive = true;
let titleAngle = 0;
function animateTitle() {
    if (!titleActive) return;
    requestAnimationFrame(animateTitle);
    titleAngle += 0.0015;
    const r = 180, h = 70;
    // Orbit around the hill ring center (-30, -190)
    titleCam.position.set(-30 + Math.sin(titleAngle) * r, h + Math.sin(titleAngle * 0.7) * 10, -190 + Math.cos(titleAngle) * r);
    titleCam.lookAt(-30, 5, -190);
    titleRenderer.render(titleScene, titleCam);
}
animateTitle();

    document.getElementById('titleScreen').style.display = 'none';

// ── Far Terrain — merged block mesh of entire world (same style as title screen) ──
let farTerrain = null, farWater = null;
let _farCenterX = 0, _farCenterZ = 0; // track where skip zone is centered

function buildFarTerrain(centerX, centerZ) {
    if (farTerrain) { scene.remove(farTerrain); farTerrain.geometry.dispose(); scene.remove(farWater); farWater.geometry.dispose(); }
    _farCenterX = centerX || 0;
    _farCenterZ = centerZ || 0;
    const BS = BLOCK_SIZE;
    const range = 1200;
    const step = 6;
    const S = BS * step;
    const halfS = S * 0.5;
    const skipRange = 100;
    const gridSize = Math.ceil(range / S);
    // Skip grid is relative to the center position
    const skipCGX = Math.round(_farCenterX / S);
    const skipCGZ = Math.round(_farCenterZ / S);
    const w = gridSize * 2 + 1;

    // Pre-compute snapped height grid for fast neighbor lookups
    const hGrid = new Float32Array(w * w);
    for (let gx = -gridSize; gx <= gridSize; gx++) {
        for (let gz = -gridSize; gz <= gridSize; gz++) {
            const h = getTerrainHeight(gx * S, gz * S);
            hGrid[(gx + gridSize) * w + (gz + gridSize)] = Math.floor(Math.max(h, -0.3) / BS) * BS;
        }
    }
    const gH = (gx, gz) => {
        if (gx < -gridSize || gx > gridSize || gz < -gridSize || gz > gridSize) return -10;
        return hGrid[(gx + gridSize) * w + (gz + gridSize)];
    };

    // Estimate max faces: each cell = 1 top + up to 4 sides + tree (up to 10 faces) = 15 max
    const skipGrid = Math.floor(skipRange / S);
    const cellCount = w * w - (skipGrid * 2 + 1) * (skipGrid * 2 + 1);
    const maxFaces = cellCount * 15;
    const posArr = new Float32Array(maxFaces * 12); // 4 verts × 3 components
    const colArr = new Float32Array(maxFaces * 12);
    const idxArr = new Uint32Array(maxFaces * 6);   // 2 tris × 3 indices
    let vi = 0, ii = 0; // vertex index, index index

    const _c = new THREE.Color();
    const pushFace = (x0,y0,z0, x1,y1,z1, x2,y2,z2, x3,y3,z3, hex) => {
        _c.set(hex);
        const p = vi * 3;
        posArr[p]=x0; posArr[p+1]=y0; posArr[p+2]=z0;
        posArr[p+3]=x1; posArr[p+4]=y1; posArr[p+5]=z1;
        posArr[p+6]=x2; posArr[p+7]=y2; posArr[p+8]=z2;
        posArr[p+9]=x3; posArr[p+10]=y3; posArr[p+11]=z3;
        for (let i = 0; i < 4; i++) {
            colArr[p + i*3] = _c.r; colArr[p + i*3+1] = _c.g; colArr[p + i*3+2] = _c.b;
        }
        idxArr[ii]=vi; idxArr[ii+1]=vi+1; idxArr[ii+2]=vi+2;
        idxArr[ii+3]=vi; idxArr[ii+4]=vi+2; idxArr[ii+5]=vi+3;
        vi += 4; ii += 6;
    };

    for (let gx = -gridSize; gx <= gridSize; gx++) {
        for (let gz = -gridSize; gz <= gridSize; gz++) {
            if (Math.abs(gx - skipCGX) <= skipGrid && Math.abs(gz - skipCGZ) <= skipGrid) continue;
            const wx = gx * S, wz = gz * S;
            const snapH = gH(gx, gz);
            const top = snapH + BS;

            // Biome color
            const snow = getSnowBlend(wz), desert = getDesertBlend(wz);
            const mtn = getMountainBlend(wx, wz), scorched = getScorchedBlend(wx, wz);
            let hex;
            if (scorched > 0.3) hex = 0x2a2018;
            else if (snow > 0.5) hex = 0xe0e0e8;
            else if (snow > 0) hex = 0xb0c8b0;
            else if (desert > 0.5) hex = 0xd4c07a;
            else if (desert > 0) hex = 0xa0a050;
            else if (mtn > 0.5) hex = 0x888888;
            else if (mtn > 0.1) hex = 0x6a8a5a;
            else hex = 0x5b8c3e;

            // Top face
            pushFace(
                wx-halfS, top, wz-halfS,
                wx-halfS, top, wz+halfS,
                wx+halfS, top, wz+halfS,
                wx+halfS, top, wz-halfS, hex
            );

            // Side faces where neighbor is lower
            const sideHex = 0x8b6b3d;
            // +X
            const hpx = gH(gx+1, gz) + BS;
            if (hpx < top) pushFace(wx+halfS,top,wz+halfS, wx+halfS,top,wz-halfS, wx+halfS,hpx,wz-halfS, wx+halfS,hpx,wz+halfS, (top-hpx>S*2)?sideHex:hex);
            // -X
            const hmx = gH(gx-1, gz) + BS;
            if (hmx < top) pushFace(wx-halfS,top,wz-halfS, wx-halfS,top,wz+halfS, wx-halfS,hmx,wz+halfS, wx-halfS,hmx,wz-halfS, (top-hmx>S*2)?sideHex:hex);
            // +Z
            const hpz = gH(gx, gz+1) + BS;
            if (hpz < top) pushFace(wx-halfS,top,wz+halfS, wx+halfS,top,wz+halfS, wx+halfS,hpz,wz+halfS, wx-halfS,hpz,wz+halfS, (top-hpz>S*2)?sideHex:hex);
            // -Z
            const hmz = gH(gx, gz-1) + BS;
            if (hmz < top) pushFace(wx+halfS,top,wz-halfS, wx-halfS,top,wz-halfS, wx-halfS,hmz,wz-halfS, wx+halfS,hmz,wz-halfS, (top-hmz>S*2)?sideHex:hex);

            // LOD trees — match actual biome check (all mountain blends summed)
            const allMtn = mtn + getNWMountainBlend(wx,wz) + getSWMountainBlend(wx,wz) + getNEMountainBlend(wx,wz) + getSEMountainBlend(wx,wz) + getFarEastMountainBlend(wx,wz);
            const rawH = getTerrainHeight(wx, wz);
            if (scorched < 0.1 && snow < 0.5 && desert < 0.5 && allMtn < 0.3 && rawH >= 1 && rawH <= 35) {
                const th = Math.sin(gx * 127.1 + gz * 311.7) * 43758.5453;
                const treeChance = th - Math.floor(th);
                if (treeChance < 0.18) {
                    const trunkH = BS * 5;   // ~2.4 world units (real trees 4-8 blocks)
                    const leafR = BS * 2.5;  // ~1.2 world units canopy radius
                    const trunkR = BS * 0.5; // ~0.24 world units trunk radius
                    const trunkCol = 0x5a3a1a;
                    const leafCol = (treeChance < 0.06) ? 0x2d6b1e : (treeChance < 0.12) ? 0x3a8a2a : 0x4a9a3a;
                    const tBase = top;

                    // Trunk — 4 side faces
                    pushFace(wx-trunkR, tBase+trunkH, wz-trunkR, wx-trunkR, tBase, wz-trunkR, wx-trunkR, tBase, wz+trunkR, wx-trunkR, tBase+trunkH, wz+trunkR, trunkCol);
                    pushFace(wx+trunkR, tBase+trunkH, wz+trunkR, wx+trunkR, tBase, wz+trunkR, wx+trunkR, tBase, wz-trunkR, wx+trunkR, tBase+trunkH, wz-trunkR, trunkCol);
                    pushFace(wx-trunkR, tBase+trunkH, wz+trunkR, wx-trunkR, tBase, wz+trunkR, wx+trunkR, tBase, wz+trunkR, wx+trunkR, tBase+trunkH, wz+trunkR, trunkCol);
                    pushFace(wx+trunkR, tBase+trunkH, wz-trunkR, wx+trunkR, tBase, wz-trunkR, wx-trunkR, tBase, wz-trunkR, wx-trunkR, tBase+trunkH, wz-trunkR, trunkCol);

                    // Leaves — blocky canopy (top + 4 sides)
                    const lBase = tBase + trunkH - BS * 1.5;
                    const lTop = lBase + BS * 5;
                    pushFace(wx-leafR, lTop, wz-leafR, wx-leafR, lTop, wz+leafR, wx+leafR, lTop, wz+leafR, wx+leafR, lTop, wz-leafR, leafCol);
                    pushFace(wx-leafR, lTop, wz-leafR, wx-leafR, lBase, wz-leafR, wx-leafR, lBase, wz+leafR, wx-leafR, lTop, wz+leafR, leafCol);
                    pushFace(wx+leafR, lTop, wz+leafR, wx+leafR, lBase, wz+leafR, wx+leafR, lBase, wz-leafR, wx+leafR, lTop, wz-leafR, leafCol);
                    pushFace(wx-leafR, lTop, wz+leafR, wx-leafR, lBase, wz+leafR, wx+leafR, lBase, wz+leafR, wx+leafR, lTop, wz+leafR, leafCol);
                    pushFace(wx+leafR, lTop, wz-leafR, wx+leafR, lBase, wz-leafR, wx-leafR, lBase, wz-leafR, wx-leafR, lTop, wz-leafR, leafCol);
                }
            }
        }
    }

    // Trim to actual used size
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(posArr.subarray(0, vi * 3), 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colArr.subarray(0, vi * 3), 3));
    geo.setIndex(new THREE.BufferAttribute(idxArr.subarray(0, ii), 1));
    geo.computeVertexNormals();
    farTerrain = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ vertexColors: true, side: THREE.DoubleSide }));
    farTerrain.position.y = 0;
    farTerrain.renderOrder = -1; // render before chunks so chunks cover it
    scene.add(farTerrain);

    // Water plane with center hole centered on player
    const holeR = skipRange + 10;
    const hcx = _farCenterX, hcz = _farCenterZ;
    const outerR = range * 1.5;
    const waterShape = new THREE.Shape();
    waterShape.moveTo(-outerR, -outerR);
    waterShape.lineTo(outerR, -outerR);
    waterShape.lineTo(outerR, outerR);
    waterShape.lineTo(-outerR, outerR);
    waterShape.lineTo(-outerR, -outerR);
    const hole = new THREE.Path();
    hole.moveTo(hcx - holeR, hcz - holeR);
    hole.lineTo(hcx - holeR, hcz + holeR);
    hole.lineTo(hcx + holeR, hcz + holeR);
    hole.lineTo(hcx + holeR, hcz - holeR);
    hole.lineTo(hcx - holeR, hcz - holeR);
    waterShape.holes.push(hole);
    const farWaterGeo = new THREE.ShapeGeometry(waterShape);
    farWaterGeo.rotateX(-Math.PI / 2);
    farWater = new THREE.Mesh(farWaterGeo, new THREE.MeshStandardMaterial({ color: 0x3a7ab5, transparent: true, opacity: 0.5 }));
    farWater.position.y = -0.3;
    farWater.renderOrder = -2;
    scene.add(farWater);
}

// ── Save/Load System (IndexedDB for large storage) ──
const SAVE_KEY = 'satw_saves';
const DB_NAME = 'SatwSaves';
const DB_STORE = 'saves';
let _savesCache = {}; // in-memory cache, synced with IndexedDB

function _openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => { req.result.createObjectStore(DB_STORE); };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function _loadAllSaves() {
    try {
        const db = await _openDB();
        return new Promise((resolve) => {
            const tx = db.transaction(DB_STORE, 'readonly');
            const store = tx.objectStore(DB_STORE);
            const req = store.get('all');
            req.onsuccess = () => {
                _savesCache = req.result || {};
                // Migrate from localStorage if IndexedDB is empty
                if (Object.keys(_savesCache).length === 0) {
                    try {
                        const old = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}');
                        if (Object.keys(old).length > 0) {
                            _savesCache = old;
                            _persistSaves(); // move to IndexedDB
                            localStorage.removeItem(SAVE_KEY); // free up localStorage
                        }
                    } catch(e) {}
                }
                resolve(_savesCache);
            };
            req.onerror = () => resolve({});
        });
    } catch(e) {
        // Fallback to localStorage
        try { _savesCache = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); } catch { _savesCache = {}; }
        return _savesCache;
    }
}

async function _persistSaves() {
    try {
        const db = await _openDB();
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put(_savesCache, 'all');
    } catch(e) {
        // Fallback to localStorage (may fail if too large)
        try { localStorage.setItem(SAVE_KEY, JSON.stringify(_savesCache)); } catch(e2) { console.warn('Save failed:', e2); }
    }
}

function getSaves() { return _savesCache; }

function collectSaveData() {
    return {
        time: Date.now(),
        player: { x: player.position.x, y: player.position.y, z: player.position.z, ry: player.group.rotation.y },
        inventory: JSON.parse(JSON.stringify(inventory)),
        hotbarSlots: [...hotbarSlots],
        selectedSlot,
        armorSlots: JSON.parse(JSON.stringify(armorSlots)),
        equippedShield,
        playerHP, playerMaxHP, playerMana, playerMaxMana, staffDamageDealt,
        killedBosses: [...killedBosses],
        customSwords: window._customSwords ? JSON.parse(JSON.stringify(window._customSwords)) : {},
        customStaffs: window._customStaffs ? JSON.parse(JSON.stringify(window._customStaffs)) : {},
        eggItems: JSON.parse(JSON.stringify(eggItems)),
        modifiedBlocks: world._modifiedBlocks ? Object.fromEntries(world._modifiedBlocks) : {},
        dragons: dragonMgr.dragons.filter(bd => !bd._fortressGuardian).map(bd => ({
            x: bd.x, z: bd.z, age: bd.age, angle: bd.angle,
            eggColor: bd.eggColor, wingColor: bd.wingColor, isWyvern: bd.isWyvern,
            dragonName: bd.dragonName, hp: bd.hp,
        })),
        pickedUpEggs: dragonMgr.eggs.filter(e => e.pickedUp).map((e, i) => dragonMgr.eggs.indexOf(e)),
        chests: JSON.parse(JSON.stringify(chestData)),
    };
}

function saveGame(slotName) {
    _savesCache[slotName] = collectSaveData();
    _persistSaves();
}

function showToast(msg) {
    const t = document.getElementById('saveToast');
    t.textContent = msg; t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 1500);
}

const mainMenuEl = document.getElementById('mainMenu');
let gameStarted = false;

function updateMenuUI() {
    const saves = getSaves();
    const keys = Object.keys(saves);
    let html = '';
    if (keys.length > 0) {
        html += '<div style="color:rgba(180,170,140,0.6);font:11px monospace;margin:8px 0 4px;">Saved Games:</div>';
        for (const name of keys) {
            const s = saves[name];
            const date = new Date(s.time).toLocaleString();
            html += `<div class="save-slot">
                <div class="info"><div class="name">${name}</div>${date}</div>
                <button class="menu-btn" style="width:80px;padding:8px;font-size:13px;" data-load="${name}">Load</button>
                <button class="menu-btn delete" data-delete="${name}">Delete</button>
            </div>`;
        }
    }
    document.getElementById('savedGames').innerHTML = html;
    document.querySelectorAll('[data-load]').forEach(btn => {
        btn.addEventListener('click', () => startGame(btn.dataset.load));
    });
    document.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => {
            delete _savesCache[btn.dataset.delete];
            _persistSaves();
            updateMenuUI();
        });
    });
}

// ── World (created once, reset on new game) ──
let world, chunkManager, creatures, dragonMgr, player, villageMgr;
const mp = new Multiplayer(scene);

function startGame(loadSlotName) {
    mainMenuEl.style.display = 'none';
    previewRunning = false;
    gameStarted = true;
    // Prevent autosave from overwriting wrong slot during startup
    _autosaveTimer = 0;
    if (!loadSlotName) {
        // Generate unique save name immediately so autosave doesn't use old name
        const existingSaves = getSaves();
        let n = 1;
        while (existingSaves['Save ' + n]) n++;
        _currentSaveName = 'Save ' + n;
    }
    // Stop menu music, then start calm after fade
    if (musicSystem.current) {
        musicSystem.fadeOut(musicSystem.current);
        musicSystem.currentName = null;
        musicSystem.current = null;
        setTimeout(() => musicSystem.play('calm'), 1200);
    } else {
        musicSystem.play('calm');
    }

    // Clean up previous game if any
    if (world) {
        while (scene.children.length > 0) scene.remove(scene.children[0]);
        scene.add(ambient); scene.add(hemi); scene.add(sun); scene.add(sun.target);
    }
    // Clear anvil and campfire models
    for (const [k, m] of anvilModels) scene.remove(m);
    anvilModels.clear();
    for (const [k, m] of campfireModels) scene.remove(m);
    campfireModels.clear();

    world = new World();
    if (!world._modifiedBlocks) world._modifiedBlocks = new Map();
    chunkManager = new ChunkManager(scene, world);
    chunkManager.setRenderDist(settingsRenderDist);
    creatures = new CreatureManager(scene, world);
    creatures._onCreatureDrop = (item, count) => {
        for (let i = 0; i < count; i++) addToInventory(item);
        refreshUI();
    };
    creatures._onPlayerHit = (dmg, type, srcX, srcZ) => {
        // Check shield block
        if (srcX !== undefined && isShieldBlocking(srcX, srcZ)) {
            // Blocked! Flash blue instead
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(100,150,255,0.15);z-index:50;pointer-events:none;';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 100);
            return;
        }
        playerHP = Math.max(0, playerHP - applyArmorDamage(dmg));
        updateHeartsUI();
        const flash = document.createElement('div');
        flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(200,0,0,0.2);z-index:50;pointer-events:none;';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 150);
    };
    villageMgr = new VillageManager(scene, world);
    world._placeVillages = placeVillageInChunk;

    // ── Giant Ruined Fortress at (-505, -175) ──
    buildFarTerrain(0, 0);
    buildRuinedFortress(world);
    buildForestGate(world, -140, -190, 'z', false);   // west gate (intact)
    buildForestGate(world, 80, -190, 'z', true);       // east gate (half shattered)
    buildForestGate(world, -30, -300, 'x', false);     // north gate (intact)
    buildForestGate(world, -30, -80, 'x', false);      // south gate (intact)
    buildForestRuins(world);

    function buildRuinedFortress(w) {
        const BS = BLOCK_SIZE;
        const yOff = 128;
        const centerX = Math.round(-505 / BS);
        const centerZ = Math.round(-175 / BS);
        const groundY = Math.floor(getTerrainHeight(-505, -175) / BS) + yOff;
        const S = BLOCK.DARK_STONE, G = BLOCK.GRAVEL, P = BLOCK.PLANKS, A = BLOCK.AIR, D = BLOCK.DIRT;
        const hash = (x, z) => { const d = Math.sin(x * 127.1 + z * 311.7 + 42.0) * 43758.5453; return d - Math.floor(d); };

        const _placeBlock = (bx, by, bz, block) => {
            if (by < 0 || by >= 256) return;
            w._modifiedBlocks.set(bx + ',' + by + ',' + bz, block);
            const mcx = Math.floor(bx / CHUNK_SIZE), mcz = Math.floor(bz / CHUNK_SIZE);
            const mlx = ((bx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
            const mlz = ((bz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
            const ck = mcx + ',' + mcz;
            if (!w._modsByChunk) w._modsByChunk = new Map();
            if (!w._modsByChunk.has(ck)) w._modsByChunk.set(ck, []);
            w._modsByChunk.get(ck).push({ lx: mlx, y: by, lz: mlz, block });
        };
        const rb = (bx, by, bz, block, ruinChance) => {
            if (ruinChance && hash(bx * 7 + by * 13, bz * 11 + by * 3) < ruinChance) return;
            _placeBlock(bx, by, bz, block);
        };
        const box = (x0, y0, z0, x1, y1, z1, block, ruin) => {
            for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++) for (let z = z0; z <= z1; z++) rb(x, y, z, block, ruin);
        };
        const room = (x0, y0, z0, rw, rd, rh, wb, ruin) => {
            const x1 = x0+rw-1, z1 = z0+rd-1, y1 = y0+rh-1;
            box(x0, y0, z0, x1, y0, z1, wb, ruin*0.3);
            box(x0, y1, z0, x1, y1, z1, wb, ruin);
            box(x0, y0, z0, x0, y1, z1, wb, ruin);
            box(x1, y0, z0, x1, y1, z1, wb, ruin);
            box(x0, y0, z0, x1, y1, z0, wb, ruin);
            box(x0, y0, z1, x1, y1, z1, wb, ruin);
            box(x0+1, y0+1, z0+1, x1-1, y1-1, z1-1, A, 0);
        };
        const tower = (tx, tz, r, h, ruin) => {
            for (let y = 0; y < h; y++) for (let dx = -r; dx <= r; dx++) for (let dz = -r; dz <= r; dz++) {
                if (dx*dx+dz*dz > r*r+1) continue;
                const isWall = dx*dx+dz*dz > (r-1)*(r-1);
                if (isWall) rb(tx+dx, groundY+y, tz+dz, S, ruin + y*0.005);
                else if (y === 0 || y % 6 === 0 || y === h-1) rb(tx+dx, groundY+y, tz+dz, S, ruin*0.5);
                else rb(tx+dx, groundY+y, tz+dz, A, 0);
            }
            for (let dx = -r; dx <= r; dx++) for (let dz = -r; dz <= r; dz++) {
                if (dx*dx+dz*dz > r*r+1 || dx*dx+dz*dz < (r-1)*(r-1)) continue;
                if ((dx+dz)%2===0) rb(tx+dx, groundY+h, tz+dz, S, ruin+0.15);
            }
            // Spiral stairs
            for (let sy = 0; sy < h-1; sy++) {
                const a = sy * 0.7;
                rb(tx+Math.round(Math.cos(a)*(r-2)), groundY+sy+1, tz+Math.round(Math.sin(a)*(r-2)), S, ruin*0.3);
            }
        };
        const door = (x, y0, z, dw, dh, axis) => {
            for (let dy = 0; dy < dh; dy++) {
                if (axis === 'x') for (let dz = 0; dz < dw; dz++) _placeBlock(x, y0+dy, z+dz, A);
                else for (let dx = 0; dx < dw; dx++) _placeBlock(x+dx, y0+dy, z, A);
            }
        };
        const wall = (x0, y0, z0, x1, y1, z1, ruin) => box(x0, y0, z0, x1, y1, z1, S, ruin);
        const cx = centerX, cz = centerZ, gy = groundY;
        const R = 0.01;
        const OW = 40; // half-width (80x80 footprint)

        // === FLATTEN GROUND ===
        for (let x = cx-OW-6; x <= cx+OW+6; x++) for (let z = cz-OW-6; z <= cz+OW+6; z++) {
            _placeBlock(x, gy, z, S);
            for (let dy = 1; dy <= 2; dy++) _placeBlock(x, gy-dy, z, D);
        }

        // === OUTER WALLS (80x80, 12 high, 2 thick) ===
        wall(cx-OW, gy, cz-OW, cx+OW, gy+12, cz-OW+1, R);
        wall(cx-OW, gy, cz+OW-1, cx+OW, gy+12, cz+OW, R);
        wall(cx-OW, gy, cz-OW, cx-OW+1, gy+12, cz+OW, R);
        wall(cx+OW-1, gy, cz-OW, cx+OW, gy+12, cz+OW, R);
        // Crenellations
        for (let i = -OW; i <= OW; i++) if (i%2===0) {
            rb(cx+i, gy+13, cz-OW, S, R+0.1); rb(cx+i, gy+13, cz+OW, S, R+0.1);
            rb(cx-OW, gy+13, cz+i, S, R+0.1); rb(cx+OW, gy+13, cz+i, S, R+0.1);
        }

        // === 6 CORNER & MID-WALL TOWERS ===
        tower(cx-OW, cz-OW, 5, 22, R*0.5);
        tower(cx+OW, cz-OW, 5, 22, R*0.5);
        tower(cx-OW, cz+OW, 5, 20, R*0.7);
        tower(cx+OW, cz+OW, 5, 18, R*1.0);
        tower(cx, cz-OW, 4, 18, R*0.6);   // north gate tower
        tower(cx, cz+OW, 4, 16, R*0.8);   // south gate tower
        tower(cx-OW, cz, 4, 16, R*0.7);   // west mid tower
        tower(cx+OW, cz, 4, 16, R*0.9);   // east mid tower

        // === GATES ===
        door(cx-2, gy+1, cz-OW, 4, 7, 'z'); door(cx-2, gy+1, cz-OW+1, 4, 7, 'z');
        door(cx-2, gy+1, cz+OW-1, 4, 7, 'z'); door(cx-2, gy+1, cz+OW, 4, 7, 'z');

        // === CLEAR COURTYARD AIR ===
        box(cx-OW+2, gy+1, cz-OW+2, cx+OW-2, gy+11, cz+OW-2, A, 0);
        box(cx-OW+2, gy, cz-OW+2, cx+OW-2, gy, cz+OW-2, S, 0.03);

        // === INNER WALL (separates inner and outer bailey) ===
        wall(cx-25, gy, cz+8, cx+25, gy+8, cz+8, R*0.5);
        wall(cx-25, gy, cz+8, cx-25, gy+8, cz+OW-2, R*0.6);
        wall(cx+25, gy, cz+8, cx+25, gy+8, cz+OW-2, R*0.6);
        door(cx-2, gy+1, cz+8, 4, 5, 'z');
        door(cx+15, gy+1, cz+8, 3, 4, 'z');
