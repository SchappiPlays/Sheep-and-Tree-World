    const sx = player.position.x;
    const sy = player.position.y + player.EYE_HEIGHT * 0.8;
    const sz = player.position.z;
    // Aim from spawn toward crosshair target
    const dir = new THREE.Vector3(target.x - sx, target.y - sy, target.z - sz).normalize();
    const vx = dir.x * props.speed;
    const vy = dir.y * props.speed;
    const vz = dir.z * props.speed;

    let mesh;
    const isDragon = props._dragonProjectile;
    if (isDragon) {
        mesh = _makeDragonProjectile(props.color);
        mesh.position.set(sx, sy, sz);
        // Face the direction of travel
        mesh.lookAt(sx + dir.x, sy + dir.y, sz + dir.z);
    } else {
        const mat = new THREE.MeshBasicMaterial({ color: props.color, transparent: true, opacity: 0.9 });
        mesh = new THREE.Mesh(new THREE.SphereGeometry(props.size, 6, 4), mat);
        mesh.position.set(sx, sy, sz);
    }
    scene.add(mesh);

    // Glow light
    const light = new THREE.PointLight(props.color, 2, 8);
    light.position.copy(mesh.position);
    scene.add(light);

    projectiles.push({
        mesh, light, x: sx, y: sy, z: sz,
        vx, vy, vz,
        life: props.life, age: 0,
        damage: props.damage, staffType,
        trailColor: props.trail,
        _isDragon: isDragon,
    });
}

// Helper: deal spell damage to a creature, triggering boss death handlers if killed
function spellDamage(c, dmg) {
    if (c.dead || c._shielded) return;
    c.hp -= dmg;
    staffDamageDealt += dmg;
    if (c.hp <= 0) {
        c.hp = 0; c.dead = true; c.deathTimer = 0; c.walking = false; c.speed = 0;
        if (c._isBoss) {
            if (c._bossName) killedBosses.add(c._bossName);
            if (c._isDarkKnight && creatures._onDarkKnightDeath) creatures._onDarkKnightDeath(c);
            else if (c._isNecromancer && creatures._onNecromancerDeath) creatures._onNecromancerDeath(c);
            else if (c._isHobgoblin && creatures._onHobgoblinDeath) creatures._onHobgoblinDeath(c);
            else if (c._isGateBoss && creatures._onGateBossDeath) creatures._onGateBossDeath(c);
            else if (creatures._onBossDeath) creatures._onBossDeath(c);
        }
    }
}

function castUniversalSpell(slot, staffType) {
    const px = player.position.x, py = player.position.y, pz = player.position.z;
    const props = STAFF_PROPS[staffType] || STAFF_PROPS['basic_staff'];

    if (slot === 4) {
        // Arcane Barrage: 5 homing bolts that seek nearest enemies
        const enemies = creatures.creatures.filter(c => !c.dead && !c._isSummon);
        for (let i = 0; i < 5; i++) {
            const a = player.group.rotation.y + (i - 2) * 0.3;
            const mat = new THREE.MeshBasicMaterial({ color: 0xcc88ff, transparent: true, opacity: 0.85 });
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 4), mat);
            mesh.position.set(px, py + 1.2 + i * 0.15, pz);
            scene.add(mesh);
            const light = new THREE.PointLight(0xcc88ff, 0.8, 4);
            light.position.copy(mesh.position); scene.add(light);
            // Find a target for this bolt
            const target = enemies.length > 0 ? enemies[i % enemies.length] : null;
            projectiles.push({
                mesh, light, x: px, y: py + 1.2 + i * 0.15, z: pz,
                vx: Math.sin(a) * 14, vy: 3, vz: Math.cos(a) * 14,
                life: 3, age: 0, damage: 4, staffType: staffType,
                _homing: true, _target: target,
            });
        }
    } else if (slot === 5) {
        // Teleport: blink forward 15 units in facing direction
        const facing = player.group.rotation.y;
        const tx = px + Math.sin(facing) * 15;
        const tz = pz + Math.cos(facing) * 15;
        const ty = getTerrainHeight(tx, tz);
        // Departure particles
        for (let i = 0; i < 10; i++) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08),
                new THREE.MeshBasicMaterial({ color: 0x44ddff, transparent: true, opacity: 0.8 }));
            m.position.set(px + (Math.random()-0.5)*0.6, py + Math.random()*1.8, pz + (Math.random()-0.5)*0.6);
            scene.add(m);
            setTimeout(() => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); }, 500);
        }
        // Move player
        player.position.set(tx, ty + 0.1, tz);
        player.group.position.copy(player.position);
        // Arrival particles
        for (let i = 0; i < 10; i++) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08),
                new THREE.MeshBasicMaterial({ color: 0x44ddff, transparent: true, opacity: 0.8 }));
            m.position.set(tx + (Math.random()-0.5)*0.6, ty + Math.random()*1.8, tz + (Math.random()-0.5)*0.6);
            scene.add(m);
            setTimeout(() => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); }, 500);
        }
    } else if (slot === 6) {
        // Meteor: huge fireball falls from sky at crosshair target, massive AOE
        const rc = new THREE.Raycaster();
        rc.setFromCamera(new THREE.Vector2(0, 0), camera);
        const target = new THREE.Vector3().copy(rc.ray.origin).addScaledVector(rc.ray.direction, 30);
        // Clamp to terrain
        const tx = target.x, tz = target.z;
        const ty = getTerrainHeight(tx, tz);

        // Spawn meteor high up, falling
        const meteorMat = new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.9 });
        const meteor = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 6), meteorMat);
        meteor.position.set(tx, ty + 40, tz);
        scene.add(meteor);
        const meteorLight = new THREE.PointLight(0xff4400, 5, 20);
        meteorLight.position.copy(meteor.position);
        scene.add(meteorLight);
        // Trail
        const trailMat = new THREE.MeshBasicMaterial({ color: 0xff8822, transparent: true, opacity: 0.5 });

        let mAge = 0;
        const animMeteor = () => {
            mAge += 0.016;
            meteor.position.y -= 1.5; // fall speed
            meteorLight.position.copy(meteor.position);
            // Trail particles
            if (mAge % 0.032 < 0.017) {
                const t = new THREE.Mesh(new THREE.SphereGeometry(0.3, 4, 3), trailMat.clone());
                t.position.copy(meteor.position);
                scene.add(t);
                setTimeout(() => { scene.remove(t); t.geometry.dispose(); t.material.dispose(); }, 300);
            }
            if (meteor.position.y > ty + 1) {
                requestAnimationFrame(animMeteor);
            } else {
                // Impact!
                scene.remove(meteor); scene.remove(meteorLight);
                meteor.geometry.dispose(); meteorMat.dispose();
                // Damage all enemies in range
                const range = 12;
                for (const c of creatures.creatures) {
                    if (c.dead || c._isSummon) continue;
                    const dx = c.x - tx, dz = c.z - tz;
                    if (dx*dx + dz*dz < range*range) spellDamage(c, 20);
                }
                // Explosion visual
                for (let r = 0; r < 4; r++) {
                    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.2, 6, 24),
                        new THREE.MeshBasicMaterial({ color: r < 2 ? 0xff4400 : 0xff8822, transparent: true, opacity: 0.7 }));
                    ring.position.set(tx, ty + 0.5 + r*0.5, tz);
                    ring.rotation.x = Math.PI/2;
                    scene.add(ring);
                    let a = 0;
                    const anim = () => { a+=0.016; const s=1+a*25; ring.scale.set(s,s,1); ring.material.opacity=Math.max(0,0.7-a*1.2);
                        if(a<0.7)requestAnimationFrame(anim);else{scene.remove(ring);ring.geometry.dispose();ring.material.dispose();}};
                    setTimeout(() => requestAnimationFrame(anim), r * 60);
                }
                // Flash
                const flash = new THREE.PointLight(0xff6600, 10, 25);
                flash.position.set(tx, ty + 2, tz); scene.add(flash);
                setTimeout(() => scene.remove(flash), 500);
                updateSpellSlotUI();
            }
        };
        requestAnimationFrame(animMeteor);
    }
}

const summonedSkeletons = []; // { creature, timer, group }

function castUniqueSpell(staffType, manaSpent) {
    const px = player.position.x, py = player.position.y, pz = player.position.z;

    if (staffType === 'basic_staff') {
        // Heal: restore 4 HP, green particles
        playerHP = Math.min(playerMaxHP, playerHP + 4);
        updateHeartsUI();
        // Visual: green burst
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1),
                new THREE.MeshBasicMaterial({ color: 0x44ff44, transparent: true, opacity: 0.8 }));
            m.position.set(px + Math.cos(angle) * 0.5, py + 1 + Math.random(), pz + Math.sin(angle) * 0.5);
            scene.add(m);
            setTimeout(() => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); }, 800);
        }
    } else if (staffType === 'fire_staff') {
        // Inferno: ring of fire dealing 6 damage to all enemies within 6 units
        const range = 6;
        for (const c of creatures.creatures) {
            if (c.dead) continue;
            const dx = c.x - px, dz = c.z - pz;
            if (dx*dx + dz*dz < range*range) spellDamage(c, 6);
        }
        // Visual: expanding fire ring
        const ring = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.15, 6, 24),
            new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.8 }));
        ring.position.set(px, py + 0.3, pz);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        let ringAge = 0;
        const animRing = () => {
            ringAge += 0.016;
            const s = 1 + ringAge * 15;
            ring.scale.set(s, s, 1);
            ring.material.opacity = Math.max(0, 0.8 - ringAge * 2);
            if (ringAge < 0.5) requestAnimationFrame(animRing);
            else { scene.remove(ring); ring.geometry.dispose(); ring.material.dispose(); }
        };
        requestAnimationFrame(animRing);
    } else if (staffType === 'ice_staff') {
        // Frost Nova: slow/freeze enemies within 8 units for 4 seconds
        const range = 8;
        for (const c of creatures.creatures) {
            if (c.dead) continue;
            const dx = c.x - px, dz = c.z - pz;
            if (dx*dx + dz*dz < range*range) {
                spellDamage(c, 3);
                // Freeze: store original speed, set to 0
                if (!c._frozen) {
                    c._frozen = true;
                    c._origChaseSpeed = c.chaseSpeed || 3;
                    c.chaseSpeed = 0;
                    setTimeout(() => { c._frozen = false; c.chaseSpeed = c._origChaseSpeed; }, 4000);
                }
            }
        }
        // Visual: ice burst
        for (let i = 0; i < 16; i++) {
            const a = (i / 16) * Math.PI * 2;
            const r = 2 + Math.random() * 4;
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3),
                new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0.7 }));
            m.position.set(px + Math.cos(a)*r, py + 0.3 + Math.random()*0.5, pz + Math.sin(a)*r);
            scene.add(m);
            setTimeout(() => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); }, 1500);
        }
    } else if (staffType === 'lightning_staff') {
        // Chain Lightning: hits up to 3 nearest enemies, 10 damage each
        const sorted = creatures.creatures
            .filter(c => !c.dead)
            .map(c => ({ c, d: (c.x-px)*(c.x-px) + (c.z-pz)*(c.z-pz) }))
            .sort((a, b) => a.d - b.d)
            .slice(0, 3);
        let prevX = px, prevZ = pz, prevY = py + 1.2;
        for (const { c } of sorted) {
            if (c.d > 20*20) continue;
            spellDamage(c, 10);
            // Visual: lightning bolt line
            const cy = getTerrainHeight(c.x, c.z) + 1;
            const geo = new THREE.BufferGeometry();
            const pts = [];
            const segs = 6;
            for (let s = 0; s <= segs; s++) {
                const t = s / segs;
                pts.push(
                    prevX + (c.x - prevX) * t + (s > 0 && s < segs ? (Math.random()-0.5)*0.8 : 0),
                    prevY + (cy - prevY) * t + (s > 0 && s < segs ? (Math.random()-0.5)*0.5 : 0),
                    prevZ + (c.z - prevZ) * t + (s > 0 && s < segs ? (Math.random()-0.5)*0.8 : 0)
                );
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
            const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffee44, linewidth: 2 }));
            scene.add(line);
            setTimeout(() => { scene.remove(line); geo.dispose(); }, 300);
            prevX = c.x; prevZ = c.z; prevY = cy;
        }
    } else if (staffType === 'void_staff') {
        // Raise Dead: uses ALL remaining mana, summons 1 skeleton per full mana star (2 mana)
        const skeletonCount = Math.floor((manaSpent || 0) / 2);
        if (skeletonCount <= 0) return;

        const boneMat = new THREE.MeshStandardMaterial({ color: 0xd0c8b8, roughness: 0.8 });
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x8833cc }); // purple eyes for summoned

        for (let si = 0; si < skeletonCount; si++) {
            const angle = (si / skeletonCount) * Math.PI * 2 + Math.random() * 0.5;
            const dist = 2 + Math.random() * 2;
            const sx = px + Math.cos(angle) * dist;
            const sz = pz + Math.sin(angle) * dist;
            const sy = getTerrainHeight(sx, sz);

            // Build skeleton mesh (same as creatures.js but with purple eyes)
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.35, 0.14), boneMat);
            body.position.y = 0.7; g.add(body);
            const spine = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.35, 0.06), boneMat);
            spine.position.set(0, 0.7, -0.06); g.add(spine);
            const headGrp = new THREE.Group();
            headGrp.position.set(0, 1.0, 0); g.add(headGrp);
            const skull = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), boneMat);
            headGrp.add(skull);
            const jaw = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.05, 0.14), boneMat);
            jaw.position.set(0, -0.1, 0.02); headGrp.add(jaw);
            const eyeG = new THREE.SphereGeometry(0.03, 6, 6);
            headGrp.add(new THREE.Mesh(eyeG, eyeMat).translateX(-0.05).translateY(0.02).translateZ(0.1));
            headGrp.add(new THREE.Mesh(eyeG, eyeMat).translateX(0.05).translateY(0.02).translateZ(0.1));
            const armGeo = new THREE.BoxGeometry(0.05, 0.3, 0.05);
            g.add(new THREE.Mesh(armGeo, boneMat).translateX(-0.17).translateY(0.6));
            g.add(new THREE.Mesh(armGeo, boneMat).translateX(0.17).translateY(0.6));
            const legs = [];
            const legGeo = new THREE.BoxGeometry(0.05, 0.35, 0.05);
            for (const lx of [-0.07, 0.07]) {
                const hip = new THREE.Group(); hip.position.set(lx, 0.5, 0); g.add(hip);
                hip.add(new THREE.Mesh(legGeo, boneMat).translateY(-0.175));
                hip.add(new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.03, 0.12), boneMat).translateY(-0.37).translateZ(0.03));
                legs.push(hip);
            }
            g.position.set(sx, sy, sz);
            g.rotation.y = Math.random() * Math.PI * 2;
            scene.add(g);

            // Create creature entry — friendly skeleton that attacks enemies
            const skel = {
                group: g, legs, headGrp, x: sx, z: sz, angle: g.rotation.y, speed: 0,
                walkPhase: Math.random() * Math.PI * 2, wanderTimer: 0,
                idleHeadTimer: 0, idleHeadTarget: 0, walking: false,
                type: 'skeleton', hostile: true, aggroRange: 15, attackRange: 1.5,
                attackDmg: 3, attackCD: 1.5, attackTimer: 0,
                hp: 5, maxHP: 5, dead: false, chaseSpeed: 3.0,
                _isSummon: true, _summonTimer: 20, // dies after 20s
                _friendlyToPlayer: true, // won't target player, enemies target it
            };
            creatures.creatures.push(skel);
            summonedSkeletons.push(skel);

            // Spawn visual: purple particles rising from ground
            for (let pi = 0; pi < 6; pi++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.06),
                    new THREE.MeshBasicMaterial({ color: 0x8833cc, transparent: true, opacity: 0.7 }));
                p.position.set(sx + (Math.random()-0.5)*0.5, sy + Math.random()*0.3, sz + (Math.random()-0.5)*0.5);
                scene.add(p);
                let pAge = 0;
                const animP = () => {
                    pAge += 0.016;
                    p.position.y += 0.03;
                    p.material.opacity = Math.max(0, 0.7 - pAge * 1.5);
                    if (pAge < 0.8) requestAnimationFrame(animP);
                    else { scene.remove(p); p.geometry.dispose(); p.material.dispose(); }
                };
                setTimeout(() => requestAnimationFrame(animP), pi * 50);
            }
        }

        // Dark flash
        const flash = new THREE.PointLight(0x8833cc, 5, 15);
        flash.position.set(px, py + 1, pz);
        scene.add(flash);
        setTimeout(() => scene.remove(flash), 400);
    }

    // Custom staff — route to standard spell if gem maps to a standard type, otherwise gem-specific
    if (typeof staffType === 'string' && staffType.startsWith('cstaff_') && window._customStaffs) {
        const cs = window._customStaffs[staffType];
        if (!cs) return;
        const gem = cs.gem;
        const gemKey = typeof gem === 'number' ? { [BLOCK.LEAVES]: 'leaves', [BLOCK.WOOD]: 'wood', [BLOCK.STONE]: 'stone' }[gem] : gem;
        // If this gem maps to a standard staff type (fire/ice/lightning), use that spell instead
        const stdType = STAFF_GEM_TYPE[gem];
        if (stdType) {
            castUniqueSpell(stdType, manaSpent);
            return;
        }

        if (gemKey === 'diamond') {
            // Crystal Storm: 8 piercing shards fan out
            for (let i = 0; i < 8; i++) {
                const a = player.group.rotation.y + (i / 8) * Math.PI * 2;
                const mat = new THREE.MeshBasicMaterial({ color: 0x88ffff, transparent: true, opacity: 0.8 });
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.12), mat);
                mesh.position.set(px, py + 1.2, pz);
                scene.add(mesh);
                const light = new THREE.PointLight(0x88ffff, 0.5, 3);
                scene.add(light);
                projectiles.push({ mesh, light, x: px, y: py+1.2, z: pz, vx: Math.sin(a)*16, vy: 1, vz: Math.cos(a)*16, life: 1.5, age: 0, damage: 4, staffType: 'ice_staff' });
            }
        } else if (gemKey === 'emerald') {
            // Poison Cloud: AOE damage over time
            const cloud = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 6),
                new THREE.MeshBasicMaterial({ color: 0x22cc44, transparent: true, opacity: 0.2 }));
            cloud.position.set(px, py + 1, pz); scene.add(cloud);
            let age = 0;
            const tick = () => { age += 0.5;
                for (const c of creatures.creatures) { if (c.dead) continue; const dx=c.x-px,dz=c.z-pz; if(dx*dx+dz*dz<64) spellDamage(c, 3); }
                cloud.material.opacity = 0.2 * (1 - age/5);
                if (age < 5) setTimeout(tick, 500); else { scene.remove(cloud); cloud.geometry.dispose(); }
            }; setTimeout(tick, 500);
        } else if (gemKey === 'gold_ingot' || gemKey === 'gold') {
            // Midas Touch: burst of 5 gold bolts
            for (let i = 0; i < 5; i++) {
                const a = player.group.rotation.y + (i-2)*0.15;
                const mat = new THREE.MeshBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0.9 });
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 4), mat);
                mesh.position.set(px, py+1.2, pz); scene.add(mesh);
                const light = new THREE.PointLight(0xffdd44, 0.5, 3); scene.add(light);
                projectiles.push({ mesh, light, x:px, y:py+1.2, z:pz, vx:Math.sin(a)*18, vy:0.5+i*0.3, vz:Math.cos(a)*18, life:2, age:0, damage:3, staffType:'basic_staff' });
            }
        } else if (gemKey === 'iron_ingot' || gemKey === 'iron') {
            // Iron Wall: spawn 3 temporary iron blocks in front of player
            const facing = player.group.rotation.y;
            const bx = Math.round((px + Math.sin(facing)*2) / BLOCK_SIZE);
            const bz = Math.round((pz + Math.cos(facing)*2) / BLOCK_SIZE);
            const by = Math.floor(py / BLOCK_SIZE) + 128;
            for (let i = -1; i <= 1; i++) {
                const wx = bx + Math.round(Math.cos(facing)*i), wz = bz - Math.round(Math.sin(facing)*i);
                for (let dy = 0; dy < 3; dy++) world.setBlock(wx, by+dy, wz, BLOCK.IRON_ORE);
                chunkManager.rebuildChunkAt(wx, wz);
                setTimeout(() => { for (let dy = 0; dy < 3; dy++) world.setBlock(wx, by+dy, wz, BLOCK.AIR); chunkManager.rebuildChunkAt(wx, wz); }, 8000);
            }
        } else if (gemKey === 'steel_ingot' || gemKey === 'steel') {
            // Ricochet: bolt that bounces between 4 enemies
            const sorted = creatures.creatures.filter(c=>!c.dead).map(c=>({c,d:(c.x-px)*(c.x-px)+(c.z-pz)*(c.z-pz)})).sort((a,b)=>a.d-b.d).slice(0,4);
            let prevX=px,prevZ=pz,prevY=py+1.2;
            for (const{c} of sorted) { if(c.d>25*25)continue; spellDamage(c, 8);
                const cy=getTerrainHeight(c.x,c.z)+1;
                const geo=new THREE.BufferGeometry(); const pts=[];
                for(let s=0;s<=4;s++){const t=s/4;pts.push(prevX+(c.x-prevX)*t+(s>0&&s<4?(Math.random()-0.5)*0.3:0),prevY+(cy-prevY)*t,prevZ+(c.z-prevZ)*t+(s>0&&s<4?(Math.random()-0.5)*0.3:0));}
                geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
                const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0xe0e8f0})); scene.add(line);
                setTimeout(()=>{scene.remove(line);geo.dispose();},400);
                prevX=c.x;prevZ=c.z;prevY=cy;
            }
        } else if (gemKey === 'leaves') {
            // Regrowth: heal 6 + regen
            playerHP = Math.min(playerMaxHP, playerHP + 6); updateHeartsUI();
            let ticks = 0;
            const regen = () => { ticks++; playerHP = Math.min(playerMaxHP, playerHP + 2); updateHeartsUI();
                if (ticks < 3) setTimeout(regen, 1000); };
            setTimeout(regen, 1000);
            for (let i = 0; i < 10; i++) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,0.08), new THREE.MeshBasicMaterial({color:0x44ff44,transparent:true,opacity:0.7}));
                m.position.set(px+(Math.random()-0.5),py+0.5+Math.random()*1.5,pz+(Math.random()-0.5)); scene.add(m);
                setTimeout(()=>{scene.remove(m);m.geometry.dispose();m.material.dispose();},1200);
            }
        } else if (gemKey === 'wood' || gemKey === String(BLOCK.WOOD)) {
            // Splinter Bomb: explosive AOE 5 damage
            const facing = player.group.rotation.y;
            const tx = px + Math.sin(facing)*5, tz = pz + Math.cos(facing)*5;
            for (const c of creatures.creatures) { if(c.dead)continue; const dx=c.x-tx,dz=c.z-tz; if(dx*dx+dz*dz<25) spellDamage(c, 5);}
            for (let i = 0; i < 12; i++) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.04,0.04), new THREE.MeshBasicMaterial({color:0x8a6a3a}));
                m.position.set(tx+(Math.random()-0.5)*2,py+1+Math.random(),tz+(Math.random()-0.5)*2); m.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3); scene.add(m);
                setTimeout(()=>{scene.remove(m);m.geometry.dispose();m.material.dispose();},600);
            }
        } else if (gemKey === 'stone' || gemKey === String(BLOCK.STONE)) {
            // Quake: stun all enemies within 7 units for 3s
            for (const c of creatures.creatures) { if(c.dead)continue; const dx=c.x-px,dz=c.z-pz;
                if(dx*dx+dz*dz<49){spellDamage(c, 4);
                if(!c._frozen){c._frozen=true;c._origChaseSpeed=c.chaseSpeed||3;c.chaseSpeed=0;setTimeout(()=>{c._frozen=false;c.chaseSpeed=c._origChaseSpeed;},3000);}}}
            // Ground pound visual
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.5,0.2,6,24), new THREE.MeshBasicMaterial({color:0x888888,transparent:true,opacity:0.6}));
            ring.position.set(px,py+0.1,pz); ring.rotation.x=Math.PI/2; scene.add(ring);
            let a=0; const anim=()=>{a+=0.016;ring.scale.set(1+a*18,1+a*18,1);ring.material.opacity=Math.max(0,0.6-a*1.5);if(a<0.5)requestAnimationFrame(anim);else{scene.remove(ring);ring.geometry.dispose();}};requestAnimationFrame(anim);
        } else if (gemKey === 'dragonsteel_ingot' || gemKey === 'dragonsteel') {
            // Dragon Breath: cone of fire in front, 15 damage
            const facing = player.group.rotation.y;
            for (const c of creatures.creatures) { if(c.dead)continue; const dx=c.x-px,dz=c.z-pz;const dist=Math.sqrt(dx*dx+dz*dz);
                if(dist>10)continue; const aToE=Math.atan2(dx,dz); let diff=aToE-facing; while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
                if(Math.abs(diff)<Math.PI/4) spellDamage(c, 15);}
            // Fire cone visual
            for (let i = 0; i < 20; i++) {
                const spread=(Math.random()-0.5)*0.8; const dist=1+Math.random()*8;
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,0.15), new THREE.MeshBasicMaterial({color:i<10?0xff4400:0xffaa22,transparent:true,opacity:0.7}));
                m.position.set(px+Math.sin(facing+spread)*dist,py+0.8+Math.random()*0.8,pz+Math.cos(facing+spread)*dist); scene.add(m);
                setTimeout(()=>{scene.remove(m);m.geometry.dispose();m.material.dispose();},400+Math.random()*300);
            }
        }
    }
}

// Dragon wyvern projectile — uses the REAL wyvern model from dragons.js
function _makeDragonProjectile(color) {
    // Create an actual wyvern using the same function that makes baby dragons
    const eggColor = color;
    const wingColor = new THREE.Color(color).multiplyScalar(0.6).getHex();
    const bd = makeBabyDragon(0, 0, 0, eggColor, wingColor, true); // isWyvern=true
    const g = bd.group;

    // Set to flying pose immediately
    bd.flying = true;
    bd._flapT = Math.random() * 2; // random start phase
    bd.walkPhase = 0;

    // Scale to visible projectile size
    g.scale.setScalar(0.8 * (bd.growthScale || 0.15));

    // Set legs to flying tuck
    for (const leg of bd.legs) leg.rotation.x = 0.6;
    bd.headGrp.rotation.x = -0.08;
    if (bd.neckGrp) bd.neckGrp.rotation.x = 0.15;

    // Store dragon data for animation
    g._dragonData = bd;
    g._wings = bd.wings;
    return g;
}

function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.age += dt;
        if (p.age > p.life) {
            scene.remove(p.mesh); scene.remove(p.light);
            if (p.mesh.geometry) { p.mesh.geometry.dispose(); p.mesh.material.dispose(); }
            projectiles.splice(i, 1);
            continue;
        }
        // Homing projectiles (Arcane Barrage)
        if (p._homing && p._target && !p._target.dead) {
            const dx = p._target.x - p.x;
            const dy = (getTerrainHeight(p._target.x, p._target.z) + 0.8) - p.y;
            const dz = p._target.z - p.z;
            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
            const homingStrength = 8;
            p.vx += (dx/dist) * homingStrength * dt;
            p.vy += (dy/dist) * homingStrength * dt;
            p.vz += (dz/dist) * homingStrength * dt;
            // Clamp speed
            const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy + p.vz*p.vz);
            if (spd > 18) { p.vx *= 18/spd; p.vy *= 18/spd; p.vz *= 18/spd; }
        }
        // Gravity for fire, none for lightning
        if (p.staffType === 'fire_staff') p.vy -= 5 * dt;

        p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
        p.mesh.position.set(p.x, p.y, p.z);
        p.light.position.set(p.x, p.y, p.z);

        // Dragon wyvern projectile: face direction + real flying animation
        if (p._isDragon && p.mesh._dragonData) {
            p.mesh.lookAt(p.x + p.vx, p.y + p.vy, p.z + p.vz);
            const bd = p.mesh._dragonData;
            bd._flapT = (bd._flapT || 0) + dt;
            bd.walkPhase += dt * 12;
            for (const w of bd.wings) {
                const si = w._s;
                if (bd.isWyvern && w._elbow) {
                    // Exact wyvern flying animation from dragons.js
                    const [sFlap, eFlap] = computeFlap(bd._flapT);
                    w.rotation.set(0, 0, 0);
                    w.rotation.y = si * 0.15;
                    w.rotation.z = si * (-0.1 + sFlap * 0.4);
                    w.rotation.x = sFlap * 0.08;
                    w._elbow.rotation.set(0, si * -0.25, si * (-0.15 + eFlap * 0.45));
                    if (w._hand) w._hand.rotation.set(0, 0, 0);
                    if (w._flyFRots) applyFingerRots(w, w._flyFRots);
                    updateWyvernMembrane(w);
                }
            }
            // Tail sway
            if (bd.tailSegs) {
                for (let ti = 0; ti < bd.tailSegs.length; ti++) {
                    bd.tailSegs[ti].rotation.y = Math.sin(bd.walkPhase * 0.5 + ti * 0.35) * 0.07;
                }
            }
        }

        // Fade out
        if (p.mesh.material) p.mesh.material.opacity = 1 - (p.age / p.life) * 0.5;
        p.light.intensity = 2 * (1 - p.age / p.life);

        // Hit terrain — destroy on contact
        if (world && world.isSolid(p.x, p.y, p.z)) {
            scene.remove(p.mesh); scene.remove(p.light);
            if (p.mesh.geometry) { p.mesh.geometry.dispose(); p.mesh.material.dispose(); }
            projectiles.splice(i, 1);
            continue;
        }

        // Enemy projectiles hit player
        if (p._isEnemyProjectile && player) {
            const dx = player.position.x - p.x, dz = player.position.z - p.z;
            const dy = (player.position.y + 0.8) - p.y;
            if (dx*dx + dy*dy + dz*dz < 1.5) {
                if (typeof playerTakeDamage === 'function') playerTakeDamage(p.damage);
                scene.remove(p.mesh); scene.remove(p.light);
                if (p.mesh.geometry) { p.mesh.geometry.dispose(); p.mesh.material.dispose(); }
                projectiles.splice(i, 1);
                continue;
            }
        }

        // Hit creatures (player projectiles only)
        if (!p._isEnemyProjectile && creatures) {
            for (const sh of creatures.creatures) {
                if (sh.dead || sh._shielded) continue;
                const dx = sh.x - p.x, dz = sh.z - p.z;
                const dy = (world.getHeight(sh.x, sh.z) + 0.5) - p.y;
                if (dx * dx + dy * dy + dz * dz < 2) {
                    sh.hp -= p.damage;
                    staffDamageDealt += p.damage;
                    const prevMax = getMaxSpellSlot();
                    sh.x += dx * 0.1; sh.z += dz * 0.1; // tiny knockback
                    if (sh.hp <= 0) {
                        sh.hp = 0; sh.dead = true; sh.deathTimer = 0; sh.walking = false; sh.speed = 0;
                        // Trigger boss death handlers for projectile kills
                        if (sh._isBoss) {
                            if (sh._bossName) killedBosses.add(sh._bossName);
                            if (sh._isDarkKnight && creatures._onDarkKnightDeath) creatures._onDarkKnightDeath(sh);
                            else if (sh._isNecromancer && creatures._onNecromancerDeath) creatures._onNecromancerDeath(sh);
                            else if (sh._isHobgoblin && creatures._onHobgoblinDeath) creatures._onHobgoblinDeath(sh);
                            else if (sh._isGateBoss && creatures._onGateBossDeath) creatures._onGateBossDeath(sh);
                            else if (creatures._onBossDeath) creatures._onBossDeath(sh);
                        }
                    }
                    if (getMaxSpellSlot() > prevMax) {
                        addChatMessage(`New spell unlocked: Shift+${getMaxSpellSlot()}!`, 'rgba(200,170,255,0.95)');
                        updateSpellSlotUI();
                    }
                    scene.remove(p.mesh); scene.remove(p.light);
                    if (p.mesh.geometry) { p.mesh.geometry.dispose(); p.mesh.material.dispose(); }
                    projectiles.splice(i, 1);
                    break;
                }
            }
        }
    }
}

// ── World Map ──
const worldMapEl = document.getElementById('worldMap');
const mapCanvas = document.getElementById('mapCanvas');
const mapCtx = mapCanvas.getContext('2d');
let mapOpen = false;
let mapViewX = 0, mapViewZ = 0, mapViewSize = 1200;
let mapDragging = false, mapDragX = 0, mapDragY = 0, mapDragVX = 0, mapDragVZ = 0, mapDidDrag = false;
let mapCache = null, mapCacheVX = null, mapCacheVZ = null, mapCacheSize = null;

// Parchment background
const parchmentImg = new Image();
parchmentImg.src = 'parchment.png';

function drawWorldMap() {
    const w = mapCanvas.width, h = mapCanvas.height;
    const scale = w / (mapViewSize * 2);

    if (!mapCache || mapCacheVX !== mapViewX || mapCacheVZ !== mapViewZ || mapCacheSize !== mapViewSize) {
        // Draw parchment background
        if (parchmentImg.complete) {
            mapCtx.drawImage(parchmentImg, 0, 0, w, h);
        } else {
            mapCtx.fillStyle = '#d4bc8b';
            mapCtx.fillRect(0, 0, w, h);
        }

        // Build height data for contour lines
        const step = 3;
        const cols = Math.ceil(w / step), rows = Math.ceil(h / step);
        const heightData = new Float32Array(cols * rows);
        const biomeData = new Uint8Array(cols * rows); // 0=land, 1=ocean, 2=beach, 3=snow, 4=desert, 5=mountain, 6=scorched, 7=enchanted, 8=forest

        for (let gx = 0; gx < cols; gx++) {
            for (let gy = 0; gy < rows; gy++) {
                const px = gx * step, py = gy * step;
                const wx = (px / scale) + mapViewX - mapViewSize;
                const wz = (py / scale) + mapViewZ - mapViewSize;
                const idx = gy * cols + gx;

                const dist = Math.sqrt(wx * wx + wz * wz);
                const localR = getIslandRadius(wx, wz);

                if (dist > localR - 20) {
                    heightData[idx] = -5;
                    biomeData[idx] = 1; // ocean
                    continue;
                }
                if (dist > localR - 50) {
                    heightData[idx] = 0.5;
                    biomeData[idx] = 2; // beach
                    continue;
                }

                const th = getTerrainHeight(wx, wz);
                heightData[idx] = th;

                const snow = getSnowBlend(wz);
                const desert = getDesertBlend(wz);
                const mtn = getMountainBlend(wx, wz);
                const scorch = getScorchedBlend(wx, wz);
                const ench = getEnchantedBlend(wx, wz);

                if (scorch > 0.1) biomeData[idx] = 6;
                else if (ench > 0.1) biomeData[idx] = 7;
                else if (mtn > 0.3) biomeData[idx] = 5;
                else if (snow > 0.3) biomeData[idx] = 3;
                else if (desert > 0.3) biomeData[idx] = 4;
                else if (th > 1 && th < 35 && snow < 0.1 && desert < 0.1) biomeData[idx] = 8; // forest
                else biomeData[idx] = 0;
            }
        }

        // Draw biome tints (subtle, ink-wash style over parchment)
        const imgData = mapCtx.getImageData(0, 0, w, h);
        const pixels = imgData.data;

        for (let gx = 0; gx < cols; gx++) {
            for (let gy = 0; gy < rows; gy++) {
                const idx = gy * cols + gx;
                const biome = biomeData[idx];
                const th = heightData[idx];
                let tintR = 0, tintG = 0, tintB = 0, tintA = 0;

                if (biome === 1) { // ocean — blue-grey wash
                    tintR = 70; tintG = 100; tintB = 130; tintA = 0.45;
                } else if (biome === 2) { // beach — warm sand
                    tintR = 190; tintG = 170; tintB = 120; tintA = 0.1;
                } else if (biome === 3) { // snow — pale blue-white
                    tintR = 180; tintG = 195; tintB = 210; tintA = 0.35;
                } else if (biome === 4) { // desert — warm ochre
                    tintR = 170; tintG = 140; tintB = 70; tintA = 0.25;
                } else if (biome === 5) { // mountain — grey-brown, darken with height
                    const hFactor = Math.min(1, th / 80);
                    tintR = 80 - hFactor*30; tintG = 75 - hFactor*30; tintB = 70 - hFactor*25; tintA = 0.25 + hFactor*0.15;
                } else if (biome === 6) { // scorched — dark charcoal
                    tintR = 30; tintG = 20; tintB = 15; tintA = 0.4;
                } else if (biome === 7) { // enchanted — purple wash
                    tintR = 90; tintG = 50; tintB = 130; tintA = 0.25;
                } else if (biome === 8) { // forest — deep green
                    tintR = 45; tintG = 85; tintB = 35; tintA = 0.2;
                } else { // grass — light green
                    tintR = 70; tintG = 110; tintB = 50; tintA = 0.12;
                }

                if (tintA > 0) {
                    for (let sy = 0; sy < step && gy * step + sy < h; sy++) {
                        for (let sx = 0; sx < step && gx * step + sx < w; sx++) {
                            const pi = ((gy * step + sy) * w + gx * step + sx) * 4;
                            pixels[pi]     = Math.round(pixels[pi] * (1 - tintA) + tintR * tintA);
                            pixels[pi + 1] = Math.round(pixels[pi+1] * (1 - tintA) + tintG * tintA);
                            pixels[pi + 2] = Math.round(pixels[pi+2] * (1 - tintA) + tintB * tintA);
                        }
                    }
                }
            }
        }

        // Draw contour lines — interval scales with zoom (finer when zoomed in)
        // mapViewSize=1200 (zoomed out) → interval=10, mapViewSize=100 (zoomed in) → interval=1
        const contourInterval = Math.max(1, Math.min(10, mapViewSize / 120));
        const majorMult = contourInterval <= 2 ? 5 : 3; // major line every 3rd or 5th
        const inkR = 70, inkG = 45, inkB = 25;

        for (let gx = 1; gx < cols - 1; gx++) {
            for (let gy = 1; gy < rows - 1; gy++) {
                const idx = gy * cols + gx;
                if (biomeData[idx] === 1) continue;
                const th = heightData[idx];
                const hRight = heightData[idx + 1];
                const hDown = heightData[(gy + 1) * cols + gx];
                const hDiag = heightData[(gy + 1) * cols + gx + 1];

                const minH = Math.min(th, hRight, hDown, hDiag);
                const maxH = Math.max(th, hRight, hDown, hDiag);

                // Check all contour levels that cross this cell
                for (let lvl = Math.ceil(minH / contourInterval) * contourInterval; lvl <= maxH; lvl += contourInterval) {
                    if (lvl <= 0) continue;
                    const majorInterval = contourInterval * majorMult;
                    const isMajor = (Math.abs(lvl % majorInterval) < 0.01);
                    const lineAlpha = isMajor ? 0.75 : 0.45;

                    // Draw a 2px or 3px dot at this grid cell
                    const spread = isMajor ? 2 : 1;
                    for (let sy = 0; sy < spread; sy++) {
                        for (let sx = 0; sx < spread; sx++) {
                            const ppx = gx * step + sx, ppy = gy * step + sy;
                            if (ppx >= w || ppy >= h) continue;
                            const pi = (ppy * w + ppx) * 4;
                            pixels[pi]     = Math.round(pixels[pi] * (1 - lineAlpha) + inkR * lineAlpha);
                            pixels[pi + 1] = Math.round(pixels[pi+1] * (1 - lineAlpha) + inkG * lineAlpha);
                            pixels[pi + 2] = Math.round(pixels[pi+2] * (1 - lineAlpha) + inkB * lineAlpha);
                        }
                    }
                }
            }
        }

        // Draw coastline (darker ink line at land/ocean boundary)
        for (let gx = 1; gx < cols - 1; gx++) {
            for (let gy = 1; gy < rows - 1; gy++) {
                const idx = gy * cols + gx;
                const isLand = biomeData[idx] !== 1;
                if (!isLand) continue;
                const neighbors = [
                    biomeData[idx - 1], biomeData[idx + 1],
                    biomeData[(gy-1) * cols + gx], biomeData[(gy+1) * cols + gx]
                ];
                if (!neighbors.some(n => n === 1)) continue;
                // This is a coastline cell
                for (let sy = 0; sy < step; sy++) {
                    for (let sx = 0; sx < step; sx++) {
                        const ppx = gx * step + sx, ppy = gy * step + sy;
                        if (ppx >= w || ppy >= h) continue;
                        const pi = (ppy * w + ppx) * 4;
                        pixels[pi]     = Math.round(pixels[pi] * 0.4 + 60 * 0.6);
                        pixels[pi + 1] = Math.round(pixels[pi+1] * 0.4 + 45 * 0.6);
                        pixels[pi + 2] = Math.round(pixels[pi+2] * 0.4 + 30 * 0.6);
                    }
                }
            }
        }

        // Draw small tree symbols in forest areas
        for (let gx = 2; gx < cols - 2; gx += 3) {
            for (let gy = 2; gy < rows - 2; gy += 3) {
                const idx = gy * cols + gx;
                if (biomeData[idx] !== 8) continue;
                const hash = Math.sin(gx * 73.1 + gy * 197.3) * 43758.5;
                if ((hash - Math.floor(hash)) > 0.5) continue;
                const cx = gx * step + 1, cy = gy * step + 1;
                // Tiny tree symbol: small triangle
                for (let dy = -2; dy <= 1; dy++) {
                    const hw = Math.max(0, 2 - Math.abs(dy + 1)); // width narrows at top
                    for (let dx = -hw; dx <= hw; dx++) {
                        const ppx = cx + dx, ppy = cy + dy;
                        if (ppx < 0 || ppx >= w || ppy < 0 || ppy >= h) continue;
                        const pi = (ppy * w + ppx) * 4;
                        pixels[pi]     = Math.round(pixels[pi] * 0.5 + 50 * 0.5);
                        pixels[pi + 1] = Math.round(pixels[pi+1] * 0.5 + 70 * 0.5);
                        pixels[pi + 2] = Math.round(pixels[pi+2] * 0.5 + 35 * 0.5);
                    }
                }
            }
        }

        mapCtx.putImageData(imgData, 0, 0);

        // Decorative border (drawn on top)
        mapCtx.strokeStyle = 'rgba(80, 55, 30, 0.6)';
        mapCtx.lineWidth = 3;
        mapCtx.strokeRect(2, 2, w - 4, h - 4);
        mapCtx.strokeStyle = 'rgba(80, 55, 30, 0.3)';
        mapCtx.lineWidth = 1;
        mapCtx.strokeRect(6, 6, w - 12, h - 12);

        // ── Map markers and drawings ──
        const ink = 'rgba(60, 40, 20, 0.85)';
        const inkLight = 'rgba(80, 55, 30, 0.55)';
        const inkRed = 'rgba(130, 40, 30, 0.7)';
        const toX = wx => (wx - mapViewX + mapViewSize) * scale;
        const toY = wz => (wz - mapViewZ + mapViewSize) * scale;

        // Helper: draw a small castle/tower icon
        const drawCastle = (wx, wz, label) => {
            const x = toX(wx), y = toY(wz);
            if (x < -20 || x > w+20 || y < -20 || y > h+20) return;
            const s = Math.max(3, Math.min(10, 6 * scale));
            mapCtx.strokeStyle = ink; mapCtx.lineWidth = 1.5; mapCtx.fillStyle = ink;
            // Tower body
            mapCtx.strokeRect(x - s*0.6, y - s, s*1.2, s*1.4);
            // Crenellations
            for (let i = -1; i <= 1; i++) {
                mapCtx.fillRect(x + i*s*0.4 - s*0.15, y - s - s*0.35, s*0.3, s*0.35);
            }
            // Door
            mapCtx.fillRect(x - s*0.15, y + s*0.1, s*0.3, s*0.4);
            // Label
            if (label) {
                mapCtx.font = `italic ${Math.max(8, Math.min(13, 10 * scale))}px Georgia, serif`;
                mapCtx.fillStyle = ink; mapCtx.textAlign = 'center';
                mapCtx.fillText(label, x, y + s*1.4 + Math.max(8, 10 * scale));
            }
        };

        // Helper: draw mountain peak symbol (small inverted V with hatching)
        const drawMountain = (wx, wz, label, sz) => {
            const x = toX(wx), y = toY(wz);
            if (x < -20 || x > w+20 || y < -20 || y > h+20) return;
            const s = Math.max(4, Math.min(14, (sz||8) * scale));
            mapCtx.strokeStyle = ink; mapCtx.lineWidth = 1.5;
            mapCtx.beginPath();
            mapCtx.moveTo(x - s, y + s*0.5);
            mapCtx.lineTo(x, y - s);
            mapCtx.lineTo(x + s, y + s*0.5);
            mapCtx.stroke();
            // Hatching on right side
            for (let i = 1; i <= 3; i++) {
                const t = i * 0.25;
                mapCtx.beginPath();
                mapCtx.moveTo(x + s*t*0.5, y - s + s*1.5*t);
                mapCtx.lineTo(x + s*t*0.5 + s*0.3, y - s + s*1.5*t + s*0.3);
                mapCtx.stroke();
            }
            if (label) {
                mapCtx.font = `italic ${Math.max(7, Math.min(11, 9 * scale))}px Georgia, serif`;
                mapCtx.fillStyle = ink; mapCtx.textAlign = 'center';
                mapCtx.fillText(label, x, y + s*0.5 + Math.max(8, 10 * scale));
            }
        };

        // Helper: draw ruins symbol (broken pillars)
        const drawRuins = (wx, wz, label) => {
            const x = toX(wx), y = toY(wz);
            if (x < -20 || x > w+20 || y < -20 || y > h+20) return;
            const s = Math.max(3, Math.min(8, 5 * scale));
            mapCtx.strokeStyle = ink; mapCtx.lineWidth = 1.2;
            // Broken columns
            mapCtx.beginPath();
            mapCtx.moveTo(x - s, y + s*0.5); mapCtx.lineTo(x - s, y - s*0.6);
            mapCtx.moveTo(x - s*0.1, y + s*0.5); mapCtx.lineTo(x - s*0.1, y - s);
            mapCtx.moveTo(x + s*0.8, y + s*0.5); mapCtx.lineTo(x + s*0.8, y - s*0.3);
            mapCtx.stroke();
            // Fallen beam
            mapCtx.beginPath();
            mapCtx.moveTo(x - s*0.8, y - s*0.4);
            mapCtx.lineTo(x + s*0.5, y + s*0.1);
            mapCtx.stroke();
            if (label) {
                mapCtx.font = `italic ${Math.max(7, Math.min(10, 8 * scale))}px Georgia, serif`;
                mapCtx.fillStyle = inkLight; mapCtx.textAlign = 'center';
                mapCtx.fillText(label, x, y + s*0.5 + Math.max(7, 9 * scale));
            }
        };

        // Helper: draw gate symbol (two pillars with arch)
        const drawGate = (wx, wz, label) => {
            const x = toX(wx), y = toY(wz);
            if (x < -20 || x > w+20 || y < -20 || y > h+20) return;
            const s = Math.max(3, Math.min(8, 5 * scale));
            mapCtx.strokeStyle = inkRed; mapCtx.lineWidth = 1.5;
            // Two pillars
            mapCtx.beginPath();
            mapCtx.moveTo(x - s, y + s); mapCtx.lineTo(x - s, y - s*0.5);
            mapCtx.moveTo(x + s, y + s); mapCtx.lineTo(x + s, y - s*0.5);
            mapCtx.stroke();
            // Arch
            mapCtx.beginPath();
            mapCtx.arc(x, y - s*0.5, s, Math.PI, 0);
            mapCtx.stroke();
            if (label) {
                mapCtx.font = `italic ${Math.max(7, Math.min(10, 8 * scale))}px Georgia, serif`;
                mapCtx.fillStyle = inkRed; mapCtx.textAlign = 'center';
                mapCtx.fillText(label, x, y + s + Math.max(7, 9 * scale));
            }
        };

        // Helper: draw village symbol (small cluster of houses)
        const drawVillage = (wx, wz, label) => {
            const x = toX(wx), y = toY(wz);
            if (x < -20 || x > w+20 || y < -20 || y > h+20) return;
            const s = Math.max(2, Math.min(6, 4 * scale));
            mapCtx.fillStyle = ink;
            // Small house shapes
            mapCtx.fillRect(x - s*1.2, y - s*0.3, s*0.8, s*0.6);
            mapCtx.fillRect(x + s*0.2, y - s*0.5, s*0.9, s*0.7);
            mapCtx.fillRect(x - s*0.4, y + s*0.3, s*0.7, s*0.5);
            if (label) {
                mapCtx.font = `italic ${Math.max(7, Math.min(11, 9 * scale))}px Georgia, serif`;
                mapCtx.fillStyle = ink; mapCtx.textAlign = 'center';
                mapCtx.fillText(label, x, y + s + Math.max(8, 10 * scale));
            }
        };

        // ── Place markers (actual coordinates from the codebase) ──

        // Helper: draw label only (for region names)
        const drawLabel = (wx, wz, label, color, size) => {
            const x = toX(wx), y = toY(wz);
            if (x < -40 || x > w+40 || y < -20 || y > h+20) return;
            const fs = Math.max(7, Math.min(size || 11, (size || 11) * scale));
            mapCtx.font = `italic ${fs}px Georgia, serif`;
            mapCtx.fillStyle = color || ink;
            mapCtx.textAlign = 'center';
            mapCtx.fillText(label, x, y);
        };

        // Helper: draw a danger marker (skull-like X)
        const drawDanger = (wx, wz, label) => {
            const x = toX(wx), y = toY(wz);
            if (x < -20 || x > w+20 || y < -20 || y > h+20) return;
            const s = Math.max(3, Math.min(7, 5 * scale));
            mapCtx.strokeStyle = inkRed; mapCtx.lineWidth = 1.8;
            mapCtx.beginPath();
            mapCtx.moveTo(x-s, y-s); mapCtx.lineTo(x+s, y+s);
            mapCtx.moveTo(x+s, y-s); mapCtx.lineTo(x-s, y+s);
            mapCtx.stroke();
            mapCtx.beginPath(); mapCtx.arc(x, y, s*0.3, 0, Math.PI*2);
            mapCtx.stroke();
            if (label) {
                mapCtx.font = `italic ${Math.max(7, Math.min(10, 8 * scale))}px Georgia, serif`;
                mapCtx.fillStyle = inkRed; mapCtx.textAlign = 'center';
                mapCtx.fillText(label, x, y + s + Math.max(8, 10 * scale));
            }
        };

        // Castle (the western castle from villages.js)
        drawCastle(-400, 20, 'The Castle');

        // Ruined Fortress
        drawRuins(-505, -175, 'Ruined Fortress');

        // Mountains
        drawMountain(602, -30, 'East Mountains', 10);
        drawMountain(510, -130, 'NW Peaks', 7);
        drawMountain(510, 80, 'SW Hills', 6);
        drawMountain(820, -40, 'Great Peak', 12);
        drawMountain(730, -95, 'NE Ridge', 6);
        drawMountain(735, 40, 'SE Ridge', 6);

        // Villages
        drawVillage(80, 16, 'Meadow Village');
        drawVillage(-100, -50, 'Forest Edge');
        drawVillage(200, 60, 'Hillside Town');
        drawVillage(-200, 100, 'Western Hamlet');
        drawVillage(50, -150, 'Northwatch');
        drawVillage(-150, 200, 'Southmoor');

        // Forest Gates (around the ancient forest hill ring at -30, -190)
        drawGate(-140, -190, 'West Gate');
        drawGate(80, -190, 'East Gate');
        drawGate(-30, -300, 'North Gate');
        drawGate(-30, -80, 'South Gate');

        // Gate bosses
        drawDanger(-125, -190, 'Colossus');
        drawDanger(65, -190, 'Skeleton');
        drawDanger(-30, -285, 'Dark Knight');
        drawDanger(-30, -95, 'Hobgoblin');

        // Goblin camps
        drawDanger(-115, 35, 'Goblin Outpost');

        // Ancient forest — large italic label
        drawLabel(-30, -190, 'Ancient Forest', 'rgba(25, 55, 20, 0.7)', 13);

        // Forest ruins (inside the ancient forest)
        const ruinStyle = 'rgba(80, 55, 30, 0.5)';
        drawLabel(-60, -210, 'Broken Temple', ruinStyle, 8);
        drawLabel(-10, -160, 'Old Tower', ruinStyle, 8);
        drawLabel(-20, -220, 'Stone Circle', ruinStyle, 8);

        // Dragon altar
        const altX = toX(-505), altY = toY(-175);
        if (altX > -20 && altX < w+20 && altY > -20 && altY < h+20) {
            const s = Math.max(3, Math.min(7, 5 * scale));
            mapCtx.strokeStyle = 'rgba(100, 40, 120, 0.7)'; mapCtx.lineWidth = 1.5;
            mapCtx.beginPath();
            mapCtx.arc(altX, altY - s*3, s, 0, Math.PI*2);
            mapCtx.stroke();
            mapCtx.beginPath();
            mapCtx.moveTo(altX, altY - s*3 - s*0.5);
            mapCtx.lineTo(altX, altY - s*3 + s*0.5);
            mapCtx.moveTo(altX - s*0.5, altY - s*3);
            mapCtx.lineTo(altX + s*0.5, altY - s*3);
            mapCtx.stroke();
        }

        // Cave entrance
        const caveX = toX(560), caveY = toY(-50);
        if (caveX > -20 && caveX < w+20 && caveY > -20 && caveY < h+20) {
            const s = Math.max(3, Math.min(6, 4 * scale));
            mapCtx.fillStyle = 'rgba(40, 30, 20, 0.6)';
            mapCtx.beginPath();
            mapCtx.arc(caveX, caveY, s, Math.PI, 0);
            mapCtx.fill();
            mapCtx.font = `italic ${Math.max(7, Math.min(10, 8 * scale))}px Georgia, serif`;
            mapCtx.fillStyle = ink; mapCtx.textAlign = 'center';
            mapCtx.fillText('Cave', caveX, caveY + Math.max(8, 10 * scale));
        }

        // Abandoned Village
        drawRuins(0, -540, 'Abandoned Village');

        // Scorched Lands region label
        drawLabel(-300, 260, 'Scorched Lands', 'rgba(80, 25, 15, 0.6)', 12);

        // Enchanted Forest region label
        drawLabel(715, -30, 'Enchanted Forest', 'rgba(80, 40, 120, 0.6)', 10);

        // Compass rose (top-right corner)
        const crX = w - 45, crY = 45, crS = Math.min(30, w * 0.04);
        mapCtx.strokeStyle = ink; mapCtx.lineWidth = 1.5; mapCtx.fillStyle = ink;
        // N-S line
        mapCtx.beginPath(); mapCtx.moveTo(crX, crY - crS); mapCtx.lineTo(crX, crY + crS); mapCtx.stroke();
        // E-W line
        mapCtx.beginPath(); mapCtx.moveTo(crX - crS, crY); mapCtx.lineTo(crX + crS, crY); mapCtx.stroke();
        // N arrow
        mapCtx.beginPath();
        mapCtx.moveTo(crX, crY - crS - 4);
        mapCtx.lineTo(crX - 3, crY - crS + 3);
        mapCtx.lineTo(crX + 3, crY - crS + 3);
        mapCtx.closePath(); mapCtx.fill();
        // Labels
        mapCtx.font = `bold ${Math.max(8, crS * 0.5)}px Georgia, serif`;
        mapCtx.textAlign = 'center';
        mapCtx.fillText('N', crX, crY - crS - 7);
        mapCtx.font = `${Math.max(6, crS * 0.35)}px Georgia, serif`;
        mapCtx.fillText('S', crX, crY + crS + 10);
        mapCtx.fillText('E', crX + crS + 8, crY + 3);
        mapCtx.fillText('W', crX - crS - 8, crY + 3);

        mapCache = mapCtx.getImageData(0, 0, w, h);
        mapCacheVX = mapViewX; mapCacheVZ = mapViewZ; mapCacheSize = mapViewSize;
    } else {
        mapCtx.putImageData(mapCache, 0, 0);
    }

    // Player marker — ink style compass arrow
    const ppx = (player.position.x - mapViewX + mapViewSize) * scale;
    const ppy = (player.position.z - mapViewZ + mapViewSize) * scale;
    const angle = player.group.rotation.y;
    // Shadow
    mapCtx.fillStyle = 'rgba(40, 25, 15, 0.3)';
    mapCtx.beginPath();
    mapCtx.moveTo(ppx + Math.sin(angle) * 9 + 1, ppy + Math.cos(angle) * 9 + 1);
    mapCtx.lineTo(ppx + Math.sin(angle + 2.5) * 5 + 1, ppy + Math.cos(angle + 2.5) * 5 + 1);
    mapCtx.lineTo(ppx + Math.sin(angle - 2.5) * 5 + 1, ppy + Math.cos(angle - 2.5) * 5 + 1);
    mapCtx.closePath();
    mapCtx.fill();
    // Arrow
    mapCtx.fillStyle = '#8b2020';
    mapCtx.beginPath();
    mapCtx.moveTo(ppx + Math.sin(angle) * 9, ppy + Math.cos(angle) * 9);
    mapCtx.lineTo(ppx + Math.sin(angle + 2.5) * 5, ppy + Math.cos(angle + 2.5) * 5);
    mapCtx.lineTo(ppx + Math.sin(angle - 2.5) * 5, ppy + Math.cos(angle - 2.5) * 5);
    mapCtx.closePath();
    mapCtx.fill();
    // Center dot
    mapCtx.fillStyle = '#d4a040';
    mapCtx.beginPath();
    mapCtx.arc(ppx, ppy, 2, 0, Math.PI * 2);
    mapCtx.fill();

    // Coord label — ink style
    mapCtx.fillStyle = 'rgba(70, 50, 30, 0.8)';
    mapCtx.font = 'italic 12px Georgia, serif';
    mapCtx.textAlign = 'left';
    mapCtx.fillText(`${player.position.x.toFixed(0)}, ${player.position.z.toFixed(0)}`, 12, h - 12);
}

// Map drag
mapCanvas.addEventListener('mousedown', e => {
    mapDragging = true; mapDidDrag = false;
    mapDragX = e.clientX; mapDragY = e.clientY;
    mapDragVX = mapViewX; mapDragVZ = mapViewZ;
    mapCanvas.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', e => {
    if (!mapDragging) return;
    const dxPx = e.clientX - mapDragX, dyPx = e.clientY - mapDragY;
    if (Math.abs(dxPx) > 3 || Math.abs(dyPx) > 3) mapDidDrag = true;
    const rect = mapCanvas.getBoundingClientRect();
    const canvasScale = mapCanvas.width / rect.width;
    const pixToWorld = (mapViewSize * 2) / mapCanvas.width;
    mapViewX = mapDragVX - dxPx * canvasScale * pixToWorld;
    mapViewZ = mapDragVZ - dyPx * canvasScale * pixToWorld;
    drawWorldMap();
});
document.addEventListener('mouseup', () => {
    if (mapDragging) { mapDragging = false; mapCanvas.style.cursor = 'grab'; }
});
mapCanvas.addEventListener('wheel', e => {
    if (!mapOpen) return;
    e.preventDefault(); e.stopPropagation();
    const zf = e.deltaY > 0 ? 1.15 : 1 / 1.15;
    mapViewSize = Math.max(50, Math.min(2500, mapViewSize * zf));
    drawWorldMap();
}, { passive: false });

    // Armor items
    const _armorColors = {

    const _armorNames = { helmet: 'Helmet', chestplate: 'Chestplate', leggings: 'Leggings', boots: 'Boots' };
    for (const [tier, col] of Object.entries(_armorColors)) {

            if (key === k) return { name: tier.charAt(0).toUpperCase() + tier.slice(1) + ' ' + pname, top: col.t, front: col.f, isArmor: true, armorSlot: piece, armorTier: tier };

    if (typeof key === 'number') return BLOCK_INFO[key];

function blockIconHTML(info) {
    if (info.isTool) {
        let svg;
        const h = info.front, t = info.top; // handle, tool head colors
        if (info.toolType === 'sword') {
            const bladeC = info.bladeCol || t;
            const guardC = info.guardCol || '#997733';
            const handleC = info.handleCol || h;
            const pommelC = info.pommelCol || guardC;
            svg = `<svg width="24" height="24" viewBox="0 0 24 24">
                <rect x="11" y="12" width="2.5" height="10" rx="0.5" fill="${handleC}" transform="rotate(-40 12 17)"/>
                <rect x="10.5" y="2" width="3" height="13" rx="0.5" fill="${bladeC}" transform="rotate(-40 12 8)"/>
                <polygon points="12,0 10.5,3 13.5,3" fill="${bladeC}" transform="rotate(-40 12 2)"/>

            </svg>`;
        } else if (info.toolType === 'pickaxe') {
            svg = `<svg width="24" height="24" viewBox="0 0 24 24">
                <rect x="11" y="6" width="2.5" height="16" rx="0.5" fill="${h}" transform="rotate(-40 12 14)"/>
                <rect x="4" y="3" width="16" height="3" rx="1" fill="${t}" transform="rotate(-40 12 5)"/>
                <polygon points="3,4.5 1,3.5 2,5.5" fill="${t}" transform="rotate(-40 3 4.5)"/>
                <polygon points="21,4.5 23,3.5 22,5.5" fill="${t}" transform="rotate(-40 21 4.5)"/>
            </svg>`;
        } else if (info.toolType === 'staff') {
            svg = `<svg width="24" height="24" viewBox="0 0 24 24">
                <rect x="11" y="4" width="2.5" height="18" rx="0.5" fill="${h}" transform="rotate(-30 12 13)"/>
                <circle cx="10" cy="4" r="3.5" fill="${t}" opacity="0.8" transform="rotate(-30 12 5)"/>
                <circle cx="10" cy="4" r="2" fill="#fff" opacity="0.4" transform="rotate(-30 12 5)"/>
            </svg>`;
        } else {
            // Stick or generic
            svg = `<svg width="24" height="24" viewBox="0 0 24 24">
                <rect x="10.5" y="2" width="3" height="20" rx="1" fill="${h}" transform="rotate(-40 12 12)"/>
            </svg>`;

        return `<div class="block-icon" style="display:flex;align-items:center;justify-content:center;">${svg}</div>`;

    }
    return `<div class="block-icon"><div class="top-face" style="background:${info.top}"></div><div class="front-face" style="background:${info.front}"></div></div>`;
}

function _isSwordItem(key) {
    if (!key || typeof key !== 'string') return false;
    return key.includes('sword') || key.startsWith('csword_');
}
function _hotbarHasSword() {
    return hotbarSlots.some(s => _isSwordItem(s));
}
function addToInventory(key, eggData) {
    if (typeof key === 'string' && key.startsWith('egg_') && eggData) {
        eggItems[key] = eggData;
        inventory[key] = 1;
    } else {
        inventory[key] = (inventory[key] || 0) + 1;
    }
    if (!hotbarSlots.includes(key)) {
        // Only add sword to hotbar if no other sword is already there
        if (_isSwordItem(key) && _hotbarHasSword()) { refreshUI(); return; }
        const emptyIdx = hotbarSlots.indexOf(0);
        if (emptyIdx >= 0) hotbarSlots[emptyIdx] = key;
    }
    refreshUI();
}

function removeFromInventory(blockType) {
    if (!inventory[blockType]) return false;
    inventory[blockType]--;
    if (inventory[blockType] <= 0) {
        delete inventory[blockType];
        for (let i = 0; i < hotbarSlots.length; i++)
            if (hotbarSlots[i] === blockType) hotbarSlots[i] = 0;
    }
    refreshUI();
    return true;
}

function refreshUI() {
    updateHotbarUI();
    if (inventoryOpen) updateInventoryUI();
}

function updateHotbarUI() {
    let html = '';
    for (let i = 0; i < 9; i++) {
        const sel = i === selectedSlot ? ' selected' : '';
        const bt = hotbarSlots[i];
        const info = getItemInfo(bt);
        let inner = `<span class="key-hint">${i+1}</span>`;
        if (info && inventory[bt] > 0) {
            inner += blockIconHTML(info);
            inner += `<span class="count">${inventory[bt]}</span>`;
        }
        html += `<div class="hotbar-slot${sel}">${inner}</div>`;
    }
    hotbarEl.innerHTML = html;
}

function updateInventoryUI() {
    let html = '';

            inner += `<span class="count">${inventory[bt]}</span>`;

        }
        html += `<div class="inv-slot" data-area="hotbar" data-idx="${i}" data-bt="${bt}">${inner}</div>`;
    }

    const hotbarKeys = new Set();
    for (const s of hotbarSlots) { if (s) hotbarKeys.add(typeof s === 'number' ? s : s); }
    const allItems = Object.keys(inventory).filter(k => {
        const key = isNaN(k) ? k : Number(k);
        if (inventory[k] <= 0) return false;
        if (hotbarKeys.has(key)) return false;
        if (heldItem === key) return false; // hide held item from grid
        return true;
    }).map(k => isNaN(k) ? k : Number(k));
    html += '<div class="inv-section-label">Inventory</div><div class="inv-grid">';
    for (let i = 0; i < Math.max(27, allItems.length); i++) {
        const bt = i < allItems.length ? allItems[i] : 0;

        let inner = '';
        if (bt && info && inventory[bt] > 0) {
            inner += blockIconHTML(info);
            inner += `<span class="count">${inventory[bt]}</span>`;

        }

        html += renderRecipeRow(r, ri, canCraft);
    }
    html += '</div>';

    // Armor section

    for (const slot of ['helmet', 'chestplate', 'leggings', 'boots']) {

        if (info) {

    const shieldInfo = equippedShield ? getItemInfo(equippedShield) : null;
    let shieldInner = '<span class="slot-label" style="font-size:8px;">Shield</span>';
    if (shieldInfo) { shieldInner += blockIconHTML(shieldInfo); shieldInner += `<span class="block-name">${shieldInfo.name}</span>`; }
    html += `<div class="inv-slot" data-area="shield" data-bt="${equippedShield || ''}">${shieldInner}</div>`;
    html += '</div>';

    // Brush controls
    html += '<div class="inv-section-label">Brush [B] toggle [R] rotate</div>';
    html += '<div style="display:flex;gap:10px;align-items:center;font:11px monospace;color:rgba(200,190,160,0.8);padding:4px 2px;">';
    html += `<label>Side <input type="range" id="invBrushW" min="1" max="2" value="${brushW}" style="width:50px;vertical-align:middle;accent-color:rgba(120,160,80,0.8);"> ${brushW}</label>`;
    html += `<label>Up <input type="range" id="invBrushH" min="1" max="2" value="${brushH}" style="width:50px;vertical-align:middle;accent-color:rgba(120,160,80,0.8);"> ${brushH}</label>`;
    html += `<label>Fwd <input type="range" id="invBrushD" min="1" max="2" value="${brushD}" style="width:50px;vertical-align:middle;accent-color:rgba(120,160,80,0.8);"> ${brushD}</label>`;

    // Wire brush sliders in inventory
    for (const [id, setter] of [['invBrushW', v => brushW = v], ['invBrushH', v => brushH = v], ['invBrushD', v => brushD = v]]) {

                    heldItem = old || null;
                    if (heldItem) showDragGhost(heldItem); else hideDragGhost();
                    refreshUI(); updateInventoryUI();
                }
            } else if (equippedShield) {

    // Armor slot clicks
    invContentsEl.querySelectorAll('[data-area="armor"]').forEach(slot => {
        slot.addEventListener('click', () => {
            const slotName = slot.dataset.slot;

                // Try to equip held item
                const info = getItemInfo(heldItem);
                if (info && info.isArmor && info.armorSlot === slotName) {
                    const old = armorSlots[slotName];
                    armorSlots[slotName] = heldItem;
                    heldItem = old || null;
                    if (heldItem) showDragGhost(heldItem); else hideDragGhost();
                    refreshUI(); updateInventoryUI();
                }
            } else if (armorSlots[slotName]) {
                // Unequip
                heldItem = armorSlots[slotName];
                armorSlots[slotName] = null;
                showDragGhost(heldItem);
                refreshUI(); updateInventoryUI();
            }
        });
    });

    // Toggle crafting category
    invContentsEl.querySelectorAll('.craft-cat').forEach(el => {

    invContentsEl.querySelectorAll('.craft-row:not(.disabled)').forEach(row => {

    // Wire up click handlers for moving items
    invContentsEl.querySelectorAll('.inv-slot').forEach(slot => {
        slot.addEventListener('click', onInvSlotClick);
    });

// Click-to-move system: click a slot to pick up, click another to swap/place
// heldItem is declared in onInvSlotClick section above

// Inventory interaction — click to move items between hotbar and inventory
let heldItem = null;

function onInvSlotClick(e) {
    const slot = e.currentTarget;
    const area = slot.dataset.area;
    const idx = parseInt(slot.dataset.idx);

    if (!heldItem) {
        // ── Pick up from slot ──
        if (area === 'hotbar') {
            const item = hotbarSlots[idx];
            if (item && inventory[item] > 0) {
                heldItem = item;
                hotbarSlots[idx] = 0;
            }
        } else {
            // Get item key from the filtered inventory list (excluding hotbar items)
            const hbKeys = new Set();
            for (const s of hotbarSlots) { if (s) hbKeys.add(typeof s === 'number' ? s : s); }
            const allItems = Object.keys(inventory).filter(k => {
                const key = isNaN(k) ? k : Number(k);
                return inventory[k] > 0 && !hbKeys.has(key);
            }).map(k => isNaN(k) ? k : Number(k));
            const item = idx < allItems.length ? allItems[idx] : null;
            if (item && inventory[item] > 0) {
                heldItem = item;
            }
        }
        if (heldItem) showDragGhost(heldItem);
        refreshUI();
    } else {
        // ── Drop held item ──
        if (area === 'hotbar') {
            // Block placing a sword if another sword is already on hotbar (different slot)
            if (_isSwordItem(heldItem)) {
                const otherSwordIdx = hotbarSlots.findIndex((s, i) => i !== idx && _isSwordItem(s));
                if (otherSwordIdx >= 0) { return; } // can't have 2 swords
            }
            // Swap with hotbar slot
            const existing = hotbarSlots[idx];
            hotbarSlots[idx] = heldItem;
            heldItem = (existing && existing !== heldItem && inventory[existing] > 0) ? existing : null;
        } else {
            // Drop back — remove from any hotbar slot it might be on, it stays in inventory
            // Just clear held
            heldItem = null;
        }
        if (heldItem) showDragGhost(heldItem);
        else hideDragGhost();
        refreshUI();
    }
}

function showDragGhost(bt) {
    const info = getItemInfo(bt);
    if (!info) { hideDragGhost(); return; }
    dragGhostEl.innerHTML = `<div class="top-face" style="background:${info.top}"></div><div class="front-face" style="background:${info.front}"></div>`;
    dragGhostEl.style.display = 'block';
}
function hideDragGhost() {
    dragGhostEl.style.display = 'none';
    heldItem = null;
}
document.addEventListener('mousemove', e => {
    if (dragGhostEl.style.display === 'block') {
        dragGhostEl.style.left = (e.clientX + 10) + 'px';
        dragGhostEl.style.top = (e.clientY + 10) + 'px';
    }
});

updateHotbarUI();

// Key handlers: 1-9 for hotbar, I for inventory
document.addEventListener('keydown', e => {
    const num = parseInt(e.key);
    if (num >= 1 && num <= 9 && !inventoryOpen && !e.shiftKey) {
        selectedSlot = num - 1;
        updateHotbarUI();
        updateSpellSlotUI();
    }
    if (e.code === 'Escape' && settingsOpen) {
        settingsOpen = false;
        document.getElementById('settingsMenu').style.display = 'none';
        pauseMenuEl.style.display = 'flex';
    } else if (e.code === 'Escape' && furnaceOpen) {
        furnaceOpen = false;
        furnaceMenuEl.style.display = 'none';
        if (useMouseLook && gameStarted) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
    } else if (e.code === 'Escape' && craftingTableOpen) {
        craftingTableOpen = false;
        craftTableMenuEl.style.display = 'none';
        if (useMouseLook && gameStarted) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
    } else if (e.code === 'Escape' && anvilOpen) {
        anvilOpen = false;
        anvilMenuEl.style.display = 'none';
        if (useMouseLook && gameStarted) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
    } else if (e.code === 'Escape' && blastFurnaceOpen) {
        blastFurnaceOpen = false;
        blastFurnaceMenuEl.style.display = 'none';
        if (useMouseLook && gameStarted) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
    } else if (e.code === 'Escape' && chestOpen) {
        chestOpen = false; chestOpenKey = null;
        chestMenuEl.style.display = 'none';
        if (useMouseLook && gameStarted) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
    } else if (e.code === 'Escape' && !craftingTableOpen && !furnaceOpen && !anvilOpen && !blastFurnaceOpen && !chestOpen && !inventoryOpen && !mapOpen && gameStarted) {
        gamePaused = !gamePaused;
        pauseMenuEl.style.display = gamePaused ? 'flex' : 'none';
        if (!gamePaused && useMouseLook) setTimeout(() => renderer.domElement.requestPointerLock(), 100);
    }
    if (e.code === keybinds.inventory) {
        if (craftingTableOpen) { craftingTableOpen = false; craftTableMenuEl.style.display = 'none'; }
        if (furnaceOpen) { furnaceOpen = false; furnaceMenuEl.style.display = 'none'; }
        if (anvilOpen) { anvilOpen = false; anvilMenuEl.style.display = 'none'; }
        if (blastFurnaceOpen) { blastFurnaceOpen = false; blastFurnaceMenuEl.style.display = 'none'; }
        if (chestOpen) { chestOpen = false; chestOpenKey = null; chestMenuEl.style.display = 'none'; }
        inventoryOpen = !inventoryOpen;
        invScreenEl.style.display = inventoryOpen ? 'block' : 'none';
        if (inventoryOpen) {
            if (pointerLocked) document.exitPointerLock();
            updateInventoryUI();
        } else {
            if (heldItem) {
                const emptyIdx = hotbarSlots.indexOf(0);
                if (emptyIdx >= 0) hotbarSlots[emptyIdx] = heldItem;
                hideDragGhost();
                refreshUI();
            }
            // Re-lock pointer when closing menus in mouse look mode
            if (useMouseLook && gameStarted && !gamePaused) {
                setTimeout(() => renderer.domElement.requestPointerLock(), 100);
            }
        }
    }
});

// ── Block highlight (wireframe outline + face highlight) ──

// ── DDA Raycast helper ──
const _raycaster = new THREE.Raycaster();
const _mouse = new THREE.Vector2();

function raycastBlock(e) {
    if (pointerLocked || !e) {
        // When pointer locked or no event, ray from screen center (crosshair)
        _mouse.x = 0;
        _mouse.y = 0;
    } else {
        _mouse.x = (e.clientX / innerWidth) * 2 - 1;
        _mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    }
    _raycaster.setFromCamera(_mouse, camera);

    const origin = _raycaster.ray.origin;
    const dir = _raycaster.ray.direction;
    const BS = BLOCK_SIZE;
    const yOff = 128;

    let x = Math.floor(origin.x / BS);
    let y = Math.floor(origin.y / BS) + yOff;
    let z = Math.floor(origin.z / BS);

    const stepX = dir.x >= 0 ? 1 : -1;
    const stepY = dir.y >= 0 ? 1 : -1;
    const stepZ = dir.z >= 0 ? 1 : -1;
    const tDeltaX = dir.x !== 0 ? Math.abs(BS / dir.x) : Infinity;
    const tDeltaY = dir.y !== 0 ? Math.abs(BS / dir.y) : Infinity;
    const tDeltaZ = dir.z !== 0 ? Math.abs(BS / dir.z) : Infinity;
    let tMaxX = dir.x !== 0 ? ((dir.x > 0 ? (Math.floor(origin.x/BS)+1)*BS - origin.x : Math.floor(origin.x/BS)*BS - origin.x) / dir.x) : Infinity;
    let tMaxY = dir.y !== 0 ? ((dir.y > 0 ? (Math.floor(origin.y/BS)+1)*BS - origin.y : Math.floor(origin.y/BS)*BS - origin.y) / dir.y) : Infinity;
    let tMaxZ = dir.z !== 0 ? ((dir.z > 0 ? (Math.floor(origin.z/BS)+1)*BS - origin.z : Math.floor(origin.z/BS)*BS - origin.z) / dir.z) : Infinity;

    const maxSteps = Math.ceil(18 / BS) + 5;
    let prevX = x, prevY = y, prevZ = z;

    for (let i = 0; i < maxSteps; i++) {
        const block = world.getBlockAt(x, y, z);
        if (block !== BLOCK.AIR && block !== BLOCK.WATER && block !== BLOCK.BEDROCK) {
            // Face normal = direction we entered from
            const nx = prevX - x, ny = prevY - y, nz = prevZ - z;
            return { x, y, z, block, prevX, prevY, prevZ, nx, ny, nz };
        }
        prevX = x; prevY = y; prevZ = z;
        if (tMaxX < tMaxY) {
            if (tMaxX < tMaxZ) { x += stepX; tMaxX += tDeltaX; }
            else { z += stepZ; tMaxZ += tDeltaZ; }
        } else {
            if (tMaxY < tMaxZ) { y += stepY; tMaxY += tDeltaY; }
            else { z += stepZ; tMaxZ += tDeltaZ; }
        }
    }
    return null;
}

function rebuildNear(bx, bz) {
    chunkManager.rebuildChunkAt(bx, bz);
    const lx = ((bx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    const lz = ((bz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    if (lx === 0) chunkManager.rebuildChunkAt(bx - 1, bz);
    if (lx === CHUNK_SIZE - 1) chunkManager.rebuildChunkAt(bx + 1, bz);
    if (lz === 0) chunkManager.rebuildChunkAt(bx, bz - 1);
    if (lz === CHUNK_SIZE - 1) chunkManager.rebuildChunkAt(bx, bz + 1);
}

// Check if a wood block is part of a natural tree (has wood above + leaves nearby)
function isNaturalTree(bx, by, bz) {
    // Check if this wood block was player-placed
    if (world._modifiedBlocks.has(bx + ',' + by + ',' + bz)) return false;
    // Check for wood above and leaves somewhere in vicinity
    let hasWoodAbove = false, hasLeaves = false;
    for (let dy = 1; dy <= 10; dy++) {
        const b = world.getBlockAt(bx, by + dy, bz);
        if (b === BLOCK.WOOD) hasWoodAbove = true;
        if (b === BLOCK.LEAVES) { hasLeaves = true; break; }
        if (b === BLOCK.AIR && hasWoodAbove) {
            // Check around for leaves
            for (let dx = -2; dx <= 2; dx++) for (let ddz = -2; ddz <= 2; ddz++) {
                if (world.getBlockAt(bx + dx, by + dy, bz + ddz) === BLOCK.LEAVES) { hasLeaves = true; break; }
            }
            if (hasLeaves) break;
        }
        if (b !== BLOCK.WOOD && b !== BLOCK.LEAVES) break;
    }
    return hasLeaves;
}

// Tree felling — break all connected WOOD above, then flood-fill remove all connected LEAVES
function fellTree(bx, by, bz, rebuildSet) {
    // 1. Break all wood blocks going straight up
    let topY = by;
    for (let dy = 1; dy < 40; dy++) {
        const ty = by + dy;
        const b = world.getBlockAt(bx, ty, bz);
        if (b === BLOCK.WOOD) {
            addToInventory(getBlockDrop(b));
            world.setBlock(bx, ty, bz, BLOCK.AIR);
            rebuildSet.add(bx + ',' + bz);
            topY = ty;
        } else {
            break;
        }
    }
    // 2. Flood-fill break all leaves connected to where the trunk was
    // Search a generous box around the trunk column
    const R = 5, VR = 6;
    for (let dx = -R; dx <= R; dx++) {
        for (let dz = -R; dz <= R; dz++) {
            for (let dy = -2; dy <= VR; dy++) {
                const lx = bx + dx, ly = topY + dy, lz = bz + dz;
                if (world.getBlockAt(lx, ly, lz) === BLOCK.LEAVES) {
                    addToInventory(getBlockDrop(BLOCK.LEAVES));
                    world.setBlock(lx, ly, lz, BLOCK.AIR);
                    rebuildSet.add(lx + ',' + lz);
                }
            }
        }
    }
}
